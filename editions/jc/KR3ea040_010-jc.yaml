body:
  text: 卷九治法準則總論上古之人德性渾厚氣質堅強而無內傷之病或感外邪客於肌表故治宜針砭而少用湯液之法後世氣化漸薄人慾日滋稟質既弱邪易入內故針砭多有不宜自漢張仲景本內經之理立論制方為方脈之祖於是各分專科習方脈者不諳針砭之法也良以陰陽氣血由臟腑而出經絡周行於身是故不獨內傷虛證必需湯藥而經絡外邪湯藥可以自內達外而祛之故近世針砭之法罕用而精其術者鮮矣然治雖分科而理法則一要必洞明陰陽五行氣化之道臟腑經絡淺深之分營衛氣血流行之度以及稟質強弱外邪剛柔天時寒熱地勢高下無不詳審而盡知然後以望聞問切辨其病證而施治法方無錯誤故方脈為諸科之綱領也針灸須識經穴而有補瀉不同其法亦細若湯方必明藥性氣味而有寒熱溫涼浮沉升降輕重厚薄之別或入臟腑或行經絡或走氣分或走血分或收或散或泄或攻或補或瀉全在配合得宜故有君臣佐使之分奇偶大小之制而其理法比之針灸諸科精細而神妙下咽即入於內錯誤不能挽回故其利害亦比諸科甚重本非易為之事也夫君子以濟世為心達則兼善天下善天下當為相窮則獨善其身不可不知醫知醫未始不可以兼善雖然若強不知以為知不如不知之為善何也不知醫不能自善而已強不知以為知者始而害人終於自害斯報應必然之道也雖其本心原欲愈人之病而學術不明肆意自用殺人於冥冥中而不覺烏得無罪薄乎云爾日積月累薄者厚矣故曰擇術不可不慎也欲求寡過非潛心力究聖經理法不可經曰上工治病十全九下工治病十全六迨今之世有能十全六者亦可以功過相抵吾將稱之為上工也古之所謂上工者不可得而見之矣以故彙集經語以為方脈家治法準則苟志於仁者當三複而不可忽也自今以後惟方制之法為最要矣然病變萬端藥必因病而施倘辨證不明方有何用無益反害則有方不如無方也是故辨證尤在論治之先當於四診疾病諸門究之欲善其身不可不知此事欲善其事者可不利其器哉經解五方同病異治素問異法方宜論帝曰醫之治病也一病而治各不同皆愈何也岐伯曰地勢使然也故東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石故砭石者亦從東方來人稟天地之氣以生賴天地之氣以養五方具五行之氣故五方之民氣質各異以其氣質各異故為病雖同而治法不同者要必合其氣質之宜而不可犯其忌也是故天地之生氣始於東也東域濱海之地而民生養其地者食魚嗜鹽故熱中而色黑也東方陽氣生髮故其腠理常疏疏則外邪易入因其熱中而邪郁經脈故多成癰瘍治之宜用砭石以其為常用者故砭石之法亦從東方相傳而來者也西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不衣而褐薦華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥故毒藥者亦從西方來陰陽之氣轉旋於地外者東昇西降故西域之地其氣收引而肅殺其民陵居者居高阜故多風西屬金故水土剛強其氣收肅故腠理固密外邪勿能傷多食厚味故積滯之病生於內須用毒藥攻瀉而毒藥亦從西方來者民生此病天即產此藥以治之毒者峻猛之謂非鴆毒也北方者天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食臟寒生滿病其治宜灸爇故灸爇者亦從北方來氣之流行生於東旺於南降於西歸藏於北也陽伏於下則地上多寒冽之氣而化風燥故民樂野處而乳食食多因之臟受水寒而生中滿之病治宜灸焫故灸焫之法亦從北方來也焫與爇同南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆致理而赤色其病攣痹其治宜微針故九針者亦從南方來陽氣旺於南其時為夏故長養萬物者也其地勢卑下故水土弱而陽氣蒸騰常多霧露陽旺而氣散漫故民嗜酸斂之物其腠理致密而色赤也酸斂食多經脈不舒以致攣痹之病宜用針治以通經絡故九針之法亦從南方來也中央者其地平以濕天地所以生萬物也其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹺故導引按蹺者亦從中央出也五行之氣土居於中而主濕故其地平廣而多濕也土生萬物萬物聚於土故民稟土氣而雜食土性重濁故不喜勞動土主肌肉氣既濁滯則經脈亦不流通營衛不調故多痿厥寒熱之病治之宜用導引按蹺之法故其法亦從中央出也故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治之大體也五方風土生民氣質各有不同此常理也能知其常自通其變如南方之人亦有北方之病東方之人亦有西方稟質則其千變萬化固不可執一端而論者聖人察其病之所由循其氣化之理隨宜而治故同一病而治法各異皆能使之愈者以得其病情之所宜而知常變之理為治之大體也形志苦樂異病異治素問血氣形志論曰形樂志苦病生於脈治之灸刺形樂志樂病生於肉治之以針石形苦志樂病生於筋治之以熨引形苦志苦病生於咽嗌治之以百藥形數驚恐經絡不通病生於不仁治之以按摩醪藥是為五形志也審形志則不可拘執方宜之論可見矣形樂志苦者身逸心勞也心主血脈心勞氣鬱則多窒滯之病故當用灸刺以通血脈也形樂志樂過於安逸而脾氣不運脾主肌肉故病生於肉宜針砭以泄衛氣蓋血脈屬營肌肉屬衛形苦者勞力也勞力則傷筋志樂者心安而血脈和也筋傷則宜用火熨導引以筋比脈為凝滯故也形苦志苦則表裡皆傷經脈腑臟氣血盡乖而咽嗌為氣脈流行津液升降之地表裡氣乖故病生於咽嗌此內傷之病必用百藥調和培補而非外治所宜也如其形勞而多驚恐則氣鬱而經絡不通病麻木不仁當用按摩服以醪藥醪藥者藥酒也此謂五端形志之病治各不同也診治五過素問疏五過論帝曰凡診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並醫工診之不在臟腑不變軀形診之而疑不知病名身體日減氣虛無精病深無氣洒洒然時驚病深者以其外耗於衛內奪於營良工所失不知病情此亦治之一過也先富貴而後貧賤經憂患而傷氣血故其病為脫營失精情志抑鬱五臟之氣不舒留連為病並於一處如思傷脾怒傷肝之類醫者診之不知其所由見病不在臟腑而形軀不變遂疑之而不知病名迨身體日減精氣日損洒洒然而畏風寒惕惕然而時驚恐此其病已深者外耗衛氣故洒洒然內奪營血故時驚恐良工之所以失治者初由不知其病情此亦診治之一過也凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絕形體毀沮暴怒傷陰暴喜傷陽厥逆上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也飲食不節則傷脾胃起居不慎易受外邪以及苦樂喜怒皆傷陰陽精氣或陰陽偏勝厥逆則氣滿經脈而離去形體蓋從外溢而耗散也醫不知補瀉不知其病情則精華日脫而邪氣並積則病日深此診治之二過也善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也比類奇恆從容皆古經篇名凡脈候病狀陰陽氣化之道皆在其中醫者必知之而方為工如不知其道則臨證茫無端緒如此為工又安足貴故為診治之三過也診有三常必問貴賤封君敗傷及欲候王故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也此言醫者必審知其病情然後以嚴詞正色開導警戒使之恐懼善為調攝若言詞不能動其神情而柔弱以順其意亂診治之經常則不能移其病而藥亦無功醫事不行此診治之四過也凡診者必知終始有知餘緒切脈問名當合男女離絕菀結憂恐喜怒五臟空虛血氣離守工不能知何術之語常富大傷斬筋絕脈身體復行令澤不息故傷敗結留薄歸陽膿積寒炅粗工治之亟刺陰陽身體解散四肢轉筋死日有期醫不能明不問所發唯言死日亦為粗工此治之五過也其始也有外感內傷之不同其終也有表裡虛實之異病而變化多端為其餘緒耳醫者必當知之者也切其脈象問其病名或男或女合其一切證狀而知其為離合憂怒等種種病因吉凶死生之期如不能明不問其病之所發是為粗工此治之五過也凡此五者皆受術不通人事不明也故曰聖人之治病也必知天地陰陽四時經紀五臟六腑雌雄表裡刺灸砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之理審於部分知病本始八正九候診必副矣此總結五過皆由受術不通之故聖人必明天道人事以副診治之法也八正九候者八方九宮虛實邪正之風義詳疾病門診治四失素問徵四失論帝曰夫經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不十全者精神不專志意不理外內相失故時疑殆診不知陰陽逆從之理此治之一失也受師不卒妄作雜術謬言為道更名自功妄用砭石後遺身咎此治之二失也不適貧富貴賤之居坐之厚薄形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也診不中五脈百病所起始以自怨遺師其咎是故治不能循理棄術於市妄治時愈愚心自得嗚呼窈窈冥冥孰知其道道之大者擬於天地配於四海經絡在外臟腑在內明經絡流行之序循流溯源即可知臟腑之病用為診治之法若精神意志不能專切於理則外內相失時多疑殆也蓋陰陽為醫道之總綱人身陰陽合乎天地之陰陽為從反此為逆是治法之一失也受師教誨而不卒業雜學他術謬稱為道更其名目自以為功妄治諸病以遺身咎是二失也更不遵望聞問切四診之教自以為是乃至三失也既不知此理但持寸口憑臆揣度焉能中病妄言作名是粗工技窮此四失也是故診之不中五臟之脈百病所起始以自怨其術不精必且遺師過咎以盲授盲流害無盡如此謬術宜為城市所棄而妄治偶時幸愈愚心自以為得則學術永世不明矣此聖人道盡後世庸俗之通病也夫醫道微妙窈冥難測而道之大擬於天地配於四海或以小道忽之而不究心是輕性命而昧至理者也可慨哉素問五臟別論岐伯曰凡治病必察其下適其脈觀其志意與其病也拘於鬼神者不可與言至德惡與針石者不可與言至巧病不許治者病不必治治之無功矣察其下之二便知腑氣之通塞也候其脈之形象知營衛之和否也觀其志意之苦樂好惡知其發病之所因也如其拘於鬼神之虛誕不可與言聖道之至德也惡於針石者不可與言治法之巧妙也諱疾忌醫者其病不必治之治之徒勞無功斯醫者所當知也五臟五味主治素問臟氣法時論岐伯曰肝主春足厥陰少陽主治其日甲乙肝苦急急食甘以緩之心主夏手少陰太陽主治其日丙丁心苦緩急食酸以收之脾主長夏足太陰陽明主治其日戊己脾苦濕急食苦以燥之肺主秋手太陰陽明主治其日庚辛肺苦氣上逆急食苦以泄之腎主冬足少陰太陽主治其日壬癸腎苦燥急食辛以潤之開腠理致津液通氣也臟腑合為表裡者以其經絡相通也故陰經陽經合同主治也五臟具五行之性其氣太過不及則皆為病而主治各有所宜之藥藥之功能在氣味而用法變化之妙殆難言盡要必悟其至理方能隨宜而施也即如脾苦濕以苦燥之肺苦氣上逆亦以苦泄之是一味而治兩臟兩病也辛味本疏散而非潤燥之藥故下文云肝欲散急食辛以散之而此言腎苦燥急食辛以潤之者蓋以疏散而開腠理以通氣致津液也津液隨氣流通而歸藏於腎則腎不燥矣良以腎攝一身之津液而藏之以化精者也津液不流通故腎燥此用藥之妙理豈庸淺所能識即此數端觀之余可類推矣病在肝愈於夏夏不愈甚於秋秋不死持於冬起於春禁當風肝病者愈在丙丁丙丁不愈加於庚辛庚辛不死持於壬癸起於甲乙肝病者平旦慧下晡甚夜半靜肝欲散急食辛以散之用辛補之酸瀉之肝病主春厥陰少陽甲乙木也夏與丙丁火也火為木子子能令母實故愈於夏與丙丁也秋與庚辛金也金剋木故加甚於秋與庚辛也冬與壬癸水也水來生木故持於冬與壬癸也起於春與甲乙者本氣旺而病愈也肝為風木故病當禁風也平旦一日之春也故慧下晡一日之秋也故甚夜半一日之冬也故靜以辛散為補酸收為瀉也以下四臟皆同病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏禁溫食熱衣心病者愈在戊己戊己不愈加於壬癸壬癸不死持於甲乙起於丙丁心病者日中慧夜半甚平旦靜心欲軟急食鹹以軟之用鹹補之甘瀉之病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己脾病者日昳慧日出甚下晡靜脾欲緩急食甘以緩之用苦瀉之甘補之病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋禁寒飲寒衣肺病者愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛肺病者下晡慧日中甚夜半靜肺欲收急食酸以收之用酸補之辛瀉之病在腎愈在春春不愈甚於長夏長夏不死持於秋起於冬禁犯淬㗜熱食溫炙衣腎病者愈在甲乙甲乙不愈甚於戊己戊己不死持於庚辛起於壬癸腎病者夜半慧四季甚下晡靜腎欲堅急食苦以堅之用苦補之咸瀉之夫邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至於所生而持自得其位而起必先定五臟之脈乃可言間甚之時死生之期也以勝相加至自得其位而起者皆申明上文之理也故必先明此理見其病而審定五臟之脈方知其相生為間相剋為甚而死生之期可分別也肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉慄藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛辛散酸收甘緩苦堅咸軟毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五者有辛酸甘苦咸各有所利或散或收或緩或急或堅或軟四時五藏病隨五味所宜也天食人以五氣地食人以五味故以五穀為養五果為助五畜為益五菜為充而藥則辛酸甘苦咸淡六味性各有偏其峻毒者可用攻邪純良者可調氣血以之補偏救弊中病即止過則反傷蓋其收散緩急堅軟燥濕寒熱溫涼浮沉升降各有所宜所忌必合四時氣化五臟病證隨其所宜而取用也所忌者必當禁之如下文所云素問宣明五氣論曰辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食本經云形不足者溫之以氣精不足者補之以味是氣味本以養人而治病若多食則助氣令偏偏則為害何況已病故禁多食也本經言久而增氣物化之常也氣增而久夭之由也又云味過於酸肝氣以津脾氣乃絕之類皆傷於多食也靈樞五味論帝曰五味入於口也各有所走各有所病酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心余知其然也不知其何由願聞其故癃者小便閉也洞心者中氣耗散心中空洞無主也悗心者心內滿悶也少俞曰酸入於胃其氣澀以收上之兩焦弗能出入也不出則留於胃中胃中和溫則下注膀胱膀胱之胞薄以懦得酸則縮綣約而不通水道不行故癃陰者積筋之所終也故酸入而走筋矣此言酸收之味不能外引而下走膀胱膀胱胞薄得酸收而縮綣故不能承三焦氣化而泄水遂小便不通以成癃也膀胱在前陰前陰為宗筋所聚故為積筋所終之地此酸味所以走於筋也又如筋者肝所主酸先入肝故走於筋矣鹹入於胃其氣上走中焦注於脈則血氣走之血與咸相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本干而善渴血脈者中焦之道也故鹹入而走血矣中焦受氣取汁變化而赤是謂血隨氣入營而充於經脈者也故鹹味入中焦而使血凝凝則陽氣窒塞津液不能輸布而胃中水汁注之因而致渴由於鹹味凝血使然故知咸走血也辛入於胃其氣走於上焦上焦者受氣以營諸陽者也姜韭之氣熏之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出陽經之氣與衛陽之氣皆由上焦出行於表者辛味升浮故隨陽氣走表其性疏泄故與汗俱出汗者心之液也辛味久留心下而液傷氣耗則心中如空洞無主也苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也三焦之道閉則氣不能輸布而壅塞脘中氣不輸則津液不化故素問云味過於苦脾氣不濡胃氣乃厚津液不化故脾不濡潤氣壅脘中故胃氣厚謂厚濁之氣不下行故變嘔也骨者軀體至深之處因苦味閉氣不能外走而深入於骨既到深處無可復走則反走於胃而復嘔出也甘入於胃其氣弱小不能上至於上焦而與谷留於胃中者令人柔潤者也胃柔則緩緩則蟲動蟲動則令人悗心其氣外通於肉故甘走肉經曰五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎者是隨金木水火土之性而先入以助之也此言走者是入後而走之地其先合五行之性而入其後隨身中氣化而走則五走有不同如肝主筋而酸走筋肺主氣而辛走氣脾主肉而甘走肉是隨先入之臟氣而走也血脈心所主咸先入腎而走血骨者腎所主苦先入心而反走骨是皆隨身中氣化而走也明乎此則其補瀉宜忌之道可不失矣素問五臟生成論曰心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之所合也五臟之氣也此味與臟合五行之性故其所欲也上言酸先入肝等者以其所欲故先入也是故多食鹹則脈凝泣而變色多食苦則皮槁而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味之所傷也鹹入胃助水剋火脈為心之合色為心之榮故多食鹹則脈凝澀而變色也苦入心助火剋金皮為肺之合毛為肺之榮故多食苦則皮槁而毛拔也辛入肺助金剋木筋為肝之合爪為肝之榮故多食辛則筋急而爪枯也酸入肝助木剋土肉為脾之合唇為脾之榮故多食酸則肉胝䐢而唇揭也甘入脾助土剋水骨為腎之合發為腎之榮故多食甘則骨痛而發落也此以味助臟氣偏勝而致五行相剋為病者與上靈樞所云多食酸令人癃多食辛令人洞心等各有義理不同究之總不外陰陽氣化五行生剋之理能明其理自能知常通變頭頭是道而無拘執舛錯之弊也六氣主治素問至真要大論岐伯曰諸氣在泉風淫於內治以辛涼佐以苦甘以甘緩之以辛散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之火淫於內治以鹹冷佐以苦辛以酸收之以苦發之燥淫於內治以苦溫佐以甘辛以苦下之寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之六氣流行有主客之分主氣年年如是客氣逐年變化以第三氣主上半年為司天第六氣主下半年為在泉氣行於天上故曰司天氣行於地下故曰在泉義理詳運氣門也氣有太過不及有相生相剋因而變生諸病其為病也各有主治之法下文皆同司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之熱淫所勝平以鹹寒佐以苦甘以酸收之濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以甘辛以汗為故而止火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之熱淫同燥淫所勝平以苦溫佐以酸辛以苦下之寒淫所勝平以辛熱佐以苦甘以咸瀉之以上言在泉司天之氣為病之治法也六氣相勝治法帝曰邪氣反勝治之奈何岐伯曰風司於地清反勝之治以酸溫佐以苦甘以辛平之熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之火司於地寒反勝之治以甘熱佐以苦辛以鹹平之燥司於地熱反勝之治以平寒佐以苦甘以酸平之以和為利寒司於地熱反勝之治以鹹寒佐以甘辛以苦平之勝者如金勝木水勝火之類風為木氣清為金氣熱為火氣寒為水氣故風司於地清反勝之熱司於地寒反勝之余皆相同此言在泉之氣相勝之治法也帝曰其司天邪勝何如岐伯曰風化於天清反勝之治以酸溫佐以甘苦熱化於天寒反勝之治以甘溫佐以苦酸辛濕化於天熱反勝之治以苦寒佐以苦酸火化於天寒反勝之治以甘熱佐以苦辛燥化於天熱反勝之治以辛寒佐以苦甘寒化於天熱反勝之治以鹹冷佐以苦辛此言司天之氣相勝之治法也帝曰六氣相勝治之奈何岐伯曰厥陰之勝治以甘清佐以苦辛以酸瀉之少陰之勝治以辛寒佐以苦鹹以甘瀉之太陰之勝治以咸熱佐以辛甘以苦瀉之少陽之勝治以辛寒佐以甘鹹以甘瀉之陽明之勝治以酸溫佐以辛甘以苦泄之太陽之勝治以甘熱佐以辛酸以咸瀉之此言六氣相勝不論主客以其氣之太過為病之治法也六氣相復治法帝曰六氣之復治之奈何岐伯曰厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之以苦發之以咸軟之太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之少陽之復治以鹹冷佐以苦辛以咸軟之以酸收之辛苦發之發不遠熱無犯溫涼少陰同法陽明之復治以辛溫佐以苦甘以苦泄之以苦下之以酸補之太陽之復治以咸熱佐以甘辛以苦堅之氣勝者偏旺也旺必有衰故曰有餘而往不足隨之不足而往有餘次之乃消長自然之理其旺也以己克彼為勝既衰則彼克己為復如火旺剋金為勝火衰則水來剋火為復余皆相同其勝其復皆五行偏氣故各以氣味而主治之也治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者軟之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也此總結上文之義也六氣勝復之義帝曰氣之上下何謂岐伯曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半所謂天樞也故上勝而下俱病者以地名之下勝而上俱病者以天名之所謂勝至報氣屈伏而未發也復至則不以天地異名皆如復氣為法也人身一小天地故身半以上天氣主之為初之三氣身半以下地氣主之為後之三氣以名定氣以氣定處而分別其為病也上下交接之中名為樞故上勝下病者以在泉名之下勝上病者以司天名之名之而可辨病以立治法也當其勝時其報復之氣伏而未發及其復氣既發六氣皆同故不分司天在泉之名而以六氣勝復為治法也帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否主客六氣流行皆有定時故時有常位也其生克由太過不及而變化勝復之氣若無太過不及則無生克故必有勝方有復無勝則無復而氣無必定者也以上義理皆當與運氣門合觀標本逆從素問標本病傳論岐伯曰夫陰陽逆從標本之為道也小而大言一而知百病之害少而多淺而博可以言一而知百也以淺而知深察近而知遠言標與本易而勿及治反為逆治得為從先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本人有客氣有同氣小大不利治其標小大利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹察間甚以意調之間者並行甚者獨行先小大不利而後生病者治其本夫陰陽之理包括甚廣能明陰陽則逆從標本之道在其中矣假如天地四時有陰陽之分人身經絡有陰陽腑臟血氣有陰陽脈象有陰陽外邪六氣有陰陽故有陰虛陽盛者有陽虛陰盛者有陽邪傷陰分者有陰邪傷陽分者內傷外感之病變化莫可數計陰病見陽脈為從陽病見陰脈為逆合天地四時之氣化為從反天地四時之氣化為逆先病者為本後病者為標發病之因為本所現病狀為標是故因氣血虛而生病者虛為本補虛則病自愈因病而傷氣血者病為本治病則氣血和能知陰陽虛實逆從標本之道則自小而大少而多淺而深言一病即可知百病為害之理也順其理而治之為從反其理而治之為逆故必辨其標本而治分先後也惟中滿與小大便不利者不論標本必當先治蓋百病由於氣血不和必中宮二便通利方能和其氣血故中滿及二便不利者必當先治也然治之亦必審其陰陽虛實之因審其因者亦是治其本也由是言之萬病皆當治本故經曰治病必求其本也夫先病亦為本後病亦為標客氣者先病之邪氣也同氣者言後病同是先病之邪所變非有他氣也故治其本則標自愈矣邪氣盛者為有餘故當先治其本以除邪後和其氣以治標元氣虛者為不足故當先助其氣以治標後治其本以除邪此標本逆從皆由陰陽虛實之變化故明陰陽虛實則標本逆從之道自明而病之傳變亦有逆從以五臟相生而傳為從為間五臟相剋而傳為逆為甚假如心病傳脾是火生土為間間者病輕可並心脾兩臟而治之其愈易也如心病傳肺是火剋金為甚甚者病重當獨治其一臟或瀉心以保肺或救肺以去邪為難愈也故必謹察間甚用意調之也又申說先小大不利而後生病者治其本見得二便不利尤當急治也陰陽氣化逆從素問方盛衰論雷公請問氣之多少何者為逆何者為從帝曰陽從左陰從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生是以氣多少逆皆為厥此明逆從由陰陽之氣所致而天地之陰陽與人身陰陽無二也陽從左旋而上升陰從右旋而下降升者根於下降者根於上老者衰而氣從上降少者壯而氣從下升升者如春夏之氣降者如秋冬之氣故少年歸春夏為生歸秋冬為死老者反之歸秋冬為生歸春夏則孤陽上亢為死矣歸者合乎春夏秋冬之氣化也如不合氣化則逆之而為厥病也問曰有餘者厥耶帝曰一上不下寒厥到膝少者秋冬死老者秋冬生氣上不下頭痛顛疾求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日此言非氣有餘而為厥是陰陽偏勝而厥逆也老少之氣雖如春夏秋冬之異而升中有降降中有升皆陰陽通和相生之氣故無病也如或偏勝其陽上亢而不降足冷到膝厥逆甚矣少年陽旺於下又值秋冬陽氣下歸而至厥逆如是則其陽之上亢已極必至偏絕而死也若老年陽衰於下其厥冷非亢極而非偏絕則不死也蓋陰陽互相為根陰虛陽亢則根脫而絕故下文云至陰虛天氣絕至陽盛地氣不足陰陽並交陽氣先至陰氣後至良以陽先動陰必隨之自然之性也故氣上逆不下必頭痛為巔頂之疾至厥逆甚其氣流散故求陽不得求陰不審五行部位皆隔絕而無可徵驗若曠野空室之茫無端緒可見綿綿垂絕之息不能滿日而死也至陰虛天氣絕至陽盛地氣不足陰陽並交至人之所行陰陽並交者陽先至陰後至是以聖人持診之道先後陰陽而持之身半以上天氣主之身半以下地氣主之天氣根於地地氣根於天偏勝則偏亢亢絕則偏絕是故陰陽之氣和平則升降循序相交相生此至人所行修煉之功也道家名升降為火候而有坎離交乾坤交之不同當其升降相交二氣融洽則必陽氣先至陰氣後至聖人洞明此理故持診之道必循其先後陰陽氣化之序而持守之以為診治法則不明乎此則必失其道矣是以形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生是以診有大方坐起有常出入有行以轉神明必清必淨上觀下觀司八正邪別五中部按脈動靜循尺滑澀寒溫之意視其大小合之病能逆從以得復知病名診可十全不失人情故診之或視息視意故不失條理道甚明察故能長久不知此道失經絕理妄言妄期此謂失道上明陰陽之理此明標本之道也形弱氣弱則標本皆敗形有餘脈不足則枝茂而根枯故皆死也脈有餘形不足則生良以脈為陰陽之根本而形質為枝葉也是以診病之大方大法必先自立規矩坐起出入宜端品行必清必淨而心神方明然後上觀天時八風之邪正下觀病人五官之部位辨別四診之道合其病能之逆從要診治之十全必不失其人情人情不洽名信未孚縱使術優藥難奏效而人情之難洽自古相同或視其聲息或視其心意皆當不失醫道之條理道既明察庶能行之長久如不知此非流於庸淺則習於誕妄欺人自欺是謂失道嗚呼觀此知聖人警誨後學之意深矣靈樞根結篇帝曰形氣之順逆奈何岐伯曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也當瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也形體豐盛為形氣有餘消瘦為形氣不足其行坐便捷躁擾不安為病氣有餘不能行坐倦臥聲低為病氣不足形貌雖消瘦而病氣有餘者元氣與邪爭競故當急瀉其邪形體雖豐盛而病氣不足者本元內虧邪不能達故當急補其本以達邪如形氣病氣俱不足則陰陽俱虧之危證故不可刺刺則更傷陰陽氣血必致老者絕滅壯者不能復元矣如形氣病氣俱有餘當瀉其邪則元氣自和故當審察其虛實而調之有餘瀉之不足補之也陰陽表裡治法素問陰陽應象大論岐伯曰治不法天之紀不用地之理則災害至矣邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也故天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈診治之道不法天地陰陽氣化之理非但無益而又害之所以有不藥為中醫之說也虛邪賊風傷人迅疾善治者乘其淺處而速治之否則邪入日深以至傷臟其不死也幾希矣天之邪氣感則害五臟者良以天氣通於肺風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎也水穀之寒熱害六腑者以水穀產於地而地氣通於嗌嗌為六腑之大門也若地之濕氣在下但害身表之皮肉筋脈不能入於臟腑此猶火就燥水流濕本乎天者親上本乎地者親下乃天人合一之理也故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微則知過用之不殆善診者察色按脈先別陰陽審清濁而知部分視喘息聽聲音而知所苦觀權衡規矩而知病所主按尺寸觀浮沉滑澀而知病所生以治無過以診則不失矣故曰病之始起也可刺而已其盛可待衰而已故因其輕而揚之因其重而減之因其衰而彰之形不足者溫之以氣精不足者補之以味其高者因而越之其下者引而竭之中滿者瀉之於內其有邪者漬形以為汗其在皮者汗而發之其慓悍者按而收之其實者散而瀉之審其陰陽以別剛柔陽病治陰陰病治陽定其氣血各守其鄉血實宜決之氣虛宜掣引之此即皮肉筋脈之病而宜用針者言之也皮肉筋脈雖屬軀體而根於陰陽資乎血氣與臟腑相通貫者故善治者必本陰陽之理從陰引陽從陽引陰以右治左以左治右使陰陽氣血營衛經絡流通調達以我之心知彼之身視其現表之證知其內臟之病觀過與不及之處能見微而知著以為準則而平其過如此用針可以無殆而用藥之法亦然矣故善診者要在察色按脈先別陰陽之理審其為清邪濁邪知部分辨其病在何經視喘息聽聲音知其所痛所苦觀權衡規矩知其病之或主於陽或主於陰或虛或實或表或里按尺寸之脈觀浮沉滑澀可知其病所由生或由內傷或由外感如是詳審無誤治之庶可無過而不失矣故病之始起而邪淺可用針刺而已如邪盛多刺之待其邪衰而已或針或藥當觀邪之重輕正之虛實隨宜而施是故因其輕邪即用輕法而揚之散之因其重邪即用重法而減之損之因其邪衰即當調補正氣而彰之若邪退而正氣委頓不振久成虛怯但助正之法又當分別如形不足者溫之以氣氣能充形也精不足者補之以味味能生精也其或邪在上部者因而發越之如開提探吐之類其在下部者導引而竭之如疏氣通便之類中滿者則瀉其內外邪在表者漬形以發汗如藥氣蒸洗之類其在皮者汗而發之其邪勢慓悍或用按摩導引而收伏之其正氣實而不虛者邪在表則散之在裡則瀉之故凡治法必辨虛實審其陰陽孰為偏勝別其剛柔孰為逆從陽病治陰陰病治陽即上文相引之義使陰陽通和而平定其血氣各守其部位則無鬱結漫溢之病故如血實壅滯者宜攻決而去之其氣自和氣虛不振者宜提掣而引之其血自調此言診治之法則可謂詳盡矣治病必求於本故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑已詳註在臟腑門重錄於此者以為診治之理法最當究心者也水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰薄為陰之陽氣厚者為陽薄者陽之陰味厚則泄薄則通氣薄則發泄厚則發熱壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣水火者陰陽之徵兆寒熱者陰陽之體性氣味者陰陽之變化變化而後成形質有金木水火土五行之分而一行中仍具陰陽之性故陽化氣陰成形而有甲乙丙丁戊己庚辛壬癸之十干也味歸形者形質由氣味而成也形歸氣者形由氣以生長由氣以消化也氣歸精者氣由精以翕聚無精則氣渙散是陽根於陰也精歸化者精由氣以生化無氣則精不成是陰根於陽也精食氣者精能翕氣而使固密也形食味者形資於味而能充旺也化生精者味得氣化而後生精氣生形者氣必先生而後形長此皆陰陽生化自然之性也是故稟陰陽以生者必賴陰陽氣味以養也如或太過不及皆有所傷味本生形味太過則反傷形氣本生精氣太過則反傷精蓋陰陽之性互相生化陰精得陽而化氣如水之蒸騰陽氣得陰而化精如膏之凝結所以陰味太過則反傷氣陽氣太過則傷精必然之理也以陰味降而就下陽氣升而行上故氣味均平則升降調和偏勝則必傷矣然氣味皆有厚薄而入於人身則有表裡淺深不同以其輕清上浮重濁下降故功用各別而有疏泄通利發泄發熱之殊必使陰陽和平方無病患若陽太過則火壯使氣耗散而反衰乃為壯火所食也氣得少火則生旺故氣食少火也是故壯火則散氣少火則生氣用氣味以調之者不可不知此理也氣味辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄此承上文詳氣味之功用若陰陽偏勝則傷害形氣也是故陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒重寒則熱者陰極變陽也重熱則寒者陽極變陰也寒傷形熱傷氣氣傷痛形傷腫者寒與形屬陰熱與氣屬陽氣傷陽郁故痛形傷陰滯故腫此指內傷陰陽之氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄者言六氣外邪為病之狀與上文傷形傷氣各有義理且病邪之變化更非一定蓋寒熱皆能傷形而形傷則腫寒熱皆能傷氣而熱傷則痛寒傷則浮也良以稟質有強弱形氣受傷有重輕而病之變化莫可數計要必審其所因明其至理隨宜施治斷不可膠柱鼓瑟也靈樞終始篇曰明知終始五臟為紀陰陽定矣陰者主臟陽者主腑陽受氣於四末陰受氣於五臟和氣之方必通陰陽人身本元之氣根於臟而外行肢表分其陰陽以臟為陰腑為陽陰經之氣從臟而行於四肢指末之裡交接指外陽經之氣故言陰受氣於五臟陽受氣於四末是謂陽經陰經之氣所始也陰陽交接流行終而復始如環無端故和氣之方必通其陰陽使內而臟腑外而經絡周流而無阻滯方無病也所謂氣至而有效者瀉則益虛虛者脈大如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脈大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實瀉則虛必先通十二經脈之所生病而後可得傳於終始矣故陰陽不相移虛實不相傾取之其經陰盛則陽虛先補其陽後瀉其陰而和之陰虛而陽盛先補其陰後瀉其陽而和之氣至而有效者言元氣之虛實邪氣之進退皆有應效可驗也假如用法瀉之則益虛虛者其脈象雖大略如舊必虛軟而不堅也若仍堅者適雖言如舊而其病未去也假如用法補之則益實實者其脈象雖大略如舊必更堅而有力也若不更堅者適雖言暢快而其病未去也此以脈為準而辨虛實以用補瀉之法補者補其正瀉者瀉其邪故必先通十二經脈所生病狀部位然後應補應瀉方能合理而傳終始之道故陰陽之理不相移易虛實之道不可偏傾調之當取其經此言針法而用藥亦同一理如陰盛陽虛先補其陽後瀉其陰陰虛陽盛先補其陰後瀉其陽是為調和之法也從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之病先起陰者先治其陰而後治其陽病先起陽者先治其陽而後治其陰陽明行氣於三陽太陰行氣於三陰故太陰陽明主一身之陰陽也手經之氣行於上身故手太陰陽明皆主之足經之氣行於下身故足太陰陽明皆主之此統言臟腑經絡之氣也蓋陰陽氣血之流行表裡循環者也至其為病必先治發病之處所謂治本而和標也氣味生化主治素問五常政大論帝曰氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也然五味所資生化有薄厚成熟有少多始終不同其故何也岐伯曰地氣制之也非天不生而地不長也寒熱燥濕不同其化也故少陽在泉寒毒不生其味辛其治苦酸其谷蒼丹陽明在泉濕毒不生其味酸其氣濕其治辛苦甘其谷丹素太陽在泉熱毒不生其味苦其治淡咸其谷黅秬厥陰在泉清毒不生其味甘其治酸苦其谷蒼赤其氣專其味正少陰在泉寒毒不生其味辛其治辛苦甘其谷白丹太陰在泉燥毒不生其味鹹其氣熱其治甘鹹其谷黅秬化淳則咸守氣專則辛化而俱治陽化氣陰成形故萬物由天氣而生地氣而成者也五味之厚薄成熟之多少不同者由地制之以地為陰味為陰也其氣之寒熱燥濕變化不同故味之厚薄成熟有異而氣化和平則性味純良氣化乖戾則性味毒厲凡物皆然不獨五穀藥石也少陽在泉者相火之氣在地下也故寒毒不生其所生之味辛其治病之味宜苦酸其所成谷色蒼丹也陽明為燥金故濕毒不生太陽為寒水故熱毒不生厥陰為風木主春溫之氣故清毒不生清者秋涼之氣也少陰為君火故寒毒不生太陰為濕土故燥毒不生此明三陰三陽變化寒熱燥濕之氣而成味以治病其谷色各有不同也故曰補上下者從之治上下者逆之以所在寒熱盛衰而調之故曰上取下取內取外取以求其過能毒者以厚藥不勝毒者以薄藥此之謂也氣反者病在上取之下病在下取之上病在中旁取之治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之故消之削之吐之下之補之瀉之久新同法此明氣味補養治病之道也身半以上為司天之氣所主身半以下為在泉之氣所主補者因其不足而助之也治者因其偏勝而平之也故補者從其氣如火不足以溫熱氣味從而助之治者逆其氣如火有餘以寒涼氣味逆制之隨其寒熱之盛衰或補或瀉而調之使平也審其上下內外而取之以求其過之所在如稟強而能受毒者則用厚重之品不勝者用輕薄之品當因宜而施也氣反者如上為陽應熱盛而反寒盛下為陰應寒盛而反熱盛此陰陽乖戾不和故上病當治下以和上下病當治上以和下假如虛熱上浮而用下部引火歸源之藥陽氣下陷而用上部升提陽氣之藥其病在中取之旁者用氣味橫行之藥而不升降者也治熱用寒藥寒性凝滯故當溫而行之藉溫氣以行寒性不致停留也治寒用熱藥熱性剛暴故當涼而行之藉涼氣以消暴性不致格逆也治溫用清清者力弱故當冷而行之以消溫氣也治清用溫溫亦力弱故當熱而行之以消清氣也蓋寒熱力猛溫清皆輕薄也此以氣味之厚薄而用之又有寒熱溫涼之分乃為法中之法也故凡消之削之吐之下之補之瀉之不論病之新久皆當同用變化隨宜之活法不可略有拘執也帝曰病在中而不實不堅且聚且散奈何岐伯曰無積者求其藏虛則補之藥以祛之食以隨之行水漬之和其中外可使畢已不實不堅且聚且散無形之氣鬱也並無有形之積者由臟虛而氣不足故不通暢當補其虛藥祛其病食隨補之或郁在表以藥水漬之而和其中外可使畢已也帝曰有毒無毒服有約乎岐伯曰病有久新方有大小有毒無毒固宜常制矣大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法必先歲氣無伐天和無盛盛無虛虛而遺人夭殃無致邪無失正絕人長命不論藥之有毒無毒固宜照常制方法如奇偶之類而治病當分別其毒之微甚及無毒者皆不可過用以穀肉果菜調養以盡其余病如藥太過則反傷其正也倘病未盡再用前法以治之而必先審歲氣如司天在泉勝氣復氣如上所云風淫於內治以辛涼之類又如冬至後得甲子少陽旺次太陽旺之類皆當順氣化以治勿伐其天和之氣也故勿助其旺而使盛盛勿瀉其衰而使虛虛以遺人夭殃無致其邪無失其正而絕人長命也帝曰其久病者有氣從不康病去而瘠奈何岐伯曰化不可代時不可違夫經絡已通血氣以從復其不足與眾齊同養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也此言久病傷其元氣病雖去乃疲瘠而不康健者未能治之速愈也蓋氣化流行非人力所能代時序分布非人事所可違其經絡已通而血氣流行已從其舊是病去而本氣不足也要復其本氣與眾人齊同者須養之和之善為調理靜以待時謹慎保守其元氣無使傾失而改移則其形體乃彰彰者盛也以氣為體之充如是而生氣以長其體自康此聖王之教也故曰無代化無違時必養必和待其來復此之謂也方制治法素問生氣通天論帝曰陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絕味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命本經言天食人以五氣地食人以五味是稟陰陽五行以生者必賴陰陽五行以養也味出於地屬陰故陰血之生本在五味也五宮者五臟也屬陰故陰之五宮傷在五味也蓋食物由腑消化而氣味各以類從氣歸陽而走表味歸陰而入臟五味五臟同具五行之性故各從其類雖賴氣味以養而生氣血若太過則反傷矣故本經言久而增氣物化之常也氣增而久夭之由也增久則偏勝矣所以味過於酸酸味助肝肝氣以津者津水上泛也蓋木強土困則脾氣隔絕不能輸布津液故食酸者水溢於口也味過於咸鹹味助腎腎主骨脾主肉鹹味陰凝使陽氣窒塞故骨勞肌短皆形容骨肉不能舒和之象水盛制火則心氣抑而不暢也味過於甘甘味助脾而上壅故心下氣喘而滿悶土旺制水則腎病其色黑而氣不平矣味過於苦苦味助心而閉氣氣閉使脾無津液濡潤蓋脾主為胃行津液者也津液不化而胃中厚濁之氣反壅故食苦多者每致嘔逆也味過於辛辛味助肺肺旺克肝肝主筋以辛散太過致筋脈沮弛沮者消敗也弛者縱緩也如是則使精神央矣央者過午而衰之義也是故當謹和五味不可偏勝而得其滋養則骨正筋柔氣血流通腠理致密長有天命矣素問至真要大論帝曰五味陰陽之用何如岐伯曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅以所利而行之調其氣使其平也五味加淡共有六味六味各有性能不同故功用各異酸者收辛者散甘者緩苦者燥咸能潤下而軟堅淡能滲泄而利氣以所利而行之者隨宜而用也務調其氣使之平而後已詳在下文帝曰非調氣而得者治之奈何有毒無毒何先何後岐伯曰有毒無毒所治為主適大小為制也君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故上節言調其氣使其平帝欲推廣其義故言非獨調氣而得善治之法者奈何其氣味有毒無毒制度何先何後岐伯言不論有毒無毒以所治其病之藥為主視病之輕重適方之大小為制也主病之藥為君如傷寒用麻黃傷風用桂枝之類傷寒無汗故用桂枝為臣以助發表傷風有汗故用芍藥為臣以養營陰麻黃桂枝發散力猛故用杏仁降氣甘草和中桂枝湯中芍藥恐其收澀故加姜以開肺氣甘草大棗和中皆為佐使之品而制方之大法余可類推矣藥有寒熱溫涼故病之寒者熱之熱者寒之微者逆之以病氣不甚用藥逆而制之也甚者從之以病氣勢甚須從其勢以治之下文申明也堅而有積必峻利之品以破削之也外客之邪必先除去方可調其正氣也其勞傷元氣者須甘溫以培養之也其鬱結者疏散以開之留滯者攻奪以去之枯燥者濡潤之急強者柔緩之散者收之損者益之逸者多氣滯故當行其氣血驚者神氣浮故當重藥鎮平之在上治其上在下治其下上逆使其下順下陷使其上升或用按摩或用熏洗薄之劫之開之發之皆針灸砭石之法適其事之所宜而已適者從也故者事之所以然也帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已帝曰善氣調而得者何如岐伯曰逆之從之逆而從之從而逆之疏氣令調則其道也以熱治寒以寒治熱逆制其病是為正治之法也反治者以病氣勢甚必與藥氣相格或下咽即吐或變出他病當於熱藥中佐寒藥寒藥中佐熱藥以從氣為引導而從少從多觀其事之所宜故曰熱因寒用寒因熱用其塞其通凡病勢甚者皆當用反佐之法必伏其所主治之藥而先其所因之藥故始則藥氣與病和同而相洽終則藥氣與病相異而制之或熱藥冷服冷藥熱服則藥與病氣亦始同終異如是可使破積潰堅氣和而必已也要藥氣與病調和相得或先逆後從或逆從並用或先從後逆必疏其氣血調暢則其為治之道也夫子曰人而不仁疾之已甚亂也蓋小人之為惡者以其利慾之心甚而昧理也若因其所利而導其為善彼知君子亦有利益亦必從而為君子矣若逆之太甚則必作亂而治病之道亦然也帝曰病之中外何如岐伯曰從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內中外相得及則治主病內臟腑外經絡部位有淺深病邪有輕重此最要詳辨而不可誤也從內之外調其內從外之內治其外治其發病之本也其病盛者先治其本後治其標也倘病發於外而誤治其內則內虛而病反深入病發於內而誤治其外則外傷而內病更重如病不盡在內不盡在外如虛勞等類則當治其主病或主於氣或主於血或主於陰或主於陽隨其病而治之也帝曰火熱復惡寒發熱有如瘧狀或一日發或間數日發其故何也岐伯曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相搏盛衰之節瘧亦同法陰陽五行之氣流行必有衰旺故有勝復如火旺則必剋金及其衰也則水復侮之水為金子故云子為母復仇所以熱極必寒寒極必熱陰陽氣化自然之道也人在氣交之中而受病以應勝之氣以氣之會遇有多少故發病如瘧狀陰性遲鈍故陰多陽少則發日遠陽性迅速故陽多陰少則發日近此勝復盛衰之氣相迫而瘧病及治法亦同也帝曰有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治岐伯曰諸病寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也薛生白注諸寒之而熱者謂以苦寒治熱而熱反增非火之有餘乃真陰不足也只補陰以配陽則陰氣復而熱自退故曰取之陰也熱之而寒者謂以辛熱治寒而寒反增非寒之有餘乃真陽不足也但補水中之火則陽氣復而寒自消故曰取之陽也屬者根本之謂是益火之源以消陰翳壯水之主以制陽光所謂求其屬也帝曰服寒而反熱服熱而反寒何也岐伯曰治其旺氣是以反也旺者天地人身陰陽偏旺之氣非外邪之氣也外邪可用熱治寒用寒治熱而愈其偏旺之氣由陰虛則陽旺而熱必滋陰以和陽則熱退陽虛則陰旺而寒必補陽以和陰則寒去如上節所云當求其屬也大抵陰陽之道此旺則彼虛彼旺則此虛天地之氣亦然明乎此方可論診治之法帝曰不治旺而然者何也岐伯曰不治五味屬也夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常氣增而久夭之由也人身之氣隨天地之氣而衰旺春夏陽盛於上而衰於下秋冬陰盛於上而衰於下陽衰則陰旺陰衰則陽旺此進退升降之定理也其氣之旺不可逆也以春夏陽氣升旺而陰氣逆之則奮發為雷故治病必明陰陽氣化之理然又有不治旺氣而用寒治熱而反熱用熱治寒而反寒者蓋由五行之氣偏駁也五臟具五行之性五味入胃各入其臟而助之久必增其氣氣增而久則臟氣偏勝五行皆本於陰陽五行偏則陰陽亦偏偏勝極必偏絕如雲味過於酸肝氣以津脾氣乃絕之類故曰氣增而久夭之由也所以不治旺氣而相格者由不善治五味之屬故也人身一小天地夏至後地上熱而井中寒人身經絡熱而臟中寒也冬至後地上寒而井中熱則人臟中熱而經絡寒也故夏名伏陰外陽內陰也冬名伏陽外陰內陽也此診治者尤不可不知也帝曰氣有多少病有盛衰治有緩急方有大小願聞其約岐伯曰氣有高下病有遠近證有中外治有輕重適其至所為故也君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君三臣六偶之制也故曰近者奇之遠者偶之汗者不可以奇下者不可以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也病所遠而中道氣味之者食而過之無越其制度也是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也此言制方之道必審病氣之高下遠近中外輕重而使藥氣適至其病所為準也奇者陽數偶者陰數病所近而用奇取其陽性直捷也病所遠而用偶取其陰性遲緩也蓋藥先入胃然後分行表裡故以腑為近經為遠汗不可以奇者陽性直捷未及行於經絡而藥氣已消也下不以偶者腑邪實結陰性遲緩攻奪無力也藥氣柔緩則隨陽氣而上行故補上治上用緩法也藥氣迅急則直降而下達故補下治下用急法也氣味厚者急氣味薄者緩必以適至病所也若病所遠而藥至中道氣味消散須進粥食以助藥氣行過中道而之病所則當食前服藥也大抵近於胃者為近遠於胃者為遠良以藥氣必隨胃中生化之氣流行而外走經絡內入腑臟則以氣味之厚薄而各至其處是故制方之道要明營衛氣血流行之序而無越其遠近緩急之度也奇偶之法遠近皆用近者小制遠者大制大者數少而分兩重其力專故能遠達小者數多而分兩輕其力弱故止於近處若用奇而病不去即用偶法謂兩方合用以成偶名重方重者復也如麻桂各半湯之類若偶之又不去則藥病相格而反佐以取之即熱因寒用寒因熱用之法從其性以導引之也帝曰病生於本余知之矣生於標者治之奈何岐伯曰病反其本得標之病治反其本得標之方發病之因為本所現病狀為標故反求其因則得其標之病狀治之之法反求其本即得其標病之方如知其因於風寒而用麻桂等法即為治身熱頭痛不因於風寒則不用麻桂等藥是故審病必反求其本治病必反求其本能知其本自得其標之方也帝曰方制君臣何謂也岐伯曰主病之為君佐君之為臣應臣之為使非上下三品之謂也帝曰三品何謂岐伯曰所以明善惡之殊貫也不論溫涼補瀉有毒無毒必以主治其病之藥為君其相助者為臣導引者為佐使此制方之定理也若奇偶大小緩急復之七方是因病而施之活法必當隨宜變化則無窮盡故自仲景立方以後繼續之方莫可數計要如仲景方之精妙者鮮矣其妙用全在氣味厚薄寒熱溫涼浮沉升降結構得法故仲景之方用之合病其效如神非後人之方可同語也神農本草經藥分上中下三品以彆氣味良毒優劣而與制方之君臣佐使各有義理不同也帝曰病之中外如何岐伯曰調氣之方必別陰陽定其中外各守其鄉內者治內外者治外微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利謹道如法萬舉萬全氣血正平長有天命各守其鄉者如上所云在上治上在下治下從內之外者調其內從外之內者調其外則凡陰陽表裡經絡臟腑不可不詳辨而病邪微者用輕法以調和之其次平定之其邪盛者用重法以攻奪之或宜汗或宜下必審其寒熱溫涼而衰之以屬屬者發病之因為邪氣之本衰削其本則標病自愈故曰隨其攸利而謹守其道如法而治則萬舉萬全氣血正平長有天命矣素問六元正紀大論岐伯曰發表不遠熱攻裡不遠寒帝曰不發不攻而犯寒犯熱何如岐伯曰寒熱內賊其病益甚帝曰無病者何如岐伯曰無者生之有者甚之帝曰生者何如岐伯曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘛腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閟之病生矣帝曰治之奈何岐伯曰時必順之犯者治其勝也熱為陽氣升浮走表故發表不遠熱寒為陰氣沉降走里故攻裡不遠寒皆因宜而施也若非發表攻裡只當用平和氣味如不遠之而犯寒犯熱則無病者生病有病者必甚矣寒至則堅痞腹滿痛急下利等病生矣皆陰氣凝滯故也熱至則身熱等病生瞀者頭目昏冒瞤者肌肉動跳瘛者手足抽掣以及淋閟等皆邪熱肆擾鬱結之故也治之必順時令氣候而調之若其犯寒犯熱以及逆時令之氣化者審其氣之勝者而平治之或以相勝之氣制之如金制木水制火之類使之調和而後已帝曰婦人重身毒之何如岐伯曰有故無殞亦無殞也帝曰何謂也岐伯曰大積大聚其可犯也衰其大半而止過者死經凡稱毒藥者不獨言烏附砒毒是概指氣味厚重峻利者為毒毒者猶云狠也重身者孕婦也有故無殞亦無殞者言其有病邪之故而胎不殞墮則毒藥治其病亦無殞墮之虞但必其病為大積大聚方可用攻攻衰其大半而止過用則死此所謂有病則病受藥與胎無礙倘非大積大聚則不可輕用當用亦須比常人減少不可過也帝曰郁之甚者治之奈何岐伯曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之木火為肝心之陽氣鬱則宜達之發之用開提升散之法也土為中宮脾胃之氣食積壅滯而致郁宜用攻消以奪之金為肺氣其鬱者為喘逆為胸滿故當用辛開苦降以泄之水鬱者下焦腎氣不化而成腫脹故當調三焦之氣以利水道折之以其畏者培土泄水以瀉之也素問湯液醪醴論帝曰五穀湯液及醪醴奈何岐伯曰必用稻米炊之稻薪稻米者完稻薪者堅帝曰何以然岐伯曰此得天地之和高下之宜故能至完伐取得時故能至堅也此言湯劑藥酒有需用五穀者當用稻米炊以稻薪以稻得天地中和之氣而完全伐取得時故其薪堅也自古聖人之作湯液醪醴者以為備耳故為而勿服也中古道德稍衰邪氣時至服之萬全帝曰今之世不必已何也岐伯曰當今之世必齊毒藥攻其中鑱石針艾治其外也軒岐之世已不及上古之渾樸而多疾病故醫道自神農嘗百草至軒岐而針砭藥石之法大備迨乎今世又萬千年人生氣質愈薄情欲愈重故疾病愈多醫道反晦而不明死於病者少而死於醫者多故有不藥為中醫之說古聖活人之仁術反致殺人良可嘆也靈樞禁服篇帝曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱未滿而知約之以為工不可以為天下師此言制方之法有約如約囊囊滿弗約則必輸泄方成弗約則神理勿能俱得亦必無效如奇偶大小緩急等皆有一定規約而中有神理存焉未悟神理而制方猶囊未滿而約之如此為工乃庸淺之流不可以為天下師也靈樞壽夭剛柔篇治寒痹藥熨法用淳酒二十斤蜀椒一斤乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用棉絮一斤細白布四丈並內酒中置酒馬矢熅中蓋封塗勿使泄五日五夜出布棉絮曝乾之干復漬以盡其汁每漬必晬其日乃出干干並用滓與棉絮復布為復長六七尺為六七巾則用生桑炭炙巾以熨寒痹令熱入至病所寒復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起步內中無見風每刺必熨如此病已矣此言用刺法後兼用熨法也馬矢熅者以馬屎曬乾燒之也晬周日也復布為復巾如今之夾袋所以入藥滓與棉絮也
