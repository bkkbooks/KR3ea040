body:
  text: 卷十運氣要略緣起餘本淺學而於醫道略窺陰陽五行之端至於主客運氣流行變化微妙無窮所謂白首紛如者也明時有新安汪石山汪心谷集要覽頗簡明易讀輯于徐東皋古今醫統中曩承前輩湖南楚竹園先生又授余是篇雲系乾隆年間高隱張姓者所編余讀之與汪本大同而加客氣升降圖説按年分列主病脈候等尤為精簡使後學易於記誦余故不揣愚昧略加修節校録以殿斯集惜乎張公之名不傳未能表彰然其書存則人存亦可以無憾矣會稽後學章楠謹識運氣提綱嘗讀內經至天元紀論七篇推申運氣元蘊難窺未嘗不廢書三嘆也斯天地之紀綱變化之淵源非通於大易洪範曆元律法之説者其敢橫心以解矢口而談哉無惑乎當今之人置而弗講久矣先哲有言曰不明五運六氣檢遍方書何濟故弗醫則可業已志醫反掌生殺能不猛畏博學多聞沉思力索神將通我幸勿憚焉然知天知地必先知人丹溪曰先識病機變化處治純攻運氣恐流於馬宗素之徒妄謂某年生人於某日病於某經用某藥某日當瘥某日當危悖亂經旨涉於怪僻茲特撮其大綱提其切要令學者欣其簡便為行遠登高之自至於窮神達變則內經而下代有發明其可以是為畫耶五運者金木水火土也六氣者風寒暑濕燥火也合十干為五運如甲己合為土運乙庚合為金運丙辛合為水運丁壬合為木運戊癸合為火運是也對十二支為六氣如子與午對俱為君火醜與未對俱為濕土寅與申對俱為相火卯與酉對俱為燥金辰與戌對俱為寒水巳與亥對俱為風木是也運乃五年一周氣則六期環會五運有太過有不及有平運有大運有主運有客運太過者甲丙戊庚壬五陽干也不及者乙丁己辛癸五陰乾也太過之年大寒前十三日交名曰先天不及之年大寒後十三日交名曰後天平運者司天與運同氣也或太過而司天克氣或不及而年支相合謂之歲會或月干與之相符或交初氣日乾時干與之相合謂之干德符值之者物生脈應無相後先皆平運也正大寒日交名曰齊天大運者本年年干也主運者每年皆以木運從大寒日始以次相生至水而終每運各主七十二日另五刻歲歲皆然者也客運者假如甲己年即以土起運亦從大寒日始以次相生至火而終每運亦主七十二日另五刻此逐歲變遷者也六氣有司天有在泉有正化有對化有主氣有客氣正化者午未寅酉辰亥之年也對化者子醜申卯戌巳之年也正司化令之實對司化令之虛又以子午卯酉為一律子午君火司天則必卯酉燥金在泉寅申巳亥為一律辰戌丑未為一律例皆同也主氣者每年皆以木氣從大寒日始以次相生至水氣而終每氣各主六十日奇八十七刻半歲歲皆然也客氣者以本年年支後第三支起運即如子年子後第三支是戌戌屬水就以水氣從大寒日始為初之氣即在泉左間也木為二之氣即司天右間也火為三之氣即司天火氣也土為四之氣即司天左間也熱為五之氣即在泉右間也金為終之氣即在泉燥金也每氣各主六十日奇八十七刻半每年一易者也以客加主客勝主則從主勝客則逆凡司天主歲半以前在泉主歲半以後此客氣之大者加於主氣之上也司天居上在泉居下運氣居中或司天克運生運以上臨下為順順分生克之殊或運克司天生司天以下臨上為逆逆有大小之異其中有司天與運同者名曰天木符年支與運合者名曰歲會在泉與運同者名曰同天金符運與在泉合者名曰同歲水會司天與運與氣三合者名曰太乙天符天符為執法中執法者其病速而危歲會為行令中行令者其病徐而持太乙天符為貴人中貴人者其病暴而死嗟乎風寒暑濕燥火者天之陰陽三陰三陽上奉之木火土金水者地之陰陽生長化收藏下應之戊己土也然化氣必以五故甲己化土而居其首土生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊癸次之此化氣之序也五行各一而火獨君相二者上應乎天之六氣也蓋木旺於東火旺於南金旺於西水旺於北而土旺於四維戊附於戌而在乾己附於辰而在巽未之對衝在醜而丑未屬坤艮之鄉故辰戌丑未寄旺之位也假如太角之化為啓拆而變為摧拉太徵之化為暄燠而變為炎烈正化之氣也少角木氣不足清勝而熱復少徵火氣不足寒勝而雨復邪化之復也寒甚而陽焰為火鬱熱甚而悽清為金鬱抑而不足也水鬱而發則為冰雹土鬱而發則為飄驟鬱而怒起也風淫所勝則克太陰熱淫所勝則克陽明侮其所勝也相火之下水氣承之濕土之下風氣承之亢則制也摧拉之變不應普天悉皆大風炎烈之變不應薄海悉皆燔灼清氣之勝不應宇宙無不明潔雨氣之復不應山澤無不蒸溽聖人反復諄諄蓋欲人法於陰陽和於術數勿為運氣所中也即使偶中亦知其受病之因不令妄投藥餌而有夭傷之嘆耳凡主客之氣皆能致疾下為主氣上為客氣經曰木位之主其瀉以酸其補以辛厥陰之客以辛補之以酸瀉之以甘緩之火位之主其瀉以甘其補以咸少陰之客以甘瀉之以痠軟之少陽之客以咸補之以甘瀉之以咸軟之土位之主其瀉以苦其補以甘太陰之客以甘補之以苦瀉之以甘緩之金位之主其瀉以辛其補以酸陽明之客以酸補之以辛瀉之以苦泄之水位之主其瀉以咸其補以苦太陽之客以苦補之以咸瀉之以苦堅之以辛潤之凡客勝瀉客補主主勝瀉主補客而本經更有六氣司天在泉淫勝之治法有司天在泉反勝之治法有歲運上下所宜藥食之治法而五運之中又必折其鬱氣先取化源故化子以為太陽司天取九月為水之源陽明司天取六月為金之源少陰少陽司天取三月為火之源太陰司天取六月為土之源厥陰司天取年前十二月為木之源經曰無失天信無逆氣宜無翼其勝無贊其復是為至治者此也夫人稟五行之氣而生亦從五行之數而盡故王冰曰蒼天布氣尚不越乎五行人在氣中豈不應乎天道隨氣運陰陽之盛衰理之自然也經曰不知年之所加氣之盛衰虛實之所起不可以為工矣雖然氣運之理亦有不可泥者如肝木素虛脾土太盛運值太角肝氣稍實脾氣方平五臟顯然又內外兩因隨時感觸雖當太過之運亦有不足之理不及之運亦多有餘之患倘專泥運氣能無實實虛虛損不足而益有餘乎況歲氣之在大地亦有反常之時故冬有非時之溫夏有非時之寒春有非時之燥秋有非時之暖犯之者病又如春氣西行秋氣東行夏氣北行冬氣南行卑下之地春氣常存高阜之境冬氣常在天不足西北而多風地不滿東南而多濕又況百里之內晴雨不同千里之外寒暄各別方土不齊而病亦因之此皆法外之遺也善言運氣者隨機觀變方得古人未發之旨幸毋膠執而為程馬之續也五天五運圖解此太古占天之始察五氣紀五天而所立五運也五天五氣者謂望氣之時見丹天之火氣經於牛女璧奎四宿之上下臨戊癸之方此戊癸之所以為火運也黅天之土氣經於心尾角軫四宿之上下臨甲己之方此甲己之所以為土運也蒼天之木氣經於危室柳鬼四宿之上下臨丁壬之方此丁壬之所以為木運也素天之金氣經於亢氐昴畢四宿之上下臨乙庚之方此乙庚之所以為金運也元天之水氣經於張翼婁胃四宿之上下臨丙辛之方此丙辛之所以為水運也是知五運之化莫不有所由從蓋已肇於開闢之初矣詳太史天元册文及天元紀大論中五運圖解自太始初分陰陽析位雖五運之象昭於五天然尚有月建之法及十二肖之説則立運之法因是又一理月建者單舉正月為法如甲己之歲正月首建丙寅丙者火之陽火生土故甲己為土運乙庚之歲正月首建戊寅戊者土之陽土生金故乙庚為金運丙辛之歲正月首建庚寅庚者金之陽金生水故丙辛為水運丁壬之歲正月首建壬寅壬者水之陽水生木故丁壬為木運戊癸之歲正月首建甲寅甲者木之陽木生火故戊癸為火運此五運生於正月之建者也十二肖者謂十二宮中惟龍善變而屬辰位凡十干起甲但至辰宮即隨其所遇之干而與之俱變矣如甲己幹頭起於甲子至辰屬戊戊為土此甲己之所以化土也乙庚幹頭起於丙子至辰屬庚庚為金此乙庚之所以化金也丙辛幹頭起於戊子至辰屬壬壬為水此丙辛之所以化水也丁壬幹頭起於庚子至辰屬甲甲為木此丁壬之所以化木也戊癸幹頭起於壬子至辰屬丙丙為火此戊癸之所以化火也此又五運之遇龍而變者也又一説謂甲剛木克己柔土為夫婦而成土運乙柔木嫁庚剛金而成金運丁陰火配壬陽水而成木運丙陽火娶辛柔金而成水運戊陽土娶癸陰水而成火運此三説者義各不同今並存之以備參校運氣總論太極肇分而有陰陽陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府藏也綱紀謂生長化成收斂之綱紀也父母謂萬物形之先也本始謂生殺皆因之而有也夫有形稟氣而不為五運陰陽所攝者未之有也所以造化不極能為萬物先化之元始者何也以具是神明之育故也合散不測生化無窮非神明無能也故物生謂之化物極謂之變陰陽不測謂之神然天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之始終也陰陽五行流為十干五化之運寒暑燥濕風火之氣周流天地間而為萬物之原人則稟其精而囿於兩間所以具五臟六腑以應五運六氣之數也五運者金木水火土也木言陽氣觸地而生火言爍然盛而變化萬物金言陰氣禁止萬物而收斂水言潤養萬物土言含吐萬物將生者出將死者歸六氣者風火暑濕燥寒也六氣皆有一化也木化風主於春陽氣鼓舞為天號令君火化熱主於春末夏初行暄淑之令而不行災暑君德也相火化暑主於夏炎暑大行金化清燥清涼乃行金為丙婦帶火之氣故燥也水化寒嚴凜乃行土化濕與土潤溽暑濕化行也蓋濕則土生干則土死泉出於地中濕化信矣聖人仰觀五天云色黅天之氣經於中央臨甲己之位立為土運素天之氣經於西方臨乙庚之位立為金運元天之氣經於北方臨丙辛之位立為水運蒼天之氣經於東方臨丁壬之位立為木運丹天之氣經於南方臨戊癸之位立為火運此五氣之色上經二十八宿下應十二分位所以古人占天望氣則和氣與災疫應在何方瞭然預知之矣凡占當於正月初一日若看太過之紀寅初看不及之紀寅末看平治之紀寅正看法如蒼氣為風丹為熱黅為濕素為燥黑為寒其氣之色有兼見者又當分其微甚而推之天干取運地支取氣天干有十配合則為五運地支十二對衝則為六氣所以然者天有陰陽地亦有陰陽天有陰故能降地有陽故能升天以陽生陰長地以陽殺陰藏生長者天之道藏殺者地之道天陽主生故以陽生陰長地陰主殺故以陽殺陰藏陽中有陰陰中有陽人在氣交之中身半以上天之分也天氣主之身半以下地之分也地氣主之其生五其氣三三而成天三而成地三而成人三而三之則為九九九制會故生九竅九藏而應之也天有三百六十五日人有三百六十五骨節天有五行御五位以生寒暑燥濕風人有五藏化五氣以生喜怒憂思恐在天為元玄生神在人為道道生智在地為化化生五味神在天為風在地為木在人為怒神在天為熱在地為火在人為喜神在天為濕在地為土在人為思神在天為燥在地為金在人為憂神在天為寒在地為水在人為恐寒暑五氣更立各有所先非其位則邪當其位陰陽之神不可得而見也支幹之迹可得而求之也天地陰陽以象不以數推惟憑支幹則可測焉天氣始於甲地氣始於子天地相合則為甲子故甲子者干支之始也天氣終於癸地氣終於亥天地相合則為癸亥故癸亥者干支之末也陰陽相間剛柔相須是以甲子之後乙丑繼之壬戌之後癸亥繼之三十年為一紀六十年為一周有主運焉有客運焉有主氣焉有客氣焉主運主氣萬載而不易客運客氣每歲而迭遷自干支兄弟次序言之甲乙東方木也甲者草木始甲而出乙者陽尚屈乙丙丁南方火也丙乃萬物炳然著見而強丁適陽強與陰氣相丁戊己中央土也戊陽土也萬物生而出之萬物伐而入之己陰土也無所為而得己者也庚辛西方金也庚乃陽更而續辛乃陽極於此而更辛也壬癸北方水也壬乃陽氣生之任壬而為胎與子同意癸乃萬物閉藏懷孕於其下揆然萌芽天之道也故木為初之運火為第二運土為第三運金為第四運水為第五運此主運也詩曰大寒木運始行初清明前三火運居芒種後三土運是立秋後六金運推立冬後九水運伏周而復始萬年如或問木火土金水天道左旋自然之序也然君火生土土能復生相火火復生金其義何在蓋相火非土不成未見虛空能聚火金在礦非火不能煅出所以河圖火七居西金九居南互顯其成也須知五行六氣總一氣也故木焚則為火絞則為水石擊則為火熔則為水洲澶之內江河競流大海之中火光常起皆情之本有也又何疑土中火火中金乎自其夫婦配合言之甲與己合而化土乙與庚合而化金丙與辛合而化水丁與壬合而化木戊與癸合而化火故甲己之年土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之年木運統之戊癸之歲火運統之此客運也假如甲己年甲為土運初之運即土也土生金二之運即金也金生水三之運即水也水生木四之運即木也木生火五之運即火也每一運各主七十二日另五刻此天干在上為陽所以主乎運也又以地支循環次序言之寅卯屬春木也寅者演也正月陽上陰下律管飛灰以候之可以述事之始也卯者茂也二月陽氣盛而孳茂也巳午屬夏火也巳者起也四月正陽無陰物畢盡而起午者長也五月陽尚未盡陰始生而為生物皆長大也辰戌丑未屬四季土也辰者震也三月陽已過半萬物盡震而長戌者滅也九月萬物皆衰減矣醜者紐也陰尚執而紐之十二月始終之際也未者味也六月物成而有味也申酉屬秋金也申者身也七月物體皆成也酉者緧也八月萬物皆緧縮收斂亥子屬冬水也亥者劾也十月陰氣劾殺萬物此降之道也子者北方寒水陰位一陽肇生之始故陰極則陽生壬而為胎十一月是也故風為初之氣火為二之氣暑為三之氣濕為四之氣燥為五之氣寒為終之氣此主氣也詩曰大寒厥陰氣之初春分君火二之隅小滿少陽分三氣大暑太陰四相呼秋分陽明五位立小雪太陽六之餘自其對衝定位言之子對午而為少陰君火醜對未而為太陰濕土寅對申而為少陽相火辰對戌而為太陽寒水巳對亥而為厥陰風木故子午之歲君火主之君火司午火本熱而其氣當午位陰生之初故標寒而屬少陰也丑未之歲濕土主之主應長夏未之位未乃午之次故曰太陰寅申之歲相火主之相火司子寅寅乃醜之次故曰少陽卯酉之歲燥金主之金居兌方在人主於肺居膈上陽位金必待陽而後發故曰屬陽明也辰戌之歲寒水主之水居北方子位水本寒而其氣當陽生之初故標熱而屬太陽也巳亥之歲風木主之木居東方震在人主於肝處膈下陰位木必待陰而後生故屬厥陰此客氣也詩曰子午少陰君火天陽明燥金應在泉丑未太陰濕土上太陽寒水兩連綿寅申少陽相火旺厥陰風本地中聯卯酉卻與子午反辰戌巳亥倒皆然如卯酉年司天即子午年在泉卯酉年在泉即子午年司天辰戌年與丑未年倒巳亥年與寅申年倒假令子午年少陰君火司天陽明燥金司地上者右行太陰濕土為天之左間厥陰風木為天之右間所以面南而命其位也下者左行太陽寒水為地之左間少陽相火為地之右間所以面北而命其位也一氣在上一氣在下二氣在左二氣在右地之左間為初之氣要訣每年退二便是客鄉如子司天後二支戌太陽寒水為初之氣亥為二之氣子為三氣醜為四氣寅為五氣卯為六氣又逐年年辰逐日日辰皆名司天天之右間為二之氣司天為三之氣天之左間為四之氣地之右間為五之氣司地為終之氣每一氣主六十日八十七刻半有奇卯酉年陽明司天少陰在泉初氣太陰二氣少陽三氣陽明四氣太陽五氣厥陰六氣少陰辰戌年太陽司天太陰在泉初氣少陽二氣陽明三氣太陽四氣厥陰五氣少陰六氣太陰丑未年太陰司天太陽在泉初氣厥陰二氣少陰三氣太陰四氣少陽五氣陽明六氣太陽寅申年少陽司天厥陰在泉初氣少陰二氣太陰三氣少陽四氣陽明五氣太陽六氣厥陰巳亥年厥陰司天少陽在泉初氣陽明二氣太陽三氣厥陰四氣少陰五氣太陰六氣少陽此地支在下為陰所以主乎氣也然客運之流行也有太過焉有不及焉太過之年甲丙戊庚壬五陽干也不及之年乙丁己辛癸五陰乾也太過其至先大寒前十三日交名曰先天不及其至後大寒後十三日交名曰後天平氣之年正大寒日交不先不後名曰齊天申子辰年大寒日寅初一刻交初之氣春分日子時末交二之氣小滿日亥時末交三之氣大暑日戌時末交四之氣秋分日酉時末交五之氣小雪日申時末交終之氣所謂一六天也巳酉丑年大寒日巳初一刻交初之氣春分日卯時末交二之氣小滿寅時末交三之氣大暑日丑時末交四之氣秋分子時末交五之氣小雪日亥時末交終之氣所謂二六天也寅午戌年大寒日申初一刻交初之氣春分日午時末交二之氣小滿日巳時末交三之氣大暑日辰時末交四之氣秋分日卯時末交五之氣小雪日寅時末交終之氣所謂三六天也亥卯未年大寒日亥初一刻交初之氣春分日酉時末交二之氣小滿日申時末交三之氣大暑日未時末交四之氣秋分日午時末交五之氣小雪日巳時末交終之氣所謂四六天也客氣之升降也有正化焉有對化焉正化之歲謂午未寅酉辰亥三年也對化之歲謂子醜申卯戌巳之年也正化者令之實從本其數生對化者令之虛從標其數成水一火二木三金四土五皆以陰陽而配若考其深義則水生於一天地未分萬物未成之初莫不先見於水故草木子實人蟲胎卵未就皆水也及水聚而形質凝陰陽備而後成物故物之小而味苦者火之兆也物熟則甘土之味也甘極則淡反本也人稟陰陽先生二腎草木子實大小雖異其中皆有兩以相合與人腎同是以萬物非陰陽合體則不能化生故火曰次二既陰陽合體然後有春生而秋成故次三曰木次四曰金水火木金莫不因土而成次五曰土三陰三陽正化者從本生數對化者從標成數假如甲子年甲為土運統主一年子為君火專司一歲期三百六十五日零二十五刻正合乎周天三百六十五度四分度之一也周天者天周地位非周天之六氣也天體至圓周圍三百六十五度四分度之一天行健一日一夜周天三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度之一天多進一度則日為退一度二日天度進二則日為退二度積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度亦恰退盡本數遂與天會而成一年是謂一年一周天月行遲一日一夜行三百六十五度四分度之一行不盡比天為退了十三度有奇至二十九日半強恰與天相值在恰好處是謂一月一周天五日成一候三候成一氣即十五日也三氣成一節節謂立春春分立夏夏至立秋秋分立冬冬至此八節也三八二十四氣而分四時一歲成矣春秋言分者陰陽中分其氣異也冬夏言至者陰陽至此而極其氣同也天亦無候以雨雪霜露草木之類應期可驗而測之故曰候言一候之日亦五運之氣相生而直之即五日也書曰期三百六旬又六日以閏月定四時成歲其義蓋即此也一期之中主運以位而相次於下客運以氣而同流於上客氣加於主氣之上主氣臨於客氣之下天時所以不齊民病所由生也辰戌年初之客氣少陽相火加主氣厥陰風木二之客氣陽明燥金加主氣少陰君火三之客氣太陽寒水加主氣少陽相火四之客氣厥陰風木加主氣太陰濕土五之客氣少陰君火加主氣陽明燥金終之客氣太陰濕土加主氣太陽寒水以上皆客氣加於主氣之上舉此二年為例抑論主氣春溫夏暑秋涼冬寒風以動之火以溫之暑以蒸之濕以潤之燥以干之寒以堅之皆天地正氣之運行惟客加於主乃有逆從淫勝然後春有悽風夏有伏陰秋有苦雨冬有愆陽風勝則地動火勝則地固暑勝則地熱濕勝則地泥燥勝則地干寒勝則地裂氣候不齊癘疫時降六甲年土運太過則雨濕流行濕病乃生腎水受邪治當除濕以補腎六己年土運不及則木氣乘旺反見風化風病乃行治當益脾以平木六丙年水運太過則寒氣大行寒病乃生心火受邪治當逐寒以補心六辛年水運不及則土氣乘旺反見濕化濕病乃行治當補腎以除濕六戊年火運太過則熱氣大行熱病乃生肺金受邪治當降火以補肺六癸年火運不及則水氣乘旺反見寒化寒病乃行治當補心以逐寒六庚年金運太過則燥氣流行燥病乃生肝木受邪治當清燥以補肝六乙年金運不及則火氣乘旺反見熱化熱病乃行治當清肺以降火六壬年木運太過則風氣大行風病乃生脾土受邪治當平木以補脾六丁年木運不及則金氣乘旺反見燥化燥病乃行治當補肝以清燥此客運之治法也太陽寒水治宜辛熱陽明燥金治宜苦溫少陽相火治宜鹹寒太陰濕土治宜苦熱少陰君火治宜鹹寒厥陰風木治宜辛涼此六氣之治法也然運氣之所以有變者氣相得則和不相得則病又有相得而病者以下臨上不當位也五行相生者謂相得相剋者為不相得上臨下為順下臨上為逆假令土臨火火臨木木臨水水臨金金臨土皆以下臨上不當位也父子之義子為下父為上以子臨父不亦逆乎司天克運則順運克司天則逆氣克運則順運克氣則逆運氣皆相同曰天符戊子戊午戊寅運氣皆火丙辰丙戌運氣皆水己丑己未運氣皆土乙卯乙酉運氣皆金丁巳丁亥運氣皆木六十年中惟此十二年天符也又戊子戊為火運子為少陰君火司天運與司天同火是為天符此日得病速而危困也更遇當年太歲亦是天符或是歲會其病尤危天氣生運曰順化甲子甲午甲寅甲申火下生土也壬辰壬戌水下生木也乙丑乙未土下生金也辛酉辛卯金下生水也癸巳癸亥木下生火也六十年中惟此十二年順化天符也天氣克運曰天刑庚子庚午庚寅庚申火下剋金也戊辰戊戌水下剋火也辛丑辛未土下剋水也丁卯丁酉金下剋木也己巳辛亥木下剋土也六十年中惟此十二年天刑也運生天氣曰小逆壬子壬午壬寅壬申木上生火也庚辰庚戌金上生水也癸丑癸未火上生土也己卯己酉土上生金也辛巳辛亥水上生木也子臨父位於理未當六十年中惟此十二年小逆也運克天氣曰不和丙子丙午丙寅丙申水上剋火也甲辰甲戌土上剋水也丁丑丁未木上剋土也癸卯癸酉火上剋金也乙巳乙亥金上剋木也六十年中惟此十二年不和也運客臨本氣主之位曰歲會子水位也丙子年水運臨之午火位也戊午年火運臨之卯木位也丁卯年木運臨之酉金位也乙酉年金運臨之辰戌丑未土位也甲辰甲戌己丑己未土運臨之六十年中有此八年歲會也又丙子日丙為水運子為水支是運與支同水乃名歲會年月日時同如遇此日得病不死但執持而徐緩更會年月時合天符歲會其病尤盛天符歲會相合曰太乙天符戊午乙酉己未己丑六十年中惟此四年太乙天符也又戊午日戊為火運午是少陰君火司天又是火支乃名太乙天符此日得病主死運客與四孟月相同曰支德符寅屬木孟春月也壬寅年木運臨之巳屬火孟夏月也癸巳年火運臨之申屬金孟秋月也庚申年金運臨之亥屬水孟冬月也辛亥年水運臨之六十年中惟此四年支德符也運與交司日相合曰干德合甲與己合乙與庚合丙與辛合丁與壬合戊與癸合一年遇此二干天地德合亦為平氣之歲也太過之運加地氣曰同天符庚子庚午運同司地燥金壬寅壬申運同司地風木甲辰甲戌運同司地濕土六十年中惟此六年同天符不及之運加地氣曰同歲會辛丑辛未運臨司地寒水癸卯癸酉運臨司地君火癸巳癸亥運臨司地相火六十年中惟此六年同歲會也大要陽年先天時化則己強而以氣勝實故不勝者受邪陰年後天時化則己弱而以氣休衰故勝者來克彼克之後必待時而復也行復於所勝則己不可前故待得時則子當旺然後為母復仇也陽年太過則傳所不勝而乘所勝陰年不及則所勝妄行而所生受病如肝木有餘則時已氣盛反薄肺金而棄其脾土肝木不及則土無所畏遂妄行乃凌其腎水此五行生剋之理蓋勝至則傷傷已而勝故無常氣而不息若復而不勝則是生意已傷而有窮盡矣經曰亢則害承乃制制則生化外列盛衰害則敗亂生化大病亢者過極而不退也當退不退始則災害及物終則災害及己承猶隨也以下奉上有防之之義焉制克勝之也制則生化者言有所制則六氣不至於亢而為平平則萬物生而變化無窮矣生者自無而有化者自有而無外列盛衰者六氣分布主位迭為盛衰害而無所制則敗壞乖亂之政行為災為變生化幾乎息而為萬物之大病大病即災變也萬物皆病天地其能位乎此亢害承製皆莫或死然而自不能不然者也以天時言之春時冬令不退即水亢極而害所承之木然火為木之子由是乘土而制水則木得化生之令而敷榮列秀於外但草木生育自有各年盛衰不同苟無制而木被其害則冬入於春生化幾乎息而為天地間之大災變也豈非政令敗亂之極者乎以人身言之心火亢甚口乾發燥身熱則脾土失養肺金受害由是水乘而起以復金母之仇而制乎心火汗出發潤口津心涼而平矣苟腎水愈微而不能上制心火愈盛而不能下退則神去氣孤而災害不可解矣又曰有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期言六甲有餘己則不足不若己則有餘若余已復除少已復少則天地之道變矣又曰出入廢則神機滅息升降息則氣立孤危故非出入則無以生長壯老已非升降則無以生長收化藏是以升降出入無器不有四者常守反之則災害至矣出入者天地之呼吸也升降者天地之化氣也毛羽裸鱗介及飛走跂行者皆生氣根於身中以神為動靜之主故曰神機金玉土石草木皆生氣根於外假氣以成之故曰氣立根於中者生原系天其所動浮神氣為機發之主故其所為也物莫之知是以神捨出則機息根於外者生源系地故其生長化育收藏皆造化之氣所成立故其所出也物亦莫知是以氣止息則造化之道絶矣凡竅橫者皆有出入去來之氣竅豎者皆有陰陽升降之氣往復於中壁窗戶牖皆承來氣衝擊於人陽升則井寒陰升則井暖以物投井及葉墜空中翻翻不疾皆陰所凝也虛管溉滿捻上懸之水固不出為無升氣而不能降也空瓶小口傾溉不入為氣不出而不能入也由是觀之升無所不降降無所不升無出則不入無入則不出群品之生升降出入生氣之常也若有出無入有入無出有升無降有降無升則反生化之常道而神去氣孤非災害而何雖然順逆災眚盡皆天之氣運所為也地在人之下大氣舉之也天六動而不息地五靜而有守天以六氣臨地地以五位承天然天氣不加君火以六加五則五歲而餘一氣乃君火不立歲氣但以名奉天耳故曰君火以名相火以位言相火代君火而用事故五歲而右遷若地以五承六則當六歲乃備盡天元之氣故六期而循環周而復始五歲一周則五行之氣遍六期一備則六氣之位周五六相合故三十年一紀之則六十年矣推之歷日依節交氣常為每歲之主氣又曰地氣若司天在泉左右兩間輪行而加主氣之上者曰天氣客氣也客歲乃行藏中天命主氣只奉客氣之天而已客勝主則從主勝客則逆二者有勝而無復矣主勝則瀉主補客客勝則瀉客補主經曰先立其年以明其氣每年先立運氣審其太過不及然後以地之主氣為本天之客氣加臨於上為標以求六化之變如氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏以平為期抑考褚氏有曰大撓作甲子隸首作數志歲月日時遠近故以當年為甲子歲冬至為甲子月朔為甲子日夜半為甲子時積一十百千萬亦有條而不紊皆人所為也人嬰異氣疾難預擬吾未見其是也籲此一偏之見也不知天時非凡夫可度人身資大化有生明堂詩曰甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎藏三焦亦向壬宮寄胞絡同歸入癸方詩言人稟天地壬之氣而生膀胱命門稟癸之氣而生腎稟甲之氣而生膽稟乙之氣而生肝稟丙之氣而生小腸稟丁之氣而生心稟戊之氣而生胃稟己之氣而生脾稟庚之氣而生大腸稟辛之氣而生肺此天干也地支亦然又云肺寅卯大胃辰經脾巳心午小未中申膀酉腎心包戌亥三子膽醜肝通觀此二詩則天地人身無時不相流通經曰天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之器也故一氣不合不能生化天有六氣人以三陰三陽而上奉之以六經言之三陰三陽以十二支分之則有六陰六陽陰從上降生於午而極於亥謂之六陰陽從下起生於子而極於巳謂之六陽地有五行人有五臟而下應之臟為陰而其數奇以應五運蓋五行質具於地而氣則行於天也腑為陽而其數偶以應六氣蓋以淫氣雖降於天而勢必充於地也子午為天地之中正君火位焉手少陰心足少陰腎居之辰戌為七政之魁罡寒水位焉手太陽小腸足太陽膀胱居之然火從水化水從腎至故少陰為臟位與太陽隔而氣相合為腑也太陽寒水有子位而居於辰戌者水伏於土田水出地中行故戌為六戊天門辰為六己地戶丑未為歸藏之標本濕土位焉足太陰脾手太陰肺居之卯酉為日月之道路燥金位焉足陽明胃手陽明大腸居之然子隨母居土旺金盛故太陰為臟位與陽明隔而氣相合為腑也巳亥為天地之門戶風木位焉足厥陰肝手厥陰心包絡居之卯雖木之正分為陽明燥金所居然木生在亥故居於亥而對化於巳也寅申握生化之始終相火位焉足少陽膽手少陽三焦居之然相火寄於肝腎膽者肝之府心包絡者腎之配故厥陰為臟位與少陽隔而氣相合為腑也少陽相火佐脾雖有午位君火居之故居寅火生於寅也三陰三陽名異而體則一也陰陽氣微則謂之少陰陽氣盛則謂之太寅為少陽卯為陽明辰為太陽午為少陰未為太陰亥為厥陰南政三陰司天則皆寸不應三陰在泉則皆尺不應北政三陰司天則皆尺不應三陰在泉則皆寸不應不應者皆為沉脈也此言六氣以君火為尊五運以濕土為重故甲己土運為南政蓋土以成數貫金木水火之運土居中央君尊南面而行令餘四運以臣事之北面而受令所以有別也然此論其常也若天行時病則有不必拘者經曰天地之氣勝復之作不形於診也天地以氣不以位故不當以脈診但以形證察之由此觀之經絡臟腑脈病藥治無非運氣之所為也非只一歲也雖一時一刻之短而五行之氣莫不存非特一物也雖一毫一芒之細而五行之化莫不載上達乎天則有五星倍減之應下推於地則有草木蟲育之驗奈何俗醫不知醫之源者全然不識運氣為何物不知醫之變者又泥時日執鈐方以害人要之有在天之運氣有在人之運氣天時勝則舍人之病而從天之時人病勝則舍天之時而從人之病張子曰病如不是當年氣看與何年運氣同只向某年求活法方知都在至真中扁鵲曰陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾經曰必先歲氣毋伐天和又曰不知年之所加氣之盛衰不可以為工學者合而觀之更精於脈證乃自得之噫儒之道博約而已矣醫之道運氣而已矣學者可不由此入門而求其蘊奧耶按運氣之理在在弗遺雖有微疴罔不由斯至本年時疫尤為吃緊即七情不齊亦皆默範但奧理微詞卒難解悟非纍功探索至靈慧者莫之能解況魯鈍窾綮寧敢窺其藩籬哉是篇刪其繁蕪為下學楷梯以免其浩汗之苦高博者有完義具於胸中視茲筌蹄幾同咀雪知我罪我其在斯乎六十年運氣相臨之例運氣相同名曰天符天氣生運名曰順化天氣克運名曰天刑運生天氣名曰小逆運克天氣名曰不和六甲年土運甲子甲午甲寅甲申火下生土順化甲辰甲戌土上剋水不和六己年土運己丑己未運氣皆土天符己卯己酉土上生金小逆己巳己亥木下剋土天刑六乙年金運乙丑乙未土下生金順化乙卯乙酉運氣皆金天符乙巳乙亥金上剋木不和六庚年金運庚子庚午庚申火下剋金天刑庚辰庚戌金上生水小逆六丙年水運丙子丙午丙寅丙申水上剋火不和丙辰丙戌運氣皆水天符六辛年水運辛丑辛未土下剋水天刑辛卯辛酉金下生水順化辛巳辛亥水上生木小逆六丁年木運丁丑丁未木上剋土不和丁卯丁酉金下剋木天刑丁巳丁亥運氣皆木天符六壬年木運壬子壬午壬寅壬申木上生火小逆壬辰壬戌水下生木順化六戊年火運戊子戊午戊寅戊申運氣皆火天符戊辰戊戌水下剋火天刑六癸年火運癸丑癸未火上生土小逆癸卯癸酉火上剋金不和癸巳癸亥木下生火順化司天在泉左右間間氣之設逐年輪行原為客氣言之若主氣則上下左右俱一定不移子午君火司天卯酉燥金在泉寅申相火在泉右間辰戌寒水在泉左間丑未濕土司天左間巳亥風木司天右間子午二年太陽為初氣厥陰為二氣少陰為三氣太陰為四氣少陽為五氣陽明為終氣卯酉燥金司天子午君火在泉巳亥風木在泉右間丑未濕土在泉左間辰戌寒水司天左間寅申相火司天右間卯酉二年太陰為初氣少陽為二氣陽明為三氣太陽為四氣厥陰為五氣少陰為終氣寅申相火司天巳亥風木在泉辰戌寒水在泉右間子午君火在泉左間卯酉燥金司天左間丑未濕土司天右間寅申二年少陰為初氣太陰為二氣少陽為三氣陽明為四氣太陽為五氣厥陰為終氣巳亥風木司天寅申相火在泉丑未濕土在泉右間卯酉燥金在泉左間子午君火司天左間辰戌寒水司天右間巳亥二年陽明為初氣太陽為二氣厥陰為三氣少陰為四氣太陰為五氣少陽為終氣丑未濕土司天辰戌寒水在泉卯酉燥金在泉右間巳亥風木在泉左間寅申相火司天左間子午君火司天右間丑未二年厥陰為初氣少陰為二氣太陰為三氣少陽為四氣陽明為五氣太陽為終氣辰戌寒水司天丑未濕土在泉子午君火在泉右間寅申相火在泉左間巳亥風木司天左間卯酉燥金司天右間辰戌二年少陽為初氣陽明為二氣太陽為三氣厥陰為四氣少陰為五氣太陰為終氣司天為三氣在泉為終氣司天左間為四氣右間為二氣在泉右間為五氣左間為終氣五運主病木運諸風掉眩皆屬肝木掉搖也眩昏亂眩暈也風而頭目眩暈風木旺必是金衰不能制木木復生火風屬陽陽主乎動兩動相搏為眩暈春夏風火相搏多起旋風或乘舟躍馬登車環舞而眩暈其動不止左右紆曲曲直動搖風之用也火運諸痛癢瘡瘍皆屬心火土運諸濕腫滿皆屬脾土諸濕者地之體也土濕極盛者則痞濕腫滿之候生焉故無濕亦然金運諸氣膹郁病痿皆屬肺金膹郁膹滿奔迫也肺主氣氣為陽主輕清而升故肺主上部則膹滿奔迫不能上升也痿者手足痿弱無力以運動也由肺金本燥燥之為疾血液衰少不能榮養百體故秋金旺霧氣矇育而草木萎落也水運諸寒收引皆屬腎水收斂引急寒之用也故冬寒則拘縮六氣主病厥陰風木諸暴強直肢痛裡急筋縮軟戾屬風木之氣少陰君火諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹如鼓之有聲癰疽癆疹瘤氣結核吐下霍亂瞀郁腫脹鼻寒鼽衄血溢血泄淋閉身熱惡寒戰栗驚或悲哭譫妄衄衊血汙皆屬君火之氣太陰濕土諸痙強直積飲痞隔吐下霍亂痿厥中滿體重胕腫肉如泥按之不起屬濕土之氣少陽相火諸熱瞀瘛筋惕惕悸動搐搦瘛瘲暴瘄冒昧躁擾狂越罵詈驚駭胕腫痠疼氣逆上衝禁栗如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死皆屬相火之氣陽明燥金諸澀枯涸幹徑皺揭屬燥金之氣太陽寒水諸病上下水液出澄徹清冷不利清白吐利腥穢癥瘕堅痞㿗疝腹滿急痛食已不飢屈伸不便厥逆禁固皆屬寒水之氣也凡有餘不足之氣至而不至與未至而至者皆因初之氣早遲各十三日也其餘五氣皆因之早遲俱同六氣分主定期但以大分小三字記以蓋大寒暑為初四之氣春秋分為二五之氣小滿寒為三終之氣也是一氣管六十日有奇訣云病如不是當年氣看與何年運氣同便向某年尋活法方知都在至真中人犯邪氣發之早遲不同故當看其病與何年運氣相同斯治之無不得也天干本屬天干化氣甲己化土乙庚化金丙辛化水丁壬化木戊癸化火地支本屬亥子水寅卯木巳午火申酉金辰戌醜未土五音本屬宮土申也土為中為建極商金強也象金性之堅強角木觸也陽氣觸動而生徵火止也物盛則止也羽水舒也陽氣復萬物舒陽為太陰為少黃鐘八十一弦太簇七十六數姑洗六十四數林鐘五十四數南呂四十八數春角木夏徵火長夏宮土秋商金冬羽水五運有三一大運以本年天干化氣為主一主運春角木夏徵火長夏宮土秋商金冬羽水甲乙丙壬癸五年從太角起太生少少生太起於角丁戊己庚辛五年從少角起少生太太生少終於羽一客運從中運起初運太生少少生太每運管七十三日半與主運俱同自大寒日始主運推太角少角説甲年化陽土屬太宮逆推前生太宮者少徵生少徵者太角故甲年起太角乙年化陰金屬少商上推前生少商者太宮生太宮者少徵生少徵者太角故乙年起太角丙年化陽水為太羽推前生太羽者是少商生少商者是太宮生太宮者少徵生少徵者太角故丙年初運太角丁年化陰木屬少角即從少角起初運其年客運盡同戊年化陽火屬太徵推前生太徵者是少角故戊年起少角己年化陰土為少宮推前生少宮者是太徵生太徵者少角故己年起少角庚年化陽金屬太商推前生太商者是少宮生少宮者太徵生太徵者少角故庚年起少角為初運辛年化陰水為少羽上推前生少羽者太商生太商者少宮生少宮者太徵生太徵者少角故辛年起少角壬年化陽木屬太角即起太角為初運其年客運盡同癸年化陰火屬少徵生少徵者是太角故癸年起太角主運甲乙丙壬癸五年同每運各管七十三日另五刻與客運同俱自大寒日起初運太角木大寒起立春雨水驚蟄春分後十二日止二運少徵火清明前三日起穀雨立夏小滿芒種後九日止三運太宮土夏至前五日起小暑大暑立秋處暑後六日止四運少商金白露前九日起秋分寒露霜降立冬後三日止五運太羽水立冬後四日起小雪大雪冬至小寒至大寒日止主運丁戊己庚辛五年同初運少角木大寒日起至後七十三日另五刻止二運太徵火春分後第三日起三運少宮土芒種後十日起四運太商金處暑後第七日起五運少羽水立冬後第四日起客運定局橫推每運管七十三日另五刻與主運同俱自大寒日起十干化氣説例云甲己還加甲乙庚丙作初丙辛從戊起丁壬庚子居戊癸起壬子遁甲定不虛甲己二干於子上起甲子至戊辰是戊在辰宮屬土故化土乙庚二干於子上起丙子至庚辰是庚在辰宮屬金故化金丙辛二干於子上起戊子至壬辰是壬在辰宮屬水故化水丁壬二干於子上起庚子至甲辰是申在辰宮屬木故化木戊癸二干於子上起壬子至丙辰是丙在辰宮屬火故化火主氣即三陰三陽又內六步每步統四小氣得六十日另八十七刻半主氣地氣也靜而守位故四時有常太陰居少陽後以歲時為法也初之氣厥陰風木大寒立春雨水驚蟄二之氣少陰君火春分清明穀雨立夏三之氣少陽相火小滿芒種夏至小暑四之氣太陰濕土大暑立秋處暑白露五之氣陽明燥金秋分寒露霜降立冬終之氣太陽寒水小雪大雪冬至小寒主氣逐年皆同惟以客氣臨於其際遂有生剋制化之當客氣客氣天氣也動而不息故逐年各異太陰居少陽前以陰陽為類從也每氣與主氣同各得六十日另八十七刻半逐年客氣橫看加臨主氣之上即有生剋制化之處而人身感之經絡受疾之源可知已大抵客氣最盛當視以為憑而主氣只以奉天之本令如春木夏火四令而已似不必拘蓋以有勝而無復也其起只以司天前二位為初氣在泉為終氣最易明晰六氣本宮子午少陰君火司天陽明燥金在泉丑未太陰濕土司天太陽寒水在泉寅申少陽相火司天厥陰風木在泉卯酉陽明燥金司天少陰君火在泉辰戌太陽寒水司天太陰濕土在泉巳亥厥陰風木司天少陽相火在泉以在上司天言則面北而命其位所謂左者西而右者東也六氣司天司天通主上半年在泉通主下半年以在下在泉言是面南而命其位所謂左者東而右者西也南北政説甲己二干統六十花甲為終始又以土居中宮而馭四方故十干內惟甲己為君南面以行令而為南政其餘乙丙丁戊庚辛壬癸八干皆為臣象北面以受令而為北政南政北政所在當少陰之位脈即不應不應者謂其沉細不應本脈也當應不應與不當應而應謂之陰陽交尺寸反斯為害也南政之年南面行令其氣在南所以南為上而北為下司天應上在泉應下人氣亦應之故寸為上而尺為下左右俱同天之左為西右為東間為右寸北政之歲北面受令其氣在北所以北為上而南為下在泉應上司天應下人氣亦應之故尺應上而寸應下司天應兩尺在泉應兩寸地之東為左左間西為右右間為左寸天之左間為左尺右間為右尺南政少陰司天兩寸不應厥陰司天右寸不應太陰司天左寸不應少陰在泉兩尺不應厥陰在泉左尺太陰在泉右尺北政少陰司天兩尺厥陰司天左尺太陰司天右尺少陰在泉兩寸厥陰在泉右寸太陰在泉左寸陰陽交尺寸反如少陰在左當左不應而反見於右陽脈本在右而移於左是少陰所易之位非少陽則太陽脈也故曰交交者死反者如其年少陰在尺當尺不應而反見於寸陽本在寸而移於尺故曰尺寸反反者死然必陰陽俱交始為交也尺寸俱反始為反也若但本位當應不應乃陰陽之不應也疾而已不在交反之例掌圖其法以南政子年起中指端北政子年起中指根俱逆行輪之凡年辰所值之處即其不應之位如南政子年起中指端即兩寸不應丑年左寸寅年左尺右數到底皆南政不應之位北政子年起中指根如前從右數到底皆北政不應之位也天符歲會天符為執法猶相輔歲會為行令為方伯太一天符為貴人猶君主天符者司天與中運同氣也中其邪者其疾速而危以其權重也歲會者中運與歲支同氣也惟寅申巳亥年不在例中邪者其病徐而持同天符同歲會者中運與在泉同氣也但陽年為同天符陰年為同歲會天會歲會運會謂之三合也太乙天符者中運與司天歲支三者皆同氣也謂之貴人中其邪則病暴死戊午己丑己未乙酉四年太乙常以冬至之日居坎宮四十六日立春居艮春分居震各宮挨節四十六日惟巽乾二宮止四十五日至乾而復反於坎如是不已終而復始九宮九星天蓬太乙坎水白天輔招搖巽木緑天柱咸池兌金赤天芮攝提坤土黑天禽天符中土黃天任太陰艮土白天衝軒轅震木碧天心青龍乾金白天英太乙離火紫五星在天者曰天在地者地分主東西南北而土則寄位西南也天星抑之則不能升地星窒之則不能降歲會木熒惑火鎮星土太白金辰星水天衝木天英火天芮土天柱金天蓬水地蒼木地彤火地阜土地晶金地元水陰陽升降窒抑説司天主天之氣在泉主地之氣逐年升降皆自右旋東降西升各得其候是謂和平若本年司天之氣不及未得遷令則地之右間不得升天舊年司天之氣有餘不肯退位則天之右間不即入地是升降以司天為主又或遇天星抑之當升天者不得前遇地星窒之當降地者不得入本年中運太過皆未得正化也假如子午年太陰當升為天左間遇天衝木星抑之太陽當降為地左間而地阜土星窒之本歲少陰未得遷正則太陰不得升天舊歲厥陰未得退位則太陽不得降地壬子壬午木運太過則中運勝土太陰亦不得升甲子甲午土運太過則中運勝水太陽亦不得降也余皆仿此可以類推五運三氣之紀齊化兼化得政總説五陽年太過則不為剋制反齊克我者之化如宮土徵火運而齊木火化是也五陰年不及則為克我者所制而來兼其化如少宮徵遇木水司天是木水兼土火化是也五陰年不及既為克我者來兼其化則為我所克者無畏得專其政如己土丁木不及木金來兼化則水土無畏而得專其政也此勝復之常亦子救母之義六十年運氣主歲紀太過有制不及得助皆為和平惟得司天當令則為上宮與正宮同非司天當令則其制助之氣皆出於左右間而非司天正氣也則為少宮中運與少宮間氣同也六氣遷正升降説凡司天在泉俱三陰三陽東降西升一年一位周而復始若其陽上即陰下陰上即陽下左右間亦然配偶對陰陽合乃得各行其化也然亦有遷正未得升降不及者何哉蓋六陽年氣有餘即先年司天在泉未退位而已遷正矣是未至而至者失之太過六陰年氣不足即先年司天在泉已退位而猶未遷正是至而不至者失之不及皆不得其平也又如舊年地之右間當升為新年之天左間或遇天星窒抑如水星窒火金星窒木及中運太過皆能剋制如壬木製太陰戊火克陽明類而不得升即司天亦不得遷正也舊年天之右間當降為今年之地左間或遇地星窒抑及本年司天未遷正皆不得降而入地故當遷正即遷正當升降即升降乃各司其位而相和也否則在上者陽而在下者非陰在下者陰而在上者非陽矣安得不有駁雜之弊乎氣既抑鬱即積為疾病直待旺時乃自抒發變又有不可測者焉是知陰陽之運行各有遷次剛柔之配偶難為預意作八卦圖於下而不動次加五星圖於二層左旋而順行又加六氣圖於上作第三層右旋而逆旋中釘線紐用分節候隨氣步運而回旋以視其所值庶可明其運行之不爽矣否則奚能逐日逐氣而為之贅贅於其際哉圖附在後亦未敢為管之窺也運氣圖下層大圖不動壬子壬午中運木勝而太陰不得升甲子甲午中運土勝而寒水不得降皆不得立正也後仿此此夏至四十六日天蓬制司天天衝制天左間又地阜克地左間地彤制在在泉立秋四十六日天柱克天右間秋分後地玄克地右間以上子午年辛丑辛未水運而少陽不得升乙丑乙未金勝而厥陰不得降凡春分後四十六日天衝制司天地彤制地右間立夏天蓬制天右地阜制在泉地晶克地左木秋分四十六日天蓬制天左以上丑未年中層次圖順行戊寅戊申火運勝金而陽明不得升天丙寅丙申水運勝火而少陰不得入地凡立春四十六日天衝制天右天英制天左地玄製地左地阜制地右春分四十六日天英制天左地晶制在泉夏至四十六日天蓬制司天以上寅申年己卯己酉土運勝寒而水不得升丁卯丁酉木運勝而濕土不得降火抑司天不遷正水窒在泉不相守皆同又天芮制天右不升地晶制地右又地蒼窒太陰不降立夏四十五日天蓬制天右立冬四十五日地蒼制地左太陰以上卯酉年上層小圖逆行庚辰庚戌金運勝木厥陰不得升天又天柱抑木不升丙辰丙戌水運勝火少陽不得入地立春四十六日地玄製地秋分地右間為地玄在泉為地蒼制亦四十六日止立冬四十六日天芮制司天又天左右為天柱天柱英制又地左亦受制以上辰戌年辛巳辛亥水運勝火而少陰不得升癸巳癸亥火運勝金而陽明不得降先年冬至起有四十六日天蓬水星在坎宮之年大寒十五日四時少陽不得在泉至立春後一日在泉曰得其位夏至四十六日地蒼制地左間地彤克地右間秋分四十六日天柱制司天天蓬天芮制天左右俱四十六日止以上己亥年天蓬每以冬至日起住坎宮循艮震巽離坤兌而周於乾以成一歲每宮各四十六日惟乾巽為天門戶止四十五日而止司天在泉南北政不應少陰君火司天陽明燥金在泉南北政兩尺寸不應甲子甲午土濕為患中滿身重丙子歲會丙午水運太過其病寒下中寒下利疫氣清冷心腎有傷戊子天符戊午太乙天符太陽盛上熱血溢庚子庚午俱同天符金齊火化司天為制金得其平堅成之紀上徵與正商同其病下清二便清泄及下體清冷金氣之病也壬子壬午肝木過燥其病支滿金火合德上應熒惑太白寒熱持於氣交而為病治也熱病生於上清病生於下寒熱凌犯而爭於中其病咳喘溢血泄鼽嚏目赤背瘍寒厥入胃心痛腰痛腹大嗌乾腫上初之氣主風木客寒水寒氣抑揚關節禁固腰椎痛中外瘡瘍司天之氣二之氣主君火客風木水氣乃行風木榮動熱鬱於上頭目有病且多淋君火為病三之氣主相火客君火熱極寒生氣厥心痛寒熱並作咳喘目赤火熾為禍之害四之氣主客濕土溽暑炎蒸寒熱立至以有雨也嗌乾黃疸鼽衄飲發濕熱病也五之氣主燥金客相火畏火臨金陽氣布化時寒氣熱甚病溫厲陽和勝也須以苦散終之氣主寒水客燥金燥令行餘火內格腫於上咳喘甚則血溢皮腠病舍脅下連少腹而作寒中金乘木也歲宜咸而軟之而調其上甚則以苦泄火發之以酸補金收之而安其下太陰濕土司天太陽寒水在泉己餘年南北政左尺右寸不應甲寅甲申土濕太過體重胕腫痞飲丙寅丙申中金生水相火之病勝復交病寒腫戊寅戊申俱天符病熱鬱血溢血泄心痛火氣盛也內必應心甲年少異甲金佐於肺而受火刑其氣積實為病得半庚寅庚申司天為制金得其平所謂堅成之紀上徵與正商同也金齊火化邪在於肺其病肩背胸中壬寅壬申俱同天符木火為病掉眩支脅驚駭火木同德上應熒惑歲星風熱參布勝復寒中外發瘡瘍內為泄滿外熱內寒瘧痢聾瞑嘔吐上拂腫色變熱盛寒復水火交爭也初之氣主風木客君火木火交熾溫病乃行血溢目赤咳逆頭痛血崩脅滿膚腠中瘡二之氣主君火客濕土火為土鬱風不勝濕熱鬱於上咳逆嘔吐胸溢頭痛昏憒膿瘡三之氣主相火客相火畏火交集熱中聾瞑血溢咳嘔鼻衄渴嚏喉痹目赤善暴死四之氣主濕土客燥金涼氣至而寒暑間化燥濕以參胸滿身重肺脾自病也五之氣主燥金客寒水金肅水寒氣邪當避終之氣主寒水客風木風木得水萬物反生關閉不禁心痛陽氣不藏而咳風多暴舉炎氣流行令擾廢寒熱往復宜咸宜辛宜酸滲之泄之漬之發之蓋咸以勝火辛以治木酸以勝木火之性滲泄去二便之實漬發去腠理之邪陽明燥金司天少陰君火在泉己餘年南北政兩尺寸不應乙卯天符乙酉歲會太乙天符司天為助從辛之化上商與正商同也金運不及災及兌七宮正西方也丁卯歲會丁酉司天勝運金兼木化反得其所謂委和之紀上商與正商同也木運不及災及東方震三宮司天制木不同少角之例己卯己酉土運不及災及中五宮辛卯辛酉水運不及而土乘之所謂涸流之紀少陰與少宮同也土兼水化癸卯癸酉俱同歲會火不及而司天得政所謂伏明之紀上商與正商同金火合德上應太白熒惑政切全金不足木火乘之木亦無畏故零木之氣得次並行暴多陽少陰風濕流於氣交之際咳嘔嗌塞寒熱發暴振栗癃閉清先而徑毛蟲乃殃熱後而暴介蟲殃初之氣主風木客濕土風濕為患病中熱脹面目浮腫善眠嘔衄小便黃赤甚則淋脾腎傷二之氣主君火客相火二火交熾臣位於君疫癘大行火暴死三之氣主相火客燥金燥熱交合燥極而澤不無寒熱之患以近四氣水土故澤四之氣主濕土客寒水五之氣主燥金客風木終之氣主寒水客君火陽氣布候反溫蟄蟲見水不冰火化之盛其病為濕陽專其令炎暑大行風燥橫於歲運其極而澤寒熱互興宜咸從水化以治火宜清名在泉之火苦從火化以治金宜散司天之金辛從金化以同司天之氣而求其平也太陽寒水司天太陰濕土在泉甲餘年南北政右尺左寸不應甲辰甲戌歲會又同天符柔潤重澤病濕下重丙辰丙戌俱天符水運太過大寒留於溪谷戊辰戊戌司天為制水得其平所謂赫曦之紀上羽與正徵同也火齊水化炎裂拂騰其病熱鬱災太過而水必庚辰庚戌金氣太過其病燥眥瞀胸滿肺金受病也肝亦有損壬辰壬戌木氣太過振拉摧拔其病眩掉目瞑皆風木病也肝筋脾土亦病水土合德上應辰星鎮星寒政大舉澤無陽焰寒濕之氣持於氣交寒熱發肌肉痿不收濡瀉血溢皆火鬱寒濕之病膀胱不能無邪神明絶死不治穴在掌後鋭骨之端真心氣也初之氣主風木客相火臣隨君火冬也草乃早榮風火相搏溫厲乃作身熱頭痛嘔吐瘡瘍斑疥之類二之氣主君火客燥金大涼反至火氣遂抑氣鬱中滿時多有之諸寒滯於中陽氣不行也三之氣主相火客寒水寒水侮陽火無不應病寒反熱癰疽注下心熱瞀悶若不治之陽絶而死四之氣主濕土客風木風濕交爭大熱少氣肌肉足痿注下赤白以客勝主陽脾且生火為熱五之氣主燥金客君火太陰在泉而得君火之化萬物能長能成而人亦舒而無病終之氣主寒水客濕土濕氣大行陰凝慘淒而寒風以至是厥木來相加也脾土傷而孕不育寒凝太虛陽氣不令則火鬱待時而發少陽主治而又水勝之時雨以注寒敷於上雷動於下宜苦以燥之溫以散之蓋苦從火化治寒以熱也濕宜燥寒宜溫厥陰風木司天少陽相火在泉己餘年南北政右寸左尺不應乙巳乙亥金不及而木得政所謂從革之紀上角與正角同也災兌七宮丁巳丁亥俱天符司天為助委和之紀與正角同也災震三宮己巳己亥司天勝運則木兼土化卑監之紀上角與正角同災五中宮辛巳辛亥司天為制其土不同少宮故不得來兼化也災坎一宮癸巳癸亥俱同歲會在泉為助水不兼化不同少羽火氣不及災離九宮風火同德上應歲星熒惑政擾令速熱病行於下風病行於上風燥勝復形於中頭目昏瞑血溢嘔逆筋痿肉消心痛瘡瘍二便淋赤心肝自損肺脾有虧初之氣主厥木客燥金金氣傷肝寒於右脅之下胎孕不育二之氣主君火客寒水寒水犯君陽氣復化氣必應也不無熱中病三之氣主相火客風木司天布政風乃時舉其病泣出耳鳴掉眩四之氣主濕土客君火溽暑濕熱相搏爭於左上天左間也黃疸胕腫嘔吐瘡瘍五之氣主燥金客濕土燥濕更勝沉陰乃布寒氣及體風雨乃行終之氣主寒水客相火時寒氣熱流水不冰蟄蟲出見草乃生人乃舒其病溫厲瘧風生高遠炎氣從之上風下火也土氣溫而云雨作濕化行宜辛從金化以調上之風木咸從水化以調下之相火相火虛實最為難辨無妄犯之衝陽絶死不治穴在足跗上胃之氣也
