body:
  text: 卷一稟賦源流總論六合之內所貴者人人所重者性命也有性命而後有道德有道德而後有功業則性命豈不重哉而保衛性命者醫也其為醫者不知稟賦源流何以保衛性命乎夫性者靈也命者氣也一靈乘陰陽五行之氣生於天地之中具太極之體而與天地萬物同根故配天地為三才而一身陰陽氣血之生化與天地生化萬物無異也靈無形而氣有形自無而至有者為生有形之氣成質而靈主於中也自有而至無者為死形質消化為氣而靈歸造化也其生其死造化為機樞民可使由之不可使知之必悟道而後知機知機則順其氣化之遷流而一靈固無變易也故曰朝聞道夕死可矣能知生之機即知死之理故曰未知生焉知死也然既同其一靈同根一氣而有智愚賢不肖之殊強弱壽夭之異何也同具一靈者性相近也賢愚不一者習相遠也壽夭不同者氣化之厚薄也夫習染之害靈猶塵之汙鏡塵積日厚則明鏡日昏至於暗昧無光名為下愚不移者是故靈明則稟氣清靈昏則稟氣濁靈強則稟氣厚靈弱則稟氣薄此賢愚壽夭所由分不獨人也而萬物皆然孟子曰志一則動氣氣一則動志夫心之所之謂之志是心氣出於一本也故心能使氣而氣能動心所以習染之惡最為昧靈而氣化之乖亦甚害靈是故儒聖之設教也蕩滌惡習以全其靈醫聖之設教也斡旋氣化以保其靈二者相資不可缺也然教法垂於先聖而能否保全其靈又在各人之心志而無關於外者若欲斡旋氣化以保靈要必先明始生之理故首列稟賦源流而論其大略如此經解始生之本素問陰陽應象大論岐伯曰東方生風風生木木生酸酸生肝肝生筋筋生心肝主目其在天為玄在人為道在地為化化生五味道生智玄生神神在天為風在地為木在體為筋在臟為肝在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸在志為怒怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸南方生熱熱生火火生苦苦生心心生血血生脾心主舌其在天為熱在地為火在體為脈在臟為心在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦中央生濕濕生土土生甘甘生脾脾生肉肉生肺脾主口其在天為濕在地為土在體為肉在臟為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎肺主鼻其在天為燥在地為金在體為皮毛在臟為肺在色為白在音為商在聲為哭在變動為咳在竅為鼻在味為辛在志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝腎主耳其在天為寒在地為水在體為骨在臟為腎在色為黑在音為羽在聲為呻在變動為栗在竅為耳在味為咸在志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸故曰天地者萬物之上下也陰陽者血氣之男女也左右者陰陽之道路也水火者陰陽之徵兆也陰陽者萬物之能始也故曰陰在內陽之守也陽在外陰之使也此首明天人合一之道也天以陰陽五行化生萬物氣以成形人為萬物之靈而始生之氣稟於東者所謂帝出乎震也帝者吾人之靈明主宰當其在天則為玄妙之理在人則為大道之源在地則為生化之本以其為大道之源而神智所由生形體所由成者也神出於震寓於離為一身主宰震者肝也離者心也故自東方之木生南方之火由是而生土生金生水則陰陽五行之氣全而成質則五臟六腑筋骨血氣之形體具矣五臟稟五行之性而神寓於心亦分為五行之用如肝怒心喜脾思肺憂腎恐各有所主也五行相剋相生或有傷動其氣即偏而致病假如肝木太過則以肺金之剋制者勝之如其不足則以腎水之相生者助之余可類推矣凡聲色氣味之生化制勝亦然是故萬物生成無非出自天地陰陽之造化而陰陽之氣互相為根互相為用故在人身則陰居內為陽之守陽居外為陰之使也此統明先天生化以成臟腑形軀是為後天而後天之氣由之生化循環不息乃為稟賦源流天人合一之道也人為一小天地岐伯曰天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也帝曰何以然岐伯曰東南方陽也陽者其精並於上並於上則上盛而下虛故使耳目聰明而手足不便也西北方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之故天有精地有形天有八紀地有五里故能為萬物之父母清陽上天濁氣歸地是故天地之動靜神明為之綱紀故能以生長收藏終而復始唯賢人上配天以養頭下象地以養足中傍人事以養五臟天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴氣象雷逆氣象陽故治不法天之紀不用地之理則災害至矣此明人為一小天地而與天地同造化也並上並下者此謂本乎天者親上本乎地者親下乃陰陽自然之性也以身中陰陽不足之處則外邪乘虛襲之故邪受在上則右甚在下則左甚此天地有偏缺所不能全者人亦如之故邪氣得以乘虛居之也但其偏缺本由陰陽升降流行自然之勢而其分布循環生化自周故天有精明之氣分八節以紀序地有高下之形分五方以定里故能為萬物之父母於中濁降清升以生以化而氣之闔闢動靜神明為之綱紀故能生長收藏終而復始也惟賢智之人悟其理以取法天地氣化而為養生之道如四氣調神論所云者義詳下文蓋人生天地氣交之中與天地同根天食人以五氣故天氣通於肺清陽由鼻而入也地食人以五味故地氣通於嗌濁陰由口而入也肝屬木主風故風氣通於肝也心屬火而雷為火故雷氣通於心也脾屬土而主濕故山谷蒸濕之氣通於脾也腎屬水而主寒雨為天之陰氣下降寒水所化故雨氣通於腎也由是可知天地氣和則養人氣乖則病人已在言外矣是故陰陽氣血之流行也其在經則如川聚於腸胃則如海而氣水流行清升濁降分注於上下九竅也若以人身陰陽比天地之陰陽則其水穀所化之汗可名天地之雨其陽氣流行迅利可名天地之疾風其暴氣逆氣可名陽火迅烈之雷以是見天地之氣與人無異也故調治其身者不法天地之氣化則災害必至矣男女稟氣衰旺各異素問上古天真論岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子三七腎氣平均故真牙生而長極四七筋骨堅髮長極身體盛壯五七陽明脈衰面始焦發始墮六七三陽脈衰於上面皆焦發始白七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子矣丈夫八歲腎氣實髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子三八腎氣平均筋骨徑強故真牙生而長極四八筋骨隆盛肌肉滿壯五八腎氣衰發墮齒槁六八陽氣衰竭於上面焦髮鬢斑白七八肝氣衰筋不能動天癸竭精少腎氣衰形體皆極八八則齒髮去腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉今五臟皆衰筋骨懈惰天癸盡矣故髮鬢白身體重步態不正而無子矣夫陰陽根於太極故二氣流行互相生化陰得陽而生陽得陰而長長極則衰自然之理也七者少陽之數女子屬陰得陽而生腎主骨齒為骨之餘衝脈為血海發為血之餘故腎氣充而衝脈旺則齒更髮長至二七而血足則天癸至任脈通太衝盛滿滿則溢下循月而至故稱月事亦名月經經者謂常而有準也衝任之脈皆起於胞中氣血既盛故能孕而有子真牙俗稱盡根牙者是也五七以後則漸衰至七七而天癸竭則不能生育矣八者少陰之數也男子屬陽得陰而長故二八而天癸至五八以後則漸衰至八八而天癸盡不能生育而無子矣此皆言其常數也蓋天癸者謂天生之癸水由陰陽精氣所化者也男子陽精其色白屬陰女子陰精其色赤屬陽以其陰陽互根故陰中有陽陽中有陰也若其所稟有厚薄攝養有乖和則不能拘常數矣帝曰其有年已老而有子者何也岐伯曰此其天壽過度氣脈常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣帝曰夫道者年皆百數能有子乎岐伯曰夫道者能卻老而全形身年雖壽能生子也陰陽精氣稟受於天而女子盡於七七男子盡於八八乃天地氣化之常數也其有稟厚之人氣脈常通腎氣有餘以及修養學道者皆能卻老全形故身年雖壽能生子也其稟薄而失養者則不能及於常數理可見矣此所謂生命在天造命由人者也神為生死之本靈樞天年篇帝曰人之始生何氣築為基何立而為楯何失而死何得而生岐伯曰以母為基以父為楯失神者死得神者生也帝曰何者為神岐伯曰血氣已和營衛已通五臟已成神氣舍心魂魄畢具乃成為人此言人之始生由父母之氣血以成形體而母則乳哺故為基父則撫衛故為楯得以氣血調和而神氣舍心以生成之如其氣血未和不能生長則神氣漸喪而死所以父母為之基楯也壽夭稟於天賦帝曰人之壽夭各不同或夭壽或卒死或病久願聞其道岐伯曰五臟堅固血脈和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六腑化谷津液布揚各如其常故能長久帝曰人之壽百歲而死何以知之岐伯曰使道隧以長基牆高以方通調營衛三部三里起骨高肉滿百歲乃得終此言人賴氣血以資生氣血調和肉堅膚密臟腑生化營衛流行自然無病而可延年然稟質有厚薄其無病者得盡天壽而長短本於天賦非學道不能永壽也如其稟厚則外貌亦厚而可驗使道者鼻下水溝也亦名唇中隧者溝深也基牆者面與耳也三部者上額中顴鼻下口頤也起者隆盛即骨高肉滿也如此故其天壽可至百歲也生長衰死隨時變化帝曰其氣之盛衰以至其死可得聞乎岐伯曰人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頽落發頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰善憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣馬玄臺注此言人之十歲至三十以漸而盛四十至百歲以漸而衰也其氣在下氣盛於足六經也趨者較走更疾矣步者較走更緩矣坐者較步似倦矣至五十歲以後則肝生心心生脾脾生肺肺生腎者每十歲而日衰故至百歲五臟俱衰而終矣腎氣焦者水竭也帝曰其不能終壽而死者何如岐伯曰其五臟皆不堅使道不長空外以張喘息暴疾又卑基牆薄脈少血其肉不石數中風寒血氣虛脈不通真邪相攻亂而相引故中壽而盡也馬注五臟皆脆水溝不長其鼻孔向外而張鼻為肺竅肺氣泄矣肺氣不足故喘息而為暴疾也基牆甚卑脈薄血少而肉脆數中風寒者以其血氣虛脈道不通所以真邪相攻而相引真為元氣邪為邪氣也如是其稟薄故中壽而盡也辨形氣以分壽夭靈樞壽夭剛柔篇帝曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立壽夭奈何伯高曰形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭帝曰何謂形之緩急伯高曰形充而皮膚緩者則壽形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉䐃堅有分者肉堅肉堅則壽形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視壽夭者必明乎此立形定氣而後以臨病人決死生帝曰壽夭無以度之伯高曰牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也帝曰形氣之相勝以立壽夭奈何伯高曰平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣此言天賦形氣各有不同可驗其壽夭也形氣相任者猶云相稱也蓋陽化氣陰成形形氣相稱則陰陽均平無偏故壽偏則必多病而夭矣皮肉相果者堅實而不鬆軟也以肉生於脾土皮毛生於肺金土金相生而氣足則皮肉堅實而壽否則夭矣形者軀體也血氣行於經絡血氣盛則經絡充若形瘦小而色澤榮華可知血氣勝形而壽也如形豐而色無華澤則形勝氣血而夭矣形充而皮膚寬緩其稟氣舒和故壽皮膚急者其稟氣偏促則夭矣乃至脈與骨肉之大小堅脆而壽夭可定病之死生可決也若牆基之或卑或高而皆不及其地者謂面部短促下亭尖削又加疾病則更夭矣如無病平人氣勝形者壽即上文之血氣勝形者也若病人形肉已脫而氣反勝是本元敗而氣外奔也故死如形已削而氣猶不及形危可知也精神魂魄本天地德氣而生靈樞本神篇岐伯曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則邪僻不至長生久視馬注天非無氣而主之以理故在我之德即天之德也地非無德而運之以氣故在我之氣即地之氣也則吾之生德流氣薄而生者也生之來謂之精者易曰男女構精萬物化生是也人生有陰斯有營有陽斯有衛陰陽精氣相搏神斯見焉所謂魂者屬陽故隨神而往來所謂魄者屬陰故並精而出入正以精對神言則精為陰而神為陽也所謂心意志思智慮者舉不外乎一心而已故凡所以任物者謂之心素問靈蘭祕典曰心者君主之官神明出焉則萬物之夥孰非吾心之所任者乎由是而心有所憶者意也意有所存者志也志有所變者思也思有所慕者慮也慮有所處者智也此所稟者愚人則傷之智者善於養生上順天時下盡人事能節陰陽而調剛柔則邪僻不至而能長生久視也精氣津液血脈由陰陽所化靈樞決氣篇帝曰余聞人有精氣津液血脈余意以為一氣耳今乃辨為六名余不知其所以然岐伯曰兩神相搏合而成形常先身生是謂精何謂氣岐伯曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津岐伯曰腠理發泄汗出溱溱是謂津何謂液岐伯曰谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液何謂血岐伯曰中焦受氣取汁變化而赤是謂血何謂脈岐伯曰壅遏營氣令無所避是謂脈男女構精萬物化生當構精時兩神相合而成形常先其身而生者名精即所謂先天之氣是陰陽渾合而成太極之象也由是陰陽動靜以生以化皆為後天則由五穀氣味而生者也故如上焦開發若霧露者名氣是陽所化也腠理發泄而汗出者名津即氣蒸之水也穀氣充滿而淖澤注於骨者名液是陰所化也陽走表故熏膚澤毛而汗出腠理也陰走里故注於骨補益腦髓而其流行則潤澤皮膚以利骨屬之屈伸也中焦為太極所居故受氣取汁變化而赤者名血是陰陽合而生化故其形如水陰也色赤如火陽也所以統一身表裡上下周流不已也然後天之生化實根於先天精氣故其衰也非穀食藥餌所能培之使長而道家修煉必得先天精氣生旺方能延年成道也如其陽所化者行於脈外而走表為衛陰所化者行於脈中而走里為營故脈者肉中之徑路如地之街田之溝營分氣血所由流行者故言壅遏營氣令無所避謂脈又曰脈者氣血之先形無氣血流行鼓動則無脈形可見而氣血之強弱和否皆可驗之於脈也精氣津液血脈虛脫證狀精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴血脫者色白夭然不澤其脈空虛此其候也先天精氣為陰陽之根而無形脫則即死此言後天之精氣也其先天衰則後天精氣日少而至空虛即謂之脫也腎者受五臟六腑之精而藏之耳為腎竅精氣空虛則竅閉塞故聾也臟腑精氣上注於目則明故氣脫則昏眊不明矣汗由津化而腠開大泄則津脫是表陽不固也液生髓以滋筋骨故液脫則骨屬強急屈伸不利色夭無華髓消脛痠由於陰枯其虛陽浮動故耳數鳴也血脫故色白無澤而脈空虛以脈為血之府也凡言夭然者無生活之象也水穀氣味變化五液靈樞五癃津液篇帝曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹余知其然也不知其所由生岐伯曰水穀皆入於口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下流於膀胱則為溺與氣五臟六腑心為之主耳為聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能盡舉乍上乍下故咳而泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充廓故胃緩胃緩則氣逆故唾出五穀之精液和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛痠陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹此津液五別之逆順也水穀食物皆有五味不同五味入口各注其海者如酸先入肝辛先入肺之類故其化生津液隨氣流行各走其道也三焦為相火所遊行陽氣由之而出以溫肌肉充皮膚之氣水名為津是由陽所化也其流而不隨陽氣蒸騰者名為液此津濃厚是由陰所化也天暑衣厚則腠理開陽氣蒸津而外泄名為汗若寒氣外留分肉之間津聚成沫滯則為痛或天氣寒則腠理閉陽氣收降濕氣不行而亦下降流於膀胱而成水則為溺與氣氣者謂大便出穢氣也夫心為五臟六腑之主耳目觀聽為心之用候者審察之謂肺為相傅之官肝為將軍之官脾主肌肉為身之外衛師傳篇曰腎者主為外使之遠聽視耳好惡以知其性蓋耳為腎竅主聞外事也臟腑精氣聚於目故津液盡皆上滲於目也心悲氣並則心系急而肺上舉故液隨氣上溢而心系與肺乍上乍下肺氣逆故悲者泣出而咳也中熱則胃消穀而蟲上下動作充廓腸胃致胃緩氣逆水液不行而唾出也夫穀味入胃由陰陽氣化精液成膏內滲骨空補益腦髓下流陰股滋養筋脈若其陰陽不和則氣化失度使液溢下流出於陰竅而為帶濁等病因而髓減消耗元氣以致虛故腰背痛而脛痠其陰陽氣道不通四海閉塞則繼入之水穀不化下焦不宣則鬱而成水脹矣此皆津液生化逆順之分別也四海義詳後營衛經絡門人身有肥膏肉之分靈樞衛氣失常篇帝曰人之肥瘦大小寒溫別之奈何伯高曰人有肥有膏有肉膕肉堅皮滿者肥膕肉不堅皮緩者膏皮肉不相離者肉帝曰身之寒溫何如伯高曰膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者熱粗理者寒膝後曲處名膕淖者滑潤柔軟而不實也脂即肥其肉堅實若不堅而隆厚則名肉也蓋人生稟陰陽之氣而陰陽各有偏勝不同如後文所云者故體質有肥膏肉之殊其粗理者表陽易泄故身常寒細理者表陽固密故身常熱此由稟氣非外邪之寒熱也帝曰其肥瘦大小奈何伯高曰膏者多氣而皮縱緩故能縱腹垂腴肉者身體容大脂者其身收小帝曰三者之氣血多少何如伯高曰膏者多氣多氣者熱熱者耐寒肉者多血多血則充形充形則平脂者其血清氣滑少故不能大此別於衆人者也帝曰衆人奈何伯高曰衆人皮肉脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰衆人皮肉脂膏氣血皆相稱無多少故其身形亦中等而無大小命曰衆人衆者多也人有耐痛勝毒不耐不勝之異靈樞論痛篇帝曰筋骨之強弱肌肉之堅脆皮膚之厚薄腠理之疏密各不同其於針石火爇之痛何如腸胃之厚薄堅脆亦不等其於毒藥何如少俞曰人之骨強筋弱肉緩皮膚厚者耐痛其於針石火爇之痛亦然帝曰其耐火爇者何以知之少俞曰加以黑色而美骨者耐火爇帝曰其不耐針石之痛者何以知之少俞曰堅肉薄皮者不耐針石之痛火爇亦然帝曰人之病或同時而傷或易已或難已何也少俞曰同時而傷其身多熱者易已多寒者難已帝曰人勝毒何以知之少俞曰胃厚色黑大骨及肥者皆勝毒故其瘦而薄胃者皆不勝毒也皮肉筋骨強厚者耐痛胃厚陰陽氣旺者耐毒其身多熱則陽旺為陽證故病易已多寒則陽虛為陰證故病難已毒者謂峻利攻擊之藥也人有勇怯之分靈樞論勇篇帝曰人之忍痛與不忍痛者非勇怯之分也夫勇士之不忍痛者見難則前見痛則止怯士之忍痛者聞難則恐遇痛不動勇士之忍痛者見難不恐遇痛不動怯士之不忍痛者聞難與痛目轉面盻恐不能言失氣驚顏色變化乍死乍生余見其然也不知其何由少俞曰夫忍痛與不忍痛者皮膚之厚薄肌肉之堅脆緩急之分也非勇怯之謂也勇士秉忠義而不畏死故見難則前其不能忍痛者以無關大義故見痛則止其能忍痛者見難既不恐遇痛亦不動矣怯士貪生而不重義雖能忍痛而見難亦恐不敢前其不忍痛者無論矣是忍痛與不忍痛在皮肉厚薄堅脆不同勇之與怯在稟性之剛正與懦弱之異也勇士者目深以固長沖直揚三焦理橫其心端直其肝大以堅其膽滿以傍怒則氣盛而胸張肝舉而膽橫眥裂而目揚毛起而面蒼此勇士之所由然者也怯士者目大而不減陰陽相失其焦理縱𩩲骬短而小肝系緩其膽不滿而縱腸胃挺脅下空雖方大怒氣不能滿其胸肝葉雖舉氣衰復下故不能久怒此怯士之所由然者也醫聖論治病故明氣血以辨勇怯儒聖論治國故分血氣之勇義禮之勇如曰富貴不能淫貧賤不能移威武不能屈又曰卒然遇之而不驚無故加之而不怒此皆義禮之勇也孟子論勇最為詳切著明矣帝曰怯士之得酒怒不避勇士者何臟使然少俞曰酒者水穀之精熟谷之液也其氣慓悍其入於胃中則胃脹氣滿逆上於胸中肝浮膽橫當是之時固比於勇士氣衰則悔與勇士同類不知避之名曰酒悖恃血氣之勇而不知義禮者即酒悖之類也人之氣質有陰陽五等不同靈樞通天篇帝曰余聞人有陰陽何謂陰人何謂陽人少師曰天地之間六合之內不離於五人亦應之非徒一陰一陽而已蓋有太陰之人少陰之人太陽之人少陽之人陰陽和平之人凡五人者其態不同其筋骨氣血各不等天地陰陽氣化升降而有進退消長有進退則有偏亢有消長則有強弱故萬物之形氣各有不同人為萬物之靈稟陰陽五行之全氣而亦有太少之異異者衆而陰陽和平者寡也蓋由其心意之邪正不同則稟氣之純駁各異因其形由氣成氣隨心變者也故聖賢之學必以正心誠意變化氣質為先孟子言人皆可以為堯舜釋典云萬法由心造是變其心而氣質自變雖堯舜之聖亦可以學而至也此雖聖賢勉人之語人又安可自棄哉太陰人太陰之人貪而不仁下齊湛湛好納而惡出心和而不發不務於時動而後之此太陰之人也馬注下齊湛湛者內存陰險外假謙虛貌似下抑整齊湛然無私也好納惡出者貪得之心也心和不發不務於時動而後之者心似和平不即順應或有舉動必隨人後覘人利害以為趨避其深情厚貌狡詐之態如此少陰人少陰之人小貪而賊心見人有亡常若有得好傷好害見人有榮反乃慍怒心疾而無恩此少陰之人也馬注小貪者比太陰人小異也其心以賊害為主亦不仁也人有失則喜人有榮則慍而心之嫉忌無恩者如此太陽人太陽之人居處於於好言大事無能而虛說志發於四野舉措不顧是非為事如常自用雖敗而常無悔此太陽之人也馬注於於無事之意好言大事無能而虛說所謂其言之不怍者也志發於四野者事不畏人知也左傳云裨諶謀於野則獲謀於室則否此才性之蔽為事如常者止庸常也自用者愚而好自用雖敗無悔也少陽人少陽之人諟諦好自貴有小小官則高自宣好為外交而不內附此少陽之人也馬注諟諦者凡事自審也好自貴外交而不內附者妄自尊貴浮而不實也陰陽和平人陰陽和平之人居處安靜無為懼懼無為欣欣婉然從物或與不爭與時變化尊則謙謙談而不治是謂至治馬注無為懼懼欣欣者不因物感而遽喜怒也尊則謙謙者位尊而愈謙抑也談而不治者無為而治故曰至治不治之治也太陰狀貌帝曰別人奈何少師曰太陰之人其狀黮黮黑色念然下意臨臨然長大膕然未僂此太陰之人也馬注黮黮甚黑念然下意即上文下齊湛湛之意也臨臨然長大之貌其膕雖長直身而不傴僂也少陰狀貌少陰之人其狀清然竊然固以陰賊立而躁嶮行而似伏此少陰之人也馬注清然者言貌似清也竊然者消沮閉藏之貌雖曰清然竊然實以陰險賊害為心即上所云賊心始有此態也其立也躁而不靜嶮則覘望其行也伏如傴僂此其內藏沉思反側之心故耳較太陰人長大不傴僂為異也太陽狀貌太陽之人其狀軒軒儲儲反身折膕此太陽之人也馬注車之向前曰軒軒軒者猶云軒昂也儲儲者挺然之意若反其身而在後視之其膕似折亦不檢之態也少陽狀貌少陽之人其狀立則好仰行則好搖其兩臂兩肘則常出於背此少陽之人也馬注據其態乃多動少靜非檢身若不及之道也陰陽和平狀貌陰陽和平之人其狀委委然隨隨然顒顒然愈愈然㼐㼐然豆豆然衆人皆曰君子此陰陽和平之人也馬注委委然安重貌詩君豫偕老章有委委他他隨隨然不急遽也顒顒然尊嚴貌詩云顒顒昂昂愈愈然和悅也論語云愈愈如也㼐㼐然周旋貌禮云周旋中規折旋中矩豆豆然不亂貌君子者自聖人以至成德之士皆可稱也攝養為本總論人之壽夭不齊者由稟氣之厚薄非關清濁也賢者清愚者濁由性之明暗而使氣之清濁也蓋氣者命也以氣聽命於性故稱性命是故賢者之夭以其氣薄而性明也愚者之壽以其氣厚而性暗也所以君子之攝生也非僅保守氣血以冀延年而已故曰夭壽不二修身以俟之是保其德即為保其壽也何也氣稟於天非我所主德之不修我之罪也何有於壽哉賢者素位而行順天地自然之氣化不喪其所稟明德樂道垂範後世其壽孰加焉愚者不然縱欲敗德以喪其所稟取藥食培氣血以貪其生既無益於世或自招禍患則壽不如夭之為福也然聖人有教無類萬物並育不論賢愚皆欲使其遂生以全其所稟既明其生化之理又教以攝養之方戒以致病之由施設藥治之法嗚呼可謂仁之至慈之極矣夫善能攝養者則無病無病則焉用藥治哉故攝養為保生之本也其所以致病者由外感六氣內傷七情故凡起居服食必順夫天地氣化流行之序隨時防慎以避外來之邪懲忿窒欲清心節勞以免七情之害如是則一身陰陽氣血和平調達自鮮病患夭札之苦然一身氣血隨心所使心定神安氣血自固雖有外邪亦莫能傷故經曰恬淡虛無真氣從之精神內守病安從來虛者虛其心則神自清無者無其欲則精自固天真元氣從之生長而精神固守於內何病之有則凡自愛其身者不可不知此理也苟能恬淡虛無則動無不善而德行自全日臻於君子之域既益當時垂名後世其為壽也豈可量哉經解法天地氣化以保本元素問上古天真論岐伯曰上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神居而盡終其天年度百歲乃去法於陰陽者如所云春夏養陽秋冬養陰以順天地生長化收藏之氣也和於術數者如按摩導引針砭藥餌之類善於調和以卻病也飲食起居皆有節度不妄作勞如是故能盡其天年至百歲乃去是完其所稟而不喪者也夫上古聖人之教下也皆謂之虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來是以志閒而少欲心安而不懼形勞而不倦氣從以順各從其欲皆得所願故美其食任其服樂其俗高下不相慕其民故曰朴是以嗜欲不能勞其目淫邪不能惑其心愚智賢不肖不懼於物故合於道所以能年皆度百歲而動作不衰者以其德全不危也虛邪賊風義詳後疾病門靈樞九宮八風篇若養生之道必以恬淡虛無心自寧靜而真氣生旺精神內守則外邪不能傷也上古稟質既厚又無情欲斫喪故至百歲而動作不衰正由渾朴之德全而合乎天真之道此即詳申上條之義也天地五行生化氣味以養人素問六節臟象論岐伯曰天至廣不可度地至大不可量草生五色五色之變不可勝視草生五味五味之美不可勝極嗜欲不同各有所通天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生人之五臟具五行之性草木果谷由陰陽五行化生五氣五味以養人而人之嗜欲不同者以五行之性各有所通則各有所宜總不出天以氣地以味食養於人故天氣入鼻藏於心肺使五色明潤聲音能彰此陽氣達於表也地味入口藏於腸胃而氣得味滋味得氣化氣味生化津液相成此陰氣充於內也陰陽充盛則神自生旺矣然氣味固為養生之本如用之太過使五行偏勝則反傷臟氣其義詳治法門尤不可不知也知修養之法可以長生素問陰陽應象大論岐伯曰能知七損八益則二者可調不知用此則早衰之節也年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強不知則老故同出而名異耳智者察同愚者察異愚者不足智者有餘有餘則耳目聰明身體輕強老者復壯壯者益治是以聖人為無為之事樂恬淡之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也七損八益者女子二七而天癸至七七而天癸竭男子二八而天癸至八八而天癸竭此陰陽氣血生旺衰竭之節度也能知此理則可順夫陰陽二氣之損益而調之不知用此則日以耗損未老先衰是故常人至年四十而陰氣自半正如一日而過午之時起居衰矣逮至五十六十則漸敗遂有種種病態也原其所稟同出陰陽五行之氣知調養與不知則成強老之異名也智者察其同稟之理氣是為知本以調養而固之愚者察其強老之異態乃用飲食資助是為圖末治本則有餘為益圖末則不足為損有餘則老者復壯壯者益治是以聖人為無為之事即治本之道所謂恬淡虛無真氣從之也圖末者如藥餌培補之類終不免於衰老蓋藥餌只能培後天而勞於有為之事則先天日以消耗也能固其本則可與天地同壽而無窮故聖人之自治其身者如此斯言長生可以修養而至即老子虛無自然之仙道也廣成子曰毋勞爾形毋搖爾精乃可以長生則是恬淡虛無四字義理俱盡矣隨順四氣以調心神素問四氣調神論曰春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少養氣而曰調神者神為氣主神不清靜則氣不能調是故天道清靜無為而其春生夏長秋收冬藏出於陰陽升降自然之氣故能循環不息人稟天地之氣以生故當隨順天地氣機以為養生之道也發陳者升發冬藏之陳氣生機始萌故調氣者當夜臥早起以及賞而勿罰皆順其生機以應春氣者也如逆之則傷肝以肝屬木主春令生氣既傷則無以資長夏氣而夏令屬火木傷不能資長心火故交夏反為寒變之病以其奉長者少乃陽傷而陰邪起也夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外則夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病夏至陽極陰生則陰氣上升陽氣下降陰陽相交萬物生化蕃茂秀麗花英盛滿將以成實此時氣候始變故當隨順其機夜臥早起避暑熱以納清氣無厭日長而貪眠致神氣昏困使志無怒怒則陽火暴逆不和和則其氣得以疏泄若所愛在外者皆順其發泄之意勿使郁遏為養生之道也心屬火主夏令如逆之則傷心氣暑邪乘虛客之其時腠開汗泄則不之覺至秋涼風外加則暑邪內發而成痎瘧痎瘧者纏綿難愈以其暑濕內閉秋風外束故也若此而資奉秋收之氣既少則冬令為病更重矣秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少暑退涼生容象清肅陰陽均平故謂容平天氣以急者收肅清潔之象也地氣以明者鬱勃穢惡消散也故當早臥以避風露早起以資爽氣以及無外其志使肺氣清皆應其收肅之氣機為養生之道也肺屬金主秋令如逆之則傷肺肺傷則腎無資生之氣而腎主閉藏二便為腎之門戶閉藏無權則門戶失守而大腸為肺腑臟傷則腑氣不固而食未消化即從下泄名飧泄也此由奉藏之氣少致腎失司而腸不固也冬三月此謂閉藏水冰地坼無擾乎陽早臥夜起必待日光使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少冬三月天氣盡入於地故萬物歸藏陰寒令行則水冰地裂陽既潛伏不可擾動早臥晚起避寒就溫以防外邪使志若伏若匿等者皆順其閉藏之候為養生之道也然就溫暖亦不可太過使開泄皮膚奪其陽氣是逆其閉藏之令則傷腎腎傷不能生肝木肝主筋筋病則為痿為厥以其失於閉藏則奉生之氣少也天氣清淨光明者也藏德不止故不下也天明則日月不明邪害空竅陽氣者閉塞地氣者昌明雲霧不精則上應白露不下交通不表萬物命故不施不施則名木多死惡氣不發風雨不節白露不下則菀藁不榮賊風數至暴雨數起天地四時不相保與道相失則未央絶滅惟聖人從之故身無奇病萬物不失生氣不竭此舉天地氣化表人身失養之病以明天人合一之理以證上文之義也夫積陽為天藏德者蓄積之義不止者健運不息故永不下墜也天地為陰陽之體日月為陰陽之用天氣光明由於日月設天自明其明則日月反不能明體用倒置猶夫人之邪害空竅而昏蒙也何也空竅本清陽之氣所行若體用倒置則陽氣閉塞而不宣地之濁氣上冒而昏蒙不明正如人之邪害空竅也故其上應則雲霧濁而不精而白露壅遏不下交通蓋云為地之陽氣上升露為天之陰氣下降陰陽之氣閉塞鬱冒而不相交通則不能表萬物之命而施生化表者舒展之謂以故草木多枯藁而死乖惡之氣不得發散則賊風數至暴雨數起四時氣化無序與道相失矣若人能恬淡虛無不勞心神如天之清淨無為藏德蓄積自然日月並明陰陽之氣健運而生化不息也如其情欲勞擾則性天自用其明正如日月之反不明而體用倒置則一身氣血錯亂而不生化必至未央而絶滅未央者未到中央猶未及半之謂未到中年而夭亡也惟聖人恬淡虛無而體靜用明故能從天地化機補偏救弊不失其道則身無奇病亦如天地氣化不乖則萬物不失其命而生生之氣不竭也志於養生者可不究心此理哉逆春氣則少陽不生肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣獨沉此承上文言不順天地氣化而致病者故逆春氣則少陽不能發生人身少陽之氣由肝出膽故膽經稱少陽陽不發生而肝膽為表裡故肝氣內變為病也逆夏氣則太陽不能長旺以肝木生心火為太陽小腸為心腑故稱太陽經與心為表裡陽不長旺故心氣內虛若空洞無主也逆秋氣則太陰氣不收肅太陰者肺也肺失清肅則虛火上逆故病焦灼而胸滿也逆冬氣則少陰不藏少陰者腎也腎主閉藏為生氣之源蓋元陽根於至陰如坤下起復既逆冬氣而乏藏納則生髮之氣少猶坤下不能起復故腎氣獨沉而春陽不能升旺矣此以肝心肺腎四臟主春夏秋冬生長收藏之氣而分少太陰陽與手足三陰三陽經之分少太者各有義理不同以春夏陽升主生長故言少陽太陽秋冬陽降主收藏故言太陰少陰由陽闢而陰闔也可知臟為根本為體腑與營衛經絡為枝葉為用也故下文言春夏養陽秋冬養陰者順其闔闢之氣以養根本也順其闔闢必當調之和之非補之助之之謂上言逆之者逆其闔闢之氣則絶其生化之機故傷之為甚而生百病矣夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物沉浮於生長之門逆其根則伐其本壞其真矣故陰陽四時者萬物之終始也死生之本也逆之則災害生從之則疴疾不起是謂得道道者聖人行之愚者佩之從陰陽則生逆之則死從之則治逆之則亂反順為逆是謂內格是故聖人不治已病治未病不治已亂治未亂此之謂也夫病已成而後藥之亂已成而後治之猶渴而穿井鬥而鑄兵不亦晚乎此總結上文順時調養之理法也人與萬物同稟陰陽氣化而生而陰陽出於太極故陰陽互相為根春夏陽令則養陽秋冬陰令則養陰是養其根本則太極之生機不息而與萬物並育為生長之門戶也如逆之則伐其根本壞其天真矣故陰陽四時者萬物由之而生化終而復始循環不息而為死生之本也逆之則害從之則吉惟聖人能從其道而行之愚者不悟其理必當謹佩聖教而遵守之庶可免害而保生倘反順為逆則身內元氣先已乖格不和無論外邪之病矣如是而後施治猶渴而穿井鬥而鑄兵何濟於事哉若其虛邪賊風四時皆有更當知而避之義詳病證門中即所謂治未病之法也
