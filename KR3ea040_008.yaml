body:
  text: 卷七寒熱病證寒熱靈樞五變篇帝曰人之善病寒熱者何以候之少俞曰小骨弱肉者善病寒熱帝曰何以候之少俞曰顴者骨之本也顴大則骨大顴小則骨小皮膚薄而其肉無䐃其臂懦懦然其地色殆然不與其天同色汙然獨異此其候也然後臂薄者其髓不滿故善病寒熱也善病寒熱者不必受大邪因其皮肉筋骨皆薄弱略有微風寒即發寒熱之病也皮弱而衛陽虛故其面色亦常不正頷為地部額為天部時有清濁之邪相蒙而上下面部之色各異蓋清邪上受上部之色薄澤為風濁邪下受下部之色晦滯為濕殆者晦也凡病危殆其色必晦之意耳表常邪侵則營衛不調乃善病寒熱矣驗其顴臂與䐃知其骨肉薄弱而髓不滿之故䐃者臂肘節間隆厚之肉也皮寒熱靈樞寒熱病篇曰皮寒熱者不可附席毛髮焦鼻稿臘不得汗取三陽之絡以補手太陰絡淺在皮皮寒熱者邪閉皮膚而痛故不可附席皮毛肺之合也肺開竅於鼻以邪外閉陽郁化熱故毛髮焦而鼻稿臘臘者焦燥也此肺液已傷久則必成肺痿故當急取三陽經之絡以泄皮膚之邪補手太陰經以救肺也靈樞口問篇岐伯曰寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽是以陰盛陽虛不能勝外寒而但寒栗無內熱證故當補諸陽以散外寒與上證有陰陽虛實之異也肌寒熱肌寒熱者肌痛毛髮焦而唇稿臘不得汗取三陽於下以去其血者補足太陰以出其汗肌寒熱其邪從皮毛而深入矣唇為肌肉之本脾所主也邪已侵脾故毛髮焦肌肉痛而唇稿臘取三陽經下部以去其血者是疏通營衛以解肌肉之邪以營衛氣血行於肌肉之中也營衛疏通即補足太陰脾經以滋津液助其出汗則病退矣骨寒熱骨寒熱者病無所安汗注不休齒未稿取其少陰於陰股之絡齒已稿死不治骨厥亦然骨寒熱者邪從肌肉而深入骨也邪既深入表分更傷故病甚無少安時而汗注不休津氣皆脫矣齒為骨之餘骨者腎所主齒未稿腎水未竭故取少陰腎經所屬陰股之絡脈以瀉邪熱如齒稿則腎水涸死不可治矣骨厥者骨中灼熱而肢體厥冷近世所云骨蒸勞病亦當驗其齒以辨生死也治法隨時分淺深振寒灑灑鼓頷不得汗出腹脹煩悗取手太陰刺虛者刺其去也刺實者刺其來也振寒灑灑鼓頷者身寒如冷水灑之而戰栗也此寒閉於表內陽鬱勃故不得汗出而腹脹煩悶若無頭痛發熱等證其邪不在太陽經而在手太陰肺也故刺手太陰經當分虛實也刺虛者隨其去氣而補之刺實者迎其來氣而瀉之補者補其正氣瀉者瀉其邪氣此在候其呼吸來去而入針出針以為補瀉之法故曰知迎知隨氣可與期春取絡脈夏取分腠秋取氣口冬取經輸凡此四時各以時為齊絡脈治皮膚分腠治肌肉氣口治經脈經輸治骨髓人身氣血隨四時升降之氣而浮沉其感邪隨身中之氣而進止故刺法按時而分淺深用藥之道亦然矣此言常理之軌則亦不可以拘執也蓋病之變化無盡要必隨宜而施故仲景先辨脈證以定治法方為至當前卷虛風賊邪篇素問四時刺逆從論曰春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中是言身中旺氣所在此言刺法以泄其邪互明其義理也瘰癧靈樞寒熱篇帝曰寒熱瘰癧在於頸腋者何氣使然岐伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者帝曰去之奈何岐伯曰鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉其外為膿血者易去也請從其本引其末可使衰去而絶其寒熱審按其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已瘰癧生於頸腋間甚者連貫成串是肝膽兩經之脈所行者始由七情鬱結陽化為熱而外邪乘之致寒熱邪毒留於經脈與血氣膠結而成此病先因內傷兼外邪故其病本在臟其未出於頸腋而浮於脈中未內著於肌肉如外為膿血者病邪尚淺得從膿血而泄故易去也從本引末者先調臟氣然後疏通經脈以和營衛可使其邪衰去而絶其寒熱也審按其經脈之道路徐往徐來皆用針之法以邪在經脈血氣中非能驟去必用緩治之法而用藥亦然矣如其初起小如麥者易治故三刺可已若久而病深癧大則難治如下文所云瘰癧死期帝曰決其生死奈何岐伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死赤脈不下貫瞳子可治也黑珠屬肝瞳子屬腎赤脈貫瞳子邪毒深入肝腎之臟必死矣赤脈多其血氣盛故死期延遲若雖有赤脈而不下貫瞳子者毒猶在經而未入臟可以治之也熱病熱病素問熱論篇帝曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆十日以上者何也岐伯曰巨陽者諸陽之屬也其脈連於風府故為諸陽之氣也人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死此統標熱病而言皆傷寒之類者謂多由傷寒邪而化熱不獨感熱而成也巨陽者太陽經也風府項後督脈穴督脈為陽脈之綱太陽經主一身之表又與督脈相通故為諸陽主氣也傷於寒而病熱者以身中陽旺被邪遏而化熱以其陽旺故熱雖甚不死其兩感於寒者謂外太陽內少陰俱受邪傷而本元氣絶故不免於死也六經證傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受病而未入於臟者故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰已其未滿三日者可汗而已其滿三日者可泄而已此明表邪自淺入深之次序也蓋人身陽氣衛外而為固者衛氣晝行於陽夜行於陰行於陰則表陽虛邪得乘虛而內侵衛氣一日出入一次故邪一日內侵一經而六經是淺深之層次故至第六日深入第六層厥陰之經也太陽為第一層其經脈自足行腰背上頭故頭項痛腰脊強余皆觀其病狀知其邪在何經若六經腑臟皆受邪營衛閉塞不行五臟之氣不通則死故死皆以六七日間此言其邪重者也若非陰陽兩感之邪但由陽經遞傳陰經而未傷臟腑則七日元氣來復而邪亦逐日漸衰故至十二日後病可愈也若治之必疏其經絡以通達臟氣之脈則邪可衰去如未滿三日邪在陽經可發表而汗之已滿三日邪之陰經當從陰分泄之泄之者或腑氣不通則通其腑而陰經之邪可隨之而泄矣蓋陰經在裡不能發汗也靈樞邪客病形篇曰邪中陰經而入臟臟氣實邪不能客則還之於腑可知邪由陰經而歸胃腑者其臟氣必實如仲景所論少陰證用承氣湯者是也其臟氣虛者邪由陰經入臟必死矣若由陽經而入腑者亦為實證也然經文止明其常理如此而邪之傳變無定固不可拘執日數而治所以仲景著論要必先辨脈證知其邪在何經何腑或虛或實隨宜施治立法最為精詳是故學者首當究心奉為圭臬也兩感證帝曰其病兩感於寒者其脈應與其病形何如岐伯曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陰俱病則腹滿身熱不欲食譫語三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死帝曰五臟已傷六腑不通營衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣此又申明兩感病狀必死之理也陰陽兩經內外俱受邪故一日而至三日則邪遍陰陽六經帝謂既已邪遍六經內外五臟已傷故不知人事六腑不通故水漿不入而營衛之氣已不行矣又必待三日方死何也岐伯言陽明胃經氣血俱盛邪雖遍於內外陽明氣血未盡至第六日氣盡方死也遺邪帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也帝曰治遺奈何岐伯曰視其虛實調其逆從可使必已帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也病初愈餘熱藏於血氣中而不覺因食助氣則兩熱相合故食肉病必復發多食谷則邪遺留致淹纏不能脫體故當戒口稀粥調理為要也溫暑之分凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑暑當與汗皆出勿止此言感邪有重輕病發有遲早不定也如上所云一日太陽受之者感邪而即病者也其有邪伏而不即發則必隨時令之氣變化為病如通天論所云冬傷於寒春必溫病是故病發於先夏至日名溫發於後夏至日名暑以其氣變故病不同教人分別而治也為因冬令氣寒春令氣溫至夏至日則陽極陰生地氣升而天氣降故夏至前溫熱為陽邪夏至後地氣升而化濕濕火合氣則名為暑故暑病自汗其濕外泄熱亦得散當與汗皆出而勿止之若止其汗則濕遏其熱病必重矣故暑與溫熱之病治法不同也肝熱證素問刺熱篇云肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰少陽其逆則頭痛員員脈引沖頭也此即明伏邪發病之證也凡邪自外受者必先現表證如太陽病發熱惡寒頭痛之類也此言肝熱病者正明伏邪化熱自內而發故先現里證以肝主遺溺癃閉故肝熱病發小便先黃也腹痛多臥身熱者脾位於腹而主肌肉脾困則嗜臥肝病必然延及於脾也熱邪內擾神魂不安狂言驚惕脅痛手足躁不得臥皆心肝經現證以木火同氣也膽為甲木肝為乙木故甲乙日時而木氣旺得大汗而邪解也庚辛金也金來剋木故庚辛日時其病必甚若正不勝邪而氣逆者至庚辛而木氣絶則死矣刺足厥陰肝少陽膽二經以泄其邪若其邪氣上逆則頭痛員員脈引沖頭者員員頭中旋轉之狀以肝脈循喉後上至巔頂故也心熱證心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽五臟生陽之氣始於肝木木生火火生土土生金金生水水又生木如是生生不息則安健無病義詳稟賦源流門首節矣若邪伏於血氣之中必隨生陽之氣而動動甚則病發故其發也隨氣流行亦無定處所以難經言溫病之脈行在諸經不知何經之動也各隨其經之所在而取之故必觀其現證方知其邪發於何經今經文按生氣之序以列其證故首列肝次以心脾肺腎也如仲景所論邪之傳變亦無一定正可與經參合互證以明其理也假如邪熱由心經而發則先不樂數日即懊憹也熱爭氣逆則卒然心痛而更煩悶犯胃則嘔心與小腸為表裡小腸經脈上頭面熱邪由里出表故頭痛面赤腠理閉則無汗壬癸水也小腸為丙火心為丁火水剋火故壬癸則病甚丙丁自旺得大汗而解如其氣逆則壬癸水旺火絶而死矣刺手少陰心太陽小腸經以泄其邪也或曰此篇分五臟熱病豈無從外傳裡之邪而子盡解作伏邪內發可乎余曰外邪傳裡如前篇所云一日太陽受之以至六日厥陰受之已歷歷詳明矣此篇云小便先黃心先不樂數日乃熱等皆先現里證而後發病豈非從內而發之伏邪乎且前篇論熱邪所遺當禁肉食其義理已盡矣乃又言凡病傷寒而成溫者一節本此篇之提綱也其云肝熱病以下即明先夏至日病溫之證溫甚即為熱病也後人不審以刺熱名篇將提綱割列前篇細觀文義實同贅辭蓋篇首既言人之傷於寒也則為病熱而義理髮揮已盡乃又言凡病傷寒而成溫豈非贅乎可知其要義在先夏至後夏至兩句是專論伏邪隨氣候變病之理由此觀之豈非為此篇之提綱由後人割裂所誤哉更觀此篇下文總結云肝熱病者左頰先赤一節教人乘伏邪未發而見其色現即刺之名曰治未病豈不尤為可證乎且此言五臟之病必得旺氣時日而邪始能由里達表汗出而解正與彼之自太陽傳厥陰者有一出一入之分故此特標肝熱病心熱病正明其邪由里出表與彼之自表傳裡為對待文字也奈何讀者注者皆茫然不辨亦疏忽甚矣更有昧者謂無伏邪發病之理則於此等經義不必與言矣脾熱證脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明頭重頰痛與頭痛不同頭痛者邪在三陽經此邪在太陰欲出陽明而不得達因而鬱悶故頭重頰痛煩心顏青欲嘔皆邪結陰分不能出表欲達不達爭擾於中故又腹滿而泄利腰痛不可俯仰兩頷痛經絡氣血皆壅閉故也其病甚與汗與死例上可知矣刺足太陰脾足陽明胃經以泄其邪肺熱證肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如大豆立已皮毛肺之合也熱邪鬱於肺陽氣不達於皮毛故先淅然如水灑身而厥冷毛豎惡風寒狀似外感而實由內熱閉其陽氣故舌黃身熱若初感外邪而非內熱其舌必白也故熱甚氣逆則喘咳痛走胸膺背不得太息全是肺臟熱閉之證頭痛不堪者內火不得發泄直上衝腦而痛故曰不堪與外邪在經之頭痛不同也鬱極而腠開汗出則熱散身寒也其甚其汗其死義皆同上刺肺與大腸經出血以泄其邪腎熱證腎熱病者先腰痛䯒痠苦渴數飲身熱熱爭則項痛而強䯒寒且痠足下熱不欲言其逆則項痛員員淡淡然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽腰為腎之府熱邪將發故先腰痛䯒痠者邪郁筋骨間也苦渴數飲內熱劫津也熱爭則項痛而強邪欲外出太陽經而不得達故䯒寒且痠足下反熱皆太陽經氣壅閉故也有無可奈何之苦故不欲言邪氣上逆則項更痛員員淡淡者一身不能自主莫可形容之病也其甚其汗其死與上同刺腎與膀胱經泄其邪諸汗者至其所勝日汗出也此總結上文重申其邪內伏必得臟氣勝旺之日邪始外達汗出而愈未發先現色肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病此又總明伏邪未發必然先現外象也左頰顏鼻右頰頤是肝心脾肺腎臟之氣應於面之部位也有諸內者形諸外病雖未發而色先現可見邪本伏於血氣之中因其未動隨氣血流行而不之覺其將發也必隨五臟生氣而動故先現色於面良工望而知之乘其始動即刺而泄之則邪勢自殺而病必輕矣用藥之法可以類推是為治未病也熱病從部所起者至期而已諸當汗者至其所勝日汗大出也治諸熱病以飲之寒水乃刺之必寒衣之居此寒處身寒而止也此總結上文以明治法也從部所起者如肝熱病左頰先赤之類至期而已者即是肝得甲乙為其所勝日汗大出而愈也以其久伏之邪熱從內發故治之必先飲寒水從里逐熱然後刺之從外而泄再衣以寒居寒處使身寒熱除方可止也外感伏邪互發太陽之脈色榮顴骨熱病也榮未交曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎此明外感伏邪互發之證也與首篇之兩感同中有異彼則內外同時受邪而俱病故不免於死此則外感先發而伏邪後發則可生若同發而內外相交則死期不過三日也云太陽之脈者邪受太陽經脈如上所云一日巨陽受之頭項痛腰脊強者是也色榮顴骨者鮮榮赤色現於顴骨也蓋顴者骨之本骨者腎所主腎與太陽為表裡若腎臟伏熱之邪已動循榮血而現色於顴也榮未交今且得汗待時而已者言太陽經脈之邪與榮血伏熱之邪尚未相交今且令其得汗先解外邪其內伏之邪後發可待臟氣旺時而已如腎熱病待壬癸日得大汗而已也或如前節所云見赤色者刺之亦可也倘與厥陰經脈病證爭現則腎肝皆有熱邪勢必與太陽外邪連合而不可解救則死期比前兩感之病更速不過三日也蓋兩感病起於經必待胃氣盡六日方死此則其熱病內連腎臟本元即絶故死速也少陽之脈色也少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭現者死期不過三日上言肝熱病者左頰先赤肝為厥陰膽為少陽相表裡者也外邪受於少陽經脈而肝臟伏熱之色榮於頰前若外內之邪尚未相交今且令其得汗以解外其內發之熱可待時而已若與少陰經脈病證爭現則肝連腎熱內外邪勢必交而難解死期不過三日也大抵外內之邪先後而發尚可解救若外內齊發邪必交結而死故要緊在榮未交一句下文評熱病論云病名陰陽交交者死即是榮已交之義也按此止舉太少兩證而未及陽明太陰者其義固可類推而知也且思陽明太陰屬脾胃其邪雖交可從胃腑通利解之以胃為臟腑之海也不比彼太少兩證邪無出路而必死者故經文略之也陰陽交死證素問評熱病論帝曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯曰病名陰陽交交者死也人身陰陽之氣本來相交而相生者今因邪勢瀰漫外受陽分之邪與內發陰分之邪交合為一而本元正氣即絶故病名陰陽交而死非陰陽正氣之相交者下文明其所以然之理人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗出者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也汗生於穀穀生於精者謂由本元精氣化水穀以生津液發而為汗邪隨汗泄則邪卻而精氣勝也精氣勝則當能食以化水穀其邪已泄而不復熱矣乃復熱者邪氣未去也其所出之汗精氣徒泄也故汗出而輒復熱是精卻而邪氣勝也所以不能食精無俾也俾者倚藉之謂其病雖留連其壽可立待而傾也古論曰汗出脈躁盛者死若邪去而精氣存脈必靜矣今脈與汗不相應則邪未去而精氣不勝病氣也其死明矣且狂言是失志失志者死一也汗出復熱精卻邪勝二也脈與汗不相應三也今現三死證不見一生證雖似愈必死也死證靈樞熱病篇曰熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足身熱甚陰陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徵也兩手之脈名氣口主五臟之陰頸旁動脈名人迎主六腑之陽義詳十二經絡篇熱病三日氣口靜而人迎躁者陽熱之邪盛於陽經也蓋人迎為陽明之脈陽明行氣於三陽故當治諸陽經以瀉其熱而出其汗再實其陰氣以補其不足如身熱甚而氣口人迎之脈皆靜者脈證不合本元氣敗不能與邪爭故脈反靜為死之徵不可妄治也如其可以治者急取之若不汗出則通腑以泄之可也五十九刺者經穴針法詳針灸篇不録熱病七八日脈口動喘而短者急刺之汗且自出淺刺手大指間脈口即氣口又名寸口動喘而短者短為肺脈邪入手太陰肺經故刺手大指間肺經之井穴脈口動喘其人迎亦必躁盛可知熱病七八日之久故當急刺也熱病七八日脈微小病者溲血口中乾一日半而死脈代者一日死脈微小及代皆邪熱深陷而元氣脫故溲血口乾而死之速也熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死此即精卻而邪勝者也故死熱病七八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗出者勿腠刺之熱病七八日而脈不躁邪氣深沉之象或躁而不散數其元氣尚未敗三日中或得汗解如三日不汗其元氣敗而邪更深四日必死矣凡此等日久未曾汗出者多是死證勿妄治也肺邪熱病先膚痛窒鼻充面取之皮以第一針苛軫鼻索皮於肺不得索之火火者心也此熱邪在肺經故先皮膚痛而鼻窒充面邪浮於上也故從皮毛以治之針有圓扁大小九等淺刺皮毛當用第一針也苛者痛也軫同疹鼻上熱結成疹也若治皮而肺邪不得去當瀉心火以救肺金也凡言索者用針引氣氣至為索得也心邪熱病先身澀倚而熱煩悗唇口嗌乾取之脈以第一針五十九膚脹口乾寒汗出索脈於心不得索之水水者腎也此熱邪在心經也先身澀倚而熱者鬱熱耗津液而皮乾澀身如倚著熱物之狀故又煩悗而唇口嗌乾也心主血脈故當治脈若治脈不得邪去當助腎水以濟之所謂寒之不寒是無水也壯水以制陽光其熱自退既治之而膚脹口乾身寒汗出者衛陽已虛故身寒膚脹而汗出汗多傷津故口乾當用清補調之也脾邪熱病嗌乾多飲善驚臥不能起取之膚肉以第六針五十九目眥青索肉於脾不得索之木木者肝也此熱邪傷脾津液不能上輸而嗌乾多飲脾病則肝木乘之故善驚而目眥青臥不能起者脾主肉脾傷則身重也治脾不得邪去必當瀉肝以蘇脾困也肝邪熱病面青腦痛手足躁取之筋間以第四針於四逆筋躄目浸索筋於肝不得索之金金者肺也此熱邪傷肝故面色青肝脈上巔入腦故腦痛邪入厥陰手足躁擾甚則四逆筋傷而躄肝開竅於目肝液泄而目中含淚如水浸從筋治肝不得愈則治其肺用金以制木也血分邪熱病數驚瘛瘲而狂取之脈以第四針急瀉有餘者癲疾毛髮去索血於心不得索之水水者腎也此熱邪傷血血心所主而藏於肝故數驚瘛瘲而狂皆心肝經現證也以針取之血脈急瀉其有餘之邪若成癲疾必毛髮盡禿血熱之極也從血治心不得愈仍當助腎水以養肝制心火也腎邪熱病身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨病不食齧齒耳青索骨於腎不得索之土土者脾也此熱邪傷腎腎主骨骨病則身重骨痛耳為腎竅故耳聾陽邪深陷入陰故好瞑目邪盛於裡故不能食齒為骨之餘邪在骨齒中麻癢難忍故齧之耳青者腎熱生風也從骨治腎不得愈當治脾以勝之也髓邪熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不治邪熱深入骨髓而身反不知痛處但肢節弛縱不能收持口乾陽熱甚而陰筋頗有寒正以熱深在髓陽閉不伸也死不可治矣少陽邪熱病頭痛顳顬目掣脈痛善衄厥熱病也取之以第三針視有餘不足寒熱痔顳顬者耳前足少陽經穴動也一名腦空穴熱邪客少陽故頭痛而經穴與目牽掣而脈痛血熱隨氣升則衄故名厥熱病以陽邪上逆陽上盛則下虛而厥也視其有餘不足調之使平邪在少陽必發寒熱侵入厥陰經脈循肛而成痔也手足陽明邪熱病體重腸中熱取之以第四針於其腧及下諸指間孛氣於胃絡得氣也此邪熱在手足陽明經也陽明在肌肉中故體重腸中熱既取其腧及手足指又索胃絡之氣以泄其邪也脾腎經邪熱病挾臍急痛胸脅滿取之湧泉與陰陵泉取之第四針針嗌裡此邪熱在脾腎兩經故取脾腎兩經之穴以治之肺脾經邪熱病而汗且出及脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚取內踝上橫脈以止之此從肺脾兩經而治之也辨生死熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生此言熱邪盛而陰精涸極也以人迎為陽脈寸口為陰脈寸口躁盛故謂陰脈之極而死即上所云邪勝而精卻也脈靜則精存故生熱病脈尚躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生此言津液涸而不能作汗陽邪亢極故謂陽脈之極而死以人迎脈更盛躁也如得汗後脈靜則生義與上同死證熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也凡此九者不可刺也顴為骨本腎主骨邪熱盛腎水枯故顴赤邪氣上衝脾胃則噦古名厄逆為噦今時或以空嘔為噦而厄逆更為敗證也泄瀉則邪熱應去而腹滿反甚者脾敗而邪仍在也目不明者熱傷五臟精氣而熱不已則精竭也老人氣血衰嬰兒氣血弱腹滿而熱則邪結土敗也汗不出表氣不通邪熱內傷脾胃嘔且下血本元脫矣舌本爛者邪熱遍灼三陰臟真敗矣咳而衄邪熱傷肺汗不出及出不至足營衛經絡不通邪無出路也髓熱者上條之證也熱而痙腰折瘛瘲齒噤齘者熱極生風筋脈拘急角弓反張肝腎陰涸也凡此九證皆死不可刺則藥亦不可治也陽明腑實證素問陽明脈解篇帝曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚何也岐伯曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也帝曰其惡火何也岐伯曰陽明主肉其脈血氣盛邪客之則熱熱甚則惡火帝曰其惡人何也岐伯曰陽明厥則喘而惋惋則惡人邪熱入陽明中土土畏木故聞木音而驚也熱甚故惡火仲景所云不惡寒反惡熱也邪結而氣厥逆則喘而惋惋者懊憹故惡人也帝曰或喘而死者或喘而生者何也岐伯曰厥逆連臟則死連經則生厥逆者邪結胃腑陽不達於四肢而厥冷所謂陽極似陰之假寒證也邪內入則連臟而陽陷故死邪外出則連經而陽伸故生帝曰病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也帝曰其棄衣而走者何也岐伯曰熱盛於身故棄衣欲走也帝曰其妄言罵詈不避親疏而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也四肢皆稟氣於胃胃為臟腑之海而陽明行氣於三陽故四肢為諸陽之本邪盛於胃則氣實於四肢故能登高也身熱盛故棄衣邪亂神明怒氣衝動故妄言罵詈胃中邪實故不欲食四肢多力故妄走也乳子病熱素問通評虛實論帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死熱病脈應洪大其小弱者正虛邪盛為逆證不治乳子者謂新産而乳其子者也新産又乳子其氣血內虛雖熱病而脈甚小弱故問其吉凶何如岐伯言手足溫者其脾胃陽和之氣尚能周布而邪可漸解則生手足寒者正虛邪閉而厥逆則死矣中風熱而受於上部陽分肺氣逆滿故喘鳴肩息者喘急有聲而抬肩也邪盛於上脈必實大若和緩有胃氣者瀉其邪熱則生如急強而無和緩之象是真臟脈而本元已脫故死也嬰兒病附靈樞論疾診尺篇曰嬰兒病其頭毛逆上者必死又曰耳間青脈起者掣痛嬰兒柔嫩如芽其病久而頭毛豎逆此血竭而生氣已絶如地無生氣而草木皆枯故必死也耳間乃少陽經脈所行之處少陽內通肝經青脈起者肝風內動則必抽掣筋脈而痛甚則為驚厥之證當察其因而治之也諸腫脹病水脹靈樞水脹篇帝曰水與膚脹鼓脹腸覃石瘕石水何以別之岐伯曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也目窠眼胞也凡人睡臥初起眼胞微腫水病始起亦如之頸脈喉旁人迎胃脈也水蓄於胃肺氣逆故頸脈動而時咳也水溢三焦陽氣不周故陰股間寒而足脛腫腹乃大其水已成矣按其腹隨手而起如囊裹水之狀此為水脹之證候也膚脹膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也膚脹因陽虛寒氣客於皮膚內無水邪但是虛腫故𪔣𪔣然不堅其皮厚按其腹窅而不起以氣虛不鼓也腹色不變則與水脹之皮薄色亮按之隨手而起者不同矣窅音杳坎陷之義鼓脹鼓脹者腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也此由內傷肝脾故色青黃並現腹脹而有筋綻與水脹膚脹因各不同其證亦異如後條旦食不能暮食用雞矢醴者相類腸覃腸覃者寒氣客於腸外與衛氣相搏氣不得營因有所繫癖而內著惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也腸覃始由寒氣客於腸外是在軀殼之內正衛氣出入之區寒邪與氣相搏因而結成癖積惡氣乃起息肉乃生歲久大如懷子按之堅而推之移其結在氣分故血脈流通月事仍應時而下蓋與衛氣所結衛行脈外故也石瘕石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下石瘕由寒氣客於子門假血成形結如石堅故名石瘕而在胞脈之中故狀如懷子俗所謂鬼胎也此以惡血當瀉不瀉瘀結而月事不通與上之腸覃有氣血之分而皆生於女子當通利導之而下也帝所問尚有石水一證岐伯無答義詳前卷諸風證中諸脹脈證素問腹中論帝曰有病心腹滿旦食則不能暮食此為何病岐伯曰名為鼓脹治之以雞矢醴一劑知二劑已帝曰其時有復發者何也岐伯曰此飲食不節故時有病也雖然其病且已時故當病氣聚於腹也鼓脹者外脹中空其形如鼓此因肝旺脾虛壅滯經隧腑氣尚通旦時陽旺故能食暮則陽衰不能食也雞矢白善消宿積雞為肝之畜故又能疏肝用沸酒渥之澄清而飲名雞矢醴取其酒氣行表助陽其腑無實積故不用攻奪之藥病由脾弱故飲食不節病必復發雖然病已時當其復病濁氣仍聚於腹故也靈樞脹論帝曰脈之應於寸口如何而脹岐伯曰其脈大堅以澀者脹也帝曰何以知臟腑之脹也岐伯曰陰為臟陽為腑帝曰氣之令人脹也在於血脈之中耶臟腑之內乎岐伯曰三者皆存焉然非脹之舍也帝曰願聞脹之舍岐伯曰夫脹者皆在於臟腑之外排臟腑而廓胸脅脹皮膚故命曰脹帝曰臟腑之在胸脅腹裡之內也若匣匱之藏禁器也各有次舍異名而同處一域之中其氣各異願聞其故岐伯曰夫胸腹臟腑之廓也膻中者心主之宮城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門戶也廉泉玉英者津液之道也故五臟六腑者各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉此明內脹之脈也脈大堅以澀是邪氣壅結氣血不和故知其為脹也脈應於陽部其脹在腑脈應於陰部其脹在臟也而其為脹必皆關乎氣與血脈臟腑三者之病然非脹之定舍也胃之五竅唇齒咽胃之上口名賁門下口名幽門共五竅也廉泉玉英俱任脈經穴在舌下津液由之而升也營行脈中衛行脈外衛氣逆則營閉不得與衛通故為脈脹衛氣者並脈循分而行脈外者也若脈氣通而但衛不和者則為膚脹止脹於皮膚之內其脈必流通而不澀也此兩證當用針瀉胃經之三里穴無問虛實在疾瀉之以胃為臟腑之海統領營衛故也此明氣與血脈之脹屬於營衛下明臟腑之脹也五臟證帝曰願聞脹形岐伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛此分五臟之形證也陽經內通於腑陰經內通於臟其由經脈之脹甚則內遏臟氣故有各臟之病形或先由臟病而致外脹者則必先現臟證也下節六腑之脹亦然若膚脹僅在衛分不涉於經必無臟腑現證也六腑證六腑脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息此分六腑證狀各有不同或由各經氣逆侵內者或因內傷食積所致者其臟脹或由脾虛肝鬱肺逆使然或腑不通暢遏其臟氣者皆當詳審其因而治之三焦脹與膚脹相類以其同屬於氣也諸脹由起帝曰脹者焉生何因而有岐伯曰衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時有序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也營衛外護臟腑內居經絡氣血通貫流行其起止皆有次序陰陽相隨如環無端合乎五行四時之氣化義詳營衛經絡門中衛氣之行並脈循分肉雖行脈外而必隨順經脈流行之序若其逆而失度升降不調然後厥逆之氣在下於是營衛氣血留止不行內寒之氣上逆真氣與邪互相攻擊陰陽兩氣不得通和而搏結壅塞乃合為脹病也素問大奇論曰肝滿腎滿肺滿皆實即為腫氣盛於陽為腫盛於陰為滿此言內滿實而腫於外其病自內而之外者當先治其內也肺之雍喘而兩胠滿肝雍兩胠滿臥則驚不得小便腎雍腳下至少腹滿脛有大小髀䯒大跛易偏枯此申明上條之現證以辨之也雍同壅言邪氣壅而致滿也肺肝之壅皆兩胠滿而肺則有喘肝則有驚而不得小便之異也腎壅則少腹至腳下氣血瘀閉故脛有大小髀䯒大跛不能行或左或右相易不定而偏枯也其壅者或因內傷或受外感皆不可定此明臟病而不及心脾者心藏神明為一身之主宰若其氣壅則必昏憒多狂脾司轉運若其氣壅則一身內外皆不通和不止如三臟之現證者即參上文五臟之脹其義理可知矣諸積病證諸積靈樞百病始生篇帝曰百病之始生也皆生於風雨寒暑清濕喜怒喜怒不節則傷臟風雨則傷上清濕則傷下三部之氣所傷異類願聞其會岐伯曰三部之氣各不同或起於陰或起於陽請言其方喜怒不節則傷臟臟傷則病起於陰也清濕襲虛則病起於下風雨襲虛則病起於上是謂三部至於其淫泆不可勝數此總舉外感內傷之病而分三部以辨之也喜怒該七情而言七情傷臟臟為陰則病起於陰也風雨之邪上受上為陽部則病起於陽也清濕即寒濕其邪下受下屬足經有陰有陽則病或起於陰或起於陽當隨證辨之也至於病之淫泆猶水之泛濫故其變化不可勝數也淺深部位現證帝曰願卒聞其道岐伯曰風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者蓋無虛故邪不能獨傷人此必因虛邪之風與其身形兩虛相得乃客其形兩實相逢衆人肉堅其中於虛邪也因於天時與其身形參以虛實大病乃成氣有定舍因處為名上下中外分為三員是故虛邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則灑然故皮膚痛留而不去則傳舍於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時灑淅喜驚留而不去傳舍於伏沖之脈在伏沖之時體重身痛留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴飧泄食不化多熱則溏出糜留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積或著孫絡或著絡脈或著經脈或著輸脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論尋常風雨寒熱不能傷人必因虛邪之風與身形之虛兩虛相遇邪乃客之蓋太乙所居之宮風從後來者為虛邪從前來者為實邪義詳前卷靈樞九宮八風篇若身形實而邪實兩實相逢則肉堅不能傷也若天時身形虛實相參而中其邪大病乃成邪客於身而有定舍因其邪在之所而立病名分上下中外三部以其直則有上中下三焦橫則有表裡中三層虛邪中人初在皮膚留而不去則漸入漸深各有現證可驗而不隨證治之則病根深痼難去當邪之初入其流傳亦無定所或淺或深留著為病以至久著不去則息而成積乃不復流傳以其與氣血膠結而成瘀積也故邪氣之淫泆蔓延何可勝論哉帝曰願盡聞其所由然岐伯曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能拘積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大飢則益小其著於緩筋也似陽明之積飽食則痛飢則安其著於腸胃之募原也痛而外連於緩筋飽食則安飢則痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾塞此邪氣之從外入內從上下也浮在皮里之細絡名孫絡稍深而粗者名大絡大絡內通於經陽經則通腑陰經則通臟故陰經又深於陽經經有陰陽故絡亦有陰陽也氣血周行內外無處不到其邪客之則氣血瘀滯久乃結而成積矣積在孫絡往來上下者以臂手乃孫絡所居之處其氣浮淺而緩不能拘止其積故積往來移行以至腸胃之間腸胃為水飲灌注旁滲之地而邪從旁湊之故濯濯有音如系寒積則䐜滿雷鳴相引時時切痛因其絡阻氣不流通也其或著於陽明胃經則挾臍而居以經氣聚於此也飽食則胃氣充溢於經故積形益大飢則氣消而仍小矣經居於肉而不貼胃無形質觸礙故積不痛其著於緩筋者緩筋貼胃故似陽明之積以其貼胃飽則胃脹觸動故痛飢則安矣其著於腸胃之膜原膜原遮蔽胃中濁氣者飢則虛火衝動故痛飽則火息故安其痛連緩筋者緩筋乃募原之枝也其著於伏沖之脈者脈在脊背肉內是營氣所流行者被積壅阻故揣之應手而動發手則氣流散故覺熱氣下於兩股如湯沃之狀也積著於膂筋其在腸胃之後飢則腸胃空虛故積現飽則氣漫故積不現以其在腸胃之後軀體之裡故按之不可得也積著於輸之脈者脈閉不通則津液不能下輸故便竅乾窒此皆言其邪氣之從外入內從上而下之成積也生成之由帝曰積之始生至其已成奈何岐伯曰積之始生得寒乃生厥乃成積也寒性凝斂氣血故積因寒生至氣血與邪膠結而厥逆不行其積乃成也帝曰其成積奈何岐伯曰厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊裹而不散津液澀滲著而不去其積皆成矣此舉外感內傷皆能成積者也厥氣生於足悗悗生脛寒者外邪受於足經也悗悗猶悶悶也因足三陰經脈上行入腹者由是而血脈凝澀內傳腸胃而成積蓋邪從外入內從上而下者前文已明此又申説邪從下受及由內傷七情飲食者若卒然多飲食及起居不節用力過度以致絡傷血溢腸外占寒汁沫凝聚而成積又有外中寒邪內傷憂怒則氣上逆而六輸不通六輸者六腑轉輸之經脈也腑為陽輸不通故溫氣不行血凝不散津液澀而不流旁滲留著而皆成積此由外感兼內傷者也蓋陽絡浮淺而陽氣上升故絡傷則血外溢而吐衄陰絡深沉而陰氣下降故絡傷則血內溢而便血血既離經則必與腸外汁沫相搏及其成積或著於陰或著於陽或腑或臟皆有外證可驗如前後文之所明者已詳盡矣論治法帝曰其生於陰者奈何岐伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出則傷腎此內外三部之所生病者也帝曰治之奈何岐伯曰察其所痛以知其應有餘不足當補則補當瀉則瀉毋逆天時是謂至治此總結上文之義也上言多飲食及起居不節內傷憂怒等皆病之生於陰者此又詳所傷之由以分五臟也重寒者外感寒邪內傷寒飲食也外感則有風雨寒暑之異內傷則有飲食七情之分五臟六腑經絡淺深皆當辨別以要言之不出內外三部之所生病者也治之必先審其所因所痛之狀如上文所云以知其內外之應而積之所在再辨其虛實寒熱以施補瀉之法順天時寒熱溫涼陰陽升降之序而調其氣血通其經脈和其臟腑是謂至善之治也腸胃積聚靈樞五變篇帝曰人之善病腸中積聚者何以候之少俞曰皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒溫不次邪氣稍至蓄積留止大聚乃起皮膚薄弱而乏色澤其肺虛可知肉不堅實而淖澤淖澤者柔軟如汙泥其脾虛可知腸胃者肺脾之腑也其臟虛腑必惡劣而濁邪之氣留止積聚乃傷之也脾胃之間又寒溫不調由是稍感其邪即與所蓄之積留止不行遂大聚而成患也息積素問奇病論帝曰病脅下滿氣逆二三歲不已是為何病岐伯曰病名息積此不妨於食不可灸刺積為導引服藥藥不能獨治也一呼一吸名一息息根於臍中與脅下相近其有涎沫鬱而成痰隨息積於絡脈經膜之間以致脅滿氣逆病名息積也其腑氣通利轉動故不妨於食以積僻處肉內膜間故久不愈而不可針灸針灸止能通經氣不能去積須疊為按摩導引之法而兼服藥藥亦不能獨治也伏梁帝曰人有身體髀股胻皆腫環臍而痛是為何病岐伯曰病名伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病也有形之邪內伏橫亙如梁故名伏梁蓋一身皆腫為風風邪與氣血膠結成形而內伏為風腫之根也因其邪氣溢於大腸滯著於肓肓之原在臍下故環臍而痛也動之者謂用針以動經氣不能抉其根反使邪氣溢於膀胱以成蓄水溺澀之病則當用藥內治可知然所謂病入膏肓其危重亦可想見矣素問腹中論帝曰病有少腹盛上下左右皆有根此為何病岐伯曰病名伏梁帝曰何以得之岐伯曰裹大膿血居腸胃之外不可治治之每切按之致死帝曰何以然岐伯曰此下則因陰必下膿血上則迫胃脘生膈挾胃脘內癰此久病也難治居齊上為逆居齊下為從勿動亟奪論在刺法中此亦名伏梁者以其同前證之形狀而病邪有異但少腹盛而身不腫也然其邪積裹大膿血成腸胃癰病已危害故不可切按治之每切按致死也此在下因近二陰必有膿血下出若居臍上迫胃脘而生於膈則近心肺而膿血不得下出故為逆居臍下為從也治之勿可妄動而亟攻奪亦可設法導其膿血下行而已考刺法論並無伏梁證未知其故靈樞經筋篇曰手少陰之筋其病內急心承伏梁其成伏梁吐膿血者死不治其義大同胃脘癰素問病能論帝曰人病胃脘癰者診當何如岐伯曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也此言胃脈沉細者右關之脈也兩手之脈名寸口而主陰以其氣出於臟也人迎者結喉兩旁胃經之動脈也主陽以其氣出於腑也右關沉細者胃中陰血瘀結遏其臟氣也陰血瘀結與陽相格而陽氣逆甚故人迎脈盛而熱聚胃口血結成癰成癰必有脹痛之證熱聚必有燥渴之證而右關之脈反沉細似虛故必診人迎方知其陽逆熱聚而成癰也肥氣伏梁息賁奔豚靈樞邪氣臟腑病形篇曰心脈微緩為伏梁在心下上下行時唾血肺脈滑甚為息賁上氣肝脈微急為肥氣在脅下若覆杯腎脈微急為沉厥奔豚足不收不得前後此明臟積而缺脾臟或有脫簡也脈象模糊無力名微言微緩微急等者以營血瘀積氣不得達也滑甚者以肺主氣血結而氣逆動也故曰上氣名息賁即喘息也脅下肝經所行之部也沉厥者其氣沉伏而厥逆故突然自下上衝乃名奔豚足不收者足少陰經脈強急足不能曲也二便為腎之門戶腎積氣閉故不得前後便也難經言五臟之積肝曰肥氣心曰伏梁脾曰痞氣肺曰息賁腎曰奔豚謂在臟名積止而不移在腑名聚消長不常其所論皆發明靈素未發之義當體究之後賢因而制五積丸諸法亦甚善也諸厥病證熱厥寒厥素問厥論帝曰厥之寒熱者何也岐伯曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥陰陽之氣根於腎腎者足少陰也其氣由臟腑出於經脈升降流行仍歸於臟循環不休如氣有偏傾則升降不調而經脈鬱閉陰陽相格不得交通乃為厥逆以其根於足少陰經故厥起於足陽衰為寒厥陰衰為熱厥也帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五趾之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也陰脈集於足下而聚足心足心腎經之湧泉穴也足三陰經行於趾內足三陽經行於趾外而陰陽之氣交接於指尖互相通和而流行者陽氣勝則溢於陰位故足下熱也帝曰寒厥之為寒也必從五指而上於膝者何也岐伯曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也陽氣行於指表者不熱而陰氣行於指里者獨寒以陰氣集膝下而聚膝上故寒不從外而從五指之內上於膝其陰盛陽衰可見矣帝曰寒厥何失而然也岐伯曰前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也太陰陽明統一身之陰陽而陽明又主潤宗筋者也男女皆有宗筋而聚於前陰為太陰陽明之所會合者也故一身陰陽之氣亦聚會於此以為生育之本也人身與天地合同氣化者故春夏則陽升而多陰降而少秋冬則陰升而盛陽降而衰此人本質強壯恃強妄作秋冬陽氣本衰而又傷之奪其所用逮冬至陽將升與陰上爭而不能復其元上爭者如剝卦剝必轉復陰陽方和陽氣既奪不能復則不能應時升旺其精氣散溢而反下泄陰邪之氣乘虛上僭夫陰陽和平之元氣因中敷布而達外者也陽氣衰則不能敷布滲營其經絡而陽日損陰氣獨在故手足皆寒而為厥逆也帝曰熱厥何如而然也岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也絡脈屬衛衛為陽經脈屬營營為陰酒氣慓悍助衛故絡脈滿而經脈虛也營衛之氣出於脾胃脾主為胃行其津液者也陰氣虛則陽侵入而胃不和胃不和則水穀精氣耗竭而不營運於四肢也此由醉飽欲火劫爍陰精陽氣變成邪熱聚於脾中不散脾主肌肉故熱遍於身內熱而溺赤也腎陰之氣因而日衰邪陽之氣獨勝故手足之熱尤甚於身名為熱厥也陰厥陽厥帝曰厥或令人厥滿或令人暴不知人或至半日遠至一日乃知人者何也岐伯曰陰氣盛於上則下虛下虛則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也厥滿者氣厥而腹脹滿由陰氣盛於上而虛於下之故也蓋陰無陽不生陽無陰不化陰虛於下則下焦陽氣不能宣化而上壅故腹脹滿也陽氣盛於上者由下焦之陽重上是亢陽化邪氣而逆也逆則陽和之氣亂而心神飛越昏不知人其厥有微甚或半日或一日其氣返順方蘇耳上明寒熱厥逆此明陰陽厥逆也六經厥帝曰願聞六經脈之厥狀病能也岐伯曰巨陽之厥則腫首頭重足不能行發為眴僕陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言少陽之厥則暴聾頰腫而熱脅痛䯒不可以運太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥則口乾溺赤腹滿心痛厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫䯒內熱盛則瀉之虛則補之不盛不虛以經取之此以下詳明厥證不獨手足寒熱為厥而凡外感內傷氣血虛實以致陰陽乖逆經脈不得循序周流皆名厥也巨陽即太陽太陽經脈盛於頭厥則其氣更盛於上故腫首頭重上盛則下虛故足不能行眴僕者目眩跌僕也此由陰虛根本不固陽氣暴逆之厥也陽明行氣於三陽邪熱盛則水不濟火獨火亂其神明故發癲狂走呼面赤而熱妄見妄言此三承氣湯之實證也少陽及三陰經之厥亦與仲景傷寒論所載病證義理相同明彼即明此然其中皆有虛實不同余後集仲景條下已詳明矣此云補瀉以經取之者皆針法也以上雖名六經之厥而多現臟腑之證以六經內通臟腑者也太陰厥逆䯒急攣心痛引腹治主病者少陰厥逆虛滿嘔變下泄清治主病者厥陰厥逆攣腰痛虛滿前閉譫言治主病者三陰俱逆不得前後使人手足寒三日死太陽厥逆僵仆嘔血善衄治主病者少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死陽明厥逆喘咳身熱善驚衄嘔血手太陰厥逆虛滿而咳善嘔沫治主病者手心主少陰厥逆心痛引喉身熱死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者手陽明少陽厥逆發喉痹嗌腫痓治主病者按前卷營衛經絡門十二經條下凡臟經之病皆云是主某臟所生病者其腑經之病或云是主津液所生病或云主氣主血等各皆不同皆明其病由此而發故云是主所生病者蓋人之生先生五臟為體由臟氣生六腑為用故曰臟者藏精氣而不瀉謂其體則常固也腑者傳化物而不藏謂其用則生化流通也而筋骨血氣津液經脈又從腑氣生化為腑之用是故臟經之病從本臟之體所生故皆曰是主某臟所生病若腑經之病從生化之用所生而為主病故或主氣主血主筋骨等之不同也此篇言太陰厥逆者是主脾所生病也脾為足太陰經故足䯒急攣脾位於腹而通心氣故心痛引腹當從脾臟主治也下皆仿此其少陰厥逆是主腎所生病者腎主下焦下焦厥逆則中焦氣壅故虛滿而嘔嘔則氣通故變泄清泄清者下泄清稀因中焦穀食不化也厥陰厥逆者是主肝所生病也肝主筋故筋急而攣肝腎同源故腰痛肝氣橫逆則虛滿肝主癃閉故前陰閉不通肝藏魂肝厥傷魂則譫言或有如死者若三陰俱厥逆則肝脾腎皆傷故前後便不得通手足皆寒而內外之氣盡厥故三日而不通和則死也太陽膀胱經厥逆是主筋所生病者筋病故僵仆不能起動陽氣厥逆則血妄溢故嘔血善衄也少陽膽經厥逆是主骨所生病者其經居半表半裡正當肉裡而近骨表裡之氣由此出入故名其經為樞其氣厥逆則樞折而骨病故機關不利骨本從腎生故腰折不可以行經氣上項故項強不可顧其陽內郁化熱與腸中濁氣壅結而成癰膽內連肝肝傷則驚是腑臟俱傷故不可治而死也陽明胃經厥逆是主血所生病者肺胃相連胃氣逆於肺故喘而咳脾胃主肉故身熱肝藏血而心主血陽明為多氣多血是主血所生病則心肝之火皆動故善驚而衄且嘔血也手太陰厥逆是主肺所生病者肺氣逆故虛滿而咳沫出於肺故善嘔沫也手心主少陰乃心包連心厥逆心包是主血脈所生病心是主心臟所生病者故心痛引喉而身熱者心臟近喉心火逆則身熱也按本經云凡稱心病者心包受邪也心臟堅固不受邪受邪則神去而死此言死不可治者是心臟傷也手太陽小腸經厥逆是主液所生病者蓋小腸為受盛之官主化物液由水穀所化故厥逆而液不生化則生病其支脈循頸至目眥入耳中故耳聾泣出項強也氣上逆則下虛而不轉旋故腰硬不可以俯仰也手陽明大腸經主津液所生病手少陽三焦經主氣所生病二經厥逆則氣閉而津液不輸陽郁化火而上炎乃發喉痹嗌腫津液不輸則筋脈燥急而痓痓即痙也以上皆當治其主病者也厥逆素問腹中論帝曰有病膺腫頸痛胸滿腹脹此為何病何以得之岐伯曰名厥逆帝曰治之奈何岐伯曰灸之則喑石之則狂須其氣並乃可治也帝曰何以然岐伯曰陽氣重上有餘於上灸之則陽氣入陰入則喑石之則陽氣虛虛則狂須其氣並而治之可使全也此因陽氣重疊上逆故名厥逆其陽逆者本由陰氣不固如再以火灸之逼之入陰則氣耗散而火邪傷肺則失音而喑也石者砭法乃更泄其氣氣泄則陽虛而心神無主則昏狂然非有餘實火之狂其病危矣故不可用灸砭之法蓋厥者陰陽格逆必須俟其二氣歸併而陰陽漸和乃可調之庶使全其生也腎虛厥病素問病能論帝曰有病厥者診右脈沉而緊左脈浮而遲不知病主安在岐伯曰冬診之右脈固當沉緊此應四時左脈浮而遲此逆四時在左當主病在腎頗關在肺當腰痛也帝曰何以言之岐伯曰少陰脈貫腎絡肺今得肺脈腎為之病故腎為腰痛之病也冬令陽氣歸藏沉緊之脈應時令而無病也今左脈浮遲是逆時令逆在左故知病在左以腎水虧而陽浮動為厥病也腎脈絡肺故關於肺浮乃肺之脈象也而主病在腎虛腰為腎府故必腰痛也陽厥怒狂帝曰有病怒狂者此病安生岐伯曰生於陽也陽氣者因暴折而難決故善怒也病名陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也帝曰治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵落飲夫生鐵落者下氣疾也此言怒狂之病因陽氣暴折難決暴折者過激而致郁逆也難決者如水之壅遏不能決之使流也故病怒狂而名陽厥也所以然者陽明人迎之脈本常動不休若太陽少陽經脈本來不動不動而動且大且疾此三陽之氣亢極而逆可見矣治之當奪其食而使氣衰服以生鐵落飲鐵落者打鐵飛落之屑煎湯飲之下氣最疾也蓋怒狂由陽亢陽由肝膽而升木邪熾盛鐵落以金制木也然此怒狂與上條之狂其虛實相反也腎厥頭痛素問奇病論帝曰人有病頭痛數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名厥逆大寒深入骨髓腦為髓海邪氣上逆至腦其病深故頭痛數歲不已齒為骨之餘其根屬腎故齒亦痛此因寒邪而腎氣厥逆也後賢制玉真丸方治腎厥頭痛內有硫黃以去骨髓之寒邪凡頭痛之因甚多不同必須詳辨厥逆死證帝曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈微細如髮者此不足也其病安在名為何病岐伯曰病在太陰其盛在胃頗在肺病名曰厥死不治此所謂得五有餘二不足也帝曰何謂岐伯曰所謂五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣腎虛則膀胱熱熱則癃閉不通虛則不能收攝故一日數十溲此不足之病也身熱如炭表邪閉結也頸膺如格內邪格拒也頸旁人迎之脈躁盛胃陽逆而喘息皆病邪之有餘也兩手太陰寸口之脈則微細如髮此表邪有餘內氣不足不足之病在太陰有餘之邪在陽明肺胃相連胃氣逆故頗在肺而喘息名厥病也正虛邪盛陰陽厥逆欲治五有餘之外邪而內氣不足不能瀉之欲補二不足之元氣而外邪格拒不能補之不能治表不能治里正為死之明驗也夫臟為陰腑為陽太陰脈如發其臟陰竭矣人迎脈躁盛其腑陽脫也陰竭陽脫則死不可治諸痿病證痿躄脈痿筋痿肉痿骨痿素問痿論帝曰五臟使人痿何也岐伯曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿一身內外之氣由肺權衡敷布肺熱葉焦則氣不能輸轉周行即無津液以濡養皮毛而虛弱急薄著者皮肉血氣乾燥滯著而不柔和故生痿躄躄者行步不便也心氣熱則陽升而脈厥上逆上逆則下虛經脈為一身肢節之機樞脈痿則樞折其氣上挈而下虛故足脛弛縱而不任地也肝氣熱則膽汁泄而口苦筋膜乾枯拘急而成筋痿也脾主為胃行津液者也脾氣熱則胃液干而渴無以滋養肌肉則不仁而成肉痿也腎藏一身之精而主骨腎氣熱則精耗而骨枯髓減故腰脊不能舉動而成骨痿也是痿者皆為邪熱而多由內傷臟真所致要必辨其虛實而治之也痿證之因帝曰何以得之岐伯曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故本病曰大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也此明痿病之因也肺為心之蓋有所失亡所求不得則懊憹而心火熾動久則灼肺肺鳴而熱以至葉焦發為痿躄也悲哀太甚則傷心胞絡胞絡之脈氣阻絶不通則陽氣內動沖逆心下如崩以動血而數溲血血去則經脈空虛無以滋養肌肉而發肌痹痹者麻木也久則傳為脈痿矣思想意淫入房太甚皆欲火耗精陽氣變成邪熱以致宗筋弛縱而成筋痿白淫者淋濁帶下之類以邪熱熾盛精不藏腎也肝主筋故筋痿生於肝使內損其精也脾為濕土而主肌肉故傷濕則肌肉不仁而成肉痿上文言脾氣熱則胃干而渴肌肉不仁發為肉痿大抵脾主肌肉不拘熱濕所傷皆使肌肉不仁乃名肉痿也遠行勞倦逢大熱而渴者此因過勞動火以傷陰液其陽和之氣內伐而化為邪熱熱舍於腎更耗其精以至骨枯髓虛兩足軟弱不任其身而成骨痿也分辨形色帝曰何以別之岐伯曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒稿肺色白而主皮毛故熱灼則毛敗心色赤而主血脈血藏於絡熱動其血故絡脈浮溢甚或如上文之溲血也肝色蒼而主筋爪為筋之餘熱盛液干故爪枯也脾色黃而主肉熱極生風風動則肉蠕動俗所云肉跳也腎色黑而主骨齒為骨之餘熱灼精耗則骨枯而齒亦稿矣治法帝曰論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也陽明胃中水穀精氣充養一身故為臟腑之海而濡潤宗筋衝脈為經脈之海而血盛以滲灌溪谷者凡經脈骨節交會罅隙皆如溪谷而血液由之滲灌以濡潤也衝脈與陽明之氣合於宗筋陽明為陽衝脈為陰以其為海故總一身陰陽之氣會合於宗筋又統宗筋之氣會於氣街氣街在臍下陽明經穴故陽明為經脈之長也宗筋者總一身之筋所以主束骨而利機關以此陰陽經氣總會之處皆屬於帶脈而絡於督脈故二脈又約束一身之經脈皆由陽明所滋養故陽明虛則一身經脈失養而宗筋弛緩帶脈不能維引故足痿不用所以治痿者獨取於陽明也帝曰治之奈何岐伯曰各補其滎而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣滎俞為經氣流行出入之穴陰陽各經皆有者補滎通俞言針法也而用藥當參究上文取陽明之理調其虛實和其逆順為善法也筋脈骨肉乃肝心腎脾四臟所主而四臟各隨其時以受旺氣如春則肝受旺氣夏則心受旺氣冬則腎受旺氣長夏未月則脾受旺氣遇受旺氣之月則病可已矣如筋痿愈於春脈痿愈於夏肉痿愈於季夏骨痿愈於冬也然此獨不及皮毛者以肺熱葉焦必傷筋脈方成痿躄若未傷筋脈骨肉而止傷皮毛則不成痿也偏枯肉苛靈樞熱病篇曰偏枯身偏不舉而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也此由陰陽氣血偏傾經絡流行失度致邪襲一邊而成半身不遂之病言不變志不亂其內臟未傷病在分肉腠理之間當用補正瀉邪之法以通經絡而調營衛益其不足損其有餘使陰陽氣血皆歸於平乃可復元也素問逆調論帝曰人之肉苛者雖近衣絮猶尚苛也是為何病岐伯曰營氣虛衛氣實也營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉如故也人身與志不相有曰死按太陰陽明論云陽道實陰道虛是謂陰居內其氣虛通陽衛外其氣堅實太陰陽明即脾胃也為營衛之本營衛為脾胃之標故此言營氣虛者本虛通也衛氣實者本堅實也夫肌肉脾胃所主而營衛居肌肉之中營為陰而行脈中衛為陽而行脈外以充肌肉者也陰主濡之陽主煦之則肉必柔和而知痛癢也今則不仁不知痛癢笨重不能運用而肉形仍如故者乃無陰陽之死氣充實於中名曰肉苛也故又申言營氣虛則不仁衛氣虛則不用言營衛陰陽之氣皆空虛止存無氣之死肉則與心志不相融洽故不仁且不用而自不覺其有身者此脾臟已絶故曰死也再按此病即肉痿證之深重者痿證皆由傷臟而起至於臟敗則死不可治其筋脈骨痿痿躄等亦必皆然而察其現證例此可知矣
