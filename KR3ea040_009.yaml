body:
  text: 卷八病邪傳變五臟移寒癰腫少氣癰腫筋攣狂膈中肺消湧水素問氣厥論帝曰五臟六腑寒熱相移者何岐伯曰腎移寒於脾癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂膈中心移寒於肺肺消肺消者飲一溲二死不治肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也此明外感寒熱之邪流傳臟腑各有病變也如腎受寒邪而移於脾脾位於腹寒則陽氣不化而腹滿壅腫少氣無力也脾移寒於肝又兼筋攣以肝主筋因寒而拘急也此二者皆由其所勝傳來則肝脾之本氣不足可知矣若肝移寒於心心火本從木生乃以寒邪移之火為寒激而發狂如陽被陰遏發而為雷也心陽不舒中脘膈而不通也心移寒於肺是傳其所勝肺金寒無陽氣以化津上升故消渴下元無火津液反從下溜故飲一溲二此火土俱敗水冷金寒故死也如肺氣未敗而金本生水者因之移寒於腎腎為寒水之臟又加寒邪則下焦陽氣無力宣化大腸水蓄不行水在腸中故按腹不堅疾行鼓動則鳴濯濯如囊裹漿水名湧水湧即壅也五臟移熱驚衄死證膈消柔痓腸澼脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為膈消肺移熱於腎傳為柔痓腎移熱於脾傳為虛腸澼死不可治脾熱傳所不勝其肝虛可知邪熱傷之氣血沸亂則為驚為衄或又順傳於心心本屬火又加邪火則心神昏亂而死若心不受邪移熱於肺而傳其所勝則膈熱善於消水以肺位於膈也與前之肺消飲一溲二屬虛寒者正相反也仲景所論飲一溲一亦屬虛寒故用腎氣丸溫補之法治之如前所云飲一溲二則為死證矣若肺移熱於腎腎為水臟邪熱乘之則水沸外溢而為汗筋脈反燥而強急為柔痓痓同痙仲景所論有汗名柔痙無汗名剛痙皆有虛實寒熱外感內傷之異也若腎移熱於脾是傳所不勝其脾虛可知脾虛則生濕遂致挾熱下利而成腸澼如近時所名休息痢者其邪結而正敗故死不可治也六腑移熱癃溺血鬲腸口糜伏瘕食亦鼻淵衄衊瞑目胞移熱於膀胱則癃溺血膀胱移熱於小腸鬲腸不便上為口糜小腸移熱於大腸為虙瘕為沉大腸移熱於胃善食而瘦又謂之食亦胃移熱於膽亦曰食亦膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊瞑目故得之氣厥也臟為陰寒邪入之而不化故有移寒之病如其由經腑而傳臟者其邪先已化熱也腑為陽寒邪入之即化為熱故有熱邪而無寒邪其有寒者是內傷之病如生冷飲食傷胃之類又如臟寒則腑冷之虛證也難經曰命門者男子以藏精女子以系胞胞脈在衝任間上通心氣下通膀胱是胞者為女子受孕男子藏精之所胞中邪熱多由欲火蘊釀若移熱於膀胱是內出外也膀胱熱結氣分則小便癃閉熱傷血分則溺血閉則痛名淋也小腸為受盛之官化水穀而分清濁濁者下傳大腸清者滲入膀胱故膀胱亦能移熱於小腸因而與大腸阻隔而便不通利濁既不下熱蒸胃中水氣上熏於口而糜爛兼舌亦有腐蝕者以舌為心之苗小腸為心之腑也小腸下接大腸如移熱於大腸則滓濁結聚不行而成虙瘕虙音義同伏瘕者假物結成形質沉著難去如宿積燥屎之類也大腸經脈絡肺肺胃相連故大腸亦能移熱於胃胃受邪熱而善食熱爍肌肉而反瘦以脾胃主肌肉也此即中消之病古名食亦也胃移熱於膽仍在中焦故病不變或兼口苦是膽熱也膽經之脈上頭通腦邪熱入腦腦髓被灼化為濁涕下注不止以其由腦而出似有辛辣氣味觸動涕即下注名為辛頞鼻淵頞音曷兩目中間鼻柱之內以在鼻之深處而出涕腥臭故名淵久則傳為衄衊瞑目者濁涕挾汙血而下以氣逆眩暈故瞑目而得之氣厥者其病為深重也病邪勝負傳變勝負傳變靈樞順氣一日分為四時篇帝曰百病之始生必起於燥濕寒暑風雨陰陽喜怒飲食居處氣合而有形得藏而有名多以旦慧晝安夕加夜甚何也岐伯曰四時之氣其然春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚也百病莫不由外感六氣內傷七情而起邪與正氣相角相合而有病形邪得藏處而立病名多以旦慧晝安夕加夜甚者良以一日一夜十二時人身元氣升降出入合乎一歲十二月之氣化故人身氣旺之時則邪負正勝而病輕安氣衰之時則邪勝正負而病加甚也帝曰其時有反者何也岐伯曰是不應四時之氣臟獨主其病者是必以臟氣之所不勝時者甚以氣所勝時者起也帝曰治之奈何岐伯曰順天之時而病可與期順者為工逆者為粗此言病有旦重夜輕與上條所云相反者因其不應四時之氣候而五臟自主其病也蓋人身元氣流行無不應天時之氣候而有不應者其臟氣先有偏傾乖逆之病以為主也故遇臟氣不勝時氣之時則病甚如肝木病遇庚申辛酉金剋木其病甚也遇臟氣所勝之時則病起如遇甲寅乙卯木氣勝其病起也余可例推矣故治之必當順天時氣化之理隨宜補瀉而調之其病之能愈不愈可與定期也知順天時之理者為良工逆者為粗工矣素問玉機真臟論帝曰風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也或痹不仁腫痛當是之時可湯尉及火灸刺而去之弗治病入舍於肺名曰肺痹發咳上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱當此之時可按可藥弗治腎傳之心病筋脈相引而急病名曰瘛當此之時可灸可藥弗治滿十日法當死腎因傳之心心即復反傳而行之肺發寒熱法當三歲死此病之次也風由陽氣所化性動而走泄凡諸邪傷人必由於風故為百病之長又曰善行而數變也風寒初傷皮毛而弗治以致漸入漸深而傳肺以成肺痹發咳上氣傳肝成肝痹脅痛出食以肝脈行脅入胃胃氣逆而食反出也傳脾成脾風發疸以脾為濕土疸者濕鬱成熱也邪熱蘊結腹熱煩心便出黃穢以心脾氣通邪熱由小腸而出也傳腎成疝瘕仍連於肝故少腹冤熱而痛冤者呻吟難忍也小便出白如淋濁之類由腎不能藏精也傳心而筋脈相引緊急抽搐成瘛以心主血脈也其邪皆傳於所勝為賊邪而又傳遍五臟弗急治之而再延十日則死若腎邪傳心而心氣強復傳於肺肺主皮毛其邪出於營衛則發寒熱然其久傳之邪與氣血膠結如油入面不能解除拖延三年元氣敗竭則死此病邪相傳之次第也傳變不常然其卒發者不必治於傳或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣此其道也故病有五五五二十五變及其傳化傳乘之名也上文明邪傳其所勝之臟是常理也而邪之傷人卒發者原不必待其傳而治之且人有強弱邪有重輕病之變化多端其傳有不以次序者假如憂恐等情志所傷其邪必乘虛深入不待傳次已成大病矣因其五臟之氣先自相乘犯如過喜而心氣虛散則腎氣乘之怒則傷肝悲則傷肺之類故一臟而有五臟乘犯之病五五二十五變及外邪傳化傳乘之病名何可數計乎難經論脈以五臟相乘犯名五邪有微甚之十變宜參觀之此條與前岐伯所云不應四時之氣而臟獨主其病者義理可以會通也傳變死證大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃豫之期日大骨枯稿大肉陷下胸中氣滿內痛引肩項期一月死真臟見乃豫之期日大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月之內死大骨枯稿大肉陷下骨髓內消動作益衰真臟未見期一歲死見其真臟乃豫之期日大骨枯稿大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目眶陷真臟見目不見人立死其見人者至其所不勝之時則死此即明久病之死證也齒為骨之餘齒枯則知其骨枯矣腎主骨脾主肉骨枯肉陷則脾腎兩敗其虛陽必然上逆而胸中氣滿喘息而氣振動形脾腎皆不輸化則不便矣如脈尚和緩者可延半年若真臟脈現可定期日而死也其內痛引肩項或又身熱脫肉破䐃則死更速矣或又加腹痛目眶陷脾氣已絶目不見人肝腎俱絶故立死其見人者至相剋之日時則死急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期其脈絶不來若人一息五六至其形肉不脫真臟雖不見猶死也急虛者危急之虛證卒然而至如中風暴僕之類五臟之氣阻絶經脈閉而不通譬如墮溺水中不及救援其死不可定期其脈絶不來此陰陽之氣不往來也或一呼五六至將脫之脈矣其形肉雖未脫真臟脈初亦不現而卒然如此者猶死也可知上節所云死期亦不過明其常理非可拘執也素問標本病傳論曰夫病傳者心病先心痛一日而咳三日脅支滿五日閉塞不通身痛體重三日不已死冬夜半夏日中此邪傳其所勝之臟互相剋賊故死也心先受邪而心痛一日而咳則傳於肺火剋金也三日脅支滿則傳於肝金剋木也五日閉塞不通身痛體重則傳於脾木剋土也又三日則土剋水傳腎而死以腎為陰陽之根夜半陰盛日中陽盛冬令夜半則重陰夏令日中則重陽遇重陰重陽之偏氣而身中之根元絶也肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死冬日入夏日出此由肺傳肝金剋木也肝傳脾木剋土也脾土敗則五日而身脹十日死者以天五生土地十成之其敗其絶以應生成之數也天地之氣以一歲而升降人身之氣應一日之升降升者氣旺降者氣衰五臟之氣各有衰旺之時其臟敗者遇氣衰旺極時其陰陽不能交接而生化則死矣前後各條所言死期義理大抵如是然又有五行生剋者暴病卒死者種種變化莫可數計其中妙理固難言喻自不可拘泥而穿鑿者但細審其脈證而生死之象灼然可見若確定其時刻則非神聖不能也肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊少腹痛脛痠三日不已死冬日入夏早食此由肝傳脾脾傳腎而死脾病身痛體重一日而脹二日少腹腰脊痛脛痠三日背膂筋痛小便閉十日不已死冬人定夏晏食此由脾傳腎腎傳膀胱故背膂筋痛小便閉也腎病少腹腰脊痛䯒痠三日背膂筋痛小便閉三日腹脹三日兩脅支滿三日不已死冬大晨夏晏晡此由腎傳膀胱膀胱傳脾脾傳肝是逆傳其所不勝也胃病脹滿五日少腹腰脊痛䯒痠三日背膂筋痛小便閉五日身體重六日不已死冬夜半後夏日昳此由胃傳腎腎傳膀胱膀胱傳脾是腑臟互傳也膀胱病小便閉五日少腹脹腰脊痛䯒痠一日腹脹一日身體痛二日不已死冬雞鳴夏下晡此由膀胱傳腎腎傳脾而死也按人身內臟腑外營衛氣血周流循環無間其有失調則邪乘虛而入以隨氣血流行如本元氣勝其邪漸從外出若元氣不勝而邪入臟腑互相傳變久則元氣敗絶而死是故以上各條皆言邪傳臟腑而死未有營衛之表病也五逆五奪靈樞玉版篇帝曰諸病皆有逆順可得聞乎岐伯曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衄而不止脈大是三逆也咳且溲血脫形其脈小徑是四逆也咳脫形身熱脈小以疾是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大脈絶是二逆也咳溲血形肉脫脈搏是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絶是五逆也如是者不過一時而死矣工不察此者而刺之是謂逆治腹脹身熱脈大表裡俱邪盛而不得泄也腹鳴而滿四肢清冷後泄是虛寒而陽敗脈反大根元外脫也衄而不止脈大孤陽上脫也咳者虛火上炎溲血其陰下泄此內傷久而脫形其脈小弱猶可治之小徑則正敗邪勝也咳而脫形脾肺俱敗脈小以疾血液皆枯矣如是者不過十五日而死五日為一候三候為一氣氣變而人身之本元絶也其腹大脹四末清冷中陽已敗脫形泄甚元氣垂絶也腹脹便血陰陽兩傷其脈反大是真臟脈現絶則氣絶也咳而溲血形肉脫陰已竭矣脈反搏孤陽將去也嘔血胸滿引背邪氣上逆脈小而疾陰陽俱竭也咳嘔腹脹且飧泄邪氣結而本元敗脈絶而氣絶也如是者不過一時而死以上皆言不可治之證當熟識而勿妄治治之反招尤悔也靈樞五禁篇帝曰何謂五奪岐伯曰形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大血之後是五奪也此皆不可瀉奪者傷之甚也氣血傷甚即有外邪亦不可瀉瀉之本元先脫故仲景論中有禁汗禁下之條多立善法以治之也帝曰何謂五逆岐伯曰熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痹不移䐃肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是謂四逆也寒熱奪形脈堅搏是謂五逆也熱病脈應洪數而反靜元氣敗而邪熱不去也汗已出脈應靜而反躁盛是精卻而邪勝也病泄氣陷脈應小弱而反洪大根本虛脫也著痹不移則氣血不活䐃肉破身熱土敗而陰涸也故其脈偏絶氣血不周矣淫邪久傷形體而身熱色白則陰陽兩損又下血衃篤重而本元竭矣發寒熱而形奪則營衛陰陽俱傷其脈堅搏是無胃氣之真臟脈現故皆為五逆之死證也諸疸病脾疸素問奇病論帝曰有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾疸夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也疸者濕熱病也脾為濕土惡濕而喜香燥主鼓運而為胃行津液者也厚味濁陰遏其清陽變成濕熱津液不得輸布而壅於脾乃上溢而口甘甘者脾之味也熱積久則必轉為消渴之病急治之以蘭除其陳腐之氣遂脾喜香之性也蘭者俗名省頭草婦女用以漬油抹發者膽疸帝曰有病口苦取陽陵泉口苦者病名為何何以得之岐伯曰病名膽疸夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞治在陰陽十二官相使中陽陵泉膽經穴也靈蘭祕典六節臟象等論云肝者將軍之官謀慮出焉膽者中正之官決斷出焉又曰十一臟皆取決於膽也膽附於肝肝經之脈上循喉後故咽為之使而膽氣亦由之而上也以謀慮太勞而不決使膽虛汁泄而氣上溢故口苦而名膽疸也凡勞思過慮無不動火而致膽熱即口苦矣取陽陵泉治膽募俞皆針法也陰陽十二官相使或者即臟象等論所云十二官各司其職而十一臟皆取決於膽以求其中義理而設治法者乎或者謂陰陽十二官古經名今已亡失未知孰是以俟明哲辨之消疸靈樞五變篇帝曰人之善病消疸者何以候之少俞曰五臟皆柔弱者善病消疸帝曰何以知五臟之柔弱也少俞曰夫柔弱者必有剛強剛強多怒柔者易傷也此人薄皮膚而目堅固以深者長沖直揚其心剛剛則多怒怒則氣上逆胸中蓄積氣血逆留臗皮充肌血脈不行轉而為熱熱則消肌膚故為消疸此言其人剛暴而肌肉弱者也消疸者渴飲多食而肌肉消瘦也由五臟柔弱而其目堅固以深其光長沖直揚者心性剛暴多怒則心肝火熾而氣逆血脈因之不行久鬱而成邪熱以致此病然此但言其人剛暴而肌肉弱者也或有飲食及酒色所傷而成消疸者亦皆邪熱蘊蓄之所致也素問通評虛實論帝曰消疸虛實何如岐伯曰脈實大病久可治脈懸小堅病久不可治消疸由邪熱積蓄病久脈實大元氣未敗可治脈懸小者小甚也元氣已敗又堅則無和緩之象邪氣痼結故不可治也兼論雜證病因凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也隔塞閉絶上下不通則暴憂之病也暴厥而聾偏應閉不通內氣暴薄也不從內外中風之病故瘦留著也跖跛寒風濕之病也此言治病必當知其所因也僕擊者忽然跌僕或如被擊而倒以及消疸偏枯痿厥氣滿發逆等病其富貴之人則由膏粱厚味情欲內傷所致也若三焦之氣隔塞閉絶上下不通則由暴憂鬱結所致也以故暴厥而聾偏應閉不通而在一邊者因內氣暴迫也不從內外中風而由本身之氣為病故消瘦而病氣留著也其忽然跌僕痿厥等病多生於膏粱肥貴之人若此瘦而跖跛者內因暴憂氣閉外得寒風濕邪所致之病也帝曰黃疸暴痛癲疾厥狂久逆之所生也五臟不平六腑閉塞之所生也頭痛耳鳴九竅不利腸胃之所生也黃疸由濕熱內閉暴痛癲疾由風痰內結厥狂由陰陽偏亢皆因本身之氣久逆之所生多因五臟之氣偏勝不平六腑閉塞不通而成此病也若頭痛耳鳴九竅不利腸胃之傳化失度濁壅不行之所生因清陽不得流通之故比上諸病為輕矣熱中消中素問腹中論帝曰夫子數言熱中消中不可服膏粱芳草石藥石藥發癲芳草發狂夫熱中消中者皆富貴人也今禁膏粱是不合其心禁芳草石藥是病不愈願聞其説岐伯曰芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此二者帝曰何以然岐伯曰大熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論熱中消中本由膏粱厚味蘊釀而成乃有上中下消之分虛實之異故當禁膏粱厚味也芳草雖可祛穢消腐而香散以耗津液石藥如石膏芒硝之類雖可清熱而質重傷脾脾已困於厚味不任再傷故治消病非緩心和平之人不可以服此二藥以其病氣慓悍而藥氣又急疾堅徑則格鬥於中而傷脾土土惡木者故服此藥者必至甲乙木旺之日時病不加重方可更論治法也黃疸靈樞論疾診尺篇曰身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食濕熱蘊積而成黃疸有陰陽之分其色晦滯者為陰屬脾病色鮮明者為陽屬胃病此條脈小而澀陽氣不振而脾困故安臥不嗜食身痛而色微黃則不鮮明乃是脾病之陰黃也本經又云溺黃赤安臥者黃疸已食如飢者胃疸可見黃疸是不嗜食之陰黃已食如飢者名胃疸即陽黃也仲景所云身黃如橘子色則鮮明為陽黃故用茵陳蒿湯以大黃下之若陰黃當用蒼朮二妙散或正氣散等方口渴喜冷者兼陽明證宜蒼朮白虎湯加茵陳仲景金匱要略又分谷疸酒疸女勞疸諸證更當詳究之噎膈反胃嘔噦噫太息飢不欲食噎膈反胃靈樞上膈篇帝曰氣為上膈者食飲入而還出余已知之矣蟲為下膈下膈者食晬時乃出余未得其意願卒聞之岐伯曰喜怒不適食飲不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充廓衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚已留留則癰成癰成則下管約其癰在管內者即而痛深其癰在外者則癰外而痛浮癰上皮熱馬注膈者膈膜也前齊鳩尾後齊十一椎所以遮隔濁氣不使上熏心肺也然有膈上之病者乃氣使然食飲一入即時還出有膈下之病者乃蟲使然食飲周時始復外出由於喜怒不適食飲不節寒溫不時以致寒汁流於腸中則蟲因寒聚於下脘臍上二寸也蟲聚下脘故腸胃充廓衛陽之氣不得上營邪氣居之其蟲因食而上上則下脘虛而邪氣勝積聚而成壅壅則下脘約約者閉也其壅在脘內者按之其痛深壅在脘外者按之其痛浮壅之皮上熱以其阻閉在下故食飲晬時乃出也楠按素問陰陽別論曰一陽發病其傳為膈又曰三陽結謂之隔蓋一陽者少陽經也少陽為樞樞病而氣阻滯不轉故久而傳變為膈病也三陽者太陽經也太陽為開其氣由內以達外者其經結而不開則內阻隔而不流通是皆言陽氣鬱逆而成膈病即此條所云氣為上膈者也又云下膈者以寒汁流於腸中積聚結而成癰當以通陽破瘀為主治與一陽發病三陽結之證源不同也又言衛氣不營者以衛氣起於下焦營氣起於中焦衛氣自下而升與營氣交通由胸而分行營衛今下脘積聚而衛不得交營則陰陽正氣失位邪僻之氣居之而充廓於腸胃故飲食晬時不化而復出其與後世名反胃病者相類也嘔靈樞四時氣篇曰善嘔嘔有苦長太息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽肝膽抑鬱故長太息以舒之也膽氣虛而逆於胃故心憺憺恐人將捕之而嘔苦水也憺憺心怯而動之貌噦靈樞口問篇帝曰人之噦者何氣使然岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦補手太陰瀉足少陰有物無聲謂之吐有聲無物謂之噦有物有聲謂之嘔吐此言有聲無物者也凡谷入胃化精氣而上注於肺因有故寒氣在胃新故相亂真氣邪氣相攻相併而上逆乃為噦也肺氣主降用針補手太陰經以降逆也腎為胃關瀉足少陰經以利其關使胃中邪氣下行則愈後世之厄逆古亦名噦噫帝曰人之噫者何氣使然岐伯曰寒氣客於胃厥逆從下上散復出於胃故為噫補足太陰陽明一曰補眉本也噫氣比噦輕上逆至胸太息氣轉即已亦因寒邪在胃脾陽不運而厥逆從下上散而出於胃故但溫補脾胃二經之氣使濁降清升則愈一曰補眉本亦內助其陽氣之法耳太息帝曰人之太息者何氣使然岐伯曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少陰心主足少陽留之也各臟皆有系通心故各臟之氣隨心所使心系急而氣道約者則中氣鬱而不舒太息以伸之也故宜補心經心包膽經之氣以和之也飢不欲食靈樞大惑論帝曰人之善飢而不嗜食者何氣使然岐伯曰精氣並於脾熱氣留於胃胃熱則消穀消穀則善飢胃氣逆上則胃脘寒故不嗜食也本經云少火生氣壯火食氣胃者如貯食之鼎少火在下聚而不炎則蒸腐水穀以生精氣也壯火者炎而不聚則反耗蝕元氣而不能化水穀也故如精氣偏並於脾而不輸布則運化失度而胃火外炎其脘中反寒故火炎似飢而脘寒仍不嗜食以鼎下無火也仲景曰厥陰之為病消渴氣上撞心心中熱疼飢不欲食蓋以厥陰中相火而化邪熱由胃上衝故使消渴心熱而似飢其胃氣逆甚則不欲食也腸澼便紅下白沫膿血腸澼便紅下白沫膿血素問通評虛實論帝曰腸澼便血何如岐伯曰身熱則死寒則生帝曰腸澼下白沫何如岐伯曰脈沉則生脈浮則死帝曰腸澼下膿血何如岐伯曰脈懸絶則死滑大則生帝曰腸澼之屬身不熱脈不懸絶何如岐伯曰滑大者曰生懸澀者曰死以臟期之腸澼者久傷濕邪傳導失職而便不固垢穢血液雜下下多則亡陰陰為陽之根陰竭則陽氣離根而外露身熱故死身寒者陽藏不動故生也下白沫者虛寒氣陷也脈沉尚可溫中助氣以治之脈浮者下竭而氣上脫故死也下膿血則挾熱邪脈滑大與證合而元氣未敗可生脈懸絶者細小欲絶本元敗而邪熱盛故死也如身不熱脈不懸絶統指以上三證而言脈滑大為元氣未損可生懸澀者脈無胃氣矣故死審其五臟之生克時日為期也後世名痢疾者與此病相類惟痢疾有積而必腹痛故內經名滯下以其數便不得暢下也此不言腹痛則與痢疾大同小異耳便紅飧泄靈樞論疾診尺篇曰大便赤瓣飧泄脈小者手足寒難已飧泄脈小手足溫易已下泄而完穀不化名飧泄多由虛寒此言赤瓣則濕邪傷血也脈小本為順手足寒則中陽衰矣氣血兩傷故病難愈手足溫其中土未傷而邪易去可愈也淫邪發夢靈樞淫邪發夢篇帝曰願聞淫邪泮衍奈何岐伯曰正邪從外襲內而未有定舍反淫於臟不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於腑則有餘於外不足於內氣淫於臟則有餘於內不足於外帝曰有餘不足有形乎岐伯曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔爇陰陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚飢則夢取甚飽則夢豫肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而瀉之立已泮衍者漫溢延綿也正邪謂尋常風寒而非虛邪賊風之猛厲者故受之而不甚覺其邪從外襲內未有定舍定處與營衛之氣混淆衛氣晝行於陽夜行於陰邪氣混亂而與魂魄飛揚使人臥不得安而發夢以邪淫之處為有餘無邪之處為不足臟為陰為內腑為陽為外邪或在陰在陽則使陰陽偏亢不和而心神亦必不寧蓋神無形而氣有形神者氣之體氣者神之用故氣和則神定而安神動則氣亂不順是以邪擾其氣則神變幻而成夢情欲動神則氣耗傷而致病以神氣本為一物而分體用者也厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢聚邑沖衢客於膽則夢鬥訟自刳客於陰器則夢接內客於項則夢斬首客於脛則夢行走而不能前及居深地窖苑中客於股肱則夢禮節拜起客於胞䐈則夢泄便凡此十五不足者至而補之立已也上言客邪之病故瀉之可已此言厥氣者以自傷本元之氣致陰陽厥逆不和故凡此十五種夢皆為不足之病而當補其虛調其陰陽和平立已也素問脈要精微論云短蟲多則夢聚衆長蟲多則夢相擊毀傷短蟲長蟲腹內之蛔蟲也余與靈樞同素問方盛衰論曰肺氣虛則使人夢見白物見人斬血籍籍得其時則夢見兵戰腎氣虛則使人夢見舟船溺人得其時則夢伏水中若有恐畏肝氣虛則夢見菌香生草得其時則夢伏樹下不敢起心氣虛則夢救火陽物得其時則夢燔灼脾氣虛則夢飲食不足得其時則夢築垣蓋屋此皆五臟氣虛陽氣有餘陰氣不足合之五診調之陰陽以在經脈前靈樞章言五臟氣盛是邪盛也此言虛者本臟陰氣不足陰不足則陽有餘陽主動而變幻成夢也蓋以五臟稟金木水火土五行之性故其夢亦各隨性之所變現而不同則必按五行生化之理診治而調之其陰陽方和要在使經脈流行升降循度不失而後已言得其時者得時令之旺氣也如肺金旺於秋或遇庚辛之日時雖非秋令亦為得其時餘臟皆然而靈素各篇皆有言因病發夢大同小異總不外陰陽五行之氣偏亢不和之所致而其因則有外邪內傷或虛或實之異故臨證者亦可因其夢象以察識其所病故彙集以廣診治之法也惑病靈樞大惑論岐伯曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視歧視歧見兩物目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽陰陽合敷而精明也目者心使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也心有所喜神有所惡卒然相感則精氣亂視誤故惑神移乃復是故聞者為迷甚者為惑此詳言目由五臟六腑之精氣聚會而成者也其瞳子為骨之精是根於腎乃髓之光華而神寓於中故能見物若瞳子散大神光不聚雖有黑珠即不能見物矣腦為髓海故目珠之脈繫上屬於腦也太陽經脈上連腦下循項故邪之中項因其體虛而腦不足其邪入深則隨眼系以入於腦則腦因邪氣而轉動牽引目繫緊急則目因之眩以轉故病人視物轉動者物本不動由目光動也目精受邪其氣血亂而不相比洽則精華散而視歧見一物成兩物此言因外邪所傷者也蓋目由臟腑精華營衛魂魄之所營聚神氣之所生者故神勞則魂魄散志意亂也瞳子黑珠在裡法於陰白眼血脈在表法於陽陰陽之氣合敷而精明也然其所主在心故目為心之使即神之用也心者神之舍也故神精散亂則目光閃爍卒然見非常境界反動其心使精神魂魄散不相得故曰惑也如其心有所喜神有所惡而喜惡之事卒然相感則精氣亂而視亦歧誤故惑久之神定情移忘其喜惡乃能復元是故耳聞而情動不甚者為迷目見而情動甚則為惑矣此言皆由心志妄動精散神移致目見異物以成迷惑如重即變癡癲痼疾非因外邪之所致也癲疾癲疾素問通評虛實論帝曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治帝曰癲疾之脈虛實何如岐伯曰虛則可治實則死此明癲疾之輕重死生也由外邪痰濁膠結於血脈血脈心所主故矇蔽心竅而神昏亂其腑氣流通故食便如常而不死邪居陽分為狂殺人放火邪居陰分為癲不省人事以其邪實故脈大搏指而有力滑者氣血尚活而流行久久邪衰痰化可以自愈若脈小則元氣已戕堅急則邪氣痼結必死不能愈矣如不搏大而虛者邪結不甚尚可助正以解邪如不滑利而但堅實則邪結甚而無陽和之氣故死不可治諸厥篇中有怒狂一證用鐵落飲者以陽邪亢極而名陽厥宜與此合觀之靈樞癲狂篇曰癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止癲病在手經邪結血脈其始發也鬱熱上冒故先不樂而頭重痛目皆赤發作極而心煩也顏者闕庭心肺之部位故當候之於顏觀其色澤之浮沉明晦以辨邪之輕重正之虛實也取手太陽小腸經陽明大腸經太陰肺經以泄其邪視其血變正色則邪去而愈此言針法如用藥亦當從三經治之矣癲疾始作而引口啼呼喘悸者候之手陽明太陽左強者攻其右右強者攻其左血變乃止此痰閉風動癲而兼癇者也故口牽引啼呼而喘悸其肢體或左或右而強急候其大腸小腸兩經而針治之邪在左則右強故攻其左邪在右則左強故攻其右以邪閉經脈而血氣不得流注於無邪之處故筋脈燥急而強也癲疾始作先反僵因而脊痛候之足太陽陽明太陰手太陽血變而止反僵者如角弓反張因而脊痛以足太陽經行於背邪閉其經故反張而脊痛兼治脾胃經者以其統一身之陰陽也然仍不離於手經故皆當取之以小腸為心之腑心病必瀉其腑也治癲疾者常與之居察其所當取之處病至視之有過者瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也癲邪結在血分治之必刺出其血置於瓠壺中至病發時而血動亦銅山西崩洛鐘東應之理其能應而動者其人元氣未敗可治如不動灸其骶骨助督脈之陽以開其結邪也按以上諸證皆言時發時止即世俗所稱羊癲風之類非癡癲之病而無心清之時也骨癲骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩滿嘔多沃沫氣下泄不治邪深入骨而遍滿於表裡本元已敗故汗出煩悶嘔多白沫氣又下泄故死不可治此下數條俱言不治者皆邪深入臟也筋癲筋癲疾者身蜷攣急大刺項大經之大杼脈嘔多沃沫氣下泄不治邪傷筋故身踡攣急大者言脈無和緩之氣也刺之而不效嘔沫氣下泄其臟傷而死不可治矣脈癲脈癲疾者暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿灸之挾項太陽灸帶脈於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治脈癲疾者邪入於脈而脹滿弛縱將四肢之脈盡刺出其血以泄邪如脈不滿灸之以通經脈陽氣使邪得出若嘔沫氣下泄皆不治也以上骨筋脈三證至於病深則傷肝腎心三臟其又嘔沫氣下泄是脾胃俱敗故死不可治也癲疾疾發如狂者死不治邪居陰分為癲居陽分為狂本居陰分而疾發如狂者則邪遍陰陽而元氣敗矣故死不可治癲狂狂始生先自悲也喜忘苦怒善恐者得之憂飢取手太陰陽明血變而止及取足太陰陽明狂病始生而先自悲喜忘苦怒善恐者得之貧乏憂飢抑鬱久而勃發也故取肺與大腸經以通鬱氣又調脾胃經以和陰陽也狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰舌下少陰視之盛者皆取之不盛釋之也不臥不飢罵詈等證皆陽邪獨盛也視其血脈之盛者皆取之以泄邪如不盛不必取而釋之其取大小腸肺腎心經者以陽邪亢盛而從上下陰陽通泄之也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太陰此因恐而傷動心肝二臟風火鴟張故現諸證取肺與大腸經通金氣以制木邪取小腸腑以泄心臟之火也狂目妄見耳妄聞善呼者少氣之所生也治之取手太陽太陰陽明足太陰頭兩顑由元氣衰少勞心神散而妄見妄聞氣不寬舒而口善呼治之通其經以調氣安神也狂者多食善見鬼神善笑而不發於外者得之有所大喜治之取足太陰太陽陽明後取手太陰太陽陽明喜則氣緩過喜則心神放逸以至於狂其氣之散漫更甚矣取六經表裡以調陰陽之氣使其平也狂而新發未應如此者先取曲泉左右動脈及盛者見血有頃已不已以法取之灸骶骨二十壯狂病新發其勢不應如此之重而重者內挾肝風熾盛之故當先取足厥陰經之曲泉穴左右動脈及他脈之盛動者刺之出血少頃即已如不已者再如法刺之並灸骶骨以通督脈之陽嬰孩癲疾素問奇病論帝曰人生而有病癲疾者病名曰何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為癲疾也此言初生時即有癲疾近時所名癲癇者也忽然暴僕昏不知人手足抽掣少頃痰湧而吐吐出痰涎則漸蘇此在胎時母受大驚而動肝風兒稟其氣與精氣並居如油入面矣每遇風氣動則鼓其痰涎上蒙心竅即神昏暴僕風動而手足抽掣也因其氣閉不通而作豬羊聲故有羊癲豬癲之名其病得之胎元故難治也不寐不得臥喘息不寐靈樞邪客篇帝曰邪氣之客人也或令人目不瞑不臥出者何氣使然伯高曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑營衛流行義理已詳營衛經絡門衛氣晝行於陽如日行天夜行於陰如日入地此人身陰陽應天地之陰陽而流行也今厥逆之氣客於臟腑與衛氣格拒衛氣不得入陰則陰陽不交而陽獨盛於外陰分之氣虛陰虛陽盛故目不瞑也厥氣者或因外邪或因內傷致陰陽厥逆不和通名厥氣故凡內傷外感之病皆有不寐者必審其因而治之方能見效也帝曰治之奈何伯高曰補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至帝曰此所謂決瀆壅塞經絡大通陰陽和得者也願聞其方伯高曰以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已也脾胃為中土陰陽升降之道路也陽根於陰而主升脾為陰而氣升也升者由內而行外陰根於陽而主降胃為陽而氣降也降者由外而行內衛氣不得入於陰是外氣不能行於內者由胃氣不得通降故也飲以半夏湯通降胃氣則陰陽交通其臥立至取長流水而又揚之萬遍取其清炊以葦薪猛火者用其輕揚滑利而流走以通壅滯也半夏通胃生津秫米和脾生液一舉兩得故雖久者三飲可已也此交通陰陽之法而從脾胃主治者以脾胃統一身之陰陽也素問病能論帝曰人有臥而有所不安者何也岐伯曰臟有所傷及精有所之寄則安故人不能懸其病也此言臥有所不安即不成寐也以思慮情欲而傷臟其精神有所之之處執著不釋故臥不得安如將執著之心寄放則自安矣但未知其所執何事所傷何臟如思則氣結而傷脾怒則氣逆而傷肝之類故人不能懸揣其病必問其所因而治之也不得臥帝曰人之不得偃臥者何也岐伯白肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥論在奇恆陰陽中偃臥者平身而臥也肺為華蓋其氣下降肺氣偏盛則逆而不降故寸口脈大不得偃臥也奇恆陰陽古經篇名奇者異也恆者常也謂所論皆異常之病也喘息素問逆調論帝曰人有逆氣不得臥而息有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者皆何臟使然願聞其故岐伯曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也脾胃統一身陰陽之氣脾主升胃主降陽明行氣於三陽而足三陽經皆下行也故胃氣逆則三陽經皆逆而不得從其道故不得臥而出入之息有音也若起居如故則眠食安而胃氣和也而息有音是肺之絡脈氣逆不得隨經上下流行而肺最高其絡脈淺在皮膚故病人也微雖息有音而起居如故也若坐則氣定臥則喘者是水氣客於三焦蓋三焦為決瀆之官而出水道氣不宣化而水客之故坐則水氣下行臥則水壅氣喘此但喘而息無音故病不在肺胃而在下焦腎臟以腎為寒水之臟其陽虛則下焦之氣不化津液水壅為患臥則肺氣歸腎以水壅逆肺則喘不得臥是故陽氣化而津液流行則水道通而氣順喘定所以言津液與臥與喘皆腎臟主之當治其主病者也帝所問六證岐伯止答其三蓋帝問雖有六證不出肺胃腎三者之病岐伯已詳明之其餘不過淺深虛實之異可以類推而知如帝所云得臥而行則喘者肺虛也故靜則氣定得臥行則勞動即喘也如雲不得臥不能行而喘者卻有虛實兩證一者肺腎俱虛以腎虛不能納氣肺虛氣不收降故喘不得臥不能行也一者風痰閉結於肺肺主一身之氣一身氣壅不行故喘不得臥不能行此為邪實也然邪閉者其聲粗而脈實若臟虛者其聲低而脈弱氣既不順亦必有痰而易吐也如雲不得臥而息無音者其氣平而不喘但胃不和而臥不安是上文半夏湯證也故所問雖有六證總不外肺胃腎之病也目開不瞑靈樞大惑論帝曰病而不得臥者何氣使然者岐伯曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣此言因病不得臥亦由衛氣不得入陰之故與前之半夏湯證義同然其本病或因外感或因內傷先當詳辨也目閉不開帝曰病而目不得視者何氣使然岐伯曰衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得行於陽則陽氣虛故目閉也此與上條為對待之病也以衛氣出於陽則目開留於陽而不行則目不能瞑衛氣入於陰則目瞑留於陰而不行則目閉不能開留於陽則陽蹺滿留於陰則陰蹺滿是陰陽二蹺脈為衛氣出陽入陰之門戶道路也多臥少瞑帝曰人之多臥者何氣使然岐伯曰此人腸胃大而皮膚澀而分肉不解也腸胃大則衛氣留久皮膚澀則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚澀分肉不解此行遲留於陰也久其氣不精則欲瞑故多臥矣此言因腸胃大而皮膚澀澀則不能解利而衛氣之出於表者遲鈍其腸胃大而衛氣之留於裡者久矣表為陽里為陰衛氣久留於陰故其陽不精而心神昏倦則多臥也其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑也此與上條相對待以明其理也卒然多臥帝曰其非常經也卒然多臥者何氣使然岐伯曰邪氣留於上焦上焦閉不通已食若飲湯衛氣留久於陰而不行故卒然多臥也此言非關腸胃大小皮膚滑澀之常經而有時卒然多臥者因邪氣在上焦上焦閉不通又加食飲濁陰壅之使衛氣不得外行於陽而久留於陰故卒然多臥也大抵衛氣雖晝行於陽而亦有浮沉升降若上焦氣閉濁陰壅之則衛氣不得升浮故雖在晝亦多臥也更要知氣之升降全在脾胃調暢則三焦通利升降之氣自和是故脾倦少運則清陽不升即多昏睡胃中不調則衛氣不得沉降入陰即不能寐所以脾胃為陰陽升降出入之總區而蹺脈為衛氣出入陰陽之門戶道路也治法帝曰治此諸邪奈何岐伯曰先其臟腑誅其小過後調其氣盛者瀉之虛者補之必先明知其形志之苦樂定乃取之此言治法先分臟腑之淺深以除其小病再調其氣隨宜補瀉如治法門所云審其形樂志苦形苦志樂形志皆苦形志皆樂等必先明知方能識其發病之因外感內傷之證定乃可如法治之也內傷諸病內傷五臟靈樞本神篇岐伯曰怵惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收怵惕者驚惶也怵惕思慮心脾俱傷心傷則氣怯而常恐懼脾傷則不能攝精歸腎而常流淫不止如遺滑帶濁之類又有過於勞思而精即流出者悲則氣消哀則神傷神氣竭絶則失其生生之機矣喜則氣散故神憚散而不藏乃多言多笑也愁憂則氣鬱結久則經脈閉塞而不流行也盛怒動火火動亂神故迷惑而理不明不能治事也恐懼者心神憚蕩無主故不能收斂自持也心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬脾憂愁而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存亡得失之意五者已傷針不可以治之也此承上文以明七情傷臟之證也心因怵惕思慮則傷神而恐懼自失心脾同氣相貫故久則脾亦傷而破䐃脫肉䐃者臀間厚肉也脾土傷則不能生肺金故毛悴色夭而死於冬者水旺心火絶也脾因憂愁不解則傷意意脾之神也意傷則悗亂者昏悶憒亂也脾胃主四肢故四肢無力不能舉至毛悴色夭而死於春者木旺土絶也肝因悲哀動中則傷魂魂肝之神也屬陽故傷則狂而善忘者陽氣耗散故不精明而言行皆不得其正謂之狂也似癲非癲之狀耳陰為總筋肝所主脅為肝經所行之部故陰縮筋攣而脅骨疼痛不可舉動也至毛悴色夭而死於秋者金旺木絶也喜樂出於心喜樂無極則心火大動不休而傷肺金魄者肺之神也屬陰心火乘之故魄傷而狂意不存人者自言自笑旁若無人也肺主皮毛為火所灼故皮革焦毛悴色夭而死於夏者火旺金絶也怒本出於肝肝陽逆甚則腎水耗而傷腎之志志腎之神也主記持事物志傷故喜忘其前言腰為腎之府故腰脊不可以俯仰屈伸毛悴色夭死於季夏者土旺水絶也各臟所傷皆言毛悴色夭者自內至外皆枯敗故遇剋制之氣旺則所傷之臟氣絶而死也上言恐懼而流淫不止則傷精精傷故骨痠痿厥蓋骨髓由精而生此因傷心神而及於腎以各臟之神如魂魄意志等皆由心神所化凡七情皆從心起故縱情則傷各臟而保養學道者必先斷情欲而後神凝於一心則病可愈而道可期也各臟皆有精氣留藏滋養傷則失守而陰先虛陰虛則精氣不生而無氣無氣則死矣蓋陰陽互相為根互相生化缺一則無二也凡內傷臟者不可用針治之法必以甘藥調補也精氣津液血脈虛脫靈樞決氣篇曰人有精氣津液血脈也精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴血脫者色白夭然不澤其脈空虛此其候也精為陰而能化氣氣為陽而能生精此陰陽互根互相生化者也陽氣蒸騰之水為津而行於表水凝為液而行於里中焦受氣取汁變化而赤為血赤即火色血即水質此陰陽合體所成故周行於身表裡經脈肌肉臟腑無處不到也精藏於臟津潤皮膚液滋筋骨血充脈中此四者必賴陽氣生化流行敷布表裡故氣為五者之帥而其功用各別故其脫也各有現證不同色澤者血之華也故血脫則色白不澤而脈賴血充由氣鼓動無血則脈雖動而內空也七情寒熱變化九氣致病素問舉痛論帝曰余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣喜則氣和志達營衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣炅則腠理開營衛通汗大泄故氣泄矣驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘且汗出外內皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣此言九氣致病惟寒熱二氣兼括外感故現腠理營衛之證其餘七氣皆內傷情欲蓋心之所之氣亦至焉情欲起於心而氣隨心變則傷而致病是故怒則肝氣逆肝藏血血隨氣升故嘔血肝主疏泄木邪犯土故食不化而飧泄也喜主於心悲主於肺故氣緩氣消各有不同恐主於腎腎藏精故精卻卻者流溢即上所云恐懼流淫而不止也驚則動心傷肝心藏神肝藏魂故神魂搖蕩而氣亂矣勞則內外之氣皆浮動奔越故耗矣脾主思而心神執著一端故氣留止結而不行也凡七情之病雖屬各臟而皆統於心心為君主之官一身氣血隨心所使故心靜則氣血靜情欲動則氣血傷耗而七情之病必先自治其心否則藥亦無功此章當與前靈樞本神篇合觀以究其義也驚恐勞力諸傷素問經脈別論帝曰人之居處動靜勇怯脈亦為之變乎岐伯曰凡人之驚恐恚勞動靜皆為變也是以夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨當是之時勇者氣行則已怯者則著而為病故曰診病之道觀人勇怯骨肉皮膚能知其情以為診法也此言七情勞力皆擾動身心其稟強者氣血流行旋即安和無患怯者因而氣血滯著成病故凡臨證當觀其形氣強弱察其病由以為診治要法也故飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾故春夏秋冬四時陰陽生病起於過用此為常也經言奪血者無汗奪汗者無血是汗與血同由水穀精氣所化而出於一源者有所勞傷以動五臟精氣即與胃中水穀之精隨氣上注於肺遂化汗由皮腠而外泄也是故春夏秋冬之四時陰陽氣血之生病起於過用心力勞傷所致此為常也善忘靈樞大惑論帝曰人之善忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也善忘者後世名健忘以心肺清陽氣虛故神不精明而善忘清陽上虛則濁陰不降故腸胃實腑不轉動而營衛之氣因之不得旋運留滯於下而不升心主營肺主衛其氣不以時上故心肺虛而善忘也血枯素問腹中論帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時之前後血病名為何何以得之岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也帝曰治之奈何岐伯曰以四烏賊骨一藘茹二物合併之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也出清液者時吐清液脾虛不能攝涎故也四肢清者手足逆冷也前後血大小便皆有血也此名血枯而男女皆有是病後世名勞損也中氣竭故四肢無陽和以溫之而逆冷肝傷故目眩而唾血便血肝不能藏血故病至先聞腥臊臭俗言血腥氣也肝氣逆則胸脅支滿而胃氣不順則妨於食也烏賊骨丸吳門王晉三古方選注解義甚精當考之喑痱素問脈解篇曰內奪而厥則為喑痱此腎虛也少陰不至者厥也靈樞熱病篇曰痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起於陽後入於陰者先取其陽後取其陰浮而取之邪氣盛為實精氣奪為虛此由內傷奪精而陽氣厥逆以成喑痱故為腎虛而少陰經脈之氣不能上至於舌本則不能言而為喑陽上逆則下虛而為厥非由外感之邪故身無痛楚本元氣散故四肢懈弛不收如其智亂不甚其言略能成句微有可知者用峻補之法可治甚則不能言而元氣脫絶不可治也病起於陽先治陽後治陰浮而取之者用針淺刺通其經氣也其起於陰者當從陰經治之用藥之法可類推矣方書稱為類中風以其肝腎虛而風由內生非外邪之風也五勞所傷素問宣明五氣論曰五勞所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷肝藏血而開竅於目故久視勞目則傷血肺為華蓋權衡一身之氣敷布周流循環不息久臥則肺氣不舒而傷矣脾司轉運而主肌肉久坐則脾不運而肌肉傷矣久立則勞骨久行則勞筋故皆傷始而傷血氣肉骨筋久則傷及五臟是謂五勞所傷者也然身逸者氣血多滯而但勞心則直傷內臟其病尤重也卒然失音靈樞憂恚無言篇帝曰人之卒然憂恚而言無音者何道之塞也少師曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音肺之氣喉在前近胸胃之咽喉在後近背喉口中間有薄膜一片名會厭厭者掩蓋喉口者也飲食入口則掩蓋氣喉而咽喉開言語發聲則掩蓋咽喉而氣喉開故如飲食到喉或值言語而氣喉開則食飲誤下氣喉與肺氣格逆則必咳嗆而出以氣喉在前故也是故會厭為音聲之戶口唇為音聲之扇舌動方能變聲音而成語故舌為機如舌強或痿雖有聲不能成語矣上齶喉口垂下之軟肉名懸雍故為音聲之關也橫骨者舌根之嫩骨本由心臟所生故為神氣所使主發動其舌以舌為心之苗也頏顙者頂前額內之處津氣循喉上升至頏顙如煙霧之四布周行也故頏顙之氣不開不能分布津氣則由鼻下溜成涕其氣不能約束故名鼻洞此因清陽不足不能透開頏顙故嬰孩老年多有此病凡語言便利及遲鈍難出皆會厭有大小厚薄不同之故如其應對之敏拙由心之靈昧非關於外也若寒氣客於會厭不能開闔則卒然無音其卒然憂恚氣必逆亂以傷會厭而機關不利可以類推而知也帝曰刺之奈何岐伯曰足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢會厭之脈上絡任脈取之天突其厭乃發也足少陰腎經之脈上行系舌本絡橫骨而終於會厭會厭之脈又上絡任脈故用針瀉少陰任脈兩處之血脈則濁氣闢除而清陽透達其會厭聲音乃發也天突任脈絡穴在結喉下孕婦失音素問奇病論帝曰人有重身九月而喑此為何也岐伯曰胞之絡脈絶也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復刺法曰無損不足益有餘以成其疹然後調之所謂無損不足者身羸瘦無用鑱石也無益其有餘者腹中有形而泄之泄之則精去而病獨擅中故曰成疹也身重者孕婦也喑者失音也胞之絡脈絶者言脈氣阻絶不通非斷絶之絶此因胎大壓其胞脈致少陰腎經之氣不得上貫於舌而喑也俟十月産後脈通氣復自愈無用治也若強治之反損其正之不足而益其病之有餘以成其疹疹者痼疾難愈也然其由胎大之故則亦無法可治之矣咳嗽咳嗽素問咳論帝曰肺之令人咳何也岐伯曰五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之人與天地相參故五臟各以治時感於寒則受病微則為咳甚則為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之肺為華蓋而朝百脈主一身之氣故各臟腑之氣皆由經脈匯於肺而行周身五臟六腑皆令人咳者以所受之邪隨氣而歸於肺也皮毛為肺之合皮毛先受邪則邪氣以從其合必入於肺其寒飲食入胃亦從經脈上達於肺則肺寒而與外邪相合客之則為肺咳也人生天地氣交之中故與天地相參五臟稟五行之氣以治五時各以其時而受外邪若非肺臟主令之時而各臟所受之邪皆隨氣而傳於肺假如感寒而微則為咳甚則為泄瀉為腹痛也肺金主秋肝木主春心火主夏脾土為至陰而主長夏未月腎水主冬皆各以其時而先受邪邪之變化多端皆能傳肺而致咳故治咳者其邪有寒熱氣有虛實必審其所因下文即明其病狀也五臟咳證帝曰何以異之岐伯曰肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎五臟部位不同經脈流行各別故其受邪而致咳者各有病狀不同辨其狀方知病邪之所在而治之受邪之臟為本肺為標拔其本則標自愈而咳可止今人但知治肺無怪其不效也六腑咳證五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也臟病久不已則移於腑其咳也亦各有證狀可辨長蟲即蛔蟲也膽汁苦水也三焦包臟腑之外故末傳三焦而胃又為臟腑之海肺主一身之氣故其病雖發於各臟腑而必皆聚於胃關於肺乃成咳病如不關肺則不咳而為他病矣夫脾氣散水穀之精上歸於肺水精四布下輸膀胱者久咳肺氣傷不能分布水精隨氣上逆故多涕唾而面浮腫氣逆也治法帝曰治之奈何岐伯曰治臟者治其俞治腑者治其合浮腫者治其經此分邪之淺深而用針法治之也用藥亦可類推矣要必審其虛實寒熱以調之耳呵欠唏噴嚏涎下嚲泣涕耳鳴齧舌頰唇呵欠靈樞口問篇帝曰人之欠者何氣使然岐伯曰衛氣晝行於陽夜半則行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣瀉足少陰補足太陽欠者呵欠也困倦欲睡必先有呵欠良以陰陽之氣相引故數欠如非其時而多呵欠是陽衰陰盛宜用針法瀉足少陰經補足太陽經蓋二經為衛氣出入陰陽之道路也義詳經絡門營衛生會篇唏帝曰人之唏者何氣使然岐伯曰此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛而陽氣絶故為唏補足太陽瀉足少陰唏者余哀未盡而氣抑不達之聲也陰陽相逆而陰氣盛與陽阻絶不得流通乃作是聲故補瀉同呵欠助陽使達也噴嚏帝曰人之嚏者何氣使然岐伯曰陽氣和利滿於心出於鼻故為嚏補足太陽滎眉本一曰眉上也此言噴嚏之氣由鬱而達也宣明五氣論云腎氣為病為欠為嚏是始由腎氣抑鬱既而得通上達於心陽氣和利充滿乃由鼻出而作噴嚏故補足太陽之滎以通少陰之氣也凡暴厥而死者以其心腎之氣悶絶也故用藥通其鼻得嚏者生無嚏者死素問熱論曰十一日少陰病衰渴止不滿舌乾已而嚏可見嚏者由腎經氣鬱得通而出也又如陰陽氣逆之病有呵欠者其陰陽之氣將交通為吉象也仲景曰師持脈病人欠者無病也亦謂陰陽相交則無病矣是呵欠噴嚏皆為愈病之先機也涎下帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下補足少陰涎為脾之液脾虛胃熱而液泛出於舌下之廉泉穴而流溢口外由於蟲動故也嬰孩多如此常人睡中亦有此病以昏睡而脾氣馳不能攝涎也補足少陰腎使廉泉之氣下達則涎可歸於脾也嚲帝曰人之嚲者何氣使然岐伯曰胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用力氣不能復故為嚲因其所在補分肉間嚲音妥身首下垂無力振舉之貌胃為水穀之海主潤宗筋宗筋主束骨而利機關者也胃氣虛故筋脈皆虛懈惰無力有垂頭喪氣之象用藥當助胃氣用針補分肉之間者以脾胃主肌肉故也泣涕帝曰人之哀而泣涕出者何氣使然岐伯曰心者五臟六腑之主也目者宗脈之所聚者上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故泣涕出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經挾頸淚為肝之液涕為肺之液凡氣血津液出於臟腑而臟腑之氣皆隨心所使以心為一身之主也故以情動心則臟腑氣搖而液隨氣泄即如心驚則汗出心惚則汗出汗為心之液余可類見矣肝開竅於目泣多肝液竭則目無所見故西河痛子而致失明也天柱膀胱經穴此穴挾項頸後髮際言用針以補之者以膀胱為州都之官津液藏焉補其已傷之液耳耳鳴帝曰人之耳鳴者何氣使然岐伯曰耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴補客主人手大指爪甲上與肉交者也耳目為視聽之靈竅故皆宗脈所聚而通於心宗脈者宗氣所行之脈也清陽積於胸中名曰宗氣由先天元氣後天穀氣會合而升者也故胃中空虛其氣下溜而上升之脈氣竭空竅乏清靈之氣清不升則濁不降濁不降則陽鬱而內動故耳鳴矣經又云胃之大絡名曰虛里出於左乳下其動應衣脈宗氣也是故宗脈之氣生於胃胃虛其脈有所竭者也客主人膽經之穴手大指爪甲上肺經少商穴也肺主一身之氣膽經入於耳中補二經以通陽助氣使之上達也齧舌頰唇帝曰人之自齧舌者何氣使然岐伯曰此厥逆走上脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣視主病者則補之經脈之氣升降循環如其不調而厥逆走上則其氣至之處經脈盛脹與齒相礙故不覺自齧少陰脈氣至舌故齧舌少陽脈氣至頰故齧頰陽明脈氣至唇故齧唇矣盛於上者虛於下也補其下則氣平矣
