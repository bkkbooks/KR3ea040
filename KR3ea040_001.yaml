body:
  text: 例言一靈素聖經原不應割裂因欲便於學者揣摩而分門類古已有之非余創也既然有之余又何必效顰為因聖經辭簡義廣後人注解如管窺日日光遍宇宙窺見只一隅故有明此不明彼者明此不明彼則其所見有似是而實非者余故執余管而窺之則所見有異於衆者矣窺既不離日所見有不同則何妨就吾管中所見者言之俟明者擇焉一全經多系問答之言類儒書之論孟可知由漸積纍而非成於一時者也其於天人合一之理反復詳明或舉此以明彼或援彼以證此各篇辭義故有重復今觀其辭同義別者録之注明其辭異義同者不録以省繁就簡期明義理而已一是編專為方脈家設而婦女小兒事同一律其針灸外科祝由等另有專門則不録今體會經義而分門類一曰稟賦源流二曰攝養為本三曰陰陽臟腑四曰營衛經絡五曰四診合參六曰外感內傷七曰治法準則八曰運氣要略雖分門類仍將各篇原題標出以備考證如關兩門要義者兩門俱收注於一門可隨時查閲一是經由黃帝問岐伯述者十居六七其文義多古奧難解間有脫訛歷來注家紛紛聚訟鮮有至當不易之論其中又有詞義淺顯似評似論不類經語所敘事實不似上古者以致後人生疑臆度謂此書由戰國時人所造而非出自軒岐此膚見也大抵上古典誥本來義奧字奇必經翻譯流傳儒典且然遂多不類之文攙混而世遠年湮自多脫訛余前集中如君火相火夏至前病溫夏至後病暑及秋傷於濕為訛等均有辨論明其至理以解歷來疑竇者余且不論即如同人圖所繪臟腑經絡腧穴若非天生神聖誰能知之如是詳細而絲毫不錯乎若謂由戰國時人所造即是其時之神聖其時之神聖又何必假託軒岐之名乎且如秦越人述難經發明其理而稱經曰者皆靈素之文可見其為古經尤足徵矣乃謂戰國時書豈非膚見可哂哉讀書而不求其理率憑臆斷所謂以辭害意者也今凡深奧簡古之文息心體會詳細辨注必明其不易之理其有文義明晰易解毋須贅注者則略之此余之管見所異於衆者也若採舊注必標其名不敢沒其善也一是經由諸聖問答明醫道之體其用多針砭法而湯方甚少嗣後仲景重明其用立湯劑法為述聖然經明陰陽造化之源流天人合一之至理大無不包細無不貫本已體用俱備而仲景特詳脈證準脈證以立湯劑方法為後世軌則若外科針灸等雖別分支派必以方脈為總綱如諸科不明方脈之理不能善其用是仲景又為方脈祖聖而傳軒岐之道者故內經立七方之制而仲景因方以廣其法法者即內經所明寒熱溫涼辛甘鹹苦酸淡之氣味準其相助相制升降浮沉之功能以合脈證之宜否施治而立成方者也故為醫道之用後世注內經者少為其難解也仲景書似乎易解因而濫注者多愈多則仲景之道愈晦而不思不明內經之體焉能達仲景之用此所以軒岐之道脈不絶如縷迄於近世吳門葉薛徐王諸君子已有中興之象延至於今而能續此一縷者猶罕靜觀相習之風其一縷者將絶矣可勝悼哉章楠又識
