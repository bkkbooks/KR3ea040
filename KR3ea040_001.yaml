front:
  text: 自序原夫古聖以天地之心為心以黎庶為子以黎庶為子則不忍見其死必欲全其生欲全其生則必明其所以生所以死之理於是著靈樞素問若干篇聖人闡明生死之理之書稱為內經者蓋以性命為內為重事物為外為輕之意也朱子曰天以陰陽五行化生萬物氣以成形而理亦賦焉以其在天名理賦物名性同出異名無非一靈而已一靈乘氣化以成形質凡有血氣者皆有知覺也惟人為萬物之靈稟陰陽五行之全氣故配天地為三才而羲聖畫卦有奇耦懿表天地人之象也天為陽陽中有陰地為陰陰中有陽人亦如之故卦象必有六爻也所以陽中有陰陰中有陽者陰陽互根於太極也太極動而生陽靜而生陰則太極為陰陽之根也是故陰陽貴平偏勝則偏害偏甚則偏絶其根脫而太極毀矣太極者陰陽環抱渾元一氣人之命蒂也主宰太極者知覺神明為天人合一之理名曰性故言天命之謂性也一靈孕乎太極則生陰陽氣竭而太極毀則死由是言之所以生者得氣化之和也所以病者因氣化之乖也所以死者由陰陽氣絶也故聖人詳究天地陰陽五行生化之理即以斡旋人身陰陽氣血生化之源以救其病而保其生嗚呼此聖人以天地之心為心故能操造化之柄而補天地之缺失以垂教後世使民無夭札之苦其流澤何可窮盡哉然理之微妙通乎造化事之重大關乎性命非有聰明特達之資不能悟其理非有沉潛力學之功不能精其術非有仁慈惻隱之心不能善其用非有不忮不求之量不能行其道然則醫豈易言哉若無實學而幸竊虛名者是造孽也非行道也道之不行也由於聖教之不明聖教之不明由於氣化日薄人心日澆姦巧相角名利是營而於養生之道未嘗經意偶嬰疾病性命付諸醫手聽其所為莫能裁主及至危殆則平日營求自待者毫無所用束手待斃徒深悲泣誠可憐也其業醫者不肯究心聖經理法陋習相沿不識陰陽虛實通套一方混治諸病而謂道止如是名為仁術不知殺人於冥冥中以他人身命作自己生涯試一捫心果能安乎夫醫之殺人固非有心而不自量學術即與有心殺人何異每見有自醫自病而戕其命者何莫非冥報之速也可不畏哉孟子曰擇術不可不慎也世上謀生之術亦多矣何必據仁術之名而蹈不仁之實乎愧余淺陋年力已衰未能闡聖道以挽頽風前以一得之愚著醫門棒喝四卷聊述此弊而今殘息苟延復將靈素要妙之文節取注解分類編輯以為學者首當必讀之書略表古聖垂教之意或於醫道不無小補但經旨淵玄管見之言恐未盡當尤望高明君子不吝賜教實為斯道之幸也道光十四年歲次甲午孟春會稽章楠謹序
