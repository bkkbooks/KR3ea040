body:
  text: 卷六諸風病證寒熱素問風論帝曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或內至五臟六腑不知其解願聞其説岐伯曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉故使人怢栗而不能食名曰寒熱風由陽氣所化隨寒熱溫涼而變寒熱之傷人必由於風故風為百病之長善行而數變如其藏於皮膚之間營衛不得通和腠理開閉不常以致陰陽相爭陰勝則寒而飲食減陽勝則熱而肌肉消氣血兩傷故使人怢栗而不能食名曰寒熱病也怢栗者畏怯戰栗之狀熱中寒中風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出同感風邪因人之肥瘦不同而為病各異故凡邪之傷人必隨人身之氣變化為病若風由陽明而入於胃其人體盛肌厚則風不得外泄與水穀之氣鬱蒸而成濕熱隨脈上行而至目黃也瘦人肌薄腠疏中宮陽氣隨風邪而外泄以致中寒風氣上行至目則泣出也癘風寒熱風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所礙而不行故其肉有不仁也太陽主一身之表而統營衛風氣入太陽行諸脈俞散於分肉與衛氣相干使脈道不利則營氣不從逆於肉裡乃生癰腫衛氣礙而不行則肌肉不知痛癢為不仁也癘者有營氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風或名曰寒熱癘者邪熱毒厲之氣腐其營脈其氣穢濁不清上熏於鼻故使鼻柱壞而色敗皮膚瘍潰初由風寒客於脈中而不去挾瘴惡之氣所釀成故名癘風俗名大麻風古名癩最為惡病其邪入骨傳延子孫而方書亦有治法也五臟六腑頭腦眼目中風以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風人身與天地氣化相通五臟合五時之氣候風為天氣故以天干之五行而應五臟也風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風五臟六腑皆有俞穴在背為臟腑之門戶風中於俞由一門而入邪止偏入一臟一腑故名偏風也風氣循風府而上則為腦風風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也無常方然致由風氣也督脈風府穴上通於腦而又通太陽經太陽經脈起於目內眥故風由風府而上入於腦則頭腦痛由太陽而至目眥則為眼寒也飲酒之人多汗而腠理疏漏風邪易入故名漏風入房汗出風邪乘虛入內故名內風新沐陽氣發泄頭為諸陽之會故風中於首也久風入於腑則為腸風飧泄者食不及化而下泄以風性疏利故也諸邪傷人必由於風故風為百病之長至其變化乃為他病而無常方然其致病總由風氣也五臟中風形狀帝曰五臟風之形狀不同者何願聞其診及其病能岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面龐然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑此即明上文五時風邪中於五臟之病證也風必由皮毛而入腠理開泄故多汗傷風故惡風而五臟病證皆然也肺色白邪郁肺氣故時咳而短氣也晝則氣升而肺開故病瘥暮則氣降而肺闔故病甚也心火為邪所遏故焦躁善怒心色赤言者心之聲舌為心之苗舌轉動方成語故病甚則言不快便也肝有餘則怒不足則悲邪客之故兩者並現心風怒者木助火勢也肝病悲者金來乘木也肝色蒼風火上炎則嗌乾怒者陽盛惡陰故時憎女子青者蒼之甚也脾主肌肉四肢故身重怠惰四肢不欲動也脾色黃脾困不運故不嗜食也頭為諸陽之會太陽為諸陽主氣而為腎之表故腎風而頭面腫其身不腫者以風為陽邪陽升於上而不在經也脊為督脈內通於腎故痛不能正立腎色黑二便為腎之門戶隱曲者便處也胃腑頭等中風形狀胃風之狀頸多汗惡風飲食不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大頸兩旁人迎胃脈也故汗偏多於頸風邪阻胃故食飲不下膈塞腹滿也失衣則又加外寒故䐜脹食寒則又加內寒故泄瀉正傷肉消故形瘦邪壅於中故腹大也首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事體盡痛則寒此申上文首風漏風泄風之狀也首風因新沐而邪中之不及他處頭應天氣天將起風而人應之故先一日頭痛惡風甚不可以出內至發風日其氣外泄則少愈也漏風者腠理疏漏風邪易入難去表虛故不可單衣食則氣泄汗出甚則身常多汗喘息惡風肺氣虛也汗多津耗故口乾善渴氣傷故不能勞事也漏風由飲酒而得泄風因表虛而得表虛故勞則體盡痛而汗出汗出則陽泄故寒余同漏風也風厥漉汗靈樞五變篇帝曰人之善病風厥漉汗者何以候之少俞曰肉不堅腠理疏則善病風帝曰何以候肉之不堅也少俞曰膕肉不堅而無分理者粗理而皮不致者腠理疏此言其渾然者肉不堅而腠理疏風邪易入故善病風而汗多如水漉名漉汗膝後曲處為膕膕肉不堅而無分理或理粗則其皮不致密而腠理疏矣渾然者即無分理之謂也素問評熱病論帝曰有病身熱汗出煩滿煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥帝曰願卒聞之岐伯曰巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也帝曰治之奈何岐伯曰表裡刺之飲之服湯此即仲景所云風傷衛之病也風為陽邪性疏泄故自汗而煩滿不為汗解者以太陽名巨陽統營衛而主一身之表其經內通少陰故為表裡因太陽風邪化熱而少陰之氣上從上從者上逆也上逆而陰並於陽則上實下虛上實則煩滿不解下虛則足冷而厥因風邪所致故名風厥是當表裡兼治既刺以解表服湯以和里也勞風帝曰勞風為病何如岐伯曰勞風法在肺下其為病也使人強上冥視唾出若涕惡風而振寒此為勞風之病帝曰治之奈何岐伯曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如濃大如彈丸從口中若鼻中出不出則傷肺傷肺則死也太陽經淺在皮毛而皮毛為肺之合平日勞傷肺氣太陽風邪乘虛入肺肺氣主降邪隨走於肺下太陽經脈為目上綱風邪傷之故目不能正視勉強上視即冥無所見肺下之邪與津液膠結故唾出稠痰如涕表邪仍在故惡風而振寒此因勞傷而感風邪故名勞風太陽經脈行於背故背強不能俯仰治之當先救其俯仰用針法引太陽經之精氣三日若中年及精衰之人須引五日七日精氣生髮則內陷之邪得以漸出咳出青黃涕如濃大如彈丸或從口或從鼻而出病方可愈若邪不出則傷肺傷肺將成失音肺癰等病而死也引太陽精氣如用藥當開提肺氣疏利太陽經脈也酒風素問病能篇帝曰有病身熱解墮汗出如浴惡風少氣此為何病岐伯曰病名酒風治之以澤瀉術各十分麋銜五分合以三撮為後飯酒熱傷風腠理疏豁外風易入內多濕氣故汗出如浴惡風少氣身熱懈惰病名酒風即上風論所云飲酒中風則為漏風是也治之以澤瀉術健脾去濕麋銜草祛風邪合為散服三撮後以飯壓之腎風素問奇病論帝曰有病龐然如有水狀切其脈大緊身無痛者形不瘦不能食食少名為何病岐伯曰病生在腎名為腎風腎風而不能食善驚驚已心氣痿者死龐然如有水狀者身面皆腫也水腫其脈必沉弱今脈大且緊即所謂真臟脈也此腎虧陽氣化風故名腎風腎氣逆中不和故不能食雖食亦少腎水虧肝失養故善驚驚已心氣痿者木枯不生心火心氣消索則生機已絶而死矣上文風論所云腎風多汗惡風面龐然腫其身不腫是外邪之風傷腎也此腎水枯虛陽化風是內傷病也以至肝木心火皆無生氣則死風水素問評熱病論帝曰有病腎風者面胕龐然壅害於言可刺不岐伯曰虛不當刺不當刺而刺後五日其氣必至帝曰其至何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名風水論在刺法中帝曰願聞其説岐伯曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也小便黃者少腹中有熱也不能正偃者胃中不和也正偃則咳甚上迫肺也諸有水氣者微腫先見於目下也帝曰何以言岐伯曰水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也真氣上逆故口苦舌乾臥不得正偃正偃則咳出清水也諸水病者故不得臥臥則驚驚則咳甚也腹中鳴者病本於胃也薄脾則煩不能食食不下者胃脘膈也身重難以行者胃脈在足也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也經曰面腫曰風足脛腫曰水胕足面也頭面足胕皆龐然壅腫此因腎虛水泛風邪由太陽而入腎經風鼓水湧故名風水以腎為水臟與太陽為表裡也腎經之脈上連舌本邪壅經氣不得上達舌不能轉故害於言此虛證不當刺而刺之五日後其病氣必然復至則更重遂現所敘諸病經文明晰毋須贅注臥則驚者以胃不和肝氣被郁也薄脾者邪盛迫脾以遏心火故煩胃氣格逆故食不下而胃氣不得下達於足故身重難行心氣遏而不下通則胞脈閉月事不來也此正虛挾邪之病與上兩證之腎風皆各不同也素問水熱穴論帝曰少陰何以主腎腎何以主水岐伯曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也帝曰諸水皆生於腎乎岐伯曰腎者牝臟也地氣上者屬於腎而生水液也故曰至陰勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水所謂玄府者汗空也冬為寒水主令腎為水臟故水之本出於腎水為金子子能令母實故其末在肺肺腎氣不通調則三焦輸化失職以致積水為病所以然者腎開竅於二便水液滓濁由之而出故為胃之關關門不利則胃中水飲壅積與腎水類聚上下漫溢於皮膚經絡而胕腫為病也諸水皆生於腎者以腎為牝臟牝者陰也陰氣從陰故地氣之上蒸者屬於腎而生水液蓋物以類聚所謂水流濕也以陰從陰故曰至陰若其勇而勞力甚則腎汗出而經絡疏逢於風內不得入於臟腑外不得越於皮膚而客於玄府行於皮里傳為胕腫玄府為汗空即毛竅也因用力汗出而竅開風邪客之其水本於腎與風邪相鼓於皮里肌膚而成腫病故名風水也帝曰水俞五十七處者是何主也岐伯曰腎俞五十七穴積陰之所聚也水所從出入也尻上五行行五者此腎俞故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受者水氣之所留也伏兔上各二行行五者此腎之街也三陰之所交結於腳也踝上各一行行六者此腎脈之下行也名曰太衝凡五十七穴者皆臟之陰絡水之所客也此明所以成水病者蓋腎俞有五十七穴陰氣之所積聚水者陰類故從五十七穴而出入其氣鬱而不從三焦水道滲入膀胱乃由俞穴行於皮膚肌肉則下為胕腫大腹也子能令母實故使肺逆而喘呼腎水泛為腫標本俱病也肺氣逆則不得臥以俞穴之氣分布相輸而周身俱受水氣留而不行也伏兔等穴為腎氣所行之街足三陰經交會而結於腳也踝上等穴腎脈下行之路也名太衝共凡五十七穴皆臟之陰絡故水蓄之即陰從陰水流濕之理也石水風水素問大奇論曰腎肝並沉為石水並浮為風水此舉脈象以辨病也素問生氣通天論云陰陽結斜多陰少陽曰石水是石水者陰邪盛於陰分故云多陰少陽而肝腎之脈並沉則木沉水中水中陽微陰凝如石也腎肝之脈並浮者風木之氣勝水從風鼓而泛濫故為風水之病也蓋腎臟為陰陽之根根本固則陰陽和平而生化不息根本空虛則陰陽妄動陽化為風陰變成水陰盛則水壅結而沉伏名曰石水也陽盛則風鼓水而泛濫以致身面皆腫名曰風水也皆根本空虛之故也虛邪賊風虛風賊邪素問八正神明論帝曰星辰八正何候岐伯曰星辰者所以制日月之行也八正者所以候八風之虛邪以時至者也四時者所以分春夏秋冬之氣所在以時調之也八正之虛邪而避之勿犯也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工候救之勿能傷也故曰天忌不可不知也星辰所以分周天之度數而制日月之行以定晝夜四時之氣候也東南西北四正四隅所來之風名八風隨八節之氣候而變以分邪正虛實義詳後九宮八風篇圖注日月者陰陽之精氣以長養萬物者也月為太陰受日陽氣而後有光而人賴日月之精氣以充身者故隨月之圓缺而為盈虛也若值人身之虛而逢天之虛風則中其邪深入至骨而傷臟故聖人避虛風賊邪如避矢石良工測候而救之則邪勿能傷故曰天忌不可不知也虛邪者八正之虛邪氣也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形上工救其萌芽必先見三部九候之氣盡調不敗而救之故曰上工下工救其已成救其已敗救其已成者言不知三部九候之相失因病而敗之也虛風賊邪傷人則病重若非虛邪而尋常風寒因人用力汗出腠理開乘虛而感者其邪微而身不覺故莫見其病形惟上工於三部九候之脈氣先見其病端而救其萌芽盡法調治而不敗下工不能先知而救之於病已成已敗往往用力不及是不知三部九候之脈氣相失因病已成而敗之也知其所在者知診三部九候之病脈處而治之故曰守其門戶焉莫知其情而見邪形也此言上工能知病邪之所在者知診三部九候之病脈隨邪所在處而治之如守門戶不使其邪蔓延入內本人雖莫知病情而良工已見邪形治其萌芽不待病成而調之也素問離合真邪論岐伯曰夫聖人之起度數必應於天地故天有宿度地有經水人有經脈天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起夫邪之入於八脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然其至寸口中手也時大時小大則邪至小則平其行無常處在陰與陽不可為度從而察之三部九候卒然逢之早遏其路此言天地人由一氣相貫者也天有宿度循氣而行地有經水即江河也人身經脈血氣流行皆如之故經水隨寒熱風而變人身經脈血氣亦然必溫和而安靜也若寒則血凝泣熱則氣淖澤淖澤者熱氣相蒸而化濕也寒熱擾其氣血虛邪因而入客亦如經水遇風鼓之則隴起其行於脈中循循然隨氣而至寸口其應於手時大時小大則為邪氣至小則為氣血平其邪氣流行亦無常處或在陰或在陽不可為一定之度必從三部九候而察之如仲景所云風傷衛者脈浮緩寒傷營者脈浮緊之類察之既明卒然逢邪即早解之遏其內入之路如是乃為良工也靈樞歲露論少師曰賊風邪氣之中人也不得以時必因其開也其入深其內極病其病人也卒暴因其閉也其入淺以留其病也徐以遲雖平居其腠理開閉緩急其故常有時也人與天地相參也與日月相應也故月滿則海水西盛人血充積肌肉充皮膚致毛髮堅腠理郤煙垢著當是之時雖遇賊風其入淺不深至月廓空則海水東盛人氣血虛其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落當是之時遇賊風則其入深其病人也卒暴此言邪氣中人不得以時者不得以遇邪之時測其病也要必以人身之虛實而分邪入之淺深若遇月滿時人身氣血充盛腠理閉密雖中虛風賊邪其入淺而其病徐以遲至月廓空則氣血虛皮膚縱而腠理開則其邪入深而病人卒暴也此與前八正神明論岐伯所云義理大同此為詳耳帝曰其有卒然暴死暴病者何也少師曰三虛者其死暴疾也得三實者邪不能傷人也乘年之衰逢月之空失時之和因為賊風所傷是謂三虛逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也命曰三實然此一夫之論也馬注乘年之衰者即素問刺法本病二篇所謂司天失守也逢月之空者即上文月廓空也失時之和者即春應暖而反寒之類也有此三虛而賊風傷之則暴病暴死三實者反是然此言一人之所病也至於衆人同病詳後其刺法本病二篇在靈樞卷末補遺中帝曰願聞歲之所以皆同病者何因而然少師曰此八正之候也常以冬至之日太乙立於葉蟄之宮其至也天必應之以風雨者矣風雨從南方來者為虛風賊傷人者也其以夜半至也萬民皆臥而弗犯也故其歲民少病其以晝至者萬民懈怠而皆中於虛風故多病虛邪入客於骨而不發於外至立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣馬注此言八正之候常以冬至之日太乙立於葉蟄之宮風雨從南方來是謂從後來者為虛風賊邪夜可避晝難避民或中之邪客於骨而不發至立春陽氣大發而腠理開又值風從西方來者為虛風也此兩次之虛邪相搏人之經氣結而代脈見矣然不特此也凡太乙居於別宮如立春遇西風北風之類皆謂之遇歲露焉大抵歲之賊風有多少則民病之多少系之矣帝曰虛邪之風其所傷貴賤何如候之奈何少師曰正月朔日太乙居天留志宮其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病死者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來髮屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔日天利溫不風糴賤民不病天寒而風糴貴民多病此所以候歲之風䔲殘傷人者也二月醜不風民多心腹病三月戊不溫民多寒熱四月巳不暑民多暴病十月申不寒民多暴死諸所謂風者皆髮屋折樹木揚沙石起毫毛發腠理者也一歲生成之氣化始於元旦風者陽氣所動故可占一歲之豐歉及余月之寒溫愆期不調即以驗民病之吉凶也諸所謂風者皆髮屋折樹揚沙石之厲風故名虛邪賊風而為災害之應也素問金匱真言論帝曰天有八風經有五風何謂岐伯曰八風發邪以為經風觸五臟邪氣發病所謂得四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝也此言人本天地之氣而生既成身形故與天地氣化相通而受邪各有所屬也八風即上文八正之風有邪正虛實不同風由經絡而觸五臟故有五風之謂蓋五臟具五行之性合五時之序五行有生克故其風邪相傳有勝負如春勝長夏木剋土也長夏勝冬土剋水也冬勝夏水剋火也夏勝秋火剋金也秋勝春金剋木也其邪之相傳以相剋為凶如肝木之邪傳脾土之類以相生為吉如肝木之邪傳心火之類若去其邪當用制勝之法如木邪則助金以制之若助其正當用相生之法如滋水生木補火生土之類也東風生於春病在肝俞在頸項南風生於夏病在心俞在胸脅西風生於秋病在肺俞在肩背北風生於冬病在腎俞在腰股中央為土病在脾俞在脊故春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢故春善病鼽衄仲夏善病胸脅長夏善病洞泄寒中秋善病風瘧冬善病痹厥故冬不按蹺春不鼽衄春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥飧泄而汗出也夫精者身之本也故藏於精者春不病溫夏暑汗不出者秋成風瘧此平人脈法也此承上文以明外風觸五臟之病證也春屬木其位東應於肝臟故東風生於春病在肝也俞在頸項者頸項本少陽經脈所行之部以肝膽為表裡風必由表入里故俞在頸項也心火主夏位於南故南風病在心也俞即心包經脈所行在胸脅也肺金主秋位於西故西風病在肺而俞在肩背也腎水主冬位於北故北風病在腎而俞在腰股也中央為土故病在脾而俞在脊也此言五臟應五行時令氣候而邪皆由俞穴而入也其言春氣病在頭以及冬氣病在四肢者義又不同是以天地升降之氣候而應人身表裡淺深上下之部位也春病鼽衄者血隨春陽之氣上升至頭由鼻而衄故言春氣病在頭也夏病胸脅者心火當令其俞在胸脅仲夏陽氣初降而浮於身表其內則虛故言夏氣病在臟也長夏季夏也病洞泄寒中者正值陽降陰升如地熱井寒脾土主令故言病在脾也秋病風瘧者余暑內伏涼風外加則發寒熱之瘧秋為肺金主令其俞在肩背風邪由之而入故言秋氣病在肩背也冬病痹厥者是時陽氣盡入於地寒邪逼於身外陽氣伏於內臟不能暢達四肢而陰陽經脈交接之處不得通貫則為痹為厥故言冬氣病在四肢也按蹺者按摩導引以通氣血流行經脈即為治痹厥之法也然必不得已而用之者蓋冬令當順其歸藏之候不宜擾動氣血故冬不按蹺則氣血沉靜而春不病鼽衄以至夏秋冬皆可調順而無患也良以陰精為陽氣之根乃一身之本也要在冬令歸藏固密以滋春生之氣是故冬能藏精則陽氣足而春陽發生和而不亢則無溫病若夏令又當順其風泄之氣如汗不出其氣不宣則暑伏於內秋風外襲即成風瘧也以上雖分兩義而統明隨順陰陽五行四時氣化升降流行之序如上所云順之則治逆之則亂以發諸病是故為診視平人之脈法不可不知也若其病之變化又當隨宜而治不可拘執冬不按蹺夏必汗出之説神而明之存乎其人也靈樞刺節真邪篇帝曰余聞有真氣有正氣有邪氣何謂真氣岐伯曰真氣者所受於天與穀氣並而充身者也正氣者正風也從一方來非實風又非虛風也邪氣者虛風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去此言生初所稟本元之氣及平時由呼吸所受天地中和純粹之氣是陰陽之精氣故為真氣與飲食之穀氣合併而充身者故曰天食人以五氣地食人以五味則又統括陰陽五行氣化以長養萬物者也正氣即正風由太乙所居正位而來以少陽之氣所化而柔弱不厲正可舒養萬物故名正氣或有過猛之時其中人亦淺而不傷不能勝身中真氣則自去而不為病也其虛邪賊風中人也深不能自去則傷而成病下更詳之虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈外則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣往來行則為癢留而不去為痹衛氣不行則為不仁灑淅動形者寒栗毛豎也以其邪厲故發腠理而深入至骨則為骨痹必骨痛也邪搏於筋則筋拘攣脈者血之府邪搏於脈故血閉甚則經脈不通而成癰肉在脈外衛氣所居故邪侵肉則與衛氣相搏其陽勝則為熱陰勝則為寒寒則真氣去而虛虛則寒搏於皮膚之間發腠理開毫毛而往來行則為癢久留不去則為痹衛氣因之不得流行其肉頑木而不仁也虛邪偏客於身半其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛此言邪氣偏傷其入深則成偏枯半身不遂入淺則一邊經脈疼痛以其真氣耗去而邪居之也虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨為骨蝕有所疾前筋筋屈不能伸邪氣居其間而不反發為筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚速以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也此言人身陰陽氣血而中賊風日久深沉寒熱相結在陰則寒勝在陽則熱勝寒勝則骨疼肉枯熱勝則爛肉腐肌而為膿內傷於骨則骨損如蟲蝕也上言邪搏於筋而筋攣即屈不能伸邪居其間則發為筋溜同瘤也邪氣內結衛氣留滯津液不輸與邪合而結成腸瘤久者數歲乃成初起按之尚柔已有所結則氣日以歸而津液留之邪氣中之故凝結日易而成昔瘤謂由宿昔漸結故云數歲乃成於是按之堅矣如邪深中於骨氣因循骨而行者與邪並結日以益大則為骨疽也宗氣本溫分肉者也邪中於肉則宗氣歸之邪留不去有熱則肉化成膿無熱則結為肉疽故有熱為癰無熱為疽疽為陰證癰為陽證也凡此邪氣中人發病無一定之常處及其成病則有一定之常名因名以辨陰陽表裡寒熱而治之也靈樞論勇篇帝曰有人於此並行並立其年之少長等也衣之厚薄均也卒然遇烈風暴雨或病或不病或皆病或皆不病其故何也少俞曰春青風夏陽風秋涼風冬寒風凡此四時之風者其所病各不同形黃色薄皮弱肉者不勝春之虛風白色薄皮弱肉者不勝夏之虛風青色薄皮弱肉者不勝秋之虛風赤色薄皮弱肉者不勝冬之虛風也帝曰黑色不病乎少俞曰黑色而皮厚肉堅固不傷於四時之風其皮薄而肉不堅色不一者長夏而有虛風者病矣其皮厚而肌肉堅者長夏而有虛風不病也其皮厚而肌肉堅者必重感於寒外內皆然乃病此言四時之風本於五行之氣而人稟陰陽五行以生其氣質各有強弱之異而五行有生克故氣質有勝負假如黃色土質也土畏木故不勝春之虛風白色金質也金畏火故不勝夏之虛風青色木質也木畏金故不勝秋之虛風赤色火質也火畏水故不勝冬之虛風此皆言虛風者即虛風賊邪也惟黑色為水質水畏土長夏未月土旺主令而有虛風其皮薄肉弱而色不一定常黑者方中其邪若色黑而皮厚肉堅者其陰陽皆充實故長夏虛風亦不能傷之無論四時之風也必其重感寒邪內外俱傷乃病即所謂兩感者也故如黃白青赤之人亦皆言皮薄肉弱而不勝四時之風如其皮厚肉堅亦未必皆病以此推之可概見矣靈樞賊風篇帝曰夫子言賊風邪氣之傷人令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊風邪氣其故何也岐伯曰此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痹其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉此言不感虛風賊邪而卒然病者以平日嘗傷濕氣藏於血脈分肉之間久留不去而不自覺又若有所墮墜惡血在內不去或卒然喜怒不節飲食不適寒溫不時其腠理閉不通及開而遇風寒血氣凝結新故之邪相襲而成痹或有因熱汗出而受風如此雖不遇賊風邪氣必有因故邪加重而卒然發病焉蓋上言正風之氣柔弱不能勝真氣則自去而不為病此因先有所傷之邪與外風相襲則加重而病發不必虛風賊邪方病以余觀之平時此等病證為多而虛風賊邪所傷者少也帝曰夫子之所言者皆病人之所自知也其毋所遇邪氣又無怵惕之所志卒然而病者何也惟有因鬼神之事乎岐伯曰此亦由故邪留而未發因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神帝曰其祝而已者何也岐伯曰先巫者因知百病之勝先知其病之所從來可祝而已也此言初無外感內傷之因而有卒然病發心昏語亂似為鬼神所憑者以其有故邪內伏而不自覺適因所惡所慕之情感觸氣血內亂其情志與故邪兩氣相搏而病發其所從來由微而漸故視之不見聽而不聞卒然發作似乎鬼神所憑其有祝之而已者先巫知百病相勝之理如恐勝喜怒勝思之類審其病之所生即以其情志之相勝者祝之使情志平調則氣血和而病自愈昔有一女子許字未嫁其夫外出多年無信因而結思成病朱丹溪治之用激怒之法遂大哭嘔吐痰涎慚紿以夫有信至將歸遂調理而愈旋即其夫果歸矣可知情志之病由漸而成其卒發者必有故邪相觸而亦真有鬼神所憑者必由其內氣先病乘虛而入也蓋人鬼乃陰陽之分鬼之侮人人之陽虧或心不正直故也九宮八風太乙居遊日期靈樞九宮八風篇曰太乙常以冬至之日居葉蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居葉蟄之宮曰冬至矣太乙日遊以冬至之日居葉蟄之宮數所在日從一處至九日復反於一常如是無已終而復始太乙移日天必應之以風雨以其日風雨則吉歲美民安少病矣先之則多雨後之則多汗太乙在冬至之日有變占在君太乙在春分之日有變占在相太乙在中宮之日有變占在吏太乙在秋分之日有變占在將太乙在夏至之日有變占在百姓所謂有變者太乙居五宮之日病風折樹木揚沙石各以其所主占貴賤因視風所從來而占之風從其所居之鄉來者為實風主生長養萬物從其沖後來者為虛風傷人者也主殺主害謹候虛風而避之故聖人日避虛邪如避矢石邪勿能害此之謂也太乙者太歲之神也有行住之分自冬至日住居坎宮次日遊行艮宮由震而巽至第五日遊於中宮第六日遊於離宮由坤而兌至第九日遊於乾宮為一周第十日仍居坎宮次日又遊艮宮如是周而復始至立春日太乙遷居艮宮次日遊於震宮由巽而離至第五日遊於中宮第六日遊於坤宮由兌而乾至第九日遊於坎宮為一周第十日仍居艮宮次日又照前遊歷如是循節氣遷居逐日遊歷至遷居乾宮已周一歲乃至冬至之日即次年之太歲神居坎官也挨查節氣日期觀太歲神所居之宮占風雨寒熱之氣以驗吉凶如經文所云者是也假如太乙居坎宮之日以離坤兌乾為後以中央巽震艮為前太乙居中宮之日以坎艮震巽為後離坤兌乾為前太乙居離宮之日以中央乾兌坤為前巽震艮坎為後余可類推矣其從前來者為實風從所居之鄉來者為正風從後來者為虛風賊邪主殺害故聖人避之如避矢石是故太乙徙立於中宮乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也內舍於心外在於脈氣主熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虛而偏中於邪風則為擊僕偏枯矣此又申明太乙居中宮之日而辨八風為病之理也風由八卦方位而來故其傷人臟腑亦按八卦方位以應之而八卦具五行之氣即氣變化而成其病也然皆論其常理耳凡經論陰陽五行八卦之道皆是活法變化無窮要必明其圓通至理方能頭頭是道如或拘泥穿鑿即有不能融貫者矣其從後來之虛風傷人為甚若又逢月廓虛人身虛是謂三虛會合則暴病卒死或兩實一虛兩虛一實其病有輕重不等未至卒死其三虛會合或不卒死而偏中其邪則必跌僕而成偏枯半身不遂之病故聖人避虛風如避矢石焉九宮節氣圖注諸痹證行痹痛痹著痹素問痹論帝曰痹之安生岐伯曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也風為陽寒濕為陰三氣雜合而成痹病風陽而性動搖傷衛氣故風多則流走名行痹也寒陰而性凝斂傷營血故寒多則身痛名痛痹也濕邪濁滯營衛俱傷故濕多則氣血滯著身體重名著痹也此一病而以邪之多寡分三證也骨痹筋痹脈痹肌痹皮痹帝曰其有五者何也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹腎主冬令骨屬腎肝主春令筋屬肝心主夏令血脈屬心脾主長夏肌肉屬脾肺主秋令皮毛屬肺本經風論言以春甲乙傷於風者為肝風餘臟皆然今痹邪亦同此義蓋五臟應五時之氣候故外邪即乘氣而入其部以成病也帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去內舍於其合也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也凡手足十二經經皆有穴名曰井滎溜俞合其出氣者名井入氣者名合氣血由之而出入流行於一身者也邪乘時令之氣而入久不去者內舍於其合也又不去而復感於邪則深舍於臟所以名痹者因重感於邪自淺而深閉結不出也靈樞五變篇曰粗理而肉不堅者善病痹蓋粗理肉不堅則腠理疏而邪易入乃留滯成痹也肺痹心痹肝痹腎痹脾痹凡痹之客五臟者肺痹者煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐肝痹者夜臥則驚多飲數小便上為引如懷腎痹者善脹尻以代踵脊以代頭脾痹者四肢解墮發咳嘔汁上為大塞邪客於臟則病重為難治矣肺痹者遏其心火而多煩肺主氣而居胸氣痹故胸滿而喘肺胃相連故胃氣亦逆則嘔也心主血脈痹則脈不通而煩煩則氣動故心下鼓暴逆犯肺則喘心火上灼則嗌乾脘滯則善噫陽上亢而下虛則厥厥則傷腎而恐也肝藏魂氣痹而魂不安故夜臥則驚肝火鬱故多飲數小便者肝木主疏泄也肝陽本上升痹不得達故上引如有物在懷中也三焦通主升降而腎司下焦腎氣痹而下焦不宣則中上兩焦皆不通利故善脹也督脈通腎腎痹而督脈陽氣不通蹺維之脈皆不用而兩足不舉以尻代踵尻音考平聲尾骨也督傷則天柱骨痿頭垂背曲故脊以代頭也脾主四肢氣痹不得充於四肢故懈墮無力脾為肺母母病必及於子而發咳有痰名嗽無痰有聲名咳也脾不運不能為胃行其津液而汁上泛則嘔出濁壅不降上焦大塞也病至如此不可治矣故下文言入臟者死腸痹胞痹腸痹者數飲而出不得中氣喘爭時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胃中水穀下行由小腸變化分清濁清滲膀胱濁傳大腸邪痹於腸傳化失職津液不輸口舌乾燥而數飲下既不化水蓄於中不得出與中氣格爭而喘息爭久則水暴瀉而發飧泄飧泄者水穀不化皆由腸痹之故也胞即胞脈連繫膀胱胞痹氣壅故於少腹按之內痛以其陽郁化熱故如湯沃而澀於小便水液不得下泄反被熱蒸上行而為清涕也五臟證陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絶痹聚在脾諸痹不已亦益內也其風氣勝者其人易已也此言陰氣謂臟氣臟為陰也以表情欲躁擾乃傷臟飲食不節則傷腑因不同而同為內傷本元因此外邪得以聚而成痹也夫陰平陽祕精神乃治故陰氣靜則精神藏若躁擾則消耗而亡矣飲食本以滋養如不節而倍多則反傷腸胃凡偏駁不純者皆名淫氣傷寒本元本元傷則淫氣聚而正氣痹矣故如淫氣而喘息者知其痹聚在肺也淫氣而憂思難釋者知其痹聚在心也淫氣而遺溺者知其痹聚在腎也淫氣而乏竭無力者知其痹聚在肝也淫氣而肌絶者知其痹聚在脾也肌絶謂無陽氣煦和不知痛癢也諸痹不已則內傷本元益甚也如其風氣勝者為行痹其病易已若寒濕陰邪則凝滯難愈也帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨者疼久其留皮膚間者易已此言邪痹淺深不同而愈有難易其邪入臟則本元氣竭而死六腑證帝曰其客於六腑者何也岐伯曰此亦其食飲居處為其病本也六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也此言外邪由內邪引之深入者故其食飲居處為之病本也六腑各有俞邪中於俞而內傷應之邪即乘虛入舍於腑而成痹也諸痹帝曰營衛之氣亦令人痹乎岐伯曰營者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於盲膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹上言邪舍於合而成痹又云由俞入舍於腑故帝又問營衛受邪亦能成痹否然營者水穀之精氣所謂清者為營是也其氣純粹氤氳故和調於五臟灑陳於六腑如甘瀾之優遊浸灌而後入於脈故曰營行脈中即循脈上下而貫臟絡腑也衛者水穀之悍氣所謂濁者為衛是也其氣慓疾滑利則不能入於脈故曰衛行脈外即循皮膚之中分肉之間熏於盲膜散於胸腹此營衛之氣同源異流者也如感邪而逆其氣則病順其氣之流行則愈不與風寒濕氣相合故不為痹也大抵營衛之氣周流內外倘遇邪阻即有寒熱頭痛等病發現其成痹者以風寒濕氣錯雜之邪表發未透留滯於合於俞著而成痹由淺入深如上所明者是也帝曰痹或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深營衛之行澀經絡時疏故不痛皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也人身陰陽氣血各有偏勝風寒濕邪多寡不同而傷有表裡淺深故病狀多端人身陽少陰多則與病邪相益而為寒陽多陰少陽遭陰痹鬱而成熱濕多則為汗濕亦陰邪陽氣少也蓋外邪有陰陽又隨人身之陰陽偏勝而變病故必審其陰陽表裡虛實寒熱而施治法也帝曰痹之為病不痛何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈而不伸在於肉則不仁在皮則寒故具此五者則不痛也凡痹之類逢寒則急逢熱則縱上言痛者寒氣多也其有不痛者必風濕邪勝濕氣滯著則有身重血凝筋屈不伸肉不仁皮寒之五端故具此五者而非寒多則不痛也大凡痹之為病逢寒則經脈緊急而多痛逢熱則經脈緩縱而不痛寒兼濕則重著熱兼濕必多汗兼風則行走行走而寒束之亦必痛濕合之必多汗也故其變化雖多總不出陰陽虛實四端而已衆痹周痹靈樞周痹篇帝曰周痹之在身也上下移徙隨脈其上下左右相應間不容空願聞此痛在血脈之中耶將分肉之間乎何以致是其痛之移也間不及下針其慉痛之時不及定治而痛已止矣何道使然願聞其故岐伯曰此衆痹也非周痹也帝曰願聞衆痹岐伯曰此各在其處各發更止更居更起以右應左以左應右非能周也更發更休也刺此者痛雖已止必刺其處勿令復起按此言忽痛忽止上下移徙者以其邪各在一處此痛彼止彼痛此止或各痛各止互起互伏痹處衆多故名衆痹因邪依脈路而脈中氣血流行不住故邪動靜不常動則痛靜則止而經脈左右相同故痛必左右相應而止在近脈之處更發更休非能周於一身故不名周痹也刺之者其痛雖止必刺其原痛之處以去邪勿使復痛也帝曰周痹何如岐伯曰周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所帝曰刺之奈何岐伯曰痛從上下者先刺其下以過之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之此言邪在血脈之中十二經脈行於周身故名周痹其痛上下行走不能左右者邪隨陰陽升降之氣而行故與衆痹不同痛從上下者其痹在上故先刺下以泄其標再刺其上以脫其本痛從下上者其痹在下故先刺上以泄其標再刺其下以脫其本若衆痹邪依脈外脈外氣寬其邪與脈或近或遠近脈則動而痛遠脈則靜而止以其氣寬故動則必依脈路左右相應也帝曰此痛安生岐伯曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是此內不在臟而外未發於皮獨居分肉之間真氣不能周故名曰周痹上文言邪在血脈之中血脈本居分肉之間分肉即衛氣所周行者風寒濕邪必先傷衛久則侵營而入血脈當其由淺入深而與衛氣迫切而為沫沫得寒而凝聚則排分肉而分裂作痛痛則心神注之心之所之氣亦至焉故陽氣隨心而至痛處則熱熱則寒散痛解解則氣厥而不通和不通和故他處之痹又發發則又如是而痛也經脈內通於臟而邪則痹聚營衛未入內臟其營衛在分肉間故外不及於皮因是真元之氣不得行於周身內外皆為邪痹肌肉之故而名周痹若以邪在血脈而經脈周於一身其義亦當名周痹也至於一處痛解而他處痹痛又發其義理與衆痹同衆痹邪痹衛分而近於脈此則邪痹肌肉間而入血脈故其痛發隨脈上下而與衆痹之左右相應者不同也諸痛證素問舉痛論帝曰願聞人之五臟卒痛何氣使然岐伯曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛帝曰其痛各不同形別之奈何岐伯曰寒氣客於脈外則脈寒脈寒則縮踡縮踡則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止寒氣客於挾脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於腸小腸不得成聚故後泄腹痛矣熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣營行脈中衛行脈外脈外者衛分絡脈也氣血周流循環不已若寒氣客之寒性凝斂經脈稽遲不能循度而行寒氣客於脈外則血少者以乏陽氣生化也寒氣客於脈中則營氣閉塞不通故卒然而痛其客於脈外則脈縮踡而絀急則外引小絡故卒然而痛得炅則寒散而痛立止若重中於寒則痛久難止矣寒氣客於經脈之中與陽氣相迫則脈中血瘀而脹滿故痛不可按因其寒氣稽留陽氣從上而行致脈充大而血氣亂故痛甚不可按也寒氣客於腸胃膜原之下此不在經脈故按之血氣散而痛止也寒氣客於挾脊之脈比營衛深故按之不能及而痛無增減也衝脈之氣自少腹上行至胸寒氣客之則氣閉脈不通故按之喘動應手也寒氣客於背俞之脈血脈澀而血虛其俞注於心故與心相引而痛背俞亦同絡脈故按之熱氣至而痛止也厥陰經脈行於脅肋少腹寒氣客之血澀脈急故脅肋引少腹而痛也寒氣客於陰股上及少腹而血澀故腹痛引陰股也寒氣客於小腸膜原之間絡血澀而不得注於大經稽留而成積其痛不言可知矣寒氣客於五臟臟氣厥逆上泄而陰氣竭則陽不得入陰而通和故卒然痛死不知人厥氣反順而陰陽和則復生寒氣客於腸胃而腑中濁壅其氣厥逆上衝故痛而嘔也寒氣客於小腸小腸為受盛之官不得聚水穀而輸化故後泄而腹痛矣以上皆為寒痛惟熱留小腸而痛者止一條則有疸熱焦渴其便堅幹不得出之證因熱閉不通而痛者當辨別也帝曰捫而可得者奈何岐伯曰視其主病之脈堅而血及陷下者皆可捫而得也此言針治之法也如上所現證狀知其病在何經何絡即為主病之脈視其脈捫之堅而露血色及脈陷下者皆邪之所在可捫而得以法治之也諸瘧證暑瘧素問瘧論帝曰夫痎瘧皆生於風其蓄作有時何也岐伯曰瘧之始發也先起於毫毛伸欠乃作寒栗鼓頤腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲帝曰何氣使然岐伯曰陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實而陽虛陽明虛則寒栗鼓頤也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而渴故欲冷飲也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也此令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作起於毫毛伸欠者毛豎伸尸呵欠瘧發之狀也人身表陽內陰上陽下陰氣血周流陰陽交通則安和無病瘧邪由傷暑熱水氣又遇風寒並客於皮膚之內腸胃之外營氣所舍之地故邪與氣血混合以致陰陽互相格拒上下交爭虛實更作陰陽相移寒則寒極熱則熱極蓋水火者陰陽之徵兆寒熱者水火之體性人身陰陽不和即水火相爭故有寒熱之變現也邪與衛氣並居衛氣晝出陽分夜入陰分一日出入一次故邪隨之內外逼迫而病日發一次其邪入深而間一二日發者下文明之帝曰其間日而作者何也岐伯曰其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也邪在衛分則隨衛氣出入而病發其深舍於陰分者欲與陽爭而陽行迅利陰邪遲鈍故不得即出其病間日而發也蓋陽如日而行速陰如月而行遲造化自然之理也帝曰其作日晏與其日早者何氣使然岐伯曰邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也邪之客於身也本無定處上明邪客於皮膚之內腸胃之外與衛氣並居則日發一次邪入陰分則間日一發俱無早晏此節言邪氣先客於脊背者因衛氣每日必有大會風府之時衛氣至風府則腠理開腠理開則脊背之邪氣乘虛而入風府與衛氣相遇則病發也然衛氣會於風府而有定時以其循度而行也若邪入風府風府督脈穴也因從脊骨而下行每日下行一節故與衛氣相遇日遲而病發日晏也至二十五日邪氣下至尾骶骨二十六日入注於脊內伏膂之脈從上而行九日出於缺盆之中因邪氣日高則與衛氣相遇日早故病發日早也此以邪氣流行而病發有早晏與前之邪與衛氣並居者不同由是可知瘧邪伏於血氣之中如遇衛陽衝動而後病發其邪深入陰分而發日遲者為難愈也即此推之經言冬傷於寒春必病溫者良以冬為極陰之令寒為至陰之邪以陰加陰故隱伏而不覺至春陽氣升發則人身之氣相應而動其邪則溫病發是寒邪隨天地之氣而變溫也吳又可不明此理反以經語為非可謂愚而好自用者盍思瘧邪隱伏時而亦全然不覺乎陰陽變化微妙無窮苟不悟其至理安可憑臆妄斷哉其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也此又申明間日一發之理也夫陽動陰靜自然之性故邪在陽分則動而易發邪在陰分則伏而不覺必待陽氣衝動與衛氣皆出則病發其道遠行遲不能日與衛氣皆出故間日始發也其有間兩日而發者邪伏更深矣然邪必外發而隨陽疏泄始能漸衰故其深伏陰分者淹纏難愈也帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何岐伯曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也帝謂衛氣日會於風府而亦由節下行如邪與衛氣未遇於風府其病亦日作者奈何岐伯言人有虛實不同故邪必乘虛而入各異其處則不得皆當其風府之穴也上文言其發病日晏日早者因邪先客於脊背乘衛氣至風府穴而腠開邪入則病發如其邪客頭項或中於背或中腰脊或中手足皆無定所必以衛氣周行所至與邪遇合則病作故風邪無常客之府其衛氣所發必開其腠理邪氣因入與衛氣所合之處則為其府不必定在風府之穴也由此可知人身營衛氣血周行自有常度而不改變其邪之中人既無定所而又流傳各處故其病變多端經文可謂詳盡義理矣帝曰夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作此更明同由外邪而發病不同之理也凡感風邪則身熱頭痛而邪常留其處必服藥汗出乃已既已即不復發以其邪去也瘧病發後休歇歇後又發者以其邪隨經絡流行混於血氣之中沉以內薄故不之覺遇衛陽之氣衝動乃發而衛氣周行表裡與邪相離則邪仍伏而病休歇也寒瘧溫瘧疸瘧帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧此明瘧邪之由各有不同以暑熱水寒風邪交混而成瘧其邪所傷有先後多寡不同故發病亦異如夏傷暑熱汗出腠開又遇水寒藏於腠理皮膚中至秋又傷於風則成瘧水寒為陰風邪為陽先傷水寒後傷風邪故病發則先寒後熱名曰寒瘧如先傷風邪後傷寒邪故病發則先熱後寒名曰溫瘧其有素來陰虛陽盛之人所傷之邪化熱而陰寒之氣先絶則陽邪獨發乃少氣力而煩冤手足皆熱而欲嘔以火性炎上故也名曰疸瘧由是觀之發於秋後者多挾暑邪發於春後者必由風寒而無暑或有挾濕者其濕有外感內生之不同脾虛則水液不化而濕自內生衛虛則表陽不固而濕從外受肝血少風自內生腎水虧熱從內發凡此諸義皆當知者也論治法帝曰經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也岐伯曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗故為其病逆未可治也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰並復於外則陰虛而陽實故先熱而渴夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復至病之發也如火之熱如風雨之不可當也故經曰方其盛時必毀因其衰也事必大昌此之謂也夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃止故工不能治其已發為其氣逆也古經言有餘瀉之不足補之以調其平為一定之法也若瘧之大寒大熱亦有餘不足之類而良工不能即用補瀉之法以治之必須其氣自衰乃刺之者蓋經亦有言無刺熇熇之熱渾渾之脈漉漉之汗熇熇渾渾漉漉者邪正相爭陰陽相併氣血騰沸無論不可刺藥亦不可服服之遏其勢或致元氣悶絶而死者有之此不可不知也故瘧病者陰陽之氣相角相併互相勝負陽並於陰則陰勝而寒陰並於陽則陽勝而熱當其發也如火性風雨之急驟不可當故經言方其盛時而治之必毀其元氣因其病氣衰而調之事必大昌調之得時真氣安而邪氣乃止故良工不能治其已發之時為其氣逆不可犯也帝曰攻之奈何早晏何如岐伯曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得並者也當其發時不可治則治之必有其時矣蓋瘧邪混於血氣之中隨經絡流行以致營衛陰陽不和邪與衛氣相遇則邪正互爭而病發夫十二經陰陽之氣流行交接於四肢之末其邪將發必使陰陽移易而擾亂故瘧發時從四末陰陽交接之處起而指尖先冷陽氣既傷陰必從之而傷故當先其發時邪氣未動堅束四末指尖使陰陽氣不移易而邪氣止於一處不得出入陰陽以擾血氣然後審其孫絡之脈盛而且堅有血色現者邪氣之所在也用針取之以去邪則真氣往歸本位而未得與邪相併則病不發也帝曰瘧不發其應何如岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜極則陰陽俱衰衛氣相離故病乃休衛氣集則復病也人身陰陽二氣本來交通而和平瘧邪居之使有偏亢邪在陽則陽盛陰衰則熱而脈躁邪在陰則陰盛陽衰則寒而脈靜邪氣出入陰陽使陰陽互爭互並擾亂之極則邪正之氣俱衰衛氣與邪相離其病乃休衛氣集則病復作也三陰瘧帝曰時有間二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也瘧者陰陽更勝也或甚或不甚故或渴或不渴瘧邪在陰則靜遇陽則動腑居身中陰分邪客於腑與衛陽有時相失而不遇故間二日或數日一發名為三陰瘧也蓋衛氣行於陽其氣旺行於陰其氣衰不能衝動邪氣邪氣蓄積數日與元氣俱旺則病發故邪在陽分則淺而從汗泄為易愈邪在陰分則深為難愈也邪乘陽則熱熱甚則渴不甚亦不渴邪乘陰不熱而不渴或乘陽而挾濕邪雖熱亦多不渴或口燥而不欲飲者濕遏陽氣津液不升也四時瘧帝曰論言夏傷於暑秋必病瘧今瘧不必應者何也岐伯曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗瘧有不必定發於秋與論言不相應者蓋四時之氣皆能成瘧也如春風夏暑秋涼冬寒四時之氣也其病有異形者與四時之氣相反也如秋應涼而反熱春應溫而反大寒此其氣異而病亦異乃變成瘧也然春為風木主令其發瘧也則必惡風夏令陽氣發泄其病瘧也則必多汗此其病形雖異而氣之升降浮沉仍有次序可驗以瘧者由伏邪所發夏令發泄感邪不覺至秋外寒驟加而內邪不容則必病發故論言之也其三時之氣不反則感邪即病少有成瘧者故論獨舉夏傷暑秋病瘧也其三時之氣不反而有伏邪者如冬傷於寒春必病溫等已另有明文矣又論溫瘧帝曰夫病溫瘧與寒瘧而皆安舍舍於何臟岐伯曰溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧生氣通天論陰陽應象大論皆曰冬傷於寒春必溫病是伏邪發於少陰經絡也故仲景論伏氣溫病必先喉痛以少陰經脈循喉系舌本故也然腎司冬令而主骨此其邪入深而云藏於骨髓故至春陽氣雖大發而邪氣不能自出因又遇大暑其邪久伏鬱極而成熱爍髓消肌腠理發泄或有所用力以動陽其邪始與汗皆出此因先藏於腎從內出外故其陰已虛而陽邪盛陽盛則熱矣盛極必衰衰則邪氣復反入陰入陰則陰盛陽虛陽虛則寒矣故先熱而後寒以其邪本溫熱因入於陰而身寒故名溫瘧非寒邪也其寒瘧之由已詳上文矣又論疸瘧帝曰疸瘧何如岐伯曰疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍肌肉故命曰疸瘧肺素有熱者以其陽盛於身也陽盛則升氣多而厥逆上衝中氣實而不外泄所以肺熱也因有所用力而腠理開風寒乘虛客於皮膚分肉之間以其陽盛邪即化熱心為君火同氣相召故藏於心而外舍於分肉之間則消爍肌肉其邪不及於陰故但熱而不寒命曰疸瘧也大抵瘧之發寒熱者以邪氣出入陰陽陰陽之氣互爭互並故也然邪必隨身中之氣變化故陽盛之人邪即化熱陽虛之人邪易入陰入陰則陰盛多寒客陽則陽盛多熱疸瘧之邪不及於陰故但熱而不寒也又有濕閉熱伏之病亦由陽氣不振或見其內熱而投寒藥則濕邪愈閉而陽陷乃至危殆矣此陰陽強弱邪之淺深不可不辨也足太陽瘧素問刺瘧篇曰足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺郤中出血此下皆明足六經所行之現證也足太陽經脈自足由背上頭故腰痛頭重寒從背起然風寒在太陽必頭痛今不痛而但重者正因濕邪所閉陽郁不伸故先背寒其邪本在陽經陽鬱極則發熱而熇熇暍暍者遏悶不達也故雖熱止汗出而病難已為陰濕所閉也郗中太陽經穴刺之以泄其邪足少陽瘧足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽足少陽膽經之脈也內通肝經肝主筋邪熱侵之筋脈弛縱而解㑊也邪入近陰分故發寒熱而皆不甚其邪傷膽則膽怯故惡見人見人而心惕然也人身之陽初由少陽而升及其陽升邪發則熱多而汗出甚也刺法同上足陽明瘧足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月火光氣乃快然刺足陽明跗上足陽明胃經之脈也胃為臟腑之海而主肌肉陽明行氣於三陽邪客之三陽之氣皆不伸故先寒而灑淅寒甚久始發熱然後氣行腠開熱去汗出以邪未淨則陽不能伸故喜見日月火光為快也足太陰瘧足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰足太陰脾經之脈也與心氣相通邪閉氣不舒故心不樂而好太息脾困不運故不嗜食與陽明為表裡其邪出入陰陽表裡相格故多發寒熱而胃中水穀之氣外泄則汗出也病至邪氣衝胃則善嘔嘔已邪氣乃衰也足少陰瘧足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已足少陰腎經之脈也腎者胃之關也邪阻關門濁壅於胃不得降而上逆故嘔吐甚少陰為至陰之地邪伏深而難達故發寒熱皆多時其陽勝則熱尤多於寒也氣閉心抑悶而不爽故欲閉戶獨處以腎邪心火受制故也邪在至陰故病難已足厥陰瘧足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒足厥陰肝經之脈也肝為腎子子能令母實故所現多兼腎證腰者腎之府少腹肝之居故腰痛而少腹滿肝主遺溺癃閉此病淺在經故小便不利似癃非癃數數欲便而短之意也腎主恐故恐懼肝鬱氣不接續而少氣虛實篇云肝氣虛則恐實則怒腹中悒悒者窒悶也肺瘧肺瘧者令人心寒寒熱甚熱間善驚如有所見者刺手太陰陽明凡一臟受邪其氣橫逆必侮其所不勝而乘其所勝也心火為肺金所不勝者以其邪氣橫逆心火被抑而心寒也肺主一身之氣一身皆為邪窒故其發寒發熱皆甚也熱間善驚如有所見者肝病也以肺邪勢衰猶逞餘威乘其所勝也目為肝竅邪侵肝故目光亂而妄見怪異之物也刺肺與大腸經以泄其邪心瘧心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰心為君火瘧邪犯之故煩心甚而欲得清水以解之火熱內郁陽不流行故表反寒多而不甚熱也按經所言心藏神明其臟堅固而不受邪受邪則心傷神去而死凡言心病者心之包絡受邪也包絡為心脈之本心氣所由出入故受邪亂氣則但神昏而不死如癲狂等病亦然若受邪在經神亦不昏故刺手少陰經以泄其邪肝瘧肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血肝木色蒼肝病故色現於外肝鬱不舒故必太息肝藏魂其氣厥逆則肢冷神昏若死者厥回則蘇厥不回即死矣肝藏血故必刺之出血方能去邪脾瘧脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰脾為陰臟位於腹而主肌肉故受邪則身寒腹痛陰盛極則陽來復而發熱熱則氣動而腸鳴鳴已其表氣亦通而出汗也刺其經以泄其邪腎瘧腎瘧者令人灑灑然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰膀胱為腎腑外應腠理毫毛臟病必及於腑故乍覺寒襲腠理而灑灑然如冷水灑之也腎居腰脊故腰脊痛腎開竅於二便邪侵氣窒故宛轉大便難也目之黑珠屬肝瞳神本腎腎連肝病故目眴眴然眴音懸即昏眩也十二經陰陽之氣交接於手足指尖陰陽不得交通則手足皆寒刺膀胱腎經以泄其邪胃瘧胃瘧者令人且病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血令人且病者謂其發寒熱之瘧病而邪在胃腑也邪熱壅胃故飢其清濁不轉故不能食食則支滿也支滿而腸中不得傳導則腹大矣脾胃同氣相貫故刺胃脾經橫脈出血以泄邪夫陽經自表通腑陰經自表通臟皆為軀體至臟腑之徑路也上文舉六經瘧病明其邪在經而浮淺此以臟腑名病者明其邪已深入於裡也然邪由表入必使從表而出故皆同刺其經以泄之也治法所宜瘧脈緩大虛便宜用藥不宜用針凡治瘧先發如食頃乃可以治過之則失時也脈緩大虛皆本元不足也針法在引其元氣升發領邪外出故元氣虛者針不可用宜用藥助內氣以達邪也若瘧發時氣逆不可治上文已明其發後勢衰餘邪伏匿治亦無功故當於先發食頃時其邪將動未動迎其機而泄之過此皆為失時治之而不效也凡諸瘧病皆然以故一切外感內傷之病用藥應飯前飯後或早或暮皆有相宜之時所當體究者也
