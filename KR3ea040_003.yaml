body:
  text: 卷二陰陽臟腑總論人稟陰陽五行之氣以生而陰陽之變化無盡今以臟腑分陰陽者論之是臟為陰主裡腑為陽主表五臟具五行之性而五行又各具陰陽故各臟之氣為陽血為陰也如以腑配臟則肝為乙木屬陰膽為甲木屬陽木生火心為丁火屬陰小腸為丙火屬陽火生土脾為己土屬陰胃為戊土屬陽土生金肺為辛金屬陰大腸為庚金屬陽金生水腎為癸水屬陰膀胱為壬水屬陽而水又生木故陰陽五行之氣生化不息也五行之生者相長也生氣太過則偏亢故生中有克克者制也如木剋土土剋水水剋火火剋金金剋木互相節制也是故不足則以相生者助之如補肝助心之類太過則以相剋者制之如滋水制火之類調之使平而後已蓋臟者藏也藏精氣而不瀉腑者器也傳化物而不藏其能藏能化者皆由陰陽五行之氣運用也而臟腑各有所主各有功能各有所司其或失司則氣化乖逆而生百病矣故如肝藏魂與血而主筋心藏神而主血脈肺藏魄與氣而主皮毛脾藏意而主肌肉腎藏精與志而主骨肺又權衡一身之氣脾又統領一身之血而心為君主一身氣血隨心所使以各臟皆有系脈通心故心定則神明而五臟皆安心勞妄動則五臟皆病如憂則心氣抑怒則肝氣逆思則脾氣結悲則肺氣消恐則腎精傷故凡七情皆由心發而先傷各臟者也如其功能所司肝司疏泄開竅於目腎司閉藏開竅於二便脾司鼓運開竅於口肺司呼吸開竅於鼻心司鑑察開竅於舌耳通心腎之氣又為心腎之竅也臟腑之相配者以其部位相連而為表裡互相為用腑本臟氣以宣化故臟虛則腑不轉輸臟藉腑氣以舒和故腑實則臟氣厥逆如肺與大腸為表裡者若肺氣虛則大腸失職或泄瀉或閉塞若大腸濁壅不行則肺氣逆滿不能下降余可例知其互相為用者也又如胃司納穀賴脾健運以化飲食精微上達於肺敷布周身以充養各臟腑故胃為水穀之海六腑之大源也其糟粕下傳小腸泌別清濁清水滲入膀胱濁滓下歸大腸又必賴三焦氣化宣暢而水火均平則二便通調故曰氣化則能出矣然三焦氣化本於腎元之陰陽若腎元衰則三焦無權而脾胃因之升降不調清濁淆混則百病俱出此臟腑之所以各有功用不同也惟膽附於肝為表裡其精汁有入無出若受熱邪膽汁泄而口苦則為病矣又有心包絡居於膻中為心臟之外護代心用事凡邪之干心皆包絡受之若心臟受邪則神去神去即死矣心包經絡與三焦連貫為表裡故五臟六腑及心包絡共成手足陰陽十二經義詳營衛經絡門中必先熟臟腑生化之理經絡流行之道方能辨病之表裡虛實而治之是故學者首當究心而不可忽者也經解陰陽反作病之逆從素問陰陽應象大論帝曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也治病必求其本故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也此明天人合一之道也陰陽者天地之氣天地者陰陽之形而大道存乎其中也萬物稟陰陽之氣以成形氣盡則形消故陰陽為萬物之綱紀變化之父母生殺之本始而神為形之主藉陰陽之氣以存形消氣盡則神去故陰陽為神明之府府猶居宅也陰陽既為生命之本則治病必求其本首當調護陰陽也將欲調之必先明其生化之理故如積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形此皆生化自然之理也若寒極生熱熱極生寒即坤變復乾變姤是陰陽進退消長之道也寒氣為陰陰性凝滯故生濁如積陰成地也熱氣為陽陽性流動故生清如積陽為天也故人身之氣清升濁降自然之性也反之則病故如清氣在下而不升則下焦疏利而病飧泄以陽性流動也濁氣在上而不降則上焦壅塞而病䐜脹以陰性凝滯也如此則陰陽反其作用而病矣反則逆順則從故必察其逆從而調之是謂治病必求其本也陰陽清濁各從其部故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑雨從天降由云所化云乃地氣上升故言雨出地氣是本乎地者親下也云從地出實由天氣上蒸故言云出天氣是本乎天者親上也此陰中生陽陽中生陰互相生化循環不息之妙道也蓋陽化氣陰成形陽從地升為云陰從天降為雨故人身清陽由下焦而升出於上竅象天之云濁陰飲食所化由上焦而降出於下竅象地之水清陽輕浮而疏泄故能開發腠理濁陰膏液則凝重以故內走五臟而陰陽經絡流行交接於四肢之末清陽之氣走表故能實四肢也若飲食入胃生化津液以養五臟其濁滓由腑傳導而出故濁陰歸六腑也是走五臟者乃清中之濁歸六腑者乃濁中之濁而有兩層義理也靈樞陰陽清濁篇帝曰願聞人氣之清濁岐伯曰受谷者濁受氣者清清者注陰濁者注陽濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣上節素問以天地之氣分清濁此以人身之氣分清濁故各有義理互相發明也天地中和之氣清也穀食五味之氣濁也清氣鼻受而入心肺心肺為臟為陰故清者注於陰也穀味口受而下於胃胃為腑為陽故濁者注於陽也以氣分陰陽則陽清陰濁以人分陰陽則臟陰腑陽乃氣之清者注陰濁者注陽是亦陰陽相交相生之道故與上節各有義理也所以凡有口鼻者必賴天地之氣味以生養也若其濁而清者穀食精微之氣也上出於咽而行經脈中也清而濁者如天地濕熱蒸穢之氣則由鼻下行而到胃乃清濁相干而逆亂或為嘔瀉或為脹痛故命曰亂氣也帝曰陰清而陽濁濁者有清清者有濁別之奈何岐伯曰氣之大別清者上注於肺濁者下注於胃胃之清氣上出於口肺之濁氣下注於經內積於海此承上文受清濁之義而云陰清陽濁者謂臟屬陰而受清腑屬陽而受濁也然其濁中有清清中有濁又何以分別其所受乎伯言氣之大別者分別大概之理也假如吸入之清氣則上注於肺穢濁之氣下走於胃是初入於胸而上下分行故聞穢氣即作嘔逆而凡疫癘暑濕等邪吸入即客於胃而成諸病之類蓋清升濁降自然之性也故如胃中谷氣之清者上出於口如呵出之氣也若肺所受穀氣之濁者謂濃濁之濁非是穢濁即所謂脾氣散精上歸於肺之津液也故即下注於經內積於海海者如血海氣海等類此乃大概分別其所受者也帝曰諸陽皆濁何陽獨甚乎岐伯曰手太陽獨受陽之濁手太陰獨受陰之清其清者上走空竅其濁者下行諸經諸陰皆清足太陰獨受其濁此問諸陽腑皆受濁何腑獨甚乎伯言手太陽獨甚者蓋手太陽小腸為受盛之官承受胃中所下水穀糟粕故獨受陽之濁為甚也手太陰肺為華蓋而部位最高故獨受陰之清其清氣則上升而走空竅濃濁之氣則下行諸經如上節所云者若諸陰臟皆受清氣所注而足太陰脾為胃行其津液故獨受水穀濃濁之氣所以脾主肌肉者肌肉由水穀濁氣所生也此皆言臟腑所受清濁而行氣於經者故下文有滑澀之分也清濁相干為病治法帝曰治之奈何岐伯曰清者其氣滑濁者其氣澀此氣之常也故刺陰者深而留之刺陽者淺而疾之清濁相干者以數調之也此言因清濁相干而致病之治法也陰所受清氣也其經深故當深刺以其氣滑而流走故必久留其針俟其氣定然後出針方能去病也陽所受濁氣也其經淺故當淺刺以其氣澀而鈍遲故針必速入速出以宣動其氣方能去病也此皆言其常氣之治法耳如清濁相干而為病者其滑澀亦不定在陰陽之分別當詳審其病隨宜設法言以數調之者蓋針之宜久留宜速疾必以病人之息數為準應補應瀉依病人之呼吸以出針入針而為補瀉一呼一吸名一息也義詳針灸篇另有專科此不録若藥治之法亦可照此類推矣太陰陽明論素問太陰陽明論帝曰太陰陽明為表裡脾胃脈也生病而異者何也岐伯曰陰陽異位更虛更實更逆更從或從內或從外所以不同故病異名也此篇專明脾胃為中土統一身之陰陽為後天之根本也夫陰陽之理微妙無窮變化無盡經文每舉天地之陰陽以明人舉人身之陰陽以證天此節正表天人合一之道以脾胃之轉輸一本於天地之氣化也如天為陽位乎上地為陰位乎下火為陰位乎南水為陰位乎北木為陽位乎東金為陰位乎西是皆陰陽異位也陽升則陰降陽降則陰升陽生陰陰生陽皆氣化自然之性能其陰從陽生而降者如天之雨降極則陽中之陰並於陰位則陰實而陽虛其陽從陰生而升者如地之云升極則陰中之陽並於陽位則陽實而陰虛是皆更虛更實也逆者倒也從者順也冬至後陽升陰降為從反此為逆夏至後陽降陰升為從反此為逆何為反耶夏至天上陽氣初降地下陰氣初升陽為陰氣所逆不得入地而反倒升故地上比夏至前更熱漸俟陰陽交通二氣調順則升者升降者降至秋而陰陽平分於天地之中故地上涼和其冬至後更冷至春分溫和亦同一律是為更逆更從也凡人身偏寒偏熱寒熱往來之病即陰陽不調而各異其位更虛更實更逆更從之故也是故天地氣化和順則養人反逆則傷人其傷人也亦必以類從陽邪從陽從外陰邪從陰從內如風為陽而傷衛衛為陽為外也寒為陰而傷營營為陰為內也營衛本於脾胃故脾內胃外亦然其邪之來或從內或從外所以不同故其為病各異而名各不同也陽者天氣也主外陰者地氣也主內故陽道實陰道虛此緊承上文內外之義舉天地所主以明人身之營衛理尤淵妙也上云陰陽更虛更實者指升降屈伸而言此雲陽道實陰道虛者專指天地之道也是以內外分陰陽者蓋天包地外地凝天中故天為陽主外地為陰主內是地賴天以包載者故天行健則地寧天氣弛地即陷古今嘗有之足可徵矣由是觀之天氣雖清虛而陽道誠為堅實也若不堅實何以載地之厚重而不陷哉陰陽二氣轉旋於地外升降於地中始能生化萬物是故地形雖厚重而陰道誠為虛通也若不虛通何以受二氣之升降變化以生萬物哉故此言陽道實陰道虛是指內外之陰陽與上文之以升降分陰陽者各有義理也即以證人身之營衛者衛主外同天陽之堅實也營主內同地陰之虛通也何也衛行脈外以固表者也若不堅實則腠理開而汗泄不止矣營行脈中以守內者也若不虛通則經脈閉而血氣瘀塞矣夫營衛之氣本於脾胃故經言營者水穀之精氣也衛者水穀之悍氣也故脾為營之源胃為衛之本也此節承上文論脾胃特舉天地內外之道以證明營衛氣化之所本也故犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣此即申上文或從內或從外所從不同而病異名也陽主外風為陽從外來故陽受之陰主內食飲屬陰傷內故陰受之陽受入於腑陰受入於臟各從其類也腑為陽主外故受邪則有身熱不時臥上為喘呼諸表證也臟為陰主內故受病則有䐜滿閉塞下為飧泄腸澼諸里證也天之清氣由鼻而入通於喉故喉主天氣也食飲産地由口而入下於咽故咽主地氣也風為陽濕為陰故陽受風氣陰受濕氣以上皆明陰陽各以類從猶火就燥水流濕本於自然之性也故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之此言陰陽上行下行者專指脾胃之氣升降不同十二經氣蓋經氣流行於經脈中而脾胃之氣行於肌肉者故脾胃之強弱外顯肌肉之肥瘦足可徵矣以脾胃主四肢故陰氣從足上行由頭而至臂指正如地氣上升為云而散於四表也陽氣從手上頭而下行至足正如天氣由四表升聚化雨而下降至海也故陽病則上行極而下陰病則下行極而上亦如雲升雨降變化流行也其與十二經流行不同者三陽經自手走頭自頭走足三陰經自足入腹至胸由胸走手連接陽經陽在表陰在裡不上頭唯足厥陰之支脈內循喉後上至頂心也此言陰氣是脾臟之氣也陽氣是胃腑之氣也故下節云土者生萬物而法天地故上下至頭足則其義理固已申明在後也所以雲陽明行氣於三陽太陰行氣於三陰則是脾胃統率一身之陰陽而臟腑經絡盡在其中矣身半以上天氣主之為陽故傷風則上部先受風者天氣也身半以下地氣主之為陰故傷濕則下部先受濕者地氣也此亦各以類從者也太陰陽明為後天之本帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉胃為水穀之海生化氣血滋養周身故四肢皆稟氣於胃也但胃之上口為賁門主納穀下口為幽門主出滓其形如橐故其氣下行不能四布至於各經必賴脾之鼓運以行其津液輸於周身所以脾病則胃中水穀精氣不能達於四肢經氣日衰因而脈道不利筋骨肌肉皆無穀氣以資生遂痿弱不能動用焉帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也四時之氣金木水火本相剋制肺肝心腎亦然全賴土氣居中通貫四氣而調和之故土旺四季而脾臟常以四時旺氣長養四臟故寄治於四季之末各十八曰而不專主一時其功正是統主四時也脾臟貼著於胃為戊己二土之精故能生萬物而法則天地所以脾胃之氣上至頭下至足如天地之云升雨降而生長萬物也此數句將上文天地陰陽生化義理皆申明包括可謂簡妙矣帝曰脾與胃以膜相連耳而能為之行其津液何也岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉此重申上文之義也以脾胃之功能言之則胃止能司出納必賴脾之鼓運以行其津液正以膜之相連故脾動則胃氣流行而水穀之精敷布以輸於各經故太陰即行氣遍於少陰厥陰而陽明即行氣遍於太陽少陽周一身而達四肢原其氣之生化出於胃而各臟腑各因其經以受胃氣之滋養故胃為水穀之海而為六腑之大源此篇特詳脾胃生化之功為後天根本而實出於天地陰陽升降流行之氣化是為天人合一之道也陰平陽祕精神乃治素問生氣通天論曰凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏因而和之是為聖度故陽強不能密陰氣乃絶陰平陽祕精神乃治陰陽離決精氣乃絶此統明陰陽生化之道以結上文之義也陰陽流行生化循環無端挈其綱要必使陽氣靜密乃能堅固擾動即浮越而陰陽不和若四時之無序百病叢生因而和之是為聖人之軌度良以陰陽互相為根是故陰氣和平陽氣固密自然生化不息而精神乃治若陰陽乖離決裂精氣乃絶以精氣由陰陽化生者也四時日夜陰陽之氣以應人身素問金匱真言論岐伯曰陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人之臟腑中陰陽則臟者為陰腑者為陽肝心脾肺腎五臟為陰膽胃大腸小腸膀胱三焦六腑為陽所以欲知陰中之陰陽中之陽者何也為冬病在陰夏病在陽春病在陰秋病在陽皆視其所在為施針石也故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也此明天地陰陽之氣流行於四時則有消長進退晝夜則有升降出入而人身之氣內外雌雄相輸皆與四時晝夜相應故其病也必隨時日之氣變化而其春病在陰者以陽氣初從地下而升其冬陰之氣當盛也秋病在陽者以陰氣初從地下而升其夏陽之氣尚盛也陰陽氣盛之時必應人身之營衛故其受病春則應在營陰秋則應在衛陽而冬陰夏陽之氣更盛則不言可知若其變化多端非可拘執假如風為陽邪而傷衛寒為陰邪而傷營則又不論四時必當審察脈證以辨之也辨明為施針石而藥治亦同一律矣五臟應天地四時生化萬物之氣帝曰五臟應四時各有收受乎岐伯曰有東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞其穀麥其應四時上為歲星是以春氣在頭也其音角其數八是以知病之在筋也其臭臊南方赤色入通於心開竅於耳藏精於心故病在五臟其味苦其類火其畜羊其谷黍其應四時上為熒惑星是以知病之在脈也其音徵其數七其臭焦中央黃色入通於脾開竅於口藏精於脾故病在舌本其味甘其類土其畜牛其谷稷其應四時上為鎮星是以知病之在肉也其音宮其數五其臭香西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其谷稻其應四時上為太白星是以知病之在皮毛也其音商其數九其臭腥北方黑色入通於腎開竅於二陰藏精於腎故病在溪其味鹹其類水其畜彘其谷豆其應四時上為辰星是以知病之在骨也其音羽其數六其臭腐故善為脈者謹察五臟六腑一逆一從陰陽表裡雌雄之紀藏之心意合心於精非其人勿教非其真勿授是為得道也此與前稟賦源流門陰陽應象大論所云東方生風風生木一章互明其理也彼言天地陰陽五行之氣以生五臟故列稟賦源流此言五臟應天地四時生化萬物之氣更為詳晰是故當察臟腑之逆從其合於陰陽五行生化之序者為從反之為逆如是義理通明而藏之心意則我之心合乎精妙之理方可任司命之職而稱善為脈者若非其人勿妄教之彼必不能明若非真道勿妄授之或非其人或非真道而濫充醫職者皆致遺害於世也如擇之善而授之真方為得道而有濟於世乃觀近世醫道之失傳如仲景所云各承家技終始順舊者可勝慨哉臟腑分十二官素問靈蘭祕典論岐伯曰心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官技巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安以此養生則壽歿世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之心藏神明主宰萬物故為君主肺治周身之氣而有權衡節度使之調達故為相傅之官肝為剛臟而出謀慮故號將軍之官理直則膽氣壯而公正則有決斷故名中正之官膻中心包絡所居心包代心用事為近使而君之喜樂由其出而傳宣故為臣使之官脾主鼓運胃司納穀故為倉稟之官五味所由消化而生氣血也大腸承小腸之糟粕變化清濁而下出於二便故為傳導之官小腸受盛胃中所下食物而消化歸於大腸故為受盛之官腎藏精與志而生智巧智強則技精故號作強之官而出技巧也三焦在臟腑外軀體內相火所遊行者腸胃食物賴以腐化故名為焦取火熟物之義凡清升濁降清者由脾胃上輸於肺肺即通調水道下輸膀胱水精四布五經並行濁滓歸於二腸者皆由三焦之氣宣化故水道出於三焦為決瀆之官又曰上焦如霧者陽氣氤氳以生津液也中焦如漚者脾胃鼓運蘊釀糟粕也下焦如瀆者清濁分行滓水下出也水由下焦滲入膀胱滿則泄出故膀胱如州都之聚會而藏津液名州都之官其能滲入泄出全賴下焦之氣化故云氣化則能出矣凡此十二臟腑如職官之各有所司不得相失者獨賴心神清靜則氣化調和蓋清靜則心明有主君主明則下安矣如或情欲妄動則氣血擾亂經絡閉塞不得流通而臟腑之氣皆壅遏則百病叢生形乃大傷故善養則壽惟在君明而已否則殃害即生其治天下者同一理也是故君子戒慎恐懼而操持不敢失也臟腑功用氣血光華素問六節臟象論岐伯曰心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣肺者氣之本魄之處也其華在毛其充在皮為陰中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼此為陽中之少陽通於春氣脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣凡十一臟腑取決於膽也一靈乘氣化以成形軀而心藏靈明故為生之本神明之變體也其光華則現於面其氣則充於血脈其位在南而象離火故為陽中之太陽夏令屬火故通於夏氣也肺治周身之氣故為氣之本而魄居於肺其華在毛充在皮以皮毛為肺之合也其位在西而象乾金為陰中之太陽秋令屬金故通於秋氣也腎主蟄藏凡一身之精由脾輸化攝聚歸藏於腎故為生氣之本蓋氣生於精即陽根於陰之理也其華在發充在骨其位在北而象坎水為陰中之少陰冬屬寒水司令故通於冬氣也肝為厥陰厥陰者兩陰交盡故為罷極之本罷極者陰極也陰極則陽生陽出於腎由肝膽而升也魂居於肝其華在爪充在筋以生血氣者陽始升發所謂少火生氣氣生血也其味酸其色蒼是其性也其位東而象震木故為陽中之少陽是其體則陰極而用則為少陽風木之氣春令所主故通於春氣也脾胃大小腸三焦膀胱者皆合同氣化而司納穀轉輸泌別清濁出陳入新故為倉廩之本而營血所由生故為營之居猶如器具之能蘊釀消化糟粕以轉變氣味而入出者也其華現於口唇之四圍白肉際以唇為肌肉之本而屬脾故其充在肌其味甘其色黃以其位中而象坤土與命蒂連貫而與至陰相類通於土氣是脾通腎中先天之陽也凡臟腑各有功能所司而皆取決於膽者正以膽為少陽始生之氣為一身之機括故如其氣或弱或郁或亢或陷則各臟腑氣化皆失其度而生病此微妙之至理不可不知也臟腑合同氣化靈樞本輸篇云肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩臟三焦者中瀆之府也水道出焉屬膀胱是孤之府也是六腑之所與合者此明臟腑相合而為表裡互相輸化之道也臟腑各有功能所主前篇靈蘭祕典六節藏象等論已詳明矣惟此言少陽屬腎者指生陽之氣根於腎也蓋腎為坎象三二陰藏一陽於中故陽氣根於腎出肝膽而行三焦故肝臟稱少陽膽與三焦經稱少陽以其從臟出經陽氣初生故名少也氣根於腎而腎脈上肺系舌本故云將兩臟謂少陽一氣將肺腎兩臟如將之領兵也三焦為決瀆之官而出水道水由膀胱而泄故云屬膀胱是三焦一腑止膀胱為其下屬而無臟相合故曰是孤之腑也以其包羅五臟五腑之外經脈不通於臟是故六腑之所與合者如此也舊注解少陽即是三焦者非也夫肝膽三焦皆稱少陽乃獨指三焦豈理也哉況三焦經脈稱少陽者與手厥陰為表裡無涉於腎其言屬腎又作何解其非更可見矣五臟虛實靈樞本神篇曰肝藏血血舍魂肝氣虛則恐實則怒脾藏營營舍意脾氣虛則四肢不用五臟不安實則腹脹涇溲不利心藏脈脈舍神心氣虛則悲實則笑不休肺藏氣氣舍魂肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志腎氣虛則厥實則脹五臟不安必審五臟之病形以知其氣之虛實謹而調之也此言五臟虛實之病形已注疾病門虛實病證篇奇恆之府素問五臟別論岐伯曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也魄門亦為五臟使水穀不得久藏腦髓以及胞之六者稟地氣所生皆深藏陰處而象地故津液血氣滲灌而藏積不從外瀉也奇者異也恆者常也名奇恆之府者以腸胃等腑皆出入有常此六者亦如臟之藏而不瀉又不可名臟故名異常之府也其腸胃等五腑稟天氣所生象天氣之轉旋故輸瀉而不藏積積則反病矣此其所受五臟之濁氣故為傳化之府不能久留而不輸瀉也魄門者肛門也以其出滓穢使水穀隨時消化不得久留則臟氣舒和無患故魄門亦為五臟使也蓋常人死後魂由頂出魄從肛出故稱魄門如學道者精神魂魄渾合則不如此五臟藏精六腑傳化所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也所以稱五臟者以其收藏精氣而不泄為生命之本故其精氣常滿不能以有形之物填實之精氣空乏則虛損矣實猶入也六腑者司出納傳化食物而不留藏故雖入而不能滿滿則壅塞為病矣所以然者上入則下出而胃實腸虛下出而食物下行則胃虛腸實故言腑則實而不滿滿則為病臟則滿而不實實則氣傷矣氣口為五臟主帝曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變現於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也此言氣口者兩手寸口脈是手太陰肺氣所行之經也肺為華蓋權衡周身之氣五臟之氣各由經脈而匯歸於肺由肺敷布周身故五臟安否皆現於肺經氣口之脈而為五臟之主也所以然者胃為水穀之海六腑之大源五味入口藏於胃其精微以養五臟之氣是以五臟六腑所受之氣味皆出於胃由脾歸肺而流於經故其變化之精微現於氣口之脈也若天地五行之氣則入於鼻藏於心肺以鼻為肺竅而心肺相連故心肺病則鼻氣為之不利而凡氣之歸肺者皆現於氣口之脈故氣口獨為五臟主而其虛實病證可驗也五臟各有合榮主素問五臟生成論曰心之合脈也其榮色也其主腎也肺之合皮也其榮毛也其主心也肝之合筋也其榮爪也其主肺也脾之合肉也其榮唇也其主肝也腎之合骨也其榮發也其主脾也五臟根本也身軀枝葉也根本有淺深則枝葉有表裡淺者合於表深者合於里故五臟各有皮脈筋肉骨五層之合而其榮色亦各隨其部而外顯也五臟具五行之性五行有生克故以剋制者為其主如水剋火者也故腎水為心火之主以及火剋金金剋木木剋土土剋水皆然也五味傷五臟是故多食鹹則脈凝泣而變色多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味之所傷也咸走腎助水剋火脈為心之合色為心之榮故多食鹹而傷心氣則脈凝澀而色變蓋凡色澤榮華由氣行血而發現氣傷則血澀不行而皆變也餘臟同然已詳注治法門矣五臟欲五味五臟氣色現生死故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之所合也五臟之氣也故色見青如草茲者死黃如枳實者死黑如炲者死赤如草力血者死白如枯骨者死此五色之現死也青如翠羽者生赤如雞冠者生黃如蟹背者生白如豕膏者生黑如烏羽者生此五色之現生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨此言臟性所欲之味則能相助與臟氣相合也若五臟所生五氣而現五色即五行之光華故必與臟象相符其如草茲枳實等者乾枯沉晦為死氣也如翠羽雞冠等者鮮明潤澤為生氣也皆如縞裹者內充勿露也露則病矣而色味亦各當其臟性而內外相應者已詳注四診門矣臟腑五氣病素問宣明五氣論曰五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒此言氣病而不涉於血也臟腑部位各有不同其生化氣血各有功能所主若氣或抑鬱亢陷不得調達則各臟腑現病皆不同其與血病又異諸義詳病證門五臟精氣相併五精所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是為五並虛而相併者氣一則動志志一則動氣此言由志一動氣而致氣一動志也並者即一之義謂精氣並注一處而不舒和也以志一動氣而氣虛則他處精氣歸併之則又一而動志乃現悲喜憂畏恐之情狀蓋情欲由心志所生而志氣本是一物而體用二也其虛而相併者亦如水向低流之理也五臟所惡五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡五臟具五行之性而各有所欲所惡之氣味不同凡用藥當投其所欲而避其所惡若用相制之法則當反之如非製法而犯其所惡則傷故如熱邪傷心寒邪傷肺風邪傷肝濕邪傷脾燥邪傷腎也五臟所藏所主五臟所藏心藏神肺藏魄肝藏魂脾藏意腎藏志五臟所主心主脈肺主皮肝主筋脾主肉腎主骨太極動靜而生陰陽陰陽變化而成五行必有神明主宰乎中而人賦形具體而主於心者曰神曰魄曰魂曰意曰志由一心所化而為五行之神藏於五臟者也五臟為根本軀體為枝葉而脈皮筋肉骨由臟氣所生故各歸根本所主也五臟化液脈象五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是謂五液五脈應象肝脈弦心脈鉤脾脈代肺脈毛腎脈石是為五臟之脈津液由脾胃化穀氣而生充養周身津為陽液為陰及其動而出也則由各髒髮泄而五臟亦有陰陽如心臟為陽其汗為津故曰津脫者腠理開汗大泄液脫者骨屬屈伸不利是心為陽而主表腎為陰而主裡則津液陰陽之分余皆可知矣若脈象義理詳四診門五臟受邪傳變素問玉機真臟論曰五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此言氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死生之早暮也此言五臟受邪逆傳克賊故至於死也受氣謂受邪氣於其所生者子能令母實也氣舍謂生氣舍於母舍者藏而不出謂母無生我之氣而我反受子之邪氣既受則傳之我所勝者如肝傳脾之類如是逆傳至勝我之臟如肺勝肝之類則邪仍必歸我而本臟氣絶則死故曰此氣之逆行也蓋母本先虛無氣生我而我失養故子反以邪氣歸我乃傳之所勝如是逆傳至勝我之臟則邪仍歸我氣絶而死此乃臟氣久虛之人故一受邪氣即逆行互克以至於死如斯者察其邪至何臟以十二時分作五分計其邪傳至我不勝之臟時分則死此可占其死之早暮也帝曰五臟相通移皆有次五臟有病則各傳其所勝不治法三月若六月若三日若六日傳五臟而當死是順傳所勝之次故曰別於陽者知病從來別於陰者知死生之期言知至其所困而死此言五臟病邪傳其所勝即如肝傳脾之類傳遍五臟則氣絶而死其死或三月六月三日六日者以其正有強弱邪有重輕故其死有遲早也別於陽者陽經至腑也別於陰者陰經至臟也外邪飲食之病由陽而入故別其陽知病或從外邪或從飲食而來也如其邪由陰經至臟或由陽傳陰或內傷五臟其病則重而關生死若五臟之氣相生相助可生若相乘相剋即死其死生之遲速即可察此以期之故此言知至其所困篤而死也五臟氣通上竅陰陽不營成關格靈樞脈度篇曰五臟常內閲於上七竅也故肺氣通於鼻肺和則鼻能知香臭矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五穀矣腎氣通於耳腎和則耳能聞五音矣五臟不和則上竅不通六腑不和則留為癰故邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能營也故曰關陽氣太盛則陰氣弗能營也故曰格陰陽俱盛不得相營故曰關格關格者不得盡期而死也五臟之氣上通七竅而知其和否在心也腑陽臟陰之氣周流外貫十二經絡外邪由經絡而入腑臟內傷自臟腑以及經絡外邪為實內傷為虛虛中之實食積傷也實中之虛邪強正弱也虛中之虛情欲傷也實中之實邪正俱盛也是故臟腑受病則陰陽氣血不和諸竅窒塞經脈稽留陽脈不和則氣結成癰陰脈不和則血留而瘀甚則陰陽各不相營即成孤陽獨陰陽不營於陰名曰關陰不營於陽名曰格關則不得小便格則吐逆食不能下夫人迎之脈主六腑之陽寸口之脈主五臟之陰故脈論言人迎脈至四盛以上為格寸口脈至四盛以上為關此以陰陽各不相營而成關格而曰陽太盛陰太盛則其人迎寸口之脈亦必倍盛而成孤陽獨陰故不得盡天年之期而死也難經單以寸口之脈覆溢為關格名真臟脈其人不病而死是陽偏亢脈上溢也陰偏亢脈下覆也偏亢則偏絶是分關與格為兩證與內經以陰陽俱盛各不相營為關格一證者義有不同而實發內經未發之理也由是可知一病而有三證之異也臟腑有小大強弱偏正不同靈樞本臟篇帝曰五臟者所以藏精神血氣魂魄者也六腑者所以化水穀而行津液者也此人之具受於天也無愚智賢不肖無以相倚也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒寒大暑勿能害也有其不離屏蔽室內無怵惕之恐然有不免於病何也岐伯曰五臟者所以參天地副陰陽而連四時化五節者也五臟固有小大高下堅脆端正偏傾者六腑亦有小大長短厚薄結直緩急者凡此二十五形各有不同或善或惡或吉或凶請言其方此言人稟天地氣化而具體無論智愚賢不肖皆同而無偏倚者然其有百年不衰外邪不能害者又有不離屏蔽無情志之傷而不免於病者何也岐伯言臟腑有小大等種種不同故有善惡吉凶之異而分別一如下文心小則安邪勿能傷易傷以憂心大則憂不能傷易傷於邪心高則滿於肺中悗而善忘難開以言心下則臟外易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也心臟居肺中形小則深藏故外邪勿能傷然因小而氣不寬舒故凡憂慮則氣逼促而傷之也大者反是若心高為肺罩裹氣不能揚故常悗而善忘悗即悶也難開導以言者憒憒不明故善忘也心下則露故易傷寒邪露則氣浮而少主宰故易恐以言心堅則神氣收斂故五臟皆安而守固也心脆則心火浮動故善病消疸熱中心端正則氣和利心偏傾則邪妄無操守矣肺小則少飲不病喘喝肺大則多飲善病胸痹喉痹逆氣肺高則上氣喘息咳肺下則居賁迫肝善脅下痛肺堅則不病咳上氣肺脆則苦病消疸易傷肺端正則和利難傷肺偏傾則胸偏痛也臟腑之氣皆上歸於肺權衡敷布肺小則氣舒津布故少飲而無喘喝之病肺大則氣滿於胸津液難以上輸故多飲而善病胸痹喉痹逆氣也肺高則氣難降故上逆喘息而多咳也肺下則居賁門賁門胃之上口而迫於肝使肝氣不舒故脅下善痛也肺堅則氣自固而調順故不病咳而上氣也肺脆則心火乘之故苦病消疸而易傷也肺端正則氣和利難傷自無諸病肺偏傾則胸氣偏窒而痛也肝小則臟安無脅下之病肝大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也肝為陽臟其氣升動故肝小則氣舒五臟皆安而無脅下之病以肝脈行於脅也肝大則氣逼胃迫咽因其經脈由胃上行咽為胃管故兼膈中且脅下痛膈中即格逆也肝高則上支賁門而切痛賁門胃之上口也脅中滿悶為息賁賁同奔呼吸急促也肝下則逼胃腑其本位脅下反空則易受邪傷也肝堅其氣靜則五臟皆安而難傷肝脆則多虛熱善病消疸以相火由肝膽而出也肝端正則氣和利難傷肝偏傾則氣滯脅下痛也脾小則臟安難傷於邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脅而痛脾下則下加於大腸下加於大腸則臟苦受邪脾堅則臟安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則善滿善脹也脾主鼓運脾小則氣轉運而和故邪難傷之脾大則鼓運不便而氣結滯故湊䏚而痛䏚者脅下軟腹以脾位腹右也脾胃主四肢氣滯不得暢達於肢故不能疾行也脾高則氣偏輸於上而下不和故䏚引季脅而痛也脾下則下壓大腸而臟氣不勻時苦受邪其堅脆端正義與上同脾偏傾則氣不轉旋而善脹滿也腎小則臟安難傷腎大則善病腰痛不可以俯仰易傷以邪腎高則苦背膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅則不病腰背痛腎脆則苦病消疸易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此二十五變者人之所苦常病也腎小其義同上腰者腎之府腎大則腰氣塞滯故痛不可俯仰高則氣上壅故背膂痛下則氣下垂故腰尻痛尻者尾脊骨也氣下而前陰腎子亦下墜有時則收為狐疝其大其高其下皆使腰氣不舒故皆不可俯仰者或強或痛而不便也以上五臟凡言小者堅者端正者皆無病大抵小者質自堅實邪不能傷端正其氣調順和利也凡言脆者俱病消疸是由液少內燥而生虛熱凡物熱燥必脆寒潤則堅故五臟皆同也帝曰何以知其然也岐伯曰赤色小理者心小粗理者心大無𩩲骬者心高𩩲骬小短舉者心下𩩲骬長者心下堅𩩲骬弱小以薄者心脆𩩲骬直下不舉者心端正𩩲骬倚一方者心偏傾也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也凡此諸變者持則安減則病也持謂本臟之氣可以持守減謂精氣減乏也帝曰願聞人之有不可病者至盡天壽雖有深憂大恐怵惕之志猶不能減也甚寒大熱不能傷也其有不離屏蔽室內又無怵惕之恐然不免於病何也岐伯曰五臟六腑邪之舍也五臟皆小者少病苦焦心大憂愁五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心而善盜不可以為人平反復言語也先哲言有天賦之性而無不善氣質之性則有偏惡夫性一而已豈有二哉所謂氣質之性者初由性動化識識即氣中之神也孟子謂之志故志一則動氣氣一則動志也形質由氣而成本於志之夙習而有偏正高下等種種之異故即其形質可知其神志行為者是所謂氣質之性也內經雖止論疾病而實為一篇好相法也臟腑合同氣化應外部帝曰願聞六腑之應岐伯曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應也此言腑本臟氣而生故合臟氣生化以應外部皮脈筋肉惟獨三焦膀胱不同腎臟應骨而應腠理毫毛何也蓋上明腑生於臟故同臟氣之應而腎之腑本是膀胱乃又合三焦者以明一臟兩腑相合而生化氣血出陳入新也良以一身氣血由胃中水穀生化而腎為胃關關不利則大便不調矣三焦出水道水道不利則膀胱氣癃而小便不通二便不通則胃中壅阻不能出陳入新何以生化氣血乎而三焦膀胱之宣化實本腎臟陰陽之氣腎氣不和則三焦膀胱皆不宣化而胃關不利矣是故腎合三焦膀胱專明生化氣血而三焦膀胱之經脈則外應腠理毫毛以其義重在此故不同彼四臟氣化之應也嗚呼其旨深矣帝曰應之奈何岐伯曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裡大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆曲者小腸結脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下脘約不利肉䐃不堅者胃緩肉䐃無小裹纍者胃急肉䐃多少裹纍者胃結胃結者上脘約不利也肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結也腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結帝曰厚薄美惡皆有形願聞其所病岐伯曰視其外應以知其內臟則知所病矣臟腑經脈相通氣化相合而皮脈肉筋骨由臟腑之氣血所生者故其厚薄美惡必內外相應觀外而知內視其形色即知其病之所生所在也按本輸篇言肺合大腸大腸者傳道之腑等語是明臟腑之功能運用也此篇亦言肺合大腸等者是明臟腑合同氣化以應外部也故義理迥別注家因見此篇言腎合三焦膀胱遂將本輸篇少陽屬腎一句解作三焦屬腎不察上下文義而兩處經理俱失相沿久矣故余詳辨明晰入於後集也觀頭面身形候臟腑善惡靈樞師傳篇岐伯曰身形支節者臟腑之蓋也非面部之閲也帝曰五臟之氣閲於面者余已知之以支節知而閲之奈何岐伯曰五臟六腑肺為之蓋巨肩陷咽候現其外五臟六腑心為之主缺盆為之道䯏骨有餘以候𩩲骬肝者主為將使之候外欲知堅固視目小大脾者主為衛使之迎糧視唇舌好惡以知吉凶腎者主為外使之遠聽視耳好惡以知其性帝曰善願聞六腑之候岐伯曰六腑者胃為之海廣骸大頸張胸五穀乃容鼻隧以長以候大腸唇厚人中長以候小腸目下果大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六腑者也上下三等臟安且良矣腸胃尺度水穀多少靈樞平人絶谷篇帝曰人之不食七日而死何也伯高曰胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下溉諸腸小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一腸胃之長凡五丈八尺四寸受水穀九斗二升一合合之大半此腸胃所受水穀之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五臟安定血脈和則精神乃居故神者水穀之精氣也故腸胃之中常留谷二斗水一斗五升故平人日再後後二升半一日五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也平人者無病之人也尺寸是同身尺非世所用之尺其長短隨各人身量者升斗亦隨尺寸之度而計也腸胃容受九斗余升之數必以出陳入新轉輸傳化其氣上下流通則五臟安而血脈和精神乃居故神者賴水穀精氣以養之也若七日不食則水穀精氣津液皆盡故死此言無病而貧無食者也五臟之腧在背靈樞背腧篇帝日願聞五臟之腧出於背者岐伯曰背中大腧在杼骨之端肺腧在三焦之間心腧在五焦之間膈腧在七焦之間肝腧在九焦之間脾腧在十一焦之間腎腧在十四焦之間皆挾脊相去三寸所欲得而驗之按其處應在中而痛解乃其腧也灸之則可刺之則不可氣盛則瀉之虛則補之以火補者須自滅也以火瀉者疾吹其火傳其艾須其火滅也馬注五臟之腧皆在背大腧在杼骨端大腧者大杼穴也去中行督脈經大椎穴左右各開一寸半其肺腧以中行三椎為主心腧以五椎為主膈腧以七椎為主肝腧以九椎為主脾腧以十一椎為主腎腧以十四椎為主左右各開中行一寸半挾中行脊骨而計之則相去三寸所故欲驗諸穴者乃按其處其中必應之而內痛乃解是五臟之各腧穴也楠按火即天地之陽氣待其自滅則氣入內為補速吹之則火引內氣外泄故為瀉也
