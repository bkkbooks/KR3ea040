body:
  text: 卷三營衛經絡總論營衛經絡者合言之即皮肉筋骨淺深之部位也分言之衛為陽淺在表營為陰深在裡直者為經如川橫者為絡如渠經深在營分絡淺在衛分衛主氣衛護於表營主血營運於裡氣主煦之血主濡之然氣血由陰陽生化陰陽互根於太極故氣血必交互運行不能分析血中無氣則瘀結不行氣中無血則散漫不聚血中之氣經氣也氣中之血絡血也故氣血運行而經絡通貫則營衛因之調和而呈露氣血之形象可見者則名脈因其淺深而分營衛經絡故名經脈絡脈然衛行經脈之外故主氣營行經脈之中故主血絡脈在衛分故絡血為氣中之血也經脈在營分故經氣為血中之氣也所以必分營衛經絡而各有所主者要清其氣血流行次序以察受病淺深部位也若其陰陽各經交接之處皆由絡脈貫通而氣血始得周流一身所以分手足三陰三陽十二經者營血由經流行無分晝夜循環於一身表裡故為營行脈中也衛氣漫溢於絡脈肌腠間者故為衛行脈外也然其晝行於陽分二十五度周於身夜行於陰分二十五度周於身平旦從陰出陽隨日而升黃昏從陽入陰隨日而沒至夜半亥子之交營衛之氣血會合如日月合璧是故衛同日為陽而主氣營同月為陰而主血以各有所主而流行不同故分營衛以脈路之橫直淺深不同故分經絡如是周行一身表裡合而不可混分而不可離然後方可審知其病之所在而治之也夫氣血由陰陽化生陰陽互根於太極為人身之命蒂而通天地之氣故其升降流行必應天地氣候絲毫不爽者也嗚呼非聖人垂慈指示詳悉後世孰能明之以救病苦哉蓋六氣之邪傷人各由門徑而入風寒濕三氣由皮腠侵絡由絡流經由經入腑臟也暑火燥三氣由口鼻吸入軀內膜外隨氣血外走營衛內侵腑臟是先從中道分傳表裡故諸病現證各有不同也又有內邪六氣之病是本臟自傷非由外感者如肝傷則風邪內生而眩暈驚厥等病現矣心勞則火邪內生而煩惱消渴等病現矣脾傷則濕邪內生而腫脹疲弱等病現矣腎傷則寒邪內生而陽痿四逆等病現矣肺傷則燥邪內生而失音乾咳等病現矣火濕相合即同暑邪暑由火濕二氣合化故也為因人生天地之中稟天地之全氣故外邪內邪病狀相同而內邪先傷本元為虛外邪由淺入深為實故經曰精氣奪為虛邪氣盛為實所以治法則迥異此乃醫經之要旨必先熟究洞明於心庶免誤治之失也經解營衛生會靈樞營衛生會篇帝曰人焉受氣陰陽焉會何氣為營何氣為衛營安從生衛於焉會岐伯曰人受氣於谷谷入於胃以傳與肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止故曰日中而陽隴為重陽夜半而陰隴為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隴夜半後陰衰平旦陰盡而陽受氣矣日中為陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀此言營衛之氣流行生會與天地之氣同其軌度也人受氣於谷者谷入於胃所化精微之氣上輸於肺肺氣敷布則五臟六腑皆受穀氣之充養也痹論曰營者水穀之精氣也衛者水穀之悍氣也精者清悍者濁故清者為營濁者為衛也夫營行脈中衛行脈外營出中焦衛出下焦穀氣分布則清升濁降自然之性也故濁者降至下焦隨衛氣流行脈外清者由中焦變化隨營氣而行脈中其營氣之周行也始於手太陰經終於足厥陰經循環無間以手太陰經脈起於中焦者也其周行各經次序詳後營氣篇中晝夜十二時流行於身五十周乃與衛氣大會陰陽十二經互相貫注必待五十周與衛氣大會者蓋衛氣晝行於陽二十五周夜行於陰二十五周故云衛氣至陽而起者自陰而出陽子正時也至陰而止者從陽而入陰亥正時也當亥末子初之際乃營衛之氣會合而返渾沌以歸於太極故曰萬民皆臥命曰合陰合陰者陰與陽合而為一也故當日中則陽氣隆盛為重陽夜半則陰氣隆盛為重陰重陰者太陰也故主內此時衛氣入於內也重陽者太陽也故主外此時衛氣盛於外也斯言一身之內外是合天地三才之道也帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然岐伯曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其營氣衰少而衛氣內伐故晝不精夜不瞑上文明衛氣流行平旦出於陽則目開而寤日入入於陰則目瞑而寐合乎天地陰陽升降之氣也然壯者氣血盛肌肉滑氣道通能合天地氣化而不失其常故晝精明而夜安寐老者氣血衰五臟之氣搏結而不舒和肉枯脈澀營衛流行失常故晝不精明而夜多不寐與天地氣化相乖其患病之人可類推矣上焦帝曰願聞營衛之所行皆何道從來岐伯曰營出於中焦衛出於下焦帝曰願聞三焦之所出岐伯曰上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明常與營衛俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰矣人身表裡臟腑營衛經絡無非由一氣轉旋而聖人所以詳細分別者要明其生化之源流也上文論營衛由後天穀氣之精微所化此論三焦本元之氣從先天命蒂所發者也後天之穀食賴先天元陽以消化先天之元陽賴後天穀氣以滋培當其氣之流行也則先天后天合而為一矣既而合一則氣之清升濁降自然之性也其上焦之清氣積於胸中者名曰宗氣其氣氤氳敷布故曰上焦如霧也蓋以命蒂先天之氣為祖胸中後天之氣為宗故其流行與穀食所化營衛之氣相同至五十度為一周而復大會於手太陰經也其循行各經次序詳後營氣篇矣此先明上焦之氣也若其所從來則營氣出於中焦衛氣出於下焦而先天元陽之氣發於命蒂即腎臟坎象中之一陽此先天後天以生以化之源流也又按常與營俱行營字下難經有一衛字為是此處必因脫落也蓋言行於陽二十五度行於陰二十五度原兼衛氣而言若單指營氣則始自手太陰終於足厥陰終而復始晝夜無間焉有行陽二十五度行陰二十五度之理顯然可見舊注反謂難經誤多一衛字乃未究其至理忽略甚矣帝曰人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循衛氣之道而出何也岐伯曰此外傷於風內開腠理毛蒸理泄衛氣走之固不得循其道穀氣慓悍滑疾見開而出故不得從其道故命曰漏泄此承上文言上焦之氣出於胃上口故以飲食入胃未及行消而即出汗者明其理也蓋穀氣入胃其清者為營濁者為衛宜乎助胃而固氣今反開泄而汗出者良因外傷於風風性疏泄內開其腠理毛竅被氣熏蒸而腠理開則衛氣本來行走為固者不得循其常道而熱飲食之氣滑利疾速見腠開而即出為汗故不得蘊釀化精微從脈道而入營衛故命曰漏泄中焦帝曰願聞中焦之所出岐伯曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣肺手太陰之脈起於中焦中焦與胃相併而其氣出於上焦之後者以上焦宗氣聚於胸中而中焦之氣輸於肺而近背故出上焦之後矣以其並胃中故所受者胃之穀氣其功能則泌糟粕蒸津液化穀氣之精微上注於肺脈乃化而為血即所謂中焦受氣取汁變化而赤是為血也釀水穀而成血氣故曰中焦如漚也滋養生身者莫貴乎此以其穀氣之清者所化故獨得行於經隧之中命曰營氣也此與上焦之宗氣由先後天相合者各有源流也蓋相火遊行於三焦胃貯穀食如鼎而下焦元陽如爐中焦之脾如扇故脾健陽旺則水穀易化氣血壯盛也帝曰夫血之與氣異名同類何謂也岐伯曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生此承上文以明中焦生化之道也精血氣者皆由陰陽五行化生故異名而同類營衛者肌膚經絡也由精氣所成而陰陽五行之能生化精血氣者因有心神運動其中故心藏神明而主血脈血者神氣所化故謂異名而同類也蓋陰陽生化之妙隨地而變水穀之精微從陰而化為血從陽而化為津津從皮毛外泄而為汗故血之與汗出於一本皆由穀氣所化而奪其血則無汗奪其汗則無血無血則死無汗則死故有兩死也或有血而無汗者陰不從陽化而無津也則不能生或有汗而無血者陽不從陰化而無血也則不能生故無兩生也必也汗血無虧則生機方保所以言陰無陽不生陽無陰不化此生化之至理也下焦帝曰願聞下焦之所出岐伯曰下焦者別回腸注於膀胱而滲入也故水穀者常並居胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉此明下焦之功用所謂如瀆者以其濟泌別汁由中焦所化之糟粕分其清濁而道之下出於二便也膀胱有下口而無上口由下焦相火蒸化其水而滲入膀胱滿則變溺從下口而出故言循下焦而滲入膀胱焉下焦氣化不宣則二便失調矣蓋腎居下焦而先天元陽之氣根於中出行於三焦乃名相火能熟腐水穀故名焦其上升而行於表者為衛氣行於內而至胸者名宗氣元陽之氣本無清濁以穀氣之濁者隨衛氣而行凝而為脂以成肌肉故言濁者為衛清者為營專指後天穀氣之生化敷布也如此則涇渭異同瞭然矣帝曰人飲酒酒亦入胃谷未熟而小便獨先下何也岐伯曰酒者熟谷之液也其氣悍以清故後谷而入先谷而液出焉帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也酒由水穀釀造以其氣清而悍故行於三焦迅利其水即滲入膀胱而出也清氣氤氳涵蓄於上焦故如霧水穀蘊釀糟粕於中焦故如漚水液滓濁皆出於下焦故如瀆此總結三焦之功用也營衛行度靈樞五味篇帝曰營衛之行奈何伯高曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循咽喉故呼則出吸則入天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣此專明胃中水穀精微出於中上兩焦滋溉五臟而分別營衛二氣乃與岐伯所言營出中焦衛出下焦互明其理也素問太陰陽明論曰脾常著胃土之精也生萬物而法天地故上下至頭足是言脾胃之氣行於一身上下內外如天地之氣無處不周故能生化萬物也夫清者為營濁者為衛始由中焦而分其清者至上焦積於胸而為氣海名宗氣也其清中之悍者循咽喉直上沖頭入腦出額下面合陽明經入於頸旁人迎之脈而下行義詳四診門靈樞動輸篇其循咽喉之氣則隨呼而出隨吸而入與天地精氣和會而出入其出也常三入也止一故半日無谷入則氣衰一日無谷入則氣少矣營氣流行靈樞營氣篇帝曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從手太陰出注手陽明上行注足陽明下行至跗上注大趾間與太陰合上行抵髀從脾注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小趾之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大趾間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之所行逆順之常也此言納穀為寶者明營氣由穀氣而生流行於上下表里者也營氣出中焦手太陰肺脈亦起於中焦故營氣流行始於手太陰終於足厥陰從肝復歸於肺常營無已終而復始晝夜五十周行於身而無陰陽之分其與衛氣之行於脈外晝行於陽夜行於陰者不同更可見前篇之論上焦宗氣云行陽二十五度行陰二十五度者是言宗氣合營衛之氣而行也蓋穀氣之清濁由中焦而分以行於營衛宗氣者先天元陽之氣與穀氣相合也穀氣出於胃元陽之氣出命蒂其發源不同而流行合一此經之所以詳細辨別也營行脈中故營氣流行與十二經脈相同但十二經惟論經絡貫注其營衛之氣血流行則外而經絡內而臟腑無不周遍故此營氣與十二經脈各分篇而論乃聖人精微之旨也百刻五十營靈樞五十營篇岐伯曰天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脈上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十五分五百四十息氣行再周於身下水四刻日行四十分二千七百息氣行十周於身下水二十刻日行五宿二十分一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脈終矣所謂交通者並行一數也故五十營備得盡天地之壽矣凡行八百一十丈也此明營氣流行於經脈者合天象列宿之度凡一晝夜天宿行一周而人之營氣行於身者恰五十周所謂交通者經脈連接陰陽相貫循環無已也並行一數者並陰陽經絡臟腑周遍一回也如是十二時共計五十營周於身備得盡天地之壽者以不失其度合乎天地之紀故可盡其天壽而無病夭之虞也周身經脈共十六丈二尺其氣行五十周共計八百一十丈是為天人合一之道也但本文所云日行漏下分刻錯誤不準馬元臺原注校核詳明更宜參考營衛逆從素問痹論帝曰營衛之氣亦令人痹乎岐伯曰營者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於盲膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹此言穀氣之所以分營衛者以其清氣和柔如湛水優遊遍周溝壑故能入於脈也其濁氣慓悍如狂瀾奔湧四散漫溢故止行於皮膚分肉間也雖營衛分途而流行自有軌度故逆之則病順之則安凡風寒濕三氣雜至逆其營衛之氣則病痹矣衛氣行度靈樞衛氣行篇伯高曰歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至心為陰陽主晝陰主夜故衛氣之行一日一夜五十周於身晝行於陽二十五周夜行於陰二十五周周於五臟是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者別於目鋭眥下手太陽下至手小指之間外側其散者別於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間別者以上至耳前合於頷脈注足陽明以下行至跗上入五趾之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周此明衛氣之行於脈外者合天象列宿之行度也其氣雖行脈外而亦如經脈流行之序故如上節痹論所云逆之則病順之則安蓋營衛之氣本出一源故流行自同軌度其異於營氣者晝行於皮肉之陽分夜行於五臟之陰分故自平旦從陰出於目內眥太陽經之睛明穴則目開而寤乃循三陽經之部而行於身者二十五周至日沒從陽入於足心少陰經之湧泉穴則目瞑而寐乃循三陰經行周於五臟至夜半與營氣會合其行於陰者亦二十五周於身至平旦又出於陽如是周流不已矣食氣行度素問經脈別論岐伯曰食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府府精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也此言穀食所化之氣先由肝心而浸淫筋脈脈氣流經由經歸肺蓋穀食入胃必賴元陽之氣消化陽氣出於腎由肝而之心故食氣先隨肝心而滋筋脈以肝主筋心主脈也然後由脈流經而肺朝百脈故歸於肺乃隨肺氣輸精於皮毛則毛脈之精氣相合而內行於府是先上行走表而後下行入府府者如雲背為胸之府腰為腎之府之類不獨指六腑而言也府中精氣隨神明而留於心肝脾腎四臟故言臟者藏精氣而不瀉也心藏神肝藏魂脾藏意腎藏志魂意志者皆出神明之運動也故必由神明以攝精氣留藏於臟其流行之氣先歸肺臟權衡平準敷布內外以入兩手氣口之脈而成尺寸部位以決驗生死吉凶也其水飲入胃比食氣清淡故不入於經脈由脾氣鼓運上歸於肺走三焦水道下輸膀胱而泄也原其始由胃而分水穀精氣布於四旁行於五經而皆合乎四時氣化及五臟陰陽升降流行揆度以為常也五經者五臟之經也六經氣血衰旺各異素問至真要大論帝曰陰陽之三也何謂岐伯曰氣有多少異用也帝曰陽明何謂也岐伯曰兩陽合明也帝曰厥陰何謂也岐伯曰兩陰交盡也帝曰幽明何如岐伯曰兩陰交盡故曰幽兩陽合明故曰明幽明之紀寒暑之異也此明陰陽六經所以分太少者二氣相生之理也陽生陰陰生陽故二氣流行生化循環不息其氣之初生名少既旺名太太少兩陽合明為陽明太少兩陰交盡為厥陰盡者極之謂也故有三陰三陽之分布以成一歲之功而人身經氣衰旺相同故陰極則陽生正是冬至之時陽明者陽極也陽極則陰生正是夏至之時陰極故幽而不彰陽極故明而不晦幽明之紀即冬寒夏暑之氣象也人身之氣隨天地之氣而浮沉升降故經脈因之以分三陰三陽以候氣之得失消長也素問血氣形志篇曰夫人之常數太陽常多血少氣少陽常少血多氣陽明常多血多氣少陰常少氣少血厥陰常多血少氣太陰常多氣少血此天之常數此即如上節所云氣有多少異用者也蓋氣血由陰陽所化少陽陽氣始生故氣多於血太陽陽氣漸旺陽旺則血生化多故血多於氣陽明者陽極也故氣血皆多矣少陰陰氣始生故氣血皆少太陰陰氣已旺陰旺則生陽故氣多於血厥陰者陰極也故血多於氣此為天生之常數也然此言經中之氣血非臟腑之氣血也靈樞九針篇言少陰多氣少血太陰多血少氣與此處不同或者手經足經之分耳即如手太陰肺主氣自然多氣足太陰脾統血自然多血則少陰亦可類推矣原夫衛氣起於下焦營血生於中焦皆由脾轉輸至肺敷布周身而血和氣行以至各經乃為末流勢必參差不齊故有多少之異觀下節經脈流行有開闔樞之不同則氣血之參差蓋有必然者也三陽經開闔樞素問陰陽離合論帝曰願聞三陰三陽之離合也岐伯曰聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽太陽根起於至陰結於命門名曰陰中之陽中身而上名曰廣明廣明之下名曰太陰太陰之前名曰陽明陽明根起於厲兌名曰陰中之陽厥陰之表名曰少陽少陽根起於竅陰名曰陰中之少陽是故三陽之離合也太陽為開陽明為闔少陽為樞三經者不得相失也搏而勿浮名曰一陽此明陰陽闔闢之道也陰陽互根於太極太極即為機樞動而生陽動極則靜靜而生陰靜極復動而闔闢之道存乎中焉今以三陰三陽之氣原出於太極故其流行升降則有機樞闔闢而人為一小天地故南面而立則身中氣化合乎天地之道也前曰廣明者心之部位神明廣大也後曰太衝者衝脈部位與腎連屬腎名少陰也少陰之上名曰太陽者膀胱也其經脈之根起於足小趾之至陰穴其終結於目內眥之睛明穴稱命門也太陽居少陰之表故名陰中之陽也中身而上為廣明所屬之部廣明之下即中身以下也名曰太陰者脾也故其前為陽明陽明者胃也其經脈之根起於足次趾端厲兌穴以其居太陰之表故亦名陰中之陽也厥陰之表名曰少陽者厥陰肝也少陽膽也其經脈之根起於足四趾端竅陰穴名陰中之少陽者以厥陰陰極生陽陽始生故名少也是故陽升陰降陽降陰升周流往復循環不休其氣始生而動則為機樞故少陽為樞也其氣既旺則為闢故太陽為開開即闢也旺極而止則為闔故陽明為闔也此三陽經氣行於表而通腑者也其氣流行不失升降闔闢之序則脈必搏而勿浮無太過不及故命曰一陽謂陰陽和平也三陰經開闔樞帝曰願聞三陰岐伯曰外者為陽內者為陰然則中為陰其沖其下名曰太陰太陰根起於隱白名曰陰中之陰太陰之後名曰少陰少陰根起於湧泉名曰陰中之少陰少陰之前名曰厥陰厥陰根起於大敦陰之絶陽名曰陰之絶陰是故三陰之離合也太陽為開厥陰為闔少陰為樞三經者不得相失也搏而勿沉命曰一陰陰陽沖沖積傳為一周氣里形表而為相成也陽經行表陰經行里以外為陽內為陰也而中身以下為陰太衝所屬之部其沖以下名太陰者言沖與太陰俱屬身半以下也太陰脾也其經脈之根起於足大趾端隱白穴以陰臟而居陰部故名陰中之陰也太陰之後少陰腎也其經脈之根起於足心之湧泉穴以陰部之陰氣始生故名陰中之少陰也少陰居太陰之後今言少陰之前名厥陰者以三臟部位如念伊字互為前後也厥陰肝也其經脈之根起於足大趾之大敦穴言陰之絶陽者謂厥陰陰極幾乎與陽隔絶不相交通又名陰之絶陰者即陰極之謂也此乃造化機樞陰極則陽生而厥陰與少陽為陰陽經脈流行之終始故厥陰為闔也若其陽旺則陰生故少陰為樞陰旺則闢故太陰為開與三陽經之升降流行同一律也若此不失其序而脈必搏而勿沉命曰一陰所謂一陰一陽之謂道也故曰陰陽沖沖者沖和流利而無偏勝也如是積纍傳化周於一身則氣充於裡形顯於表可知其陰陽相生相成而無病矣下節靈樞即言經脈流行失度之病也三陽經開闔樞折靈樞根結篇曰太陽為開陽明為闔少陽為樞故開折則肉節瀆而暴病起矣故暴病者取之太陽視有餘不足瀆者皮肉宛膲而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不收也所謂骨繇者搖故也此言三陽經開闔樞折者如門戶之不開閉也本經言三焦膀胱者腠理毫毛其應膀胱為太陽之腑故太陽開折其皮肉三焦皆弱也折者陽氣不得衛外而腠理不固外邪乘虛襲之則暴病起當審其邪正之有餘不足而治之也陽明闔折而氣無所止息者蓋氣之升降由內外轉旋自內而升出於表則為開自表而降入於內則為闔闔折則氣降無所止息而散漫不收真元之氣稽留不得行於經隧邪氣因而居之則經脈弛縱故痿疾起亦當視其虛實而治之蓋陽明胃與大腸也邪氣閉為實精氣奪為虛也樞者開闔之樞紐也故少陽樞折其開闔皆參差失度不但經脈氣血紊亂至於骨節皆縱緩動搖而行步不能安於地也故當窮究其病之所本而取之者皆針法也藥治自可類推矣三陰經開闔樞折太陰為開厥陰為闔少陰為樞故開折則倉廩無所輸膈洞膈洞者取之太陰視有餘不足故開折者氣不足而生病也闔折即氣絶而善悲悲者取之厥陰視有餘不足樞折則脈有所結而不通不通者取之少陰視有餘不足有結者皆取之此言三陰經開闔樞之為病也太陰者脾也脾主鼓運故其氣為開開折而脾氣不足不能輸化倉廩之水穀而為膈洞倉廩兼胃而言膈洞者膈中乏氣而腸胃無約束則傳導失司而為洞泄之病是當助其脾氣為主也厥陰肝也為闔闔折者與陽和之氣隔絶而善悲蓋肝實則怒虛則悲皆無陽和之氣以調之也少陰樞折則開闔皆不利故三陰經之脈有所結滯而不通視有餘不足凡有結者皆當取之如其不足當助氣以通之也足六經標本靈樞衛氣篇帝曰五臟者所以藏精神魂魄者也六腑者所以受水穀而化行物者也其氣內於五臟而外絡支節其浮氣之不循經者為衛氣其精氣之行於經者為營氣陰陽相隨外內相貫如環無端然其分別陰陽皆有標本虛實所離之處能別陰陽十二經者知病之所生候虛實之所在者能得病之高下知六腑之氣街者能知解結契紹於門戶能知虛實之堅軟者知補瀉之所在能知六經標本者可以無惑於天下岐伯曰臣請盡意悉言之足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅陰之間標在窗籠之前窗籠者耳也足少陰之本在內踝下上三寸中標在背腧與舌下兩脈也足厥陰之本在行間上五寸所標在背腧也足陽明之本在厲兌標在人迎頰挾頏顙也足太陰之本在中封前上四寸之中標在背腧與舌本也此言內而臟腑外而經絡氣血周流循環不已必欲分陰陽標本十二經脈方能察其病之所生虛實之所在知六腑之氣街方能明血氣流行有分解有鬱結有契合有繼紹不同之門戶然後知氣血之虛實有堅有軟而可施補瀉之法若其綱要在六經之標以一經之氣始行為本終止為標即由絡脈通貫接連他經之始乃氣血流行之節序故凡陰陽虛實病之淺深皆可驗之無惑於天下也故岐伯備細詳明如下文而先敘六經以足太陽為始其本在外後跟以上五寸中即跗陽穴也標在命門即兩目內眥睛明穴兩目兩穴故云兩絡也本經根結篇言太陽根於至陰結於命門與此小異足少陽之本在竅陰足第四指端也標在窗籠即聽宮穴也足少陰之本在內踝下上三寸中即交信穴其標在背腎腧穴與舌下兩脈根結篇云少陰起於湧泉結於廉泉廉泉穴在舌下也亦與此小異足厥陰之本在行間上五寸所疑是中封穴標在背之肝腧穴根結篇云厥陰根於大敦結於玉英也足陽明之本在厲兌標在人迎頰挾頏顙根結篇云陽明根於厲兌結於顙大顙大者鉗耳也足太陰之本在中封前四寸中疑是三陰交穴標在背之脾腧與舌本根結篇云太陰根於隱白結於太倉手六經標本手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽明之本在肘骨中上至別陽標在顏下合鉗上也手太陰之本在寸口之中標在腋內動也手少陰之本在鋭骨之端標在背腧也手心主之本在掌後兩筋之間二寸中標在腋下下三寸也手太陽之本在手外踝之後疑是養老穴標在命門之上一寸疑是督脈命門穴之上懸樞穴手少陽之本在小指次指間上二寸當是腋門穴標在耳後上角當是絲竹空穴手陽明之本在肘骨中當是曲池穴上至別陽標在顏下合於鉗上疑是胃經頭維穴手太陰之本在寸中即太淵穴標在腋內動脈即中府穴手少陰之本在鋭骨之端即神門穴標在背之心腧穴手心主即手厥陰也本在掌後兩筋之間即內關穴標在腋下三寸即天池穴以上明十二經之標本以驗虛實病證根結篇論三陰三陽開闔樞之理與此互相闡發各有取義觀陰陽臟腑門中更詳備明晰也凡候此者下虛則厥下盛則熱上虛則眩上盛則熱痛故實者絶而止之虛者引而起之陽從下升陰自上降故下虛則足冷而厥上盛則熱痛以升多降少也上虛則眩下盛則熱以降多升少也故實者絶而止之瀉其有餘也虛者引而起之助其不足也絶而止引而起皆針法也氣行四街請言氣街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止於腦氣在胸者止於膺與背腧氣在腹者止於背腧與衝脈於臍左右之動脈者氣在脛者止之於氣街與承山踝上以下取此者用毫針必先按而在久應於手乃刺而豫之所治者頭痛眩僕腹痛中滿暴脹及有新積痛可移者易已也積不痛難已也馬注此言氣行有街其止有所首節帝言知六腑之氣街能知解結契紹於門戶本經動輸篇有四街即此是也凡氣之行於頭者止於腦氣之行於胸者止於膺與背腧胸兩旁為膺背腧系膀胱經五臟六腑皆有腧在背也氣之行於腹者亦止於背腧又在前與足陽明胃經衝脈穴及臍左右之動脈即胃經之天樞穴也氣之行於足脛者止於氣街即胃經之氣衝穴一穴而二名也及足太陽經之承山穴在腨下一寸半及外踝上下諸穴凡取此四街宜用九針論中之第七毫針先按其處而為時既久其氣應手乃以針刺之其所治在頭者則主頭痛眩僕在腹則主腹痛中滿暴脹及有新積但其積痛而可移者易已其積不痛者雖治之亦難已也楠按新積元氣未傷痛而可移動其積結尚不甚固故易治也其不痛不可移者元氣不能攻其邪積結堅牢故難愈也靈樞動輸篇帝曰營衛之行也上下相貫如環無端今有其卒然遇邪氣及逢大寒手足懈惰其脈陰陽之道相輸之會行相失也氣何由還岐伯曰夫四末陰陽之會者此氣之大絡也四街者氣之徑路也故路絶則徑通四末解則氣從合相輸如環帝曰善此帝言營衛受邪其經脈陰陽之氣流行輸轉不得循其道而相失何由復還耶岐伯謂四肢指末是陰陽經脈交接相會之大絡也四街者即上所云行氣之徑路也大絡如小路其受邪者小路雖隔絶而四街之大徑則通故邪解而四末路通其氣仍相從會合陰陽相輸如環不已也由是觀之四街者臟腑之氣所行也邪淺在經則街通而病輕邪入於腑則街塞而病危邪入於臟則街路絶而死矣十二經脈行度靈樞逆順肥瘦篇帝曰脈行之逆順奈何岐伯曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹陰陽十二經脈陰行於里陽行於表故陰經由臟走手至指尖陰面而出陽面表分接連陽經而走於頭則分三路太陽由項背陽明由頸腹少陽由兩側皆從表而行至足指陰面接連陰經入里而走腹內仍歸於臟又從臟而走手如是周流循環不已是故陽經內通於腑陰經內通於臟臟腑經絡氣血無不通貫其四街為大徑經絡為小路也帝曰少陰之脈獨下行何也岐伯曰不然夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精其下者注少陰之大絡出於氣街循陰股內廉入膕中伏行䯒骨內下至內踝之後屬而別其下者並於少陰之經滲三陰其前者伏行出跗屬下循跗入大趾間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣帝曰何以明之岐伯曰以言導之切而驗之其非必動然後乃可明逆順之行也此言足三陰之脈皆從足上行入腹通臟者也蓋以衝脈為五臟六腑陰陽十二經之海其上行者至頏顙滲諸陽經其下行者並少陰之經而行諸陰非少陰之脈獨下行是衝脈之氣注於少陰之大絡又出於少腹之氣街循陰股而下行至足遍滲三陰其前者又循跗而入大趾間滲諸絡而溫肌肉故別絡之氣結則跗上之脈不動而足冷為厥厥者因於寒而衝脈之氣不溫肌肉也欲知其故當以言導問其因再切其脈以驗之其非氣絶者厥回其跗上之脈必仍動如氣絶厥不回則不動然後乃可明其氣行之逆順也靈樞經脈篇帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入於胃脈道乃通血氣以行經脈者所以能決生死處百病調虛實不可不通此言經脈為血氣所行之道路而血氣由穀氣所生察經脈知血氣之盈虧審胃口知穀氣之虛實凡一切外感內傷之病必由是而驗生死吉凶由是而決為處治百病調和虛實之所憑故不可不通其理也各經流行起止陰陽交接連貫須細觀同人圖肺經行度肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端十二經脈流行始於肺終於肝復接於肺則氣血流行一周如是五十周於身則為一晝夜若衛氣晝則行於陽分二十五周夜則行於陰分二十五周皆漫行於經脈之外皮膚肌肉之間此營衛之氣血流行不同而其絡脈仍相通貫故營衛調和則無病或風邪傷衛或寒邪傷營以致經絡不通陰陽格拒故陰勝則寒陽勝則熱皆營衛之病也余義已詳營衛生會篇矣下明肺經所主病證肺經病證是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩臂痛風寒汗出中風小便數而欠氣虛則肩臂痛寒少氣不足以息溺色變為此諸病盛則瀉之虛則補之盛者寸口大三倍於人迎虛者寸口反小於人迎也本經之氣由中焦上胸肺走手指而接連大腸經也大腸經行度大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之間循臂上廉入肘下廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔本經止於此接連胃經之脈下明大腸經所主病證大腸經病證是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗不復為此諸病盛則瀉之虛則補之盛者人迎大三倍於寸口虛者人迎反小於寸口也本經之氣從手指走頭而止接連胃經也胃經行度胃足陽明之脈起於鼻之交頞中旁納太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中趾內間其支者下廉三寸而別下入中趾外間其支者別跗上入大趾間出其端胃經病證是動則病灑灑振寒善伸數欠顏黑病至則惡人與火聞木音則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿為此諸病盛則瀉之虛則補之盛者人迎大三倍於寸口虛者人迎反小於寸口也脾經行度脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中脾經病證是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用為此諸病盛則瀉之虛則補之盛者扣大三倍於人迎虛者寸口反小於人迎也心經行度心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端心經病證是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之盛者寸口大再倍於人迎虛者反小於人迎也小腸經行度小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴小腸經病證是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之盛者人迎大再倍於寸口虛者人迎反小於寸口也膀胱經行度膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小趾外側膀胱經病證是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小趾不用為此諸病盛則瀉之虛則補之盛者人迎大再倍於寸口虛者人迎反小於寸口也腎經行度腎足少陰之脈起於小趾之下斜走足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中腎經病證是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之盛者寸口大再倍於人迎虛者寸口反小於人迎也心包絡經行度心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端心包絡經病證是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之盛者寸口大一倍於人迎虛者寸口反小於人迎也三焦經行度三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳之上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥三焦經病證是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目鋭眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之盛者人迎大一倍於寸口虛者人迎反小於寸口也膽經行度膽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下人迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小趾次趾之間其支者別跗上入大趾之間循大趾歧骨內出其端還指爪甲出三毛膽經病證是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小趾次趾不用為此諸病盛則瀉之虛則補之盛者人迎大一倍於寸口虛者人迎反小於寸口也肝經行度肝足厥陰之脈起於大趾叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺肝經病證是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺癃閉為此諸病盛則瀉之虛則補之盛者寸口大一倍於人迎虛者寸口反小於人迎也謹按經言五臟所生病者必兼本臟經絡病證其六腑所生者有氣血津液筋骨之不同者各原其氣之生化流行之道以為生病之主也肺經氣絶手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也肺主行一身內外之氣而專溫潤於皮毛者故經氣絶則毛先死也心經氣絶手少陰氣絶則脈不通脈不通則血不流血不流則髦色不澤故其面如漆柴者血先死壬篤癸死水勝火也心主血脈心經氣絶故脈不通而血不流血先死也脾經氣絶足太陰氣絶則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則肉萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也脾主肌肉脾經氣絶故肌肉先死也腎經氣絶足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也腎藏精而主骨腎敗精枯則經氣絶故骨先死也肝經氣絶足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本也故脈勿榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也肝藏血而主筋肝血枯則經氣絶而筋先死也五陰經六陽經氣絶五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣絶則陰與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死陰陽十二經終素問診要經終論岐伯曰太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死色先青白乃死矣陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣此十二經之所敗也經絡之脈形異靈樞經脈篇帝曰經脈十二者伏行分肉之間深而不見其常現者足太陰過於外踝之上無所隱故也諸脈之浮而常現者皆絡脈也六經絡手陽明少陽之大絡起於五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛則衛氣已平營氣乃滿而經脈大盛脈之卒然盛者皆邪氣居之留於本末不動則熱不堅則陷且空不與衆同是以知其何脈之動也此言十二經脈伏行分肉之間深而不可見惟足太陰過外踝之上者常現其餘浮淺而現者非經脈皆絡脈也故凡經脈卒然盛者皆受邪氣留於本末者謂一經之本末皆由絡脈通於他經乃邪氣留於絡中則經氣不得周行故脈卒然而盛也上文十二經皆言是動則病此正明其動之由若邪留於經之本末而不動則發熱熱邪耗氣其脈則軟而不堅或下陷且空與無邪之衆脈不同是以知何脈之動即知其何經之病也雷公曰何以知經脈之與絡脈異也帝曰經脈常不可見也其虛實也以氣口知之脈之現者皆絡脈也諸絡脈皆不能經大節之間必行絶道而出入復合於皮中其會皆現於外行絶道出入者經脈盡處即由絡脈連貫他經出此入彼陽經之絡由陽注陰陰經之絡由陰注陽如是十二經循環復會合於皮中衛分淺處而現於外故營衛腑臟表裡淺深其氣血通貫流行則無病矣肺經之絡手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手掌熱虛則欠呿小便遺數取之去腕寸半別走陽明也此明手太陰肺經之絡脈也稱別者謂本經元氣自此處分別流注他經也以下皆同其絡名列缺起於腕上分間並太陰之經氣而行直入掌中散入於魚際蓋經脈止於魚際絡脈入於掌中故其病實則手掌熱謂受邪也病虛則欠呿謂氣少不足以息也故小便或自遺或短數皆氣不能敷布收攝也別走陽明者言手太陰經氣自此別行手陽明大腸經也取之者取去腕寸半之列缺穴以針之也心經之絡手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系其實則支滿虛則不能言取之掌後一寸別走太陽也此明手少陰心經之絡脈也實者謂邪實則心下支滿也心氣虛不能轉舌故不能言掌後一寸即通里穴也心經之氣自此而別走手太陽小腸經也心包經之絡手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為頭強取之兩筋間也心包絡一名手心主代心用事故名臣使之官是衛護心臟者故凡受邪皆受於包絡實則心痛者其絡脈受邪也若心臟受邪名真心痛頃刻而死不能救治也虛則頭強者絡為衛陽所行之地絡虛陽氣不能上升合於督脈也小腸經之絡手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生瘤小者如指痂疥取之所別也大腸經之絡手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰遍齒其別者入耳合於宗脈實則齲聾虛則齒寒痹膈取之所別也三焦經之絡手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也膀胱經之絡足太陽之別名曰飛揚去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也膽經之絡足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也胃經之絡足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下喉絡嗌其病氣逆則喉痹卒喑實則狂癲虛則足不收脛枯取之所別也脾經之絡足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也腎經之絡足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也肝經之絡足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者經脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取之所別也督脈督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脾之大絡脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也脾經之絡名公孫者是通胃經之絡也此外又有一大絡其脈若羅網之絡於周身故名大包脾之所以統血者以絡遍於身絡中藏血也故邪氣實則血滯而一身盡痛正虛則血少氣弛故百節盡皆縱而不能動作皆當治其大絡之脈也凡此十五絡者實則必現虛則必下視之不見求之上下人經不同絡脈異所別也胃之大絡素問平人氣象論云胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也盛喘數絶者則病在中結而橫有積矣絶不至曰死乳之下其動應衣宗氣泄也上節靈樞言胃絡名豐隆者是通脾經之絡也此言又有一大絡名虛里貫膈絡肺出於左乳下應手而動者為脈之宗氣宗氣者積於胸中者也蓋營行脈中而營氣出於中焦並胃上行合於胸中之宗氣故胃絡之動於左乳下者出於脈之宗氣也其脈盛喘數絶者滑動急促之象病在中脘阻逆如結而橫則有形之邪積也其脈氣絶不應手者則宗氣已無故死若動甚震衣者其宗氣大泄乃內傷虛勞之病也良以脾胃統一身之氣血故於本經之絡外又各有一大絡與他臟腑不同故言太陰行氣於三陰陽明行氣於三陽又曰脾者常著胃土之精也土者生萬物而法天地故上下至頭足此言脾胃生化之氣血上頭下足無不周遍也治病者不可不深悟其理也陽明浮絡素問皮部論帝曰余聞皮有分部脈有經紀筋有結絡骨有度量其所生病各異別其分部左右上下陰陽所在病之始終願聞其道岐伯曰欲知皮部以經脈為紀者諸經皆然陽明之陽名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆現則寒熱也絡盛則入客於經陽主外陰主內此明皮脈經絡筋骨部分之淺深以察病邪之進退也欲知皮部當以經脈為綱紀而辨之諸經諸絡皆然也假如陽明之陽絡名害蜚者上自手經下至足經皆同此法視其經脈所行部中有浮絡者皆陽明之絡也視其色以明病邪之所在絡中邪盛則必入客於經而由淺入深矣絡在衛分為陽而主外經在營分為陰而主內此以營衛分內外陰陽也若十二經者由臟腑而分陰陽則絡隨經分陽經之絡為陽絡陰經之絡為陰絡也其言衛行脈外者其氣行於十二經脈之外而行肌肉絡脈之中其氣悍而為陽故絡脈浮現皮膚可視其色以明病也營衛之所以通貫者由於絡脈也外邪之傷人亦各以類從如風為陽邪先傷衛分以桂枝湯主治寒為陰邪徑入營分以麻黃湯主治然止風寒之邪耳若濕邪則下部先受霧露清邪則上部先受溫暑之邪由口鼻吸入各有不同故必先明一身之營衛經絡筋骨臟腑淺深部位而後可辨病邪之所在而治之是以聖人反復詳明不嫌復贅又如後世看小兒手指紋以審病即此篇視絡脈之法也少陽太陽少陰浮絡少陽之陽名曰樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然太陽之陽名曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經此言少陽太陽之浮絡也陽絡主納陰絡主出者是陽從表入陰從里出也蓋人身陰陽之氣互根於太極轉旋於上下表里循環無端故其由里而升而旋以出於表即由表而降而旋以入於裡故在陽在表者主納在陰在裡者主出而其外邪始從衛入遇里出之氣所遏遂由絡滲入於經如或失治則漸入漸深多方傳變皆可類推以審其病邪之進退輕重也少陰之陰名曰樞儒上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出也從內注於骨此言少陰經之陰絡名樞儒者上下審視其部中有浮絡者皆少陰之絡也若邪始從陽部而注於少陰經者即由經出而內注於骨蓋骨乃少陰腎所主為腎之合也是邪始入於皮部陽分從肌肉而至筋骨由淺而入深也厥陰太陰浮絡心主之陰名曰害肩上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經此言心主是手厥陰也上下同法兼足厥陰也觀以上各條文法義例凡舉足經必兼手經舉手經必兼足經以上下同法一句該之也再觀下條凡十二經絡脈之句義更顯然矣太陰之陰名曰關蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡十二經絡脈者皮之部也此言三陰三陽上下手足共十二經之絡脈皆皮之部分先視其浮絡以審病邪絡邪盛必入客於經下文又詳明其所由也邪客淺深部分是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃邪之始入於皮也淅然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗此言邪之由淺而深或因虛陷下於筋骨間各有現證可審也又按繆刺論曰邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也是知邪之遊走亦有不入於經而流溢於大絡者故病變多端而無一定要在明其淺深部分知其邪客之所辨其陰陽氣血之虛實而治之也帝曰皮之十二部其生病皆何如岐伯曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也帝曰善此言皮有淺深之分部當邪之初感淺處而不與之治至於邪深乃生大病也陰陽經絡現色各異素問經絡論帝曰夫絡脈之現也其五色各異青黃赤白黑不同其故何也岐伯曰經有常色而絡無常變也帝曰經之常色何如岐伯曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也帝曰絡之陰陽亦應其經乎岐伯曰陰絡之色應其經陽絡之色變無常隨四時之行也寒多則凝泣凝泣則青色熱多則淖澤淖澤則黃赤此皆常色謂之無病五色俱現者謂之寒熱帝曰善此言五臟具五行之色而應於經某經病即現某色也陰經之絡現色同某經陽經之絡其氣出於腑與臟離遠且又浮於表故隨四時之氣而變色如春青夏赤秋白冬黑之類不同其本經之色也其言經有常色者統指十二經也則可知腑隨臟應如足陽明胃經即同脾經之黃色手陽明大腸經即同肺經之白色余可類推矣孫絡穴會素問氣穴論岐伯曰孫絡三百六十五穴會亦以應一歲以溢奇邪以通營衛營衛稽留衛散營溢氣竭血著外為發熱內為少氣急瀉無怠以通營衛見而瀉之無問所會此言最細之絡名孫絡周身穴會合於天度三百六十五以應一歲之氣也盛邪客之而營衛之氣散溢久而氣耗漸竭血著不行其病日深外為發熱內為少氣故當邪客之時急瀉其邪而無怠緩以通營衛但見邪在何部而瀉之無問其絡穴所會之處也肉會為溪谷岐伯曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行營衛以會大氣邪溢氣壅脈熱內敗營衛不行必將為膿內銷骨髓外破大膕留於節湊必將為敗積寒留舍營衛不居卷肉縮筋脅肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也溪谷三百六十五穴會亦應一歲其小痹淫溢循脈往來微針所及與法相同此言營衛在肌肉間由經絡之氣流行貫注邪傷氣壅營衛不行熱則為膿寒則為痹甚或卷肉縮筋百病叢生其溪谷穴會亦三百六十五以應一歲之氣也或受邪淺而小痹淫溢循脈往來未入於溪谷者以微針通其脈絡而補瀉之法則與邪深者相同也經絡氣血傳注孫絡之脈別經者其血盛而當瀉者亦三百六十五脈並注於絡傳注十二絡脈非獨十四絡脈也內解瀉於中者十脈此言針治去邪當瀉其孫絡之血也孫絡三百六十五脈之氣血並注於大絡傳注於各經絡故外邪之入由淺而深由絡入經若其邪深須用藥內解而瀉之於中者當按五臟陰陽十脈生化之理以治之也或作五臟之腧穴左右各五共十脈是言針治之法也四海十二經水靈樞海論篇岐伯曰人亦有四海十二經水經水者皆注於海海有東西南北命曰四海人有髓海有血海有氣海有水穀之海也必先明知陰陽表裡滎輸所在四海定矣胃者水穀之海其輸上在氣衝下至三里衝脈者為十二經之海其輸上在大杼下出巨虛之上下廉膻中者為氣之海其輸上在柱骨之上下前在於人迎腦為髓之海其輸上在於其蓋下在風府也十二經水比十二經中血也衝脈為十二經之海故稱血海宗氣聚於胸故胸稱氣海今膻中稱氣海者明膻中在胸而為營氣之海與沖之血海相配也則胸中為衛氣之海矣亦有稱下丹田為氣海者是陽氣發源之所先天祖氣由之而出也精髓生於腎隨陽上升而聚於腦故腦為髓海也水穀精氣聚於胃故為水穀之海也氣血由經而注於海本由胃生化氣血而注於經以故有聚會之海有生化之海各不同也其流行則各有轉輸之經穴以貫注於上下四旁如經所云諸穴是也氣衝者即氣街穴也蓋者頭頂天靈蓋骨即百會穴也四海逆順病證帝曰四海之逆順奈何岐伯曰氣海有餘者氣滿胸中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水穀之海有餘則腹滿水穀之海不足則飢不受穀食髓海有餘則輕徑多力自過其度髓海不足則腦轉耳鳴脛痠眩冒目無所見懈怠安臥此言逆順者惟髓海有餘精盈力徑為順其餘皆偏旺偏衰之病未為順也悗息者胸悶而呼吸不舒也想其身大身小皆氣血偏勝以心主血脈故自心覺其身大身小也腹滿則食滯為病飢不受食者胃傷而邪火上炎也髓海不足所現皆內損之病矣脈髓筋血氣各有所屬素問五臟生成論岐伯曰諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心諸氣者皆屬於肺此四肢八溪之潮汐也故人臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝臥出而風吹之血凝於膚者為痹凝於脈者為泣凝於足者為厥此三者血行而不得反其空故為痹厥也靈樞口問篇云目者宗脈之所聚也故諸脈皆屬於目大惑論曰目者心使也故心主血脈而聚於目者也腦為髓海故諸髓皆屬於腦也筋聚於骨節骨節必賴筋連絡脈以約束者故諸筋皆屬於節也血脈心所主故諸血屬心也一身之氣歸肺權衡敷布故諸氣屬肺也四肢者手足也手之肘與腕足之膝與腕皆血氣流行交會之處如潮汐之往來故為八溪也肝藏血臥則心靜血靜故歸於肝也肝開竅於目故受血而能視及足步手握指攝莫不由血濡氣煦而能遂意者也如無血則僵枯不能動矣臥則陽氣入於陰初起衛陽未固風邪直入營分以致血凝於膚者為痹凝於脈者為泣即瘀滯也凝於足者陽氣不能下行則足冷為厥此三者皆邪所郁使血之流行者凝滯不得反其藏血之空竅乃為痹厥之病也大谷小溪人有大谷十二分小溪三百五十四名少俞十二此皆衛氣之所留止邪氣之所客也針石緣而去之診病之始五決為紀欲知其始先建其母所謂五決者五脈也馬注大經所會謂之大谷十二分者十二經脈之部分也小絡所會謂之小溪穴有三百六十五除十二俞外止有三百五十三此言五十四者四字誤也十二俞者肺心肝脾腎厥陰膽胃三焦大腸小腸膀胱共十二俞也此皆衛氣之所留止邪氣之所客宜用針石循其部分而去之凡診病之始當決五臟之脈為紀故欲知其始先建其母所謂五決者五臟之脈也楠按五臟為根本經絡為枝葉故五脈為諸經脈之母欲知始病之因必先定其五脈之虛實而吉凶可見是為診治之綱紀也上云肉之大會為谷肉之小會為溪蓋肌肉淺深之部即營衛經絡之所在氣血之所行也三百六十五絡脈之穴是衛氣所留止即為邪氣之所客針石通其衛氣其邪可得而去也五臟陰陽十脈病證是以頭痛巔疾下虛上實過在足少陰巨陽甚則入腎徇蒙招尤目瞑耳聾下實上虛過在足少陽厥陰甚則入肝腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明咳嗽上氣厥在胸中過在手陽明太陰心煩頭痛病在膈中過在手巨陽少陰巨陽即太陽此即明上文五決為紀以辨其病證也頭痛巔頂之疾由下虛上實者以足少陰經下虛足太陽經上盛也甚則其病邪入於腎臟此一也徇蒙招尤者頭目昏悶如被矇蔽之狀故目瞑耳聾是上虛下實肝膽清陽鬱而不伸過在足少陽足厥陰二經甚則其病邪入於肝臟此二也腹滿䐜脹支膈胠脅下厥上冒者由於中焦濁邪壅閉脾胃氣不運轉過在足太陰陽明此三也咳嗽上氣厥在胸中者氣逆不降也過在手太陰肺手陽明大腸以二經為表裡大腸通調肺氣自順矣此四也心煩頭痛病在膈中若止心氣病則無頭痛小腸經脈上頭所以過在手太陽手少陰以二經為表裡者此五也惟肝腎二經病甚則邪入臟余皆表裡之經兼病而無入臟之邪也足太陽少陰合靈樞經別篇帝問十二經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止粗之所易上之所難其離合出入奈何岐伯曰足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少陰之正至膕中別走太陽而合上至腎當十四椎出屬帶脈通於帶脈直者系舌本復出於項合於太陽此為一合成以諸陰之別皆為正也此言膀胱與腎為表裡者以經脈相會合也是由經脈之分枝相合其與十二經之交接皆由絡脈相貫者不同以下五合皆然故名經別所以稱表裡者因其經氣流行有離合離則分表裡合則相貫通此人身之造化合乎天地之道也足少陽厥陰合足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上挾咽出頤頷中散於面系目系合少陽於外眥也足厥陰之正別跗上上至毛際合於少陽與別俱行為二合也此明肝膽為表裡也足陽明太陰合足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上頞䪼還系目系合於陽明也足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中此為三合也此明脾胃為表裡也手太陽少陰合手太陽之正指地別於肩解入腋走心系小腸也手少陰之正別入於淵腋兩筋之間屬於心上走喉嚨出於面合目內眥此為四合也此明心與小腸為表裡也手少陽心主合手少陽之正指天別於巔入缺盆下走三焦散於胸中也手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也此明心包絡與三焦為表裡也手陽明太陰合手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也手太陰之正別入淵腋少陰之前入走肺散之太陽上出缺盆循喉嚨復合陽明此為六合也此明肺與大腸為表裡連上共十二經以成六合者也足太陽之筋靈樞經筋篇曰足太陽之筋起於足小趾上結於踝斜上結於膝其下循足外踝結於踵上循跟結於膕其別者結於踹外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上網下結於頄其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆斜上出於頄其病小趾支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為輸名曰仲春痹也薛生白注十二經脈之外復有經筋者蓋經脈營行表裡故出入臟腑以次相傳經筋聯綴百骸維絡周身各有定位雖經筋所行之部多與經脈相同然其所結所盛之處則惟四肢溪谷之間為最以筋會於節也筋屬木其華在爪故十二經筋皆起於四肢指爪之間而後盛於輔骨結於肘腕繫於膝關聯於肌肉上於頸項終於頭面此人身經筋之大略也筋有剛柔剛者所以束骨柔者所以相維亦猶經之有絡綱之有紀故手足項背直行附骨之筋皆堅大而胸腹頭面支別橫絡之筋皆柔細也但手足十二經之筋又各有不同者如手足三陽行於外其筋多剛手足三陰行於內其筋多柔皆肝之所生而經脈經筋之所以異也足少陽之筋足少陽之筋起於小趾次趾上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小趾次趾支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰孟春痹也足陽明之筋足陽明之筋起於中三趾結於跗上邪外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於膝其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中趾支脛轉筋腳跳堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等以膏尉急頰且飲美酒啖美炙肉不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸名曰季春痹也足太陰之筋足太陰之筋起於大趾之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊其病足大趾支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為輸命曰孟秋痹也足少陰之筋足少陰之筋起於小趾之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下並足太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸在內者尉引飲藥此筋折紐紐發數甚者死不治名曰仲秋痹也足厥陰之筋足厥陰之筋起於大趾之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大趾支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為輸命曰季秋痹也手太陽之筋手太陽之筋起於小指之上結於腕上循臂內廉結於肘內鋭骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內鋭骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針劫刺以知為數以痛為輸其為腫者復而鋭之本支者上曲牙循耳前屬目外眥上額結於角其痛當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痹也手少陽之筋手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘額結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸名曰季夏痹也手陽明之筋手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不為左右視治在燔針劫刺以知為數以痛為輸名孟夏痹也手太陰之筋手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩髃前上結缺盆下結胸裡散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痹也手心主之筋手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於臂其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痹也手少陰之筋手少陰之筋起於小指之內側結於鋭骨上結肘內廉上入腋交太陰挾乳里結於胸中循臂下繫於臍其病內急心承伏梁下為肘網當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾膿血者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸淬刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也筋病總治法足之陽明手之太陽筋急則口目為僻眥急不能卒視治皆如右方也肝主筋筋病必關於肝也言十二經則周身之筋俱在其中而皆起於手足指端即十二經交接之處故治者亦必調十二經之氣血兼理其肝而已若針刺則必詳究其起其結及輸穴枝節溪谷交會之處另有專科專書茲不録載其為病則方脈家必當熟悉庶可用藥施治夫十二經陰陽之氣合乎天地四時之氣也蓋陽經之氣根於陰而行於表自足而至頭故春為足陽經筋病由手而至頭故夏為手陽經筋病也陰經之氣根於陽而行於里自足而至胸故秋為足陰經筋病自胸而走手故冬為手陰經筋病也病皆名痹者以邪痹經筋值天地氣候相應則病發矣經脈長短之度靈樞脈度篇岐伯曰手之六陽從手至頭長五尺五六三丈手之六陰從手至胸中長三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭長八尺六八四丈八尺足之六陰從足至胸中長六尺五寸六六三丈六尺五六三尺合三丈九尺蹺脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也經脈為里支而橫者為絡絡之別者為孫盛而血者疾誅之盛則瀉之虛者飲藥以補之此明經脈流行長短之度經直絡橫經深絡淺絡之支別為孫絡則更細小猶木之枝分而又分以至細微也然其橫直粗細浮沉淺深雖異而氣血之流行貫注無不周遍苟有窒滯即為病矣蹺脈起止帝曰蹺脈安起安止岐伯曰蹺脈者少陰之別也起於然谷之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目氣不營則目不合此言陰蹺為足少陰之支別並少陰上行出人迎上頄而屬於目內眥晴明穴合足太陽陽蹺之脈是衛氣從陰出陽之處陰陽交併互相回還而濡潤於目故遇平旦則目開日入則目瞑若其氣不營運則陰陽不相交通而目應合不能合其應開不能開亦可例見矣此言合於太陽陽蹺而上行則陽蹺為足太陽之支別而並太陽以行於表者可知也蹺脈行度帝曰氣獨行五臟不榮六腑何也岐伯曰氣之不得無行也如水之流如日月之行不休故陰脈營其臟陽脈營其腑如環之無端莫知其紀終而復始其流溢之氣內溉臟腑外濡腠理上言蹺脈並少陰而行故帝疑止行五臟不營六腑岐伯謂臟腑經絡出於一本故氣血如水之流陰陽如日月之行不休陰脈營其臟陽脈營其腑循環無端而必分其表裡淺深部位者將以察其有病無病而可調之也蹺脈男女異稱帝曰蹺脈有陰陽何脈當其數岐伯曰男子數其陽女子數其陰當數者為經不當數者為絡也此言男子以陽蹺為經陰蹺為絡女子以陰蹺為經陽蹺為絡也蓋蹺脈為少陰太陽兩經之支別非同臟腑正經之脈以其並少陰而行於陰者為陰蹺並太陽而行於陽者為陽蹺故男主陽以陽蹺為經陰蹺為絡女主陰故以陰蹺為經陽蹺為絡不同十二經隨臟腑分陰陽而陰陽皆有絡脈也以其為正經之支別與絡脈相類而又不同故名曰奇經奇者異於常經之謂也八脈皆稱奇經足太陽經通頂入腦靈樞寒熱病篇曰足太陽有通項入腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃別陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥陽氣盛則瞋目陰氣盛則瞑目足太陽經行一身之表其有通頂入腦者正屬目本名曰眼系若感邪而頭目苦痛當於項中兩筋之間針之以通入於腦也陰蹺陽蹺之脈於此分別與太陽經會合於目眥而衛氣之出入陰陽之相交均在此處故陽氣盛則目瞋不能合陰氣盛目瞑不能開也任脈素問骨空論曰任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目任脈為病男子內結七疝女子帶下瘕聚中極穴名在臍下四寸中極之下曲骨穴也是任脈之氣所起關元穴在臍下三寸上行至面入目中央與督脈交接也其為病男子內結七疝後賢分列七疝名目多端大抵皆由外邪與氣血膠結以傷筋脈故多涉於肝以肝主筋也其女子瘕聚亦然而帶下之病多由脾虛帶脈弛緩以致津液下泄故名帶下衝脈衝脈者起於氣街並少陰之經挾臍上行至胸中而散衝脈為病逆氣裡急氣街者陽明胃經之穴在少腹毛際兩旁各二寸為衝脈之氣所起也前文靈樞逆順肥瘦篇言衝脈為臟腑經脈之海上行至頏顙滲諸陽下行至足跟滲諸陰而此云至胸中而散者大抵自氣街至胸其脈如木之干其上行至頭下行至足者如木之枝而分散也故其現病但氣逆於胸腹裡急而無頭足之現病也督脈督脈者起於少腹以下骨中央女子入系庭孔其孔溺孔之端也其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央此生病從少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾督脈生病治督脈治在骨上甚者在臍下營又曰督脈為病脊強反折馬注任沖督三脈一源而三歧也督由會陰而行背任由會陰而行腹沖由氣街而行足少陰會陰穴在少腹之下橫骨中央督脈起於會陰而女子入系庭孔即火龷早漏之所為陰庭乃溺孔之端也督脈有支別自溺孔之端分而各行循陰器合篡間在前後陰之中間也繞行篡後又別絡分行繞臀內廉貫脊屬腎與足少陰太陽之絡相合而行者也又與足太陽之起於目內眥由巔頂而行肩膊抵腰循膂絡腎者合行也其男子起會陰循莖下至篡與女子同也薛生白曰其直行者自尻上循脊裡上頭由鼻而至人中其自少腹直上者皆任脈之道而列為督脈蓋任脈衝脈皆起於胞中上循背裡為經脈之海則前亦督而後亦任也任脈循背謂之督脈自少腹直上者謂之任脈亦謂之督脈是以背腹分陰陽而言任督若三脈者名雖異而體則一耳上衝心而痛名為沖疝蓋兼沖任而為病者不得前後即倉公所謂不得前後溲也不孕癃痔遺溺嗌乾等病雖由督脈所生而實亦任沖之病也任者女子得以任養也沖者以其氣上衝也督者以其督領經脈之海也此三脈皆由陰中而上行故其為病如此骨上謂橫骨上毛際中曲骨穴也臍下營謂臍下一寸陰交穴也皆任脈之穴而治督脈之病雖分三脈其所言治但云督而不云任沖所用之穴亦以任為督可見三脈一體督即任沖之綱領任沖即督之別名耳略舉針石以言則用藥之法該乎此矣楠按上文脈度篇云督脈任脈四尺五寸共合九尺則是行於身前者名任行於身背者名督督為陽脈之綱任為陰脈之綱也又陰蹺脈氣起於足少陰經照海穴在內踝下陽蹺脈氣起於足太陽經申脈穴在外踝下五寸是故難經以陽蹺為陽經之絡陽蹺為陰經之絡本其脈氣起處以為經者也上文岐伯言男子以陽蹺為經陰蹺為絡女子以陰蹺為經陽蹺為絡則是以主治者稱經佐治者稱絡男主陽女主陰而與難經各有取義也故難經言十二經之氣灌注八脈譬之溝渠滿溢雱霈妄行聖人不能復圖因其氣由正經漫溢不能復歸於經而無循環次序故名奇經或解作奇偶之奇謂其獨而無偶然陽蹺陰蹺陽維陰維任脈為陰督脈為陽固非獨而無偶其解作奇偶之奇可見非也難經又曰陽維起於諸陽會陰維起於諸陰交陽維維於陽陰維維於陰陰陽不能自相維則悵然失志溶溶不能自收持陽維為病苦寒熱陰維為病苦心痛觀以上諸文陽維是維持衛陽者故其病則苦寒熱陰維是維持營陰者故其病則苦心痛也諸陽會是諸陽經聚會之穴也諸陰交是諸陰經相交之穴也以其交會之處則氣盛滿溢乃為維脈之氣所起也又曰陽蹺者起於跟中循外踝上行入風池陰蹺者亦起於跟中循內踝上行至咽喉交貫衝脈陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急帶脈為病腹滿腰溶溶如坐水中此言腰弛而冷如坐水中也蓋帶脈起於季脅回身一周如束帶然為脾臟之氣所主脾虛則腹滿而帶脈弛故腰冷而或下墜也按此言陽蹺由外踝上行入風池其為足太陽之支別更可見矣起於跟中者外踝下五寸足太陽經申脈穴也陰蹺亦起於跟中內踝下足少陰經照海穴也衝任脈不榮口唇無須靈樞五音五味篇帝曰婦人無須者何也岐伯曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須不生焉此又言衝任之脈皆起於胞中循背裡上行為經絡之海其浮於肌表者循腹右上行衝任會合於咽喉別而絡唇口血盛則生髭鬚婦人行經其血數脫不榮唇口故須不生焉帝曰士人有傷於陰陰氣絶而不起陰不用然其須不去宦者獨去何也岐伯曰宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不榮故須不生此言宦者去其宗筋則內傷衝任之脈血瀉不能復生且宗筋肝所主肝藏血者也去宗筋則肝血大瀉焉能復生故皮膚結滯血不上榮口唇矣帝曰其有天宦者未嘗被傷不脫於血其須不生何也岐伯曰此天之所不足也其衝任不盛宗筋不成有氣無血唇口不榮故須不生此言天生如宦者不但衝任之脈有氣無血而宗筋且不成就則更虧缺不能生育故名天宦若後世更有為石女者皆陰陽偏雜之氣所生釋典所謂業報之身由夙世自心所造之業也
