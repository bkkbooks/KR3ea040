body:
  text: 卷五外感內傷總論方脈所主病證多端總其綱要不出外感內傷兩門然外感則有風寒暑濕燥火之異其為病不同而治法迥別故仲景分六經證治以辨陰陽表裡虛實寒熱此傷寒論一書首當體究者也夫傷寒傳裡則變為熱要在辨邪之淺深若表邪未解必先解表方可治里此而錯誤反使外邪內陷而成危證其有初感風寒直入於陰者因其本元不足則當溫中助陽不可誤發其表仲景皆已詳辨者也惟大江以南風寒無北方之厲略用辛溫表散即解其內傳者多由初治失當致表氣反閉而變重病此辨證不明之故也蓋風由陽氣所化經言風為百病之長善行而數變故隨寒熱溫涼之氣而變時令寒則為風寒時令溫則為風溫自霜降後寒氣日甚及冬至一陽下升至立春陽氣始出於地陰氣自上而降者尚盛故寒邪多也春分以後陽漸上升陰漸入地其氣方溫至巳月而陽盡升地上則寒少矣故經言夏至前病名溫夏至後病名暑溫者純陽之氣溫甚則為火邪矣其名暑者夏至一陰下升陽氣上降陰陽變遷火濕合化之氣也故人身之氣亦隨之而變夏至前人身內陽外陰或有寒邪易於化熱夏至後外陽內陰而暑由火濕合化濕為陰邪故不可輕投寒劑而暑病古方有用薑附玉桂者皆本陰陽至理而與溫熱之邪治法不同學者不可不知也若秋燥之氣亦有陰陽寒熱之異余前集六氣論中俱已辨晰此為外感之大略也若夫內傷雜證仲景金匱要略已明大綱要在分別虛實兩端凡七情妄動而傷本元者為虛飲食不調而有積滯者為實其虛者須辨陰陽氣血陰陽根於腎元氣血生自脾胃故傷氣血者調補脾胃尚易傷陰陽者培其腎元為難如其陰損而脾胃強大便固者可用滋潤養陰之法倘脾胃弱而兼大便滑者陽亦傷矣不可治也其陽損者脾胃弱而便不固必能受助陽之藥為吉如不能受陰亦枯矣不可治也其有陰陽雖傷而脾胃尚強者調理得宜猶可帶病延年如陰陽雖非無根而脾胃先敗者終歸不起故經曰有胃氣則生無胃氣則死也若由飲食勞倦而傷脾胃輕者可以調治久傷不復必至陰陽俱敗以無生化之源也此皆內傷之大略也且如純虛純實而可用補用瀉之病少內傷外感虛實夾雜之病多變幻多端莫可測識苟非洞明陰陽氣血生化之理臟腑經絡淺深之殊則不能辨本元之虛實病邪之所由難免誤治之失矣此內經之不可不研究以明之也本門所集病證有未盡者當於四診臟腑經絡諸門參合觀之至於六氣流行主客變化每有釀成疫癘者經分金木水火土五疫詳運氣門中如能悟其至理病變雖多皆可一以貫之故方脈為諸科領袖則神而明之存乎其人也經解病機一十九條素問至真要大論帝曰願聞病機岐伯曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此之謂也此總標百病各有所屬名為病機機者發動所由為病之因也其機皆同謂之皆屬然有陰陽虛實外感內傷之異必當細辨即如肝為風木之臟風為陽邪而動泄故諸風病之動掉眩冒者皆屬於肝然有外感之風則為實邪血少內生之風則為虛邪也腎為寒水之臟寒為陰邪而凝斂故諸寒病之收引氣血者皆屬於腎然有外感之寒為實邪而可發散有陽虛內生之寒必當溫補也其餘諸證莫不皆然矣諸氣膹郁皆屬於肺者以肺主一身之氣也膹同賁衝突之義脾為濕土之臟故諸濕腫滿皆屬於脾也瞀音茂昏眊也瘛者抽搐由火甚生風故皆屬於火也心主血脈血中熱鬱或因邪閉而成痛癢瘡瘍故皆屬於心也肢冷為厥起於足經鬱閉氣不周行固者二便不利泄者二便滑泄故皆屬於下也肺熱葉焦發為痿躄肺病則喘胃氣上逆則嘔故皆屬於上也禁同噤諸禁鼓栗者咬牙發戰或因外邪或因氣閉抑遏心火不伸故如喪神守皆屬於火也痙者經脈強急不得屈伸濕閉氣血不得流通故皆屬於濕也火性上炎故諸逆衝上皆屬於火而有虛實之大異也諸腹脹大由脾氣壅滯濕熱不行故皆屬於熱然有陽虛不運或食積不消多端不同也狂躁是陽動故皆屬火然更有虛實之殊也諸暴強直與痙相類此言屬風者大抵動掣者為風不動者濕閉如風則有血虛而生者與外感治法迥別也諸病有聲鼓之如鼓者如胸腹鳴響按之有聲之類病因多端總由氣火不得流通故皆屬於熱也胕腫濕火疼酸驚駭肝火故皆屬於火也諸轉反戾水液混濁者濕火內閉反側不安故皆屬於熱也水液澄徹清冷則為寒矣諸嘔吐酸肝膽火逆也暴注下迫者火性急速下迫大便暴瀉也以上一十九條止有水液澄徹清冷屬寒余皆屬火屬熱者蓋外邪雖寒傳裡則多隨陽氣化熱故劉河間言六氣皆從火化是陰陽變化自然之理也但皆有虛實之分虛實不辨殺人於反掌間矣故當詳審病機而謹守理法又必反復推求其有邪無邪為虛為實先察其五行生剋六氣勝復之道疏通其氣血使周流於臟腑經絡而致調達和平方能愈病而保生也若河間止論其實未詳其虛粗疏不可為法其發明內經至理辨別陰陽虛實表裡寒熱精細周至者惟仲景一人而已學者可不悉心體究其書哉諸病源流人生本於天地氣化素問生氣通天論帝曰自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣其生五其氣三數犯此者則邪氣傷人此壽命之本也蒼天之氣清淨則志意治順之則陽氣固雖有賊邪勿能害也此因時之序故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也此總標外感內傷所由起也人與天地同根故形氣之在天地間六合內者有九州在人身者有九竅有五臟十二節皆通乎天氣者也所稟以生者有金木水火土五行之氣所賴以養者有三陰三陽之生化萬物也其陰陽五行氣化流行必有衰旺偏駁偏駁者為邪氣若不善調理數犯其邪氣則傷人故天地之氣化為人生壽命之本也若人身之氣能如蒼天之氣之清淨則心神和而志意治其身中陽氣固密雖有賊邪勿能為害此為順天時氣化之序故聖人傳教以養精神服天氣而通神明也如失之而受邪則內閉九竅外壅肌肉衛氣散解此謂自傷而元氣削也推原其要在清淨而治意志為卻病養生之道也陽氣者若天與日失其所則折壽而不彰故天運當以日光明是故陽因而上衛外者也欲如運樞起居如驚神氣乃浮因於暑汗煩則喘喝靜則多言因於寒體若燔炭汗出而散因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿因於氣為腫四維相代陽氣乃竭此承上文言人身陽氣當如蒼天之清淨與日之光明則心神和而志意治如失其所則折壽而神明不彰矣故天之健運而不息者以天體清淨而日光明照也人能心淨氣清則神光自然彰明矣良以人身陽氣根於陰自下而上升外行以為衛也升必有降內外周流欲如機樞之運轉而循環不息者起居如有驚擾則神勞氣動而陽不固密外邪因而傷之若因傷於暑者暑當與汗俱出勿止蓋暑由火濕合化汗出而濕去火亦得泄也若火盛上炎則心煩而肺氣喘喝或氣平靜而心火不寧則必多言若因傷於寒邪表陽被遏則身熱如燔炭仲景所云脈緊身熱無汗為傷寒用麻黃湯發汗汗出則解散矣此言陽經傷寒者若寒傷陰經則無身熱頭痛非可發汗也若因傷於濕者地之濕氣下先受之霧露濕邪上先受之濕邪矇蔽清陽則頭目昏重如被包裹之狀濕侵筋脈陽郁化熱而不急為攘除則筋傷而大筋軟短小筋弛長乃成拘攣痿躄之病矣因於氣為腫者其濕不傷筋而傷陽氣也蓋脾為太陰濕土而主肌肉濕邪傷陽而脾困則肌肉腫矣脾土旺於辰戌丑未四季為一歲之綱維者脾傷身腫而遇四維土旺之時不愈至旺氣過而時令相代則陽氣竭而死故曰四維相代陽氣乃竭也舊注四維解作筋骨血肉或解作四肢而筋骨血肉與四肢又如何相代則全無義理可通矣況至真要大論岐伯曰夫氣之生與其化衰盛異也寒暑溫涼盛衰之用其在四維蓋言寒暑溫涼之氣流行有盛衰而後有變化當變化之際在辰戌丑未之四季而立春夏秋冬之四時故土旺四季而為一歲之綱維也所以然者春夏秋冬是木火金水四氣金木水火互相剋賊必賴四季之土於中調理維持方成造化之功故曰盛衰之用其在四維觀此其義理豈不確然可證乎陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汨汨乎不可止陽氣者大怒則形氣絶而血菀於上使人薄厥有傷於筋縱其若不容汗出偏沮使人偏枯汗出見濕乃生痤痱高粱之變足生大疔受如持虛勞汗當風寒薄為皶郁乃痤上節言外邪所傷此明勞欲所傷也篇首云清淨則志意治而陽氣固若煩勞不息則陽氣鴟張化為邪火火熾則水耗水者精血所由生也其水漸耗而至精絶不生其邪僻之氣蓄積而至夏令火旺之時身中灼熱如煎而經脈鬱閉陽氣不得周行四肢故反厥冷名曰煎厥俗稱骨蒸乾血勞者也目得血而能視精血枯故目盲精脫者耳聾故氣閉不通而耳不能聽傷損至此身如潰敗之壞都而氣血流散如無防之水汨汨乎不可止遏而收攝雖有藥石莫能治矣若肝為剛臟藏血而屬木主春升之氣大怒則肝氣逆而其充形之氣機遏絶血隨氣鬱而菀結於上焦因而營衛閉塞經脈不通使人薄厥者怒氣急迫暴厥也肝主筋故致有傷於筋而弛縱不能束骨則行立戰掉其若不能整容也夫氣主煦之血主濡之陽氣乖逆則營衛不和而汗出偏沮沮者漏泄也月令所云地氣沮泄是津液不能周流乃從或左或右而漏泄以成偏枯之證也以上皆言情欲所傷者也如或汗出腠開之時而受濕邪逆閉營氣乃生痤痱瘡癤之類也其有素貪高粱厚味而致傷者足以生大疔毒不止痤痱而已良以日逐所蘊邪熱如持虛空之器而受物其積蓄深也若因勞汗出而當風寒迫郁表陽或為皶為痤俗稱粉痣之類皆淺在皮腠尚無大害也陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為瘻留連肉腠俞氣化薄傳為善畏及為驚駭營氣不從逆於肉裡乃生癰腫魄汗未盡形弱而氣爍穴俞以閉發為風瘧故風者百病之始也清淨則肉腠閉拒雖有大風苛毒弗之能害此因時之序也故病久則傳化上下不並良醫弗為故陽蓄積病死而陽氣當膈膈者當瀉不亟正治粗乃敗以上皆題陽氣謂陰陽兩平中和之氣也其中和而精粹者以養心神中和而柔潤者以養筋骨敷布周流內自臟腑外達經絡表裡陰陽循環無間者也太陽為開陽明為闔少陽為樞太陰為開厥陰為闔少陰為樞如氣有乖逆而升降開闔不循軌則外寒因而從之使筋脈拘急乃生大僂者大體傴僂不伸也如或邪陷血脈營氣鬱結則成瘰癧鼠瘻等瘡如邪留連肉腠與穴俞之氣逼迫久而侵入內臟傳為善畏驚駭之病乃肝膽傷也若營氣不從軌則逆於肉裡乃生癰腫也肺藏魄皮毛為肺之合汗出毛竅乃名魄汗汗出未盡者由形氣內弱而邪風外加穴俞以閉乃發為風瘧也凡六氣之邪傷人必兼風以風性尖利而易入故風為百病之始也若身中陽氣清淨而固密則肉腠閉拒雖有大風苛毒弗能為害此因順時序之氣化也大風苛毒即靈樞九宮八風篇所云之虛風賊邪故曰邪之所湊其氣必虛至病久而邪傳化則上升下降陰陽相格而不相併謂陰陽不相交通病至如此雖有良醫弗能為矣故其陽氣化為邪氣蓄積至於病死而邪陽之氣鬱結當膈是當及早瀉之乃不急急正治而為粗工所敗者也故陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣虛氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄此總結上文之義也上言陽因而上衛外者也故此專言衛陽之氣晝行於身之陽分故一日而主外平旦自陰而出於陽其氣始生日中而陽氣隆盛日西則又入於陰故外衛之陽氣虛氣門乃閉是故暮而陽氣內收以拒外無擾動筋骨以傷內氣也表陽既虛無見霧露陰濕之氣以傷外體也如不知早午暮三時陽氣出入之序而反逆之則形氣乃困迫而致委頓矣此申明外邪所傷必由陽氣內乏之故以應上文陽氣固密外邪弗能為害之義也岐伯曰陰者藏精而起亟也陽者衛外而為固也陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通是以聖人陳陰陽筋脈和同骨髓堅固氣血皆從如是則內外調和邪不能害耳目聰明氣立如故此又申明陰陽互根之理以表必使和平不可偏勝也經中反復詳明無非斯旨自朱丹溪造陽常有餘陰常不足之論至張景嶽又反其說雲陽常不足陰常有餘兩家雖各有見解不免晦經旨而迷後學也此節專標陰陽偏勝之病尤為明著蓋陰陽之氣出於命蒂流為營衛命蒂象太極也陰陽互根於太極故偏亢則偏絶矣精者陰中之陽也陽根於陰故陰藏精也起者坤下起復也而陰根於陽故乾下變垢也亟者謂起而又起無間斷無窮已乃陰陽相生而不息者其流為營衛則營行脈中為陰衛行脈外為陽故陽者衛外而為身之固也若有偏勝而陰不勝其陽則營行脈中者不足故脈流薄弱而速疾以陽勝而行速也及其甚也氣盡歸併於陽乃發狂病矣如陽不勝其陰而陰屬臟其氣凝滯故不得調暢而相爭清陽不能轉旋於表裡以致九竅窒塞而不通也是故聖人備陳陰陽生化之道必使氣血流通煦潤而筋脈和同骨髓堅固則內外調和邪不能害自然耳目聰明元氣建立如故矣風客淫氣精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔因而大飲則氣逆因而強力腎氣乃傷高骨乃壞凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏因而和之是謂聖度故陽強不能密陰氣乃絶陰平陽祕精神乃治陰陽離決精氣乃絶此明陰陽不調而致病者也風氣通於肝風邪客之侵淫日久則化熱而傷陰精精乃亡由邪傷肝也肝主筋既經邪傷而又飽食使脾氣困乏則筋脈橫解橫解者弛懈也脾困則生濕濕邪下注而為腸澼痔漏也因而又大飲其酒則氣逆更強用力腎氣乃傷而督脈損高骨乃壞高骨背上天柱骨也故凡陰陽之要陽密乃固若兩者不和如四時之失序而生化之道絶矣因而和之是謂聖人之法度不循聖度不能和也故陽強而不靜密則偏亢而陰氣偏絶若陰氣和平陽氣祕密自然互相生化而精神乃治也若陰陽析離而決裂精氣乃絶而死矣因於露風乃生寒熱是以春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必溫病四時之氣更傷五臟風露之邪必傷營衛乃生寒熱之病凡邪之淺深傳化病變多端是以春為風木司令而傷於風者邪氣留連不解傳入腸胃而成洞泄之病以風性疏泄也夏傷於暑者邪客膜原夏氣外浮而不即病至秋涼風外束邪不能容乃發為痎瘧痎音皆痎瘧者以邪內結外閉而難出日久不愈也秋傷於濕之濕是燥字之訛余前集素問辨疑已申明矣蓋肺為燥金秋為燥令燥傷肺液故上逆而咳痿論曰肺熱葉焦發為痿躄經氣因之不周則厥矣若濕邪屬脾多為腫病而無咳逆其訛可見也冬傷於寒者腎為寒水之臟而主冬令同氣感召邪伏於經而不即發至春陽氣上升邪化為熱乃發為溫病此四時之氣更迭而傷五臟者正為人身之氣通乎天氣故氣有駁雜即為所傷又有偏亢倚伏傳變多端之病統會上文義理誠詳悉也素問陰陽應象大論曰天有四時五行以生長收藏而生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥逆上行滿脈去形喜怒不節寒暑過度生乃不固故重陰必陽重陽必陰故曰冬傷於寒春必溫病春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽此明天人合同氣化以表外感內傷之由也蓋在天為氣在地成形皆四時五行之所生長收藏者也寒暑燥濕風即水火金土木之氣以生者人稟其氣而生故有五臟化五行之氣以生喜怒悲憂恐之五情是故縱情喜怒則傷氣外感寒暑則傷形暴怒則氣逆化火而傷陰暴喜則神蕩氣弛而傷陽陰陽偏傷其氣厥逆而上行則臟虛脈滿氣血奔騰勢將離形而去蓋志者氣之帥也氣者體之充也喜怒動志而暴其氣氣離形體而去也先傷氣者後必至於傷形先傷形者後必至於傷氣是故喜怒不節寒暑過度生命乃不固也舉喜怒則悲憂恐亦然矣舉寒暑則燥濕風亦然矣此內傷外感之病因也重陰必陽重陽必陰由太極動極而靜靜極而動乃變化生成自然之道也故曰冬傷於寒云云者證明前文四時之氣更傷五臟之義也如冬之陰令而傷寒之陰邪是為重陰至春變為溫病即重陰必陽之理也春之陽令而傷風之陽邪是為重陽至夏而成飧泄是陽邪傳陰亦即重陽必陰之理也變化之道皆可類推矣帝曰法陰陽奈何岐伯曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死能夏不能冬此陰陽更勝之變病之形能也此明陰陽偏勝之病狀也其陽邪勝而身熱腠理閉喘粗為之俯仰汗不出者營衛不通而氣上逆也齒乾煩冤腹滿者邪入臟腑內外皆閉不得發泄故死能冬不能夏者冬令陰旺而陽邪勝者或可耐時以調治若夏令陽旺以助邪則不能治矣其陰邪勝而陽虛則身寒汗出身常清冷數栗而寒者表陽已虛寒甚則厥厥則腹滿者內陽又敗故死能夏不能冬者義與陽勝者同此陰陽更相勝負之變而病形之能愈不能愈可驗也清濁氣亂靈樞五亂篇帝曰經脈十二者別為五行分為四時何失而亂何得而治岐伯曰五行有序四時有分相順則治相逆則亂經脈十二者以應十二月十二月分為四時四時者春夏秋冬其氣各異營衛相隨陰陽已和清濁不相干如是則順之而治清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是謂大悶故氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝接手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩僕經脈為枝葉五臟為根本五臟具五行之性故經脈亦有五行之別而五行之生化有序也手足三陰三陽十二經以應十二月乃分春夏秋冬四時之氣候是故營衛經絡陰陽氣血生化流行皆合乎四時升降之氣五行相生之序則陰陽和平清濁不相干而各循其道如是則為順而治也夫身半以上為陽身半以下為陰清氣為陽而上升濁氣為陰而下降如清氣在陰而不升濁氣在陽而不降則使營氣順脈而行不與衛和衛氣逆行則升降失序而清濁相干故曰清氣在下則為飧泄濁氣在上則為䐜脹隨其逆亂之處而現病也如亂於胸中是謂大悗悗者鬱悶也亂於心則煩心密默俯首靜伏者以心煩不欲言動也亂於肺則氣壅塞故俯仰喘喝接手以呼者兩手交接抵胸始能呼氣以出也亂於腸胃則為霍亂吐瀉交作矣亂於臂脛則陰陽經脈交接之氣不通故四肢厥冷也亂於頭則氣厥上逆頭重下輕故目眩而跌僕也此雖止舉數端而余處皆可概見矣然其所以致之者必有外感內傷之因要必求其所因而調之也邪流八虛靈樞邪客篇帝曰人有八虛各何以候岐伯曰以候五臟肺心有邪其氣流於兩肘肝有邪其氣流於兩腋脾有邪其氣流於兩髀腎有邪其氣流於兩膕凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷經絡骨節機關不得屈伸故病攣也兩肘兩腋兩髀兩膕者五臟真氣之所過經絡血脈之所遊為一身之機樞關要也故邪氣惡血不得留住於此若五臟有邪其氣外走必由八處流行而與惡血住留於此者則傷經絡筋骨機關窒塞不得屈伸而成拘攣之病故其稱八虛者此八節機關必要虛通而氣血流行調暢則無諸病也營衛腸胃邪痹靈樞壽夭剛柔篇帝問營衛寒痹之為病伯高曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客於腸胃之中寒痹之為病也留而不去時痛而皮不仁營為陰而行脈中主血衛為陽而行脈外主氣經在營分絡在衛分營衛氣血由經絡而周流表裡者也病在營則經絡不得通和故發寒熱而少氣氣鬱則血不能四布而但上下行走故有因外邪而動血吐衄者即營病之徵也蓋血得寒則凝澀得熱則妄溢也衛行脈外其氣慓悍而浮漫其為病也逆其氣勢則鬱結而痛時來時去者流走不定也怫愾音費欷鬱悶而太息也以其風寒客於腸胃清濁相混故又賁響也賁同奔如寒邪痹而不去則內時痛而皮不仁不仁者頑木不知痛癢以大腸之氣外應於皮而邪本由皮毛而入也風寒傷形情欲傷氣帝曰形氣病之先後外內之應奈何伯高曰風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃應形風傷筋脈筋脈乃應此形氣內外之相應也風寒由皮毛而入故傷形憂恐忿怒以動神志故傷元氣元氣根於臟乃致臟病也若以風寒分之寒為陰邪傷形形者統營衛經絡肌肉筋骨而言也若風為陽邪獨言傷筋脈者兼內風而言也蓋筋脈肝心所主肝血少則生風心勞動則生火故有外邪內邪之分若外邪則風傷衛脈緩而有汗寒傷營脈緊而無汗如仲景所論者故先統言風寒傷形也又如素問調經論所云陰盛生內寒者由內傷陽氣也如其傷陰血則生肝風而心火亦熾風火交爍必傷筋脈此形氣與內邪外邪之必相應而有證狀可驗也外邪自淺入深素問繆刺論岐伯曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以別之岐伯曰邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也故絡病者其痛與經脈繆處故命曰繆刺此節當與痹病篇衆痹周痹各條合觀蓋凡外邪之由皮毛入者必自淺而深從絡入經則內連五臟散於腸胃以陰陽十二經內通臟腑者也故陰陽俱感五臟乃傷然邪雖深入其未離於經者必當從經而治以其由表而入必使仍從表出不可輕攻其里反使外邪內陷則危矣故如仲景之治少陰病發熱者邪不離經乃用麻黃細辛通經以附子助里達表此邪之淺深治法先後不可不知也如邪先舍孫絡留而不去絡脈閉塞不與經通則邪流溢於大絡而生奇病謂其病狀奇異也因大絡散布周身內外交互錯綜與經脈之徑直而有隧道者不同故邪客大絡則隨絡氣散漫遊走左注右右注左上下左右皆與十二經相干涉而分布於四肢之末其邪遊走不入經俞故為奇病如俗名流火遊風之類也治之當用繆刺以左取右以右取左不同治經之法也若邪客於經亦有偏左偏右互相移易者必用巨刺以治經非同刺絡之法繆刺淺巨刺深以絡淺經深也邪在大絡其痛遊走無常與經病之痛有定處者不同絡病之痛言與經脈繆處者與經回繞而不在經中蓋十二經交接之處皆由絡脈通貫而絡與經之首尾繆處故命曰繆刺也此下皆言絡病方脈家必須明之刺法另有專科而藥治亦同一理也邪客手足三陰三陽之絡邪客於足少陰之絡令人卒心痛暴脹胸脅支滿邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭邪客於足厥陰之絡令人卒疝暴病邪客於足太陽之絡令人頭項肩痛邪客於手陽明之絡令人氣滿胸中喘息支胠胸中熱邪客於臂掌之間不可得屈邪客於陽蹺之脈令人目痛從內眥始人有所墜墮惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡邪客於手陽明之絡令人耳聾時不聞音凡痹往來行無常處者在分肉間痛而刺之邪客於足陽明之絡令人鼽衄上齒寒邪客於足少陽之絡令人脅痛不得息咳而汗出咳者溫衣暖食邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上嗌中腫不能內唾時不能出唾者邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息邪客於足太陽之絡令人拘攣背急引脅而痛邪客於足少陽之絡令人留於樞中痛髀不可舉邪客於五臟之間其病也脈引而痛時來時止邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥以竹管吹其兩耳剃其左角之發方一寸燔治飲以美酒數杯不能飲者灌之立已手足陰陽十二經交接之處皆由絡脈通貫經如粗枝而直絡如細枝而橫由絡分枝而更細者名孫絡故經有陰陽淺深而絡亦如之其部位皆隨經而繆處者也以上所列病證皆絡氣行到之處邪客之其氣或閉或逆故現諸病其同一經而有重迭病證不同者因經之首尾皆有絡而部位又有淺深高下故其現病各異也若其流行次序及十二經所現病證已詳經絡門中經脈篇當合觀之義理更明也惟絡脈既通經之首尾而又散布周身其孫絡淺在皮腠之間而脈愈細故受邪則氣閉不通凡麻木痹痛及遊走不定者皆為絡病而陽絡在表故傷則血外溢而為吐為衄陰絡在裡故傷則血內溢而為便血溺血也外邪從絡入經氣血自經注絡而血隨氣行自內出外邪則由表入里故逆之而成病若氣血旺邪不能入故曰邪之所湊其氣必虛但六氣之邪有陰陽清濁之異故亦隨類相感或由皮毛而入於經者或由口鼻而入從中道而分走表裡者其現證皆各不同則必辨明而治之故當洞明經絡部位之淺深也邪隨時令氣候入客素問四時刺逆從論岐伯曰春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中帝曰願聞其故岐伯曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈夏者經滿氣溢入孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急冬者蓋藏血氣在中內著骨髓通於五臟是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣闢除其邪除其邪則亂氣不生此言天地陰陽五行之氣升降流行以春夏季夏秋冬五時應木火土金水之五氣而主生長化收藏以滋養萬物人生氣交之中故身中元氣應天地之氣而浮沉浮則旺於表而衰於裡沉則旺於裡而衰於表邪必乘衰而襲之故亦隨時令氣候而入客於身則有淺深部位不同也每見秋冬風寒之邪多從皮毛而入經絡夏令暑濕之邪多由口鼻而入脾胃其表裡元氣之衰旺亦可徵矣然此言其常理耳至其變化為病不可為一定之度良以人稟有強弱感邪有重輕要必審其受邪之處從其經氣闢除其邪蓋經者通表裡之道路表裡之邪皆可由之而闢除除其邪則亂氣不生而病自愈故仲景分六經以辨脈證而立治法為傳軒岐之道脈也其不究心於仲景而流於淺陋邪僻者豈不為軒岐之罪人哉又按素問金匱真言論曰春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢與此篇相類而各有義理不同録後虛風賊邪篇內宜合觀之筋骨不得屈伸靈樞終始篇曰手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋筋攣故屈而不能伸骨強故伸而不能屈肝主筋腎主骨各守其主病者而治之也素問平人氣象論曰膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣此觀其行立之狀知其筋骨之將憊憊者敗也疹筋素問奇病論帝曰人有尺脈數甚筋急而現此為何病岐伯曰此所謂疹筋是人腹必急白色黑色現則病甚疹者結氣為病之義故風熱之邪鬱結血絡發為疹子此名疹筋者肝主筋腎水虧不能養肝其陽鬱結於下不得上達故尺脈數甚而肝枯筋燥故筋急外現其腹中亦必拘急不舒白色黑色現則金水不能相生肺腎皆不調則肝病更甚也陰陽發病諸證二陽三陽素問陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治三陽為病發寒熱下為癰腫及為痿厥腨㾓其傳為索澤其傳為㿗疝此言內傷陰陽之氣而發病也二陽者陽明胃也胃氣由心脾發生故其病有從損傷心脾而發者蓋心者一身之主宰而為脾之母脾主為胃行津液而生化氣血者也其有不得於隱情委曲之事憂思鬱結則心脾俱傷而無生化轉運之力以致胃病食減若在女子尤多此病氣鬱血耗則月事不下也久而傳變其血枯生風虛陽化火風火消爍肌肉而脾土敗矣土敗則肺金無生氣乃成息賁息賁者氣餒而喘促傳變至此金水亦枯無論男女皆死不可治也凡經候二便之病經義皆謂之不得隱曲推其源總由心脾鬱結之所致也三陽者太陽也其腑為膀胱主藏津液而出小便其經主一身之表而統營衛外邪多由太陽經而入營衛則發寒熱之病陽病者上行極而下故邪不解則下走而營氣不從逆於肉裡乃生癰腫傷及經脈則為痿為厥為腨㾓腨者小腿後太陽經脈所行之處㾓音淵痠痛也又其傳變則皮膚枯索而不澤以太陽之氣榮於皮毛氣不榮則枯也又傳為㿗疝者其邪由經入腑牽連陰筋腎子頑木名㿗疝也一陽二陽一陰一陽發病少氣善咳善泄其傳為心掣其傳為膈二陽一陰發病主驚駭背痛善噫善缺名曰風厥一陽者少陽也為生陽之氣所從出故病則少氣清陽失於轉旋肺不清肅下降逆而善咳木氣不達鬱於土中其氣下陷故善泄瀉也其傳為心中若掣者肝膽為風木風木之氣擾動血脈以心主血脈故也其傳為噎膈者少陽為樞樞不轉而三陽之氣皆逆與痰涎膠結於膈也二陽者陽明胃一陰者厥陰肝二者同病肝主驚胃病聞木音則惕然而驚故主驚駭胃不和則肺氣不順故背痛中脘濁壅故善噫也呵缺本腎所主今陽不轉旋陰氣引之下行故胃病亦有善伸數缺也胃為臟腑之海而肝氣橫逆於中則一身內外之氣皆厥而不順肝為風木故名風厥是內風乘胃牙關緊急而厥也二陰一陽三陽三陰二陰一陽發病善脹心滿善氣三陽三陰發病為偏枯痿易四肢不舉二陰者少陰也一陽者少陽也少陽為陽經之樞少陰為陰經之樞陰陽樞紐皆病則六經開闔失職升降因之不調而氣鬱勃故病善脹心滿而善氣也善氣者濁氣時從便出俗謂之屁以陽明不闔之故然脹滿亦可以暫寬也三陽者太陽也三陰者太陰也太陽為開而主表太陰為開而主裡二經俱病則陰陽表裡之氣皆窒塞不開而經脈不得周流乃病偏枯痿易偏枯是身半邊偏廢痿易者肢痿或左或右變易不定也以上舉三陰三陽發病之證其因則有內傷外感之異當詳辨也陰爭於內陽擾於外陰爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴陰之所生和本曰和是故剛與剛陽氣破散陰氣乃消亡淖則剛柔不和經氣乃絶此總結上文之義也陰主內陽主外二氣偏亢則內外爭擾察其現證知病之在陰在陽也陽擾於外者腠理開泄肺氣不固魄汗不藏流而不止也陰爭於內者陰性凝斂使陽不得循經周布而四肢厥逆其中陽內沖而起化火熏肺則肺氣喘鳴是皆陰陽不和內外格拒之故也陰之所生句下必有脫文蓋陰陽之道互相生化陰之所生其本在陽陽之所化其本在陰要必推其所本而和之則曰和也如偏亢者瀉以和之不足者助以和之是故陽亢為剛若再與之剛則為亢極而陽氣破散陽散不能生陰則陰亦消亡矣若陰已平而又益之如積水成淖則剛柔不和而陽沉伏其氣不得至經乃至偏絶此皆不知和之之道也生死證死陰之屬不過三日而死生陽之屬不過四日而死所謂生陽死陰者肝之心謂之生陽心之肺謂之死陰肺之腎謂之重陰腎之脾謂之闢陰死不治此明臟病相傳生死之證不外陰陽之理也屬者病所歸也肝之心者木生火也故謂之生陽其病不過四日而已蓋一日木生火二日火生土三日土生金四日金生水則五臟生氣周流而病已故名生陽也心之肺者火剋金也二日金剋木三日木剋土土敗而後天根本絶則死故名死陰也肺之腎者金本生水但金水皆陰故名重陰而無火土生陽之氣也腎傳脾是陰水反來侮土土本剋水反受其侮則土無生陽之火可知故名闢陰闢偏也重陰偏陰而無陽故皆死不可治也良以脾胃為生化氣血之源火為土母木為火母故病之相傳以木火土相生則正氣旺而病邪退其火土氣敗則死不可治矣結陽結陰二陽結三陽結三陰結一陰一陽結結陽者腫四肢結陰者便血一升再結二升三結三升陰陽結斜多陰少陽曰石水少腹腫二陽結謂之消三陽結謂之隔三陰結謂之水一陰一陽結謂之喉痹此言陰陽鬱結而發病者四肢為諸陽之本陰陽經脈交接於四肢之末陽結不得交通於陰故四肢浮腫也若營陰結者營主血結則血不歸絡流通遂漫溢妄行由便而下所謂陰絡傷則血內溢也故結甚則下血甚矣若陰陽皆結而有偏斜其陰結多陽結少則成石水少腹腫蓋三焦外是營衛陽所主三焦內是腑臟陰所主陰陽皆結則三焦水道不利其陰結多故水下壅而少腹腫按之堅如石也二陽者陽明胃也陽結而化邪火乃成中消之病多食易飢而肌肉消瘦也三陽者太陽也太陽主開其氣結不得外達於表則阻隔於內或致飲食難下而便不通也三陰者太陰也亦主開其氣結則脾不轉運肺不輸布水飲蓄而成病也一陰者厥陰也一陽者少陽也甲乙木也木鬱則火發上灼於喉而成喉痹以肝脈循喉後故也有形無形痛與不痛靈樞壽夭剛柔篇少師曰病在陽者名曰風病在陰者名曰痹陰陽俱病名曰風痹病有形而不痛者陽之類無形而痛者陰之類也無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加之煩心名曰陰勝其陽此謂不表不里其形不久風由陽氣所化故病在陽分名風若寒濕陰邪凝滯故病在陰分名痹此以人身陰陽之氣與外邪同類相感而致病因病以立名也有形而不痛者如浮腫痞滿之類是病傷陽而陰完全也無形而痛者如肢體疼痛而無腫脹之類是病傷陰而陽完全也蓋陽為氣起發而流通起發故有形流通故不痛也陰為血沉靜而凝滯沉靜故無形凝滯故疼痛也此以病形而辨陰陽者也乍有形乍無形而煩心者邪在陰陽之間陰陽相格故煩心以不專在陽不專在陰故乍有形乍無形如其邪入漸深而屬陰分即名陰勝其陽此不表不里之病其形不久無矣由是可知陽勝於陰者其疼痛亦必不久而邪漸從外解也陽病當調其氣陰病當和其血是為一定之法也陽勝煩熱陰勝多痹素問逆調論帝曰人身非常溫也非常熱也為之熱而煩滿者何也岐伯曰陰氣少而陽氣勝故熱而煩滿也帝曰人身非衣寒也中非有寒氣也寒從中生者何也岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出此言不因受邪而為病者若受外邪身必常溫常熱今非常溫常熱而有時發熱且煩滿者是內生之熱也由其陰氣少而陽偏勝故內熱而煩滿與外邪之身熱自異也又有非衣少而身寒非飲冷而中寒其寒從中生者由其營衛經絡之氣多痹痹者因陽氣少而陰氣多陰性凝滯陽抑不伸故身寒如從水中出也嘗見有夏令而服棉衣者其飲食起居如常而臟腑無損即是多痹氣而陽少之人也以上皆言陰陽偏勝為病非獨外邪而致寒熱者也陰虛肉爍帝曰人有四肢熱逢風寒如炙如火者何也岐伯曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳逢風而如炙如火者是人當肉爍也脾胃統陰陽而主肌肉四肢者稟氣於脾胃而十二經陰陽之氣交接於肢末故陰虛陽盛則四肢熱風寒激之則如炙如火以其腎水少不能滅盛火而亢陽獨治獨治者孤陽不能生長氣血而壯火反使消爍肌肉也腎枯骨痹帝曰人身有寒湯火不能熱厚衣不能溫然不凍栗是為何病岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也是人腎氣素強以水為事者色欲過度也腎之腑太陽膀胱也臟損則腑陽虧而太陽經氣衰矣太陽主一身之表表虛而身寒故湯火厚衣不能使之溫熱也腎脂枯涸不長骨髓由腎而生腎脂枯故髓不充滿而寒甚至骨則軀體無陽和之氣矣其所以不凍栗者心為君火少陽相火由肝膽而行故心肝兩臟皆陰中之陽也腎為寒水孤臟也以其臟體分陰陽則一水不勝君相二火故不凍栗其皮肉筋骨已無陽氣煦和但有陰氣痹滯故病名骨痹經云液脫者骨屬屈伸不利故肢節必當拘攣也如此亦九死一生而已上條肉爍是邪熱盛此條骨痹是元陽消皆內傷敗證也五病所發素問宣明五氣論曰五病所發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏是謂五發陰病發於骨者腎主骨為陰臟也陽病發於血者心主血脈為陽臟也陰病發於肉者脾主肌肉為至陰之臟也此以臟象分陰陽也如其夙病在陽分者至冬陽氣收藏邪不能容則病發如在陰分者至夏陽氣升浮則病發所以然者外邪混於血氣之中隨經脈流行而不之覺至時令遷移陰陽氣變則邪動故陰遇陽即發陽遇陰即發如冬陰令而傷陰寒至春陽旺發為溫病夏令陽時而傷暑熱至秋陰令發為痎瘧同一理也五邪所亂五邪所亂邪入於陽則狂邪入於陰則痹搏陽則為巔疾搏陰則為喑陽入之陰則靜陰出之陽則怒是謂五亂人身臟腑經絡營衛氣血皆有陰陽之分六氣外邪亦有陰陽之異故病之變化萬狀要必辨其陰陽為綱領也此言狂者以陽邪入陽分陽性躁動也痹者以陰邪入陰分陰性凝滯也巔疾者本乎天者親上陽性上亢也喑者陰性主闔聲不能發也陽入之陰隨陰性而靜陰出之陽激陽性而怒如陽被陰激發而為雷也是故邪正互爭氣血擾亂病變多端要必有陰陽之理所在此五亂者足可為綱領也五邪所見死證五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同命死不治此明上文陰出之陽之義也春得秋脈金剋木也夏得冬脈水剋火也長夏得春脈木剋土也秋得夏脈火剋金也冬得長夏脈土剋水也蓋其五行相剋者由陰陽相離而不相交也名曰陰出之陽者其陰出離於陽而成孤陽故病善怒是謂五邪皆同命死不治也若陽入之陰則陰陽相入相交而生化其人靜而不死矣邪中陽溜於經中陰溜於腑靈樞邪氣臟腑病形篇岐伯曰身半以上邪中之也身半以下濕中之也故曰邪之中人也無有常中於陰則溜於腑中於陽則溜於經帝曰陰之與陽也異名同類上下相會經絡之相貫如環無端邪之中人或中於陰或中於陽上下左右無有恆常何也岐伯曰諸陽之會皆在於面中人也方乘虛時及新用力善飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經帝曰其中於陰奈何岐伯曰中於陰者常從臂胻始夫臂與胻其陰皮薄其肉淖澤故俱受於風獨傷其陰帝曰此故傷其臟乎岐伯曰身之中於風也不必動臟故邪入於陰經則其臟氣實邪氣入而不能客乃還之於腑故中陽則溜於經中陰則溜於腑身半以上天氣主之為陽風為陽邪故風邪中之身半以下地氣主之為陰濕為陰邪故濕邪中之同類相感召也風邪動蕩故中人無常處或中於陰則溜於腑或中於陽則溜於經此以表裡分陰陽不拘上下之部位也蓋以諸陽經皆會於面邪之中方乘陽氣虛時及新用力飲食汗出腠理開而邪中之中於面則下陽明以陽明經脈起於鼻交頞中由面下行者也中於項則下太陽以太陽經脈從頭下項背而走足也中於頰則下少陽以少陽經脈由耳前下頰行於身側者也中於膺背兩脅亦各入其經脈也其中於陰從臂胻始者以手足臂胻裡面皆三陰經脈所行者也其皮薄肉淖澤而不堅密故邪易入而風邪獨傷之也陰經內通於臟邪入之而臟氣實則邪不能客故還之於腑是由經入臟從臟出腑以腑臟經脈相通也故原其邪初中於陽則溜於經初中陰則溜於腑也此但指風邪內入之徑路次第而未及於濕也外感內傷帝曰邪之中人臟奈何岐伯曰憂愁恐懼則傷心形寒飲冷則傷肺以其兩寒兩感中外皆傷故氣逆而上行有所墮墜惡血留內若有所大怒氣上而不下積於脅下則傷肝有所擊僕若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎帝曰五臟之中風奈何岐伯曰陰陽俱感邪乃得往上言臟氣實邪不能客而還於腑其有邪中於臟者必由七情飲食房勞等事先傷臟氣邪得乘虛而入故此但詳內傷之因而曰陰陽俱感邪乃得往者以臟腑居里為陰營衛在外為陽統明外邪由內傷之所感召也面耐寒熱帝曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰然而其面不衣何也岐伯曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故天熱甚寒不能勝之也首面身形雖同屬筋骨氣血合而成形其陽氣津液皆上升而熏於面故獨耐寒熱而不畏所以上言或用力或飲食汗出腠理開邪始乘虛而入也虛邪正邪帝曰邪之中人其病形何如岐伯曰虛邪之中身也灑淅動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情虛邪賊風暴厲故中於身灑淅動形者寒栗毛豎也正邪者尋常風寒因腠理開而入其氣微而不厲先現於面色而身不之覺故若有若無若存若亡有形無形皆莫知其真實之病情也胃大腸小腸證帝曰願聞六腑之病岐伯曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈豎陷者足陽明病此胃脈也大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立與胃同候胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通食飲不下足陽明胃經之脈行於面故病則面熱也手腕魚際手陽明大腸經之絡脈故病則絡脈現血色也兩足跗上胃經之動脈名衝陽其脈豎陷者按之不應為足陽明病也若大腸病者腸中切痛而鳴濯濯有聲若重感於寒即泄瀉當臍而痛不能久立者立則氣墜欲瀉也其胃病者亦同候法以胃與大腸氣本相貫若胃病腹脹腹正大腸所居之處故現證相同惟胃氣上連於肺旁近於肝故胃脘當心痛上支兩脅膈咽不通食飲不下咽者胃之食管與肺喉前後相併者是故肺肝氣或不調亦使胃脘脹悶也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也手太陽病也小腸本在胃下大腸之上其病證反現於下者以其為心之腑而下通膀胱氣化關於肝腎故小腹痛腰脊控睪丸而痛者名疝病亦名小腸氣也時窘之後者大便堅澀因小腸主化物病則滓濁不化致大腸傳導不利也其有耳前熱或寒甚或肩上熱甚及手小指次指間熱而脈陷下皆小腸經脈所現之病故知其非肝腎膀胱之病而由小腸延及於肝腎膀胱當治小腸為主也三焦膀胱膽證三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見於脈取委陽三焦為決瀆之官水道出焉膀胱藏津液必由三焦氣化方能泄水三焦病而氣空故腹中氣滿而小腹尤堅者膀胱不能泄水而小便閉也水多漫溢留於肌膚則成脹病矣候在足太陽之大絡而取委陽穴者泄膀胱以通下焦之氣下焦通則三焦俱通矣故如水腫病用開腠發汗之法亦是疏解太陽經脈以通膀胱之氣所以經言三焦膀胱者腠理毫毛其應也膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小趾外廉及脛踝後皆熱若脈陷取委中央小腸為心之腑而氣行於左膀胱承小腸之氣化者肝位於左而主遺溺癃閉則與肝亦相關涉故膀胱病則小腸與肝氣皆不宣小腹偏左而痛以手按之欲小便而不得氣結不開也膀胱為腎之腑而下焦所主以其有足小趾外廉及脛踝後皆熱若脈陷皆膀胱足太陽經現證故取其經之委中穴以治之也膽病者善太息口苦嘔宿汁心下淡淡恐人將捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉少陽生氣由肝膽而升膽病氣鬱故善太息膽汁泄而上溢故口苦逆氣犯胃則嘔宿汁膽附於肝膽泄則肝虛前云肝實則怒虛則恐故心下淡淡恐人將捕之淡淡慘淡氣怯之狀蓋怒則膽氣橫恐則膽氣怯也氣逆於嗌故吤吤然有聲水液隨湧而數唾也病在足少陽經之本末本末者經之始終也視其經脈之陷下者灸之以通陽氣其發寒熱者因少陽經在半表半裡取穴針之以通表裡之氣而仲景用小柴胡湯以和之也肺肝脾胃腎心證靈樞五邪篇曰邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩臂肺合於皮毛而主衛氣故邪在肺則皮膚痛營衛不和則發寒熱以其上氣喘而汗出咳動肩臂皆肺病之現證故寒熱亦屬肺邪若邪在經而發寒熱必有頭痛肺病發寒熱則無頭痛也邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫兩脅為肝經所行之處故邪傷肝兩脅痛也寒中者脾胃虛弱陽不輸化而肝逆不得藏血故惡血瘀積在內以陽明本多氣多血以陽虛而寒肝逆氣陷故血蓄不行而時腳腫血不養筋而筋急故行則肢節牽掣也邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱脾胃主肌肉故邪客之則肌肉痛陽有餘則熱中而善飢陰有餘則寒中而腸鳴腹痛以脾胃統一一身之陰陽故陰陽偏勝則寒熱證現也上條中寒而有蓄血者肝病不藏血也此條中寒而無蓄血肝無病也邪在腎則病骨痛陰痹陰痹者按之不可得腹脹腰痛大便難肩背頸項痛時眩腎主骨邪在腎故骨痛陰痹者邪痹陰分深處故按之不可得而腹脹腰痛大便難皆陰氣痹結者也以腎為胃關開竅於二便故二便之病皆關於腎而大便難者有陰結陽結之分陰結為虛寒陽結為實熱仲景辨脈證甚詳此之陰痹即陰結也關門痹結則腸胃濁壅不行肺氣開張不得下降經氣皆逆故肩背頸項俱痛也腎病而水不涵木則虛陽化風而上冒故時眩也邪在心則病心痛喜悲時眩僕視有餘不足而調之其輸也邪受心包絡其氣有餘則笑不足則悲而心中痛者以心主血脈血脈鬱結也脈結氣不通則心火亢逆而神不能主持故時目眩而僕當視其有餘不足而調其輸者調心包絡之經氣也以上統指外感內傷偏邪之氣而言也心臟不受邪氣靈樞邪客篇帝曰手少陰之脈獨無腧何也岐伯曰少陰心脈也心者五臟六腑之大主也精神之所舍也其臟堅固邪勿能容也容之則心傷心傷則神去神去則死矣故諸邪之在心者皆在於心之包絡包絡者心主之脈也故獨無腧也心包絡稱臣使之官喜樂出焉一如君之近臣代心用事而出喜樂為心臟之脈若心主即元神清靜無為者也故其臟堅固邪不能幹而凡邪之干心皆包絡受之若傷心臟則神去而死矣虛實病證虛實之要素問刺志論帝曰願聞虛實之要岐伯曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病帝曰如何而反岐伯曰氣盛身寒此謂反也氣虛身熱此謂反也谷入多而氣少此謂反也脈盛血少此謂反也脈少血多此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃與肺也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也夫氣者體之充也脈者血之府也色者氣血之榮華也氣血者由水穀之精微所化者也是故形氣血脈之虛實色澤之明晦谷入之多少必當相應其不相應而相反者由外感內傷之病所致而要辨其虛實也假如形實氣盛者形體壯實呼吸聲粗而陽氣旺身不寒也若反身冷畏寒是外傷寒邪內氣被遏而不舒故聲粗似氣盛也形弱氣虛則聲微呼吸少氣不足以息而陽虛身寒也若反身熱而畏熱者是暑熱傷氣故氣虛不足以息也谷入多則胃強而氣自旺乃反少者因其脫血而氣耗散或濕邪傷陽濕為陰邪居下部而陽氣根於下者以濕居之故生氣少也谷入少則胃弱而中氣虛乃反盛者以邪客肺胃其氣滯逆非真盛也血盛則脈盛而色榮也若色榮似血多而脈反小者以飲酒而血中有熱非血多也若脈盛似血盛而色反枯白者因有風氣而致脈盛非血盛也風氣阻於中水漿且不入何有穀氣以生血氣哉素問通評虛實論岐伯曰邪氣盛則實精氣奪則虛氣虛者肺虛也氣逆者足寒也非其時則生當其時則死餘臟皆如此此統言虛實之道舉一臟以該餘臟也蓋肺主一身之氣故氣虛者肺必虛也若氣逆而不降者其陽上亢故足下必寒也肺金旺於秋若非秋時而肺虛尚可生若當旺時而反虛其根本已敗可見或夏令火旺剋金之時則更難培養也又如秋冬陽氣收降之時而氣逆足寒猶可調治若春夏陽氣升浮而氣逆足寒即有上脫之虞故曰非其時則生當其時則死也餘臟如肝心之氣旺於春夏而主升肺腎之氣旺於秋冬而主降脾旺於季夏而主轉運其虛其實為逆為順皆可如此類推矣薛生白曰邪氣盛則實精氣奪則虛此二句為治之大綱其辭似顯其義甚微而辨之最難者也蓋言邪氣實宜瀉正氣虛宜補凡邪正相搏而為病則邪實正虛皆可言也主瀉者曰邪盛當瀉主補者曰精奪當補各執一見藉口文飾以至精之訓釀莫大之害不知理之所在有必不可移易者察虛實之緩急有無也無虛者急在邪氣去之不速留則生變也多虛者急在正氣培之不早臨期無濟也微虛微實者亦治其實可一掃而除也甚虛甚實者所畏在虛但固守根本以先為己之不可勝則邪無不退也二虛一實者兼其實開其一面也二實一虛者兼其虛防生不測也總之實而誤補固必增邪猶可解救其禍小虛而誤攻元氣忽去莫可挽回其禍大此虛實之緩急不可不察也所謂有無者察邪氣之有無也凡風寒暑濕燥火皆為邪邪之在表在裡在腑在臟必有所居求得其本則直取之此所謂有有則邪之實也若無六氣之邪而病出三陰則惟情欲以傷內勞倦以傷外非邪似邪非實似實此所謂無無則病在元氣也不明此義必至以逆為從以標作本絶人長命耳楠按此篇之論最為精當學者宜三復焉惟云誤補增邪猶可解救其禍小然余親見有病伏暑發瘧者其人信景嶽書而用補氣等藥其邪暫伏瘧止不數日復發更認為虛而服熟地等劑即變悶痧邀余視之不可解救是夜而卒蓋風寒之邪在表者誤補猶可解救虛人且當助內以托邪若暑濕之邪初由膜原而歸脾胃故雖虛不能用補法而為難治必須輕藥從緩調之急則生變也是故虛而挾邪者必辨其邪之淺深表里為要也五臟現病靈樞本神篇曰肝藏血血舍魂肝氣虛則恐實則怒脾藏營營舍意脾氣虛則四肢不用五臟不安實則腹脹涇溲不利心藏脈脈舍神心氣虛則悲實則笑不休肺藏氣氣舍魄肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志腎氣虛則厥實則脹五臟不安必審五臟之病形以知其氣之虛實謹而調之也心為君主之官心神靜則靈明無作動則化識為用魂魄意志皆由心神所化為識之別名寄於肝肺脾腎四臟故各臟有病皆關於心而知痛苦凡情欲之動出於心而必先傷各臟者也良以神氣本為一物而分二用者神動則傷氣氣動則亂神故曰持其志無暴其氣也觀臟氣之虛實而現恐怒悲喜等病其神氣本為一物更可徵矣然氣又有陰陽五行之分故五臟之現病各有不同也臟腑為表裡腑氣本於臟故臟氣虛實即腑氣虛實也肝氣虛則膽怯而多恐也肝為剛臟名將軍之官故其氣實則膽橫而多怒也營氣生於脾故脾藏營而營舍意也四肢稟氣於脾胃其氣由脾健運而外達脾虛故四肢無力而不用也脾為中土金木水火藉以調和其氣虛不能周布則金木水火互相剋賊而五臟皆不安矣脾位於腹其氣實則壅而不得轉輸腸胃因之不通故腹脹而涇溲不利也血脈從心臟之氣而生故謂心藏脈而脈舍神每見有外邪瘀結血脈者即多昏譫理可見矣以神氣本為一物故氣虛則神喪而悲氣實則神旺而喜笑不休也一身之氣皆歸肺權衡四布故肺藏氣而氣舍魄也肺開竅於鼻其氣虛則濁蔽其竅而不通利出入氣少也其實者則氣壅於胸不得分布故喘喝胸滿而仰息也水穀所化之精血皆由脾臟轉輸而血歸肝精歸腎故謂肝藏血而血舍魂腎藏精而精舍志也志者神火之所注而舍於精故精能生氣而為陽之根氣虛則陽衰而多厥冷也腎為胃關開竅於二便故腎氣實則關竅不利濁壅腸胃胸腹脹悶而五臟皆不安矣是故必審五臟之病形以知其氣之虛實謹按理法而調之以五臟為根本五臟調和則一身自無諸病也肝病素問臟氣法時論曰肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽氣逆則頭痛耳聾不聰頰腫此言五臟虛實之病與上本神篇有不同者蓋本神篇專明本臟之虛實此篇特明受邪之病形故直標肝病心病而不明言其臟象止表受邪之證所謂邪盛為實精奪為虛也而其言虛亦有挾邪之證故雖同論五臟虛實而義理迥別各明其病也肝脈起於足由少腹布脅肋故肝病則兩脅下痛引少腹以其受邪故有經脈之證用針以通經脈而治也邪盛為實肝實故善怒其虛者血少目光本虧再加受邪故目䀮䀮無所見䀮䀮者昏暗也肝之表是膽腑少陽經脈入於耳既虛而又邪蔽故耳無所聞膽怯故善恐如人將捕之也即取肝膽經以治之如少陽氣逆其邪盛則頭痛耳聾不聰頰腫皆少陽經脈所行之處也其耳不聰比之虛者絶無所聞則又不同矣心病心病者胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛虛則胸腹大脅下與腰相引而痛取其經少陰太陽舌下血者其變病刺郤中血者心病者靈樞邪客篇言心臟堅固不受邪受邪則神去而死凡云心病者皆心包絡及手少陰經受邪也故其胸痛脅支滿而痛及臂內痛等證皆包絡與少陰經脈所行之處也其虛者至於脅下與腰相引而痛是連及肝腎也蓋肝為心母腎為肝母由母先虛而及其子若過勞心火必耗肝腎精血也且各臟皆有系脈通心以心為一身主宰一身氣血皆隨心所使故心病必關於各臟而心生血脈血脈虛不能濡潤則牽掣各臟而脅下與腰相引而痛也是故情欲而傷各臟者必先自養其心藥石止能調氣血不能治心志之病所以情欲損傷之證不知此理終必不起也刺法經穴另詳同人圖下皆同脾病脾病者身重善飢肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者此言脾受外邪而化熱病也脾主肌肉肌肉受熱經脈皆弛縱故身重肉痿以及善飢至腳下痛皆邪熱所傷為實證也行善瘛者瘛音契以脾之經脈起於足而弛縱則行步不穩也其腹滿腸鳴飧泄食不化皆虛寒之邪經所云臟寒生滿病也若腹滿便閉發熱又為實矣治用針法而用藥亦可類推也肺病肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者喘咳逆氣肩背痛汗出者以肺氣上壅肩背血脈窒塞而胃中水液不得下輸乃從皮腠外泄皆肺臟之現病也其尻及陰股至足皆痛者足太陽經病也以太陽主一身之表與肺同合於皮毛故外邪客於太陽則必內連肺臟如仲景所論風傷衛有鼻鳴乾嘔寒傷營有喘咳皆太陽連肺臟者然邪客太陽經者必有頭痛此無頭痛者是邪客於肺外溢皮毛延及太陽之界不在其經故無頭痛而標肺病也若肺臟虛則少氣不足以充出入之息其氣不振則濁邪蒙竅而耳聾氣虛不能生津則嗌乾也刺法取太陽泄外溢之邪也取厥陰者以陰陽十二經脈流行至足厥陰與手太陰始終交接故取之皆為肺邪之出路也用藥之法可類推矣腎病腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陰太陽血者腎為寒水之臟而受風邪鼓動水不得泄乃壅而腹大脛腫以至憎風等證是成風水之病也胸中痛以至意不樂是陽虛之證清厥者手足逆冷也風水挾外邪故兼取太陽表裡並治使膀胱泄水也素問逆調論曰腎者水臟主津液主臥與喘也蓋腎為水臟而火根於中火蒸水氣而為津液上升舌下廉泉至口咽下溉於周身故津液少則舌燥嗌乾肺主出氣腎主納氣夜臥則肺氣納於腎並收天地之精氣以養身中元氣也早起則腎氣出於肺以供一身運用也是故津液與臥及喘皆腎所主而肺腎兩臟病皆有喘咳在肺是氣閉為實在腎是氣脫為虛風水病亦因腎虛受邪故有喘咳身重而寢則出汗也若中宮壅滯使肺腎之氣出入升降不利亦有喘咳皆當辨其因分虛實而治之也五有餘五不足素問調經論岐伯曰有餘有五不足亦有五神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足帝曰人有精氣津液四肢九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子言有餘有五不足亦有五何以生之乎岐伯曰皆生於五臟也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形志意通肉連骨髓而成身形五臟五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉此與上節本神篇法時論義理互相發明者也蓋神氣血肉志藏於五臟五臟之道路由經隧出入以行氣血氣血生化皆神志所主神藏心而志藏腎腎生骨髓故志意內通於骨髓而成身形五臟是腎又為身形五臟之本也故神志病則氣血不能生化氣血不和則神志不安而生百病治病必和其氣血和其氣血必守經隧之淺深部位而調之以經隧為五臟之道路故必辨其有餘不足而使五臟安和則百病自愈所以雖有十六部三百六十五節以生百病總不出五臟之和與不和而統歸心志所主者也帝曰有餘不足何如岐伯曰神有餘則笑不休神不足則悲氣有餘則喘咳上氣不足則息利少氣血有餘則怒血不足則恐形有餘則腹脹涇溲不利形不足則四肢不用志有餘則腹脹飧泄志不足則厥此言有餘不足之證即心肺肝脾腎臟之病與上本神篇同惟上言肝氣實則怒此以神氣血肉志分五臟之虛實而肝藏血者故曰血有餘則怒不足則恐其義與本神篇同也若上言腎氣實則脹此言志有餘即腎氣實之義也惟言腹脹飧泄屬脾虛證乃列於腎實下者蓋土實水虛則腹脹涇溲不利水實土虛則腹脹飧泄以腎為寒水之臟寒水勝土即謂之腎實實即有餘之謂是與上篇互明理旨者也陰陽氣血相傾相併帝曰已聞虛實之形不知其何以生岐伯曰氣血以並陰陽相傾氣亂於衛血逆於經血氣離居一實一虛血並於陰氣並於陽故為驚狂血並於陽氣並於陰乃為炅中血並於上氣並於下心煩惋善怒血並於下氣並於上亂而喜忘此言陰陽氣血相併相傾者也傾者偏側也偏傾相併故互有虛實蓋衛主氣營主血如氣亂於衛則血不隨氣循行而逆於營由是血氣各離其本居而相併氣並於血則血實氣虛血並於氣則血虛氣實血並於陰經氣並於陽經則陰陽經絡不相通和發為驚狂之病血並於陽經氣並於陰經則陰陽互爭發為炅中炅灼熱也血並走於上焦氣並走於下焦則心煩惋而善怒惋悲惱也血並於下焦氣並於上焦則神亂喜忘所謂獨火亂其神明也良以陰陽互根互用以生化氣血故氣行則血隨氣亂則血逆氣阻則血瘀氣熱則血耗氣寒則血凝氣衰則血少血少則陰不勝陽而血熱氣衰則陽不勝陰而氣寒氣旺則血多血多則陽不勝陰而血涼氣旺則陰不勝陽而氣熱此氣血陰陽之衰旺寒熱而又變生諸病者也帝曰血並於陰氣並於陽如是血氣離居何者為實何者為虛岐伯曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之是故氣之所併為血虛血之所併為氣虛帝曰人之所有者血與氣耳今言血併為虛氣併為虛是無實乎岐伯曰有者為實無者為虛故氣並則無血血並則無氣今血氣相失故為虛焉絡之與孫絡俱輸與經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死寒熱者陰陽之偏氣也陰陽兩平則氣血溫和而流行無患若寒性凝斂故氣血寒則泣而不流泣者澀也溫之則寒消而去氣血方和如其不和則必相傾相併若氣並於陽為血虛血並於陰為氣虛以偏並一邊即有一實一虛也蓋氣血流行於經絡內外相輸循環不已細者為孫絡絡與孫絡之氣血俱輸於十二經以行周身者也其血與氣並走一處此處即為實焉故如並走於上則上實上實則下虛而為大厥厥則暴死氣復反則生不反則死然其所以相傾相併者必有外感內傷之因要必求其所因而調之此當與臟腑門太陰陽明論所云更虛更實之理參合觀之帝曰實者何道從來虛者何道從去虛實之要願聞其故岐伯曰夫陰與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒凡病必辨陰陽虛實為綱要陰陽經絡有俞穴交會氣血由之互相貫注陽經注於陰陰經滿溢復歸於陽脈中脈外營衛臟腑表裡周流陰陽勻平以充其形故其三部九候之脈若一氣所貫而不參差如是命曰平人為無病也若夫邪之生也外感風雨寒暑則必先傷陽分及久而深入方傷於陰若飲食起居情欲喜怒則先傷氣血臟腑為陰分也此以表裡分陰陽為生病之端也外感內傷各分陰陽帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傳入於孫絡孫絡滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收肌肉堅緊營血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛此以外邪之陰陽而分虛實也風為陽邪故先客皮膚衛分衛為陽也入於孫絡而傳絡脈然後輸於大經營分血脈之中則血氣與邪並居於分腠之間其脈堅大故曰實實者以邪結脈中而外堅充滿故不可按按之則痛也若寒濕陰邪所傷者皮膚弛而不收以其衛陽不固陰邪得傷肌肉而營居肉中故肌肉堅緊而營血澀故曰虛由陽氣虛也聶闢者餒乏之狀靈樞根結篇云血氣枯竭腸胃聶闢也此以陰邪傷陽按之則陽動足以溫之故快然而不痛也帝曰陰之生實奈何岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣帝曰陰之生虛奈何岐伯曰喜則氣下悲則氣消消則脈空虛因寒飲食寒氣熏滿則血泣氣去故曰虛矣此言內傷之虛實也喜怒不節則心志擾動使陰氣上逆而下虛下虛則陽氣走之者亦從上走也即前所云血與氣並故曰實矣若喜則氣下行悲則氣消耗故脈空虛因寒飲食之寒氣乘虛熏滿於中則血得寒而凝澀陽氣因之而去故曰虛矣大抵怒則氣逆為實喜與悲則氣下消為虛皆由情志妄動致陰陽偏傾而為虛實下文更詳明之一曰喜則氣散恐則氣下蓋氣散亦從下泄也陽虛外寒陰虛內熱陽盛外熱陰盛內寒帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒不知其所由然也岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留留則血凝澀凝則脈不通其脈盛大以澀故中寒此明陰陽表裡虛實寒熱之病統外感內傷而言也陽受氣於上焦者言衛陽出於胸中之宗氣而行脈外以溫皮膚分肉之間今因外感寒氣則上焦陽氣不得通行而寒氣獨留於外者是衛陽虛而發寒栗故謂之陽虛則外寒也陰虛生內熱者有所勞倦致形氣衰少胃中谷氣不盛而清陽不周布於上焦則濁壅不降下脘因之不通胃氣鬱而成熱熱氣熏胸中是因勞擾耗津液故謂之陰虛生內熱也陽盛生外熱者以上焦之氣不得通利致皮膚緻密腠理閉塞玄府不通玄府者毛竅也以其外邪閉郁衛陽實而不能泄越故謂之陽盛則外熱也陰盛生內寒者因情志妄動其氣厥逆不順而耗傷陽和其陰寒積於胸中而不瀉則溫氣去而寒獨留其血因寒而凝澀脈者血之府血凝故脈不通暢而盛大以澀也此因陽傷而陰濁壅盛以成中寒之病故謂之陰盛則內寒也蓋外寒外熱同是外感之病如仲景所論而有陰陽虛實不同也內熱內寒同是內傷之病如仲景所論而有傷津液傷陽和之異也內經舉其綱要而仲景詳辨證治為後學津梁故仲景云撰用素問者其所論皆本於內經義理也後學雖悟內經義理而不讀仲景之書必不能善其用所以仲景為中古之醫聖近世罕有知仲景之道者故醫風日趨於下矣五臟為本帝曰夫子言虛實有十生於五臟五臟五脈耳夫十二經脈皆生其病今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之岐伯曰五臟者故得六腑與為表裡經絡支節各生虛實其病所居隨而調之病在脈調之血病在血調之絡病在氣調之衛病在肉調之分肉病在筋調之筋病在骨調之骨五臟各有虛實故共有十也帝即指前所云五有餘五不足之言而問謂五臟止陰經五脈而陰陽共有十二經經皆有絡絡有三百六十五節凡有病必遍被於經絡皆有虛實之分今獨言五臟之虛實何以合十二經絡三百六十五節之數乎岐伯言臟腑經絡本出一源五臟與六腑為表裡是臟為根腑為干經絡血脈等皆枝葉也則經絡支節之病之虛實總不出五臟之虛實也故隨其病之所居而調之則一以貫之矣如病在脈調之血者以脈為血之府而屬於營血脈心所主也病在血調之絡者以血在絡中故絡傷則血溢上言脈即經脈經絡血脈本屬一體以其道路而言名經絡以其流行而言名血脈也病在氣調之衛者衛氣行於脈外而固表肺所主也以其晝則行陽二十五度夜則行陰二十五度如不循度為不調也病在肉調之分肉者肌肉脾所主統屬營衛故當運脾以通調營衛其分肉自和矣病在筋調之筋者筋肝所主也使肝氣血調和則筋病自愈矣病在骨調之骨者骨腎所主也使腎臟陰陽充足精氣周流則骨病自愈也是故營衛氣血經絡支節肌肉筋骨之病總不外乎五臟審五臟之虛實而凡病之虛實在其中矣絡滿經虛絡虛經滿素問通評虛實論又曰所謂重實者言大熱病氣熱脈滿是謂重實經絡皆實是寸脈急而尺緩也滑則從澀則逆也夫虛實者皆從其物類始故五臟骨肉滑利可以長久也絡氣不足經氣有餘者脈口熱而尺寒也秋冬為逆春夏為從經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生也絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽此承上言邪盛為實者以明脈象而辨證之逆從也如大熱病氣熱而脈滿其邪與氣血相併則謂之重實也經在營分主血絡在衛分主氣經絡皆實則氣血皆受邪寸脈急強而尺和緩者以經絡皆受邪營衛之氣上逆也滑者氣血流利其邪易解為從澀者邪與氣血膠結難解為逆也夫虛實者陰陽氣血偏傾皆從其物類而始如陰邪從於陰則陰實而陽虛陽邪從於陽則陽實而陰虛陽為衛為氣陰為營為血也若無邪傷而陰陽氣血和平周流於五臟骨肉自然滑利而無瘀澀之病可以長久而生也若邪客於經則經氣有餘絡氣不足經為營營行脈中故脈口熱而現數脈也絡為衛衛行脈外絡虛故尺膚寒也此所謂從陰陽之類者也脈口統指兩手寸夫尺之脈亦名寸口亦名氣口以脈數知為熱而經有餘也尺膚不熱知為寒而絡不足也若尺亦以脈言豈有一脈流行而分寒熱兩截者乎且言絡不足明指衛氣之行脈外者豈非尺膚乎若上文滑澀二字統該脈與尺膚而言故又言五臟骨肉滑利可以長久也其絡不足經有餘者陰已偏勝又遇秋冬陰旺則陽偏絶故為逆春夏陽旺得助故為從也其經虛絡滿者可類推矣故絡滿經虛者當灸陰補經刺陽瀉絡經滿絡虛者當刺陰瀉經灸陽補絡而用藥之法亦然矣經絡營衛皆虛帝曰何謂重虛岐伯曰脈氣上虛尺虛是謂重虛虛謂氣虛者言無常也尺虛者行步恇然脈虛者不象陰也如此者滑則生澀則死也此承上言精氣奪為虛者以辨脈證也經絡皆虛謂之重虛上雲氣虛者肺虛也言其虛無常處也或虛在經絡或虛在臟腑而統曰肺虛以肺主一身之氣故也今明重虛之義而經絡皆虛經絡皆虛則陰陽皆虛陰陽皆虛則營衛臟腑俱在其中矣是故尺膚虛軟則衛虛而絡虛其行步恇然者怯弱之狀也脈虛者經虛也經虛則營血虛營血為陰脈本沉靜柔和而充滿今其虛也脈或空大或強急不象陰柔之脈也凡此重虛者其脈與尺膚滑者氣血流利尚可培養而生如澀者氣血皆枯並有邪滯則死矣此滑澀二字與上節同義上節言從逆即生死之兆也辨生死帝曰寒氣暴上脈滿而實何如岐伯曰實而滑則生實而逆則死帝曰脈實滿手足寒頭熱何如岐伯曰春秋則生冬夏則死脈浮而澀澀而身有熱者死此言精氣奪者中陽無權陰寒邪氣自內暴逆而上脈滿而實者大而有力無柔和之氣也若有滑象氣血尚活可生如實而且逆者現五行相剋之真臟脈也故死又如脈滿實手足寒頭熱者中無陽和敷布四肢其氣厥逆直上故手足寒而頭熱是陰陽乖格不相交通勢將偏亢而偏絶如春令陽初升秋令陽初降尚可調之使和而生若冬夏陰陽偏旺之時以身中之偏而遇氣候之偏則必偏絶而死也脈浮者陽露於外陽性流利而反澀者陽氣敗矣陽敗而反身熱此精氣奪甚正如殘燈余焰陰陽兩竭故死也其形盡滿者脈急大堅尺澀而不應也如是者從則生逆則死帝曰何謂從逆岐伯曰所謂從者手足溫也所謂逆者手足寒也此更申明上文之寒氣暴上而盡其形氣皆逆滿而上者脈必急大且堅而尺膚澀與脈不相應何也此脈之急大本非氣血有餘以其精氣內奪故脈無柔和之象精氣枯故尺膚澀而不潤如是者手足溫則中宮猶有陽氣布於四肢為從而可生手足寒則陽敗為逆而死也五實五虛素問玉機真臟論帝曰余聞虛實以決死生願聞其情岐伯曰五實死五虛死脈盛皮熱腹脹前後不通瞀悶此謂五實脈細皮寒氣少泄利前後飲食不入此謂五虛帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也此統言外感內傷虛實之證也脈盛皮熱腹脹是邪盛於表裡也前後便不通則邪結無出路而昏瞀躁悶則元氣絶而死名五實也脈細皮寒氣少表裡精氣皆奪也而二便泄利飲食不進則本元竭而死名五虛也實者身汗得後利則表裡邪解而正氣漸蘇虛者泄利止而漿粥進則生氣漸續故皆可活也三焦氣虛靈樞口問篇曰上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足則為痿厥心悗上焦如霧者清陽之氣氤氳旋轉如雲之上騰而充於頭腦也故氣不足則腦中如空耳鳴頭傾目眩者清陽不伸則濁陰上僭濁陰上僭則頭重而傾陽鬱於下則耳鳴目眩也中焦如漚者脾胃蘊釀水穀由中焦輸化津液故氣不足則輸化失度溲便皆變其常腸中傳導無力則鬱結而鳴也下焦如瀆者滓濁水液由之而出藉腎中元陽以蒸化者故下元氣虛或足痿無力或厥冷不溫其滓濁反壅而不出故上逆而心悗悗者滿悶也
