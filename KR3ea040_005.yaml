body:
  text: 卷四上四診合參總論四診者望聞問切也望以辨色聞以辨聲問以辨證切以辨脈蓋人稟氣血以生氣血不和而為病有諸內者必形諸外但病變多端其脈其證皆有真假差之毫釐失之千里故聖人立法必以四端互相參合方無錯誤如素問疏五過論徵四失論諄切告誡而俗學不明此理妄意揣度虛言矜誇謂切脈即能知病欺人自欺其害實甚又如難經言假令得肝脈其外證善潔面青善怒其內證臍左有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也無是者非也此言診得弦急之脈為肝脈必有肝臟之證如面青善怒等方為肝病如無肝證即非肝病各臟皆然是故一脈所主病有多端一病所現亦有多脈必當脈證互相印合方能知其病由故四診之道缺一不可經文已詳悉矣惟辨舌苔之法未曾論及止有靈樞師傳篇云脾者主為衛使之迎糧視唇舌好惡以知吉凶熱病篇言肺熱病舌上黃而已蓋脾主肌肉衛者肌肉也唇舌為肌肉之本故視之可驗病之吉凶也若夫強弱壽夭之形及一切病狀尤當於稟賦疾病諸門合參以明其理本門最詳者脈也脈為氣血流行之象而有升降出入故當與營衛經絡陰陽臟腑諸門同觀必得悟其神理指下方能明其為和為病為虛為實古人論脈云吾心之所解口莫能宣此神理必須心悟非言語所能傳能明其脈則證之真假自見能辨其證則脈之虛實自明所謂真者脈證相合虛實顯然也所謂假者脈證不合實病似虛虛病似實也真者易辨假者難辨不辨其假而誤治之殺人於反掌間可不畏哉可不慎哉經解五官五色應五臟五時之氣靈樞五閲五使篇岐伯曰五官者五臟之閲也脈出於氣口色見於明堂五色更出以應五時各如其臟經氣入臟必當治里五官者五臟之竅也故閲其外而知其內氣血流行於經出現於兩手氣口之脈而色現於明堂為氣血之華採明堂者鼻也五臟具五行之性合天地五時之氣化故有五色隨時更變出現以應五時之序各如其臟者如肝木旺於春其色青心火旺於夏其色赤脾土旺於未月長夏其色黃肺金旺於秋其色白腎水旺於冬其色黑也經氣入臟者如經病而深入於臟必當治其里以臟為本經為末也帝曰五色獨決於明堂乎岐伯曰五色已辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外五色乃治平博廣大壽中百歲如是之人血氣有餘肌肉堅緻本經五色篇曰明堂者鼻也闕者眉間也庭者顏也即首面也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲明堂骨高以起平以直五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清此言臟腑應於首面之部位詳下節五色篇也蓋庭為顏額必開張而明堂必廣大其頰側耳門為蕃蔽者如牆壁之方正而護於外頤頷之基址高聳而下垂居面部之外比中亭更大也其色充潤而治顏面平博廣大如是者其血氣有餘肌肉堅實而緻密則壽有百歲矣帝曰願聞五官岐伯曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也以候五臟故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑此言五官為五臟之竅故五臟病則有各證各色現於外而可驗也其或目不明耳不聰鼻不利口不欲食舌不知味者亦可知其病發於何臟而審其所因以治之也五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆況加疾哉五官不辨者歪斜平塌也闕庭不張以致垂角去外者總言面部窄狹而下亭又尖削短促而無基址如是則薄劣而不壽之相平時已常危殆何況加疾乎以上論壽夭之格局也於中又當分骨勝肉者壽肉勝骨者夭故有面大而色白者夭肉勝也面小而色蒼者壽骨勝也臟腑肢節應於面部靈樞五色篇帝曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當能別左右是謂大道男女異位故曰陰陽此明臟腑肢節之氣應於首面之部位以別其陰陽而和之男左女右男陽女陰之位各異如下文所辨其為病不同也須察後圖五臟六腑見於面部之圖佚臟腑肢節見於面部之圖佚辨氣色吉凶審察澤夭謂之良工沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沉以知淺深察其夭澤以觀成敗察其散摶以知遠近視色上下以知病處積神於心以知往來今故相氣不微不知是非屬意勿去乃知新故色明不粗沉夭為甚不明不澤其病不甚能察其潤澤枯夭之色以辨其病之吉凶庶可謂之良工也其色沉濁者病邪深而內在臟腑也其色浮澤者病邪淺而外在營衛經絡也即於五色之現於面者而辨其病之微甚如赤甚為血中熱甚青黑甚則痛甚是血氣瘀滯也故筋脈攣急白甚則寒甚白為肺色肺主皮毛故皮頑木不仁無陽和之氣以煦之也觀其色現之部知其病在之處觀其色之浮沉以知邪之淺深察其潤澤枯夭以決其成敗其色散漫病起於近摶結者病已深遠故當積神於心洞明其理可以知其已往之病因今來之變證也若相氣不悟其精微則不知理之是非故必專心屬意於此而勿去乃知其病之新故如色明而不粗顯已為病氣更見沉夭則甚矣其不甚明澤亦不沉夭病亦不甚也其色散駒駒然未有聚其病散而氣痛聚未成也腎乘心心先病腎為應色皆如是駒駒然者如駒之走動其色散而不聚也可知其病亦散而氣雖痛其聚未成自可愈也假如腎氣乘心為病其腎之黑色必先現於心之部位故觀其色而知其病凡各色之應皆如是類推可知矣男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也面王上下為小腸膀胱子處之部故主小腹痛圜直者色垂繞於面王之下也莖陰莖也高為本下為首因色之上下而分莖之本末也凡此皆屬狐疝㿉陰之病也女子色在於面王屬膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至骶為淫有潤如膏狀為暴食不潔面王之部與男子同而病與男子異者以其衝任血海為月經所通行而孕育亦在於此也色散為痛者氣病無形也色摶為聚者血凝為積也其積聚之或方或圓或左或右各如其外現之色形若其色從下行當應在尾骶而為白淫帶濁有潤如膏之狀者或暴因飲食墜氣即下見不潔之物也左為左右為右其色有邪聚散而不端面色所指者也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色赤大如榆莢在面王為不日其色上鋭首空上向下鋭下向在左右如法或在左或在右凡色現之有邪者聚散而不端正即其面色所指之處為病之所在者也言左右則上下亦然矣如其無邪之正色青黃赤白黑皆端正充滿而有分別之鄉或內應臟腑之氣或外合時令之氣如不應不合即為邪為病矣假如分別之鄉色赤者合於夏令應於心部若其色赤大如榆莢在於面王既不應心部而不合時日則為病邪之色余可類推矣病邪乘元氣虛處而走故現於色者亦然若其色上鋭者因上首空虛而邪氣乘之上向也其色下鋭則下向左右亦然矣以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也此即申明內應五臟之色也肝心肺脾腎為筋脈皮肉骨之本故氣相合也五色之現者各出其色部部骨陷者必不免於病矣其色部乘襲者雖病甚不死矣五臟有五色色者臟氣現於外由本臟之部分而出如肝青心赤之類也其部骨陷者稟質虧也而所虧之一臟必不免於常病如本臟篇所云各臟皆有或大或小或堅或脆之類也若其骨勝肉而不塌陷者雖其色有乘襲而病甚不至於死以腎主骨腎臟充實故也辨色合脈以驗病雷公曰官五色奈何帝曰青黑為痛黃赤為熱白為寒是為五官雷公曰病之益甚與其方衰如何帝曰外內皆在焉切其脈口滑小緊以沉者病益甚在中人迎氣大緊以浮者其病益甚在外其脈口浮滑者病日進人迎沉而滑者病日損其脈口滑以沉者病日進在內其人迎脈滑盛以浮者其病日進在外脈之浮沉及人迎與寸口氣小大等者病難已病之在臟沉而大者易已小為逆病在腑浮而大者其病易已人迎盛堅者傷於寒氣口盛堅傷於食此以五色驗病參合其脈以辨病之陰陽邪之進退而外內皆有理之所在上云黃赤為風此言為熱者風火同源互明其理也脈口寸口氣口者皆指兩手之脈也主五臟之陰人迎者結喉旁之胃脈也主六腑之陽余另有辨在後集首卷人迎本脈原大於寸口故此言人迎與寸口氣大小等者病難已蓋陽脈應大今與陰脈大小同等非偏於陽即偏於陰故病難愈也假如脈口滑小緊以沉者脈口主五臟之陰其病在中也滑小是本脈兼沉緊則邪盛而病益甚矣人迎主六腑之陽其病在外也浮大是本脈兼緊者邪盛而病益甚矣脈口主陰而浮滑則邪盛而病進矣人迎主陽而沉滑則邪退而病減損矣脈口沉以滑者邪熱入里而病亦進人迎滑盛以浮者邪盛於外而病亦進也脈之浮沉及人迎寸口其氣大小相等是陰陽邪正混亂不清故病難已也病在臟脈沉而大元氣未虧故病易已小者正不勝邪故為逆也病在腑脈浮大與病相合故易已也人迎主外故脈盛堅為外傷風寒也氣口主內故脈盛堅為內傷於食也是故觀其色切其脈而陰陽虛實病邪進退之可辨者皆有理之所在也雷公曰以色言病之間甚奈何帝曰其色粗以明沉夭者為甚其色上行者病益甚其色下行如雲徹散者病方已五色各有臟部有外部有內部也色從外部走內部者其病從外走內其色從內走外者其病從內走外病生於內者先治其陰後治其陽反者益甚病生於陽者先治其外後治其內反者益甚其脈滑大以代而長者病從外來目有所見志有所惡此陽氣之並也可變而已此又以色之浮沉聚散辨病之淺深進退也凡病初起其五色之現必粗浮以明若至沉夭晦滯病必益甚矣清陽上升濁陰下降自然之性也故先從額上現光明而病色漸由下行如雲之四散其邪亦散而病方已若反上走則病進可知矣蓋五色由五臟所現面有五臟六腑所應之部位內為臟外為腑如圖所繪者是也故觀其色之走內走外即知其病之走內走外也內為臟為陰外為腑為陽病生於陰必先從陰治病退而後和其陽病生於陽者亦然若反之則誅伐無過而傷正氣其邪在外者反乘虛入內邪在內者正氣既傷病必變而更重此陰陽表裡治之先後不可錯也若其脈滑大以代而長者外邪入於內也滑大是陽明證代而長是太陰證此陽邪並於陰陰陽擾亂神氣昏瞀目見異物志有所惡如譫語發狂等病也此必用苦寒鹹寒之藥以變其陽熱邪氣而後病方已也雷公曰小子聞風者百病之始也厥逆者寒濕之起也別之奈何帝曰當候闕中薄澤為風沖濁為痹在地為厥此其常也各以其色言其病夫四診之道色脈尤微妙難辨然其至理不外陰陽兩端上言青黃赤白黑五色而辨其為痛為熱為寒此又以色之薄澤沖濁而辨其邪詞若與上不同而皆不外陰陽之理蓋風為陽邪陽性輕浮而明故其色薄而澤澤者明潤也寒濕陰邪陰性晦濁故其色沖濁沖猶充也寒濕合而成痹病也在地者色現下亭地部是陰邪居陰部故足厥冷此陰陽之常理也故各以其色而辨邪各以其部而辨病其病之千變萬化而能明陰陽至理者自可辨之無誤也所以獨候闕中者闕為肺部肺主一身之氣而風寒濕之邪先由皮毛而傷氣分故色先現於闕中惟寒濕有獨從下部受之者以陰邪陰部同類相感乃為厥逆若受於周身而成痹名周痹也驗色辨生死雷公曰人不病卒死何以知之帝曰大氣入於臟腑者不病而卒死矣雷公曰病小愈而卒死者何以知之帝曰赤色出兩顴大如拇指者病雖小愈必卒死黑色出於庭大如拇指必不病而卒死大氣者大邪之氣直入臟腑以其內虛故也如世所云直中傷寒悶痧等類暴發暴死其未發之先亦必有黑色大如拇指者成條成塊摶結不散出現於闕庭之中闕庭心肺之部大邪犯心故卒死也顴者骨之本骨髓腎水所生者也水涸髓枯孤陽發露故赤色出現於兩顴病雖小愈必卒然而死以其腎水絶也素問刺熱論曰肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病也此未病而色先現於面者當先治之其後雖發亦必輕而易愈是不可忽也素問脈要精微論岐伯曰夫精明五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆不欲如地蒼五色精微象見矣其壽不久也精神聚於目而能明見一切五色現於面為氣之光華氣充則津液輸布而五色必光明潤澤不欲如赭鹽藍黃土地蒼之乾枯也乾枯則精氣內微之象現矣其壽不久也然光華要含蓄故欲如帛裹朱羅裹雄黃則其陽氣內充而周密故經曰陰平陽祕精神乃治若光華太露反非佳象如桃柳之鮮妍不如松柏蒼翠之永壽也於此可悟觀色之妙理而為望診之要道也夫精明者所以視萬物別黑白審長短以長為短以白為黑如是則精衰矣此專言目也目之精采醫家可見其神光或有短長亦須問之如其視物之長短黑白顛倒錯亂而目無紅痛翳障等病則其精氣衰微而神光散漫非吉象也素問五臟生成篇岐伯曰色見青如草茲者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也五臟具五行之性而色現五行之氣五臟之氣相生而通和故色現者於一色中必略兼各色雖病不虞或如草茲如枯骨等者既枯夭不澤而又純現一色則其臟氣偏勝而偏絶故死也其如翠羽烏羽等者皆明潤而有生氣雖病可生也如以縞裹者即上文含蓄勿露之理縞為白色白者肺色肺為華蓋而其氣居表故罩於外而明潤如縞裹也此五臟所生而現於外之榮華也凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也奇者異也異於本象之病脈也凡現病脈而相其五色則以面有黃色者生無黃色者死以黃為中土之氣猶脈之有胃氣則生無胃氣則死也以無中土之氣則金木水火互相剋賊但見青白赤黑之色故死也色脈辨病重輕素問脈要精微論帝曰有故病五臟發動因傷色脈各何以知其久暴至之病乎岐伯曰徵其脈小色不奪者新病也徵其脈不奪其色奪者久病也徵其脈與五色俱奪者久病也徵其脈與五色俱不奪者新病也故病者久病暴病者新病觀色切脈可辨也奪者壞色壞脈也不奪者常色常脈也大抵辨新久以色為主故脈雖小弱而色不奪猶為新病脈雖照常而色奪者已為久病蓋病傷氣血必先現於脈脈為氣血之先形也病久其色方敗故色奪必為久病而徵其脈不奪此久病將愈之證因其傷也先現於脈其愈也亦先現於脈也於此審察病之新久進退可瞭然心目矣若辨吉凶當以脈為主若脈奪而色不奪之新病尚可速治而望愈色奪脈不奪之久病不治亦能自愈以脈為根本色為枝葉故也如色脈俱奪本元已敗為難治矣色脈俱不奪雖有邪傷攻邪而正自復可無慮矣肝與腎脈並至其色蒼赤當病毀傷不見血已見血濕若中水也肝之本脈弦弱腎之本脈沉滑此言兩手之脈皆弦弱沉滑而心肺浮洪之脈不現故言肝與腎脈並至也蒼赤又為心肝之色則色脈不合當知其病由毀傷如刃傷跌打之類以脈為血之府血傷故脈沉弱而弦血動故兼滑而反現青赤色者血傷肝氣逆而虛火動也或不見血或已見血其毀傷者皆現此脈倘詢之而非毀傷即為水濕之邪所中如夏熱汗出而浴於冷水陰遏其陽其脈沉弱而弦陽伏故兼滑面青赤陽郁之象金匱所云中暍之病也薛生白雲瘀血滯於經絡其身必腫似傷濕若中水邪之病也於義亦通素問玉機真臟論帝曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相失謂之難治色夭不澤謂之難治脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之治病無後其時者恐久則邪深病重也形氣相得者如形盛氣盛形弱氣弱也色澤以浮者面不沉晦枯稿也脈從四時者弦鉤毛石合春夏秋冬之時也脈弱以滑者柔和流利有胃氣也如此而病皆易治也形氣相失者形盛氣少外強中乾也形弱氣盛本元外脫也色夭不澤乾枯晦滯也脈實以堅邪盛而少胃氣其為益甚也脈逆四時如春見毛脈金剋木之類也此皆難治不治之病必察四端之難而明告病者庶無尤悔也聞聲問證合色脈素問脈要精微論曰五臟者中之守也中盛臟滿氣盛傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也倉廩不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死五臟為根本如城之有守也臟者藏也藏精氣而不瀉故必中氣盛而臟滿則無病若氣似盛而傷於恐者如經所云心怵惕思慮則傷神神傷則恐懼自失外似有餘而內傷不足矣不足而其聲如從室中言重濁而不清亮是中氣有濕邪壅遏也若言語聲微不能接續久久乃復續一言者此元氣奪也若衣被不斂出身露體言語不知善惡不避親疏嫌疑者此神明之亂也若飲食入胃隨即下泄完穀不化是脾腎不固腎為胃之關二便為腎之門戶是無關要也水泉不止者遺溺不能收攝膀胱津液不藏亦腎氣虛脫也如是皆五臟氣敗而失守故得守者生失守者死五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死身之強健由五臟氣旺也精神陽氣聚於頭故頭為精明之府若督脈衰而氣敗頭垂下傾如視深淵知其精神將奪矣背為胸之府者背為陽胸為陰胸中宗氣所聚名氣海其身挺直若肩背曲而傴僂宗氣內敗而府將壞矣腎臟在腰故腰為腎府腰痛不能動搖腎將憊矣筋聚於膝故為筋府足不能屈伸行則僂俯筋將憊矣腎精充骨為髓故骨為髓府精竭髓枯不能久立行則振掉不能正步骨將憊矣凡此皆五臟衰敗得強則生失強則死矣色脈辨病素問五臟生成篇岐伯曰夫脈之大小滑澀浮沉可以指別五臟之象可以類推五臟相音可以意識五色微診可以目察能合脈色可以萬全赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭脈緊黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥脈象指按可以辨別五臟生克可以類推五臟音聲可以意識五色微妙可以目察色脈相合相生為吉相反相剋為凶能參合其理知其吉凶可萬全而無錯失也假如色赤而脈之至也喘而堅喘者急促之象堅者不柔和也有積氣在中時害於食名心痹者以赤色屬心思慮所傷因虛而邪乘之氣血鬱結成積中氣不和而不欲食故時害於食也如色白而脈之至也喘而浮上虛下實者脈之浮部虛沉部實也以其有積氣在胸中故心肝之氣亦不舒而為驚惕氣喘而虛名肺痹而發寒熱是得之醉後入房先因酒熱傷肺又為欲火傷腎金水兩傷而成肺痹痹者氣閉不能輸布營衛不和故氣喘而發寒熱也如色青而脈之至也長左右彈者脈從兩旁斜竄不循軌路也此有積氣在心下支胠自心至脅下軟肉際也名肝痹得之寒濕之邪與疝病治法相同者疝病邪積小腹前陰同屬厥陰也又必腰痛而足清冷皆本經寒濕氣閉也頭頂之脈緊而如束本經之脈上巔頂故也如色黃而脈之至也大而虛大者邪盛虛者脾虛脾虛不運故有積氣在腹中上逆名為厥氣也厥疝者脾肝腎之脈皆結於陰器脾虛而肝腎之氣皆乘侮為病矣女子亦同治法此因得之四肢疾用傷力如持重奔走之類致脾氣虛乏汗出而風邪乘之以脾主四肢故四肢用力則傷脾氣也如色黑而脈之至也上堅而大者腎脈之上部也故有積氣在小腹與陰名腎痹得之沐浴清水而臥是陰邪入於陰分陰經凝閉陽氣不能通於陰故上部陽分之脈反堅而大陰者小腹下前陰衝任經脈所行與肝腎相通也靈樞衛氣失常篇帝曰何以知皮肉氣血筋骨之病也伯高曰色起兩眉薄澤者病在皮唇色青黃赤白黑者病在肌肉營氣濡然者病在血氣目色青黃赤白黑者病在筋耳焦枯受塵垢病在骨皮肉氣血筋骨軀體淺深之部位而根於五臟也兩眉間闕庭肺之部肺主氣而屬皮毛邪淺在皮毛氣分而色薄澤也唇為肌肉之本脾主肌肉故色現於唇病在肌肉也心主血脈營行脈中濡者滯也脈來澀滯知其病在營中氣血也目為肝之官肝開竅於目而主筋故色現於目知病在筋也耳為腎之官腎開竅於耳而主骨腎虧而精氣不能滋榮則耳焦枯如受塵垢知其病在骨也素問移精變氣論岐伯曰色脈者上帝之所貴也先師之所傳也上古使僦貸季理色脈而通神明合之金木水火土四時八風六合不離其常變化相移以觀其妙以知其要欲知其要則色脈是矣此言臨證以察色切脈為綱要而上帝所貴先師所傳使人專理其事而通造化之神明必以色脈合以金木水火土五行之生克春夏秋冬四時之氣化四方四隅八風所從來之邪正虛實以辨其病由良以六合之內無非陰陽五行之氣流行生化而不離其常者也必通其常理方能識其變化以觀其妙道以知其綱要而生死吉凶朗然可辨故欲知其要者則色脈是矣色以應日脈以應月常求其要則其要也夫色之變化以應四時之脈此上帝之所貴以合於神明也所以遠死而近生生道以長命曰聖王此重言以申明之也本經生氣通天論曰陽氣者若天與日失其所則折壽而不彰是故色者由陽氣之光華彰顯於外如天之有日光故色以應日也脈為血之府氣陽而血陰日陽而月陰故脈以應月也是日月為天地陰陽之徵象而色脈為人身陰陽之徵象是天人合一之理也故必常求陰陽之要道則為臨證之綱要也夫色脈之相應隨四時氣化而變如春主木色青而脈弦夏主火色赤而脈鉤秋主金色白而脈毛冬主水色黑而脈石土旺四季而主令長夏未月色黃而脈緩又名代此合於時序氣化為吉也或與時令相反或五行相剋為凶也故上帝所貴以其合乎造化之神明也合乎造化所以遠死而近生生道久長而不替上帝之意如此故命之曰仁聖之王也帝曰願聞要道岐伯曰治之極要無失色脈用之不惑治之大則逆從倒行標本不得亡神失國去故就新乃得真人治病之要道無過色脈為要極也無失色脈氣化生克之理而用之不惑於心治病之大法規則無過於此若不明其理惑亂無主則其逆其從昧而不辨必至倒行其治法而標本先後不得其當如此者亡其神而失其國矣國喻身也神主一身君主一國雙舉以明其理也善治者能去其故疾而就其新生之氣血而培養之非但愈疾雖真人修煉之道可得也帝曰夫子言不離色脈此余之所知也岐伯曰治之極於一帝曰何謂一岐伯曰一者因得之帝曰奈何岐伯曰閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡帝以色脈雖為綱要意猶未明至極之道故岐伯曰極於一一者一貫之道也欲明一貫之道在審其所因而得之因由情生故必閉戶塞牖系之病者數問其情蓋要靜密委婉多方曉喻方能得其真情故經曰診可十全不失人情良以人之起居服食莫非嗜欲好惡之情百病皆因之而生故知其情之所鍾即知其病之所因既知其因以從其貪生之意而開導之警戒之使其有懼死之意則情欲淡而心神安心安則氣順然後合其色脈之逆從病之標本分先後而調治之方能奏效若不先安其神藥亦無功故得神者昌失神者亡是神之一字即一貫之道所在也此色脈為四診綱要而神之一字為要中之要也問證辨病靈樞師傳篇岐伯曰入國問俗入家問諱上堂問禮臨病人問所便帝曰便病人奈何岐伯曰夫中熱消疸則便寒寒中之屬則便熱胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹帝曰胃欲寒飲腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣縱欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先岐伯曰人之情莫不惡死而樂生告之以其敗語之以其善導之以其所便開之以其所苦雖有無道之人惡有不聽者乎帝曰治之奈何岐伯曰春夏先治其標後治其本秋冬先治其本後治其標帝曰便其相逆者奈何岐伯曰便此者飲食衣服亦欲適寒溫寒無悽愴暑無出汗食飲者熱無灼灼寒無滄滄寒溫中適故氣將持乃不致邪僻也病人所便者所欲所宜也問其所欲知其所病以辨其所因投其所宜而治之也帝謂腸胃寒熱不同貴人任性難禁何以便之岐伯言人之情莫不惡死而樂生告之以病之敗命而受苦導之以善調而卻病可生未有不聽者也若夫寒熱兩礙之病則當分其標本緩急先後而治之春夏陽氣升發宜先治標後治其本秋冬陽氣收降宜先治本後治其標蓋以受病之邪為本所現病狀為標故春夏治標則易愈以其邪氣發露也秋冬必先治其本者以其邪氣伏藏也調之之法寒者熱之熱者寒之寒熱皆不可太過太過則反病凡飲食衣服亦必使其寒溫相適則其故有之元氣將持不致為邪僻之氣所害也此與上節素問之言數問其情者互相闡發也診尺膚辨病狀靈樞論疾診尺篇帝曰余欲無視色持脈獨調其尺以言其病從外知內為之奈何岐伯曰審其尺之緩急小大滑澀肉之堅脆而病形定矣視人之目窠上微腫如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也此不視色持脈而獨診其尺膚之緩急小大滑澀肉之堅脆以定其病也視人之目窠上微腫如新臥而起之狀其頸脈動時咳者頸脈人迎胃脈也水飲蓄於胃肺氣逆不能降故人迎脈動而時咳按之手足窅而不起此外受風邪而四肢腫外風內水故名風水膚脹也素問水熱穴論曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為胕腫聚水而生病也又曰勇而勞甚則腎汗出逢於風內不得入於臟腑外不得越於皮膚客於元府行於皮里傳為胕腫本之於腎名曰風水所謂元府者汗空也觀此由腎虛下焦不利而水蓄於胃故頸脈動而時咳又用力汗出毛空開而風邪客之故名風水之病也窅音杳坎陷也尺膚滑其淖澤者風也尺肉弱者解㑊安臥脫肉者寒熱不治尺膚滑而澤脂者風也尺膚澀者風痹也尺膚粗如枯魚之鱗者水泆飲也尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也尺膚寒其脈小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也此申明診尺膚以定其病也淖澤者滑而軟潤此即風腫也肉弱者脾弱可知故為解㑊解㑊者倦怠無力而安臥也脫肉則土敗而又有寒熱陰陽乖舛故死不可治尺膚滑澤為風其澀者風痹氣血滯故澀也粗如枯魚之鱗者水邪內泆津液不輸於皮毛故反燥澀甚此飲蓄於內非腫脹也尺膚熱甚而脈盛躁則為溫熱病也其脈盛而滑者氣血流動故病邪將外出也尺膚寒其脈小者中陽氣虛故下泄少氣也尺膚炬然先熱後寒者初按浮部甚熱重按則不熱此外邪在衛故表炬然知其發寒熱者也若先按寒久按之而熱者此營熱衛寒亦發寒熱之病也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脈者胃中有寒馬玄臺注人之手自曲池以上為肘自曲池以下為臂肘在上應腰以上手臂在下應腰以下肘之前廉即內廉也據大體為在前故以內廉為肘前而主膺前蓋肘之內廉與膺前皆屬陰也肘之後廉即外廉也據大體為在後故以外廉為肘後而主後之肩背蓋肘之外廉與肩背皆屬陽也至於臂中獨熱者臂外主腰臂內主腹肘後粗大以下三四寸間即曲池為粗大之處以下則為三里之所其間熱者主腸中有蟲蓋不上不下之所正合於腸中也掌中為掌之內其熱其冷主腹中也魚際白肉際屬陰經內有青血脈現者主胃中有寒也尺炬然熱人迎大者當奪血尺堅大脈小甚少氣悗有加立死尺膚者衛陽所行者也絡脈在衛分也血藏絡中奪血者暴脫如崩吐之類陰傷陽亢故尺炬然熱而人迎獨大以人迎主六腑之陽也兩手寸口主五臟之陰者如尺膚堅而且大其衛分甚強營當相應今脈反小甚則營偏虛氣盛於表而虛於內偏勝極而將偏絶故煩悶有加而立死也蓋營衛根於陰陽營衛偏甚則陰陽偏絶故下文病形篇云色脈與尺之相應如桴鼓影響之相應不得相失也此本末枝葉之分別根死則葉枯矣觀此其理更可徵也診目色辨癧串目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中此以目之五色驗五臟之病以五臟之精氣聚於目也不可名者似黃非黃胸中肺胃相近之處也診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病此以太陽經脈由目上而行於頭故為目之上綱陽明經脈由目下而行於面故為目之下綱少陽行於目外兩側也故觀赤脈可察其病之所在也診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死此診瘰癧寒熱之病義詳疾病門瘰癧寒熱篇診血脈者多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者寒熱此看絡脈之現於皮膚者視其屬於某經之部位即知病在某經也義詳營衛經絡門身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食濕熱蘊積而成黃疸有陰陽之分其色晦滯者為陰屬脾病色鮮明者為陽屬胃病其脈小而澀陽氣不振脾困故安臥不嗜食必是陰黃也義詳疾病門診尺膚以合色脈靈樞邪氣臟腑病形篇岐伯曰夫色脈與尺之相應也如桴鼓影響之相應不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得相生之脈則病已矣先定其五色五脈之應其病乃可別也調其脈之緩急大小滑澀而病變定矣脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六脈者氣血之先形色者氣血之華採脈動於肉裡色現於肌表猶根本與枝葉如桴鼓影響之相應而不失觀枝葉之榮枯即知根本之虛實也五色應五脈之理已注上文注中矣若見其色而不得其脈反得相勝之脈者如色青而脈毛是金來剋木之類則死矣得相生之脈者如色青而脈石是水來生木之類則病已矣夫營行脈中衛行脈外營衛通和則氣血周流無間尺膚者衛氣所行者也故脈之緩急滑澀而尺膚亦然脈小則尺膚減瘦脈大則尺膚賁起賁起者隆厚也至其病變則色脈與尺膚有不相應是營衛氣血偏駁不和必審其微甚而調之善調者見其一即知其二見其二即知其三而氣血之虛實營衛之淺深邪正之勝負瞭然心目治之自可十全其九而為上工也診脈辨臟腑病證帝曰脈之緩急小大滑澀之病如何岐伯曰心脈急甚者為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉吤微大為心痹引背善淚出小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍小腹鳴澀甚為喑微澀為血溢維厥耳鳴巔疾心主一身之血其本脈圓活如鉤者陽氣升浮而按之柔和也若急甚則血少風生肝邪乘心或由外邪遏其內火而為瘛瘲瘛瘲者風火相煽筋脈或急或縱手足抽掣也微急者不甚柔和微帶急象血少不能榮養經脈故為心痛引背胃氣因之不和食不能下也緩甚者心氣熱甚故為狂笑微緩者鼓動遲軟以其氣傷血瘀或形在心下名伏梁為心之積也其積隨氣上下而行新血不能歸經反時時隨唾而出也大甚者心火亢逆肺氣窒塞喉中如物梗名喉吤者其聲變也微大者心氣不足血脈痹結故引背而痛手少陰之脈挾咽喉連目系故善於淚出也小甚者火衰而土寒胃氣空乏而善噦噦者嘔而有聲無物也後世或以厄逆名噦微小者心火下陷土中善能消食而肌肉消瘦為消疸之病也滑甚者心火乘肺胃故善渴也微滑者心火流於小腸名心疝故引臍而小腹鳴也此與心脈搏滑急亦為心疝者不同彼為外寒由腑犯臟此為內熱由臟傳腑也澀甚者氣血閉甚舌蹇而聲不達為喑以舌為心之苗也微澀者氣傷而血溢經脈瘀滯為維厥者陰維為病苦心痛也血傷而虛風動則耳鳴耳為心腎之竅也巔疾者風上巔頂而頭眩也肺脈急甚為癲疾微急為肺寒熱怠惰咳唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止大甚為脛腫微大為肺痹引胸背起惡日光小甚為泄微小為消疸滑甚為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻在頸支腋之間下不勝其上其應善痠矣肺主一身之氣其本脈輕按浮短澀名毛者陽氣初降之象也重按則柔和若浮沉皆急甚者而無柔和之氣肝邪極盛侮其所不勝肺失清肅之權風痰鼓激於內為癲疾陰病為癲陽病為狂皆心神昏亂也微急者氣傷而營衛不和則發寒熱怠惰無力氣逆血不循經則咳而唾血氣脈不通咳則牽引腰背胸而鼻生瘜肉也緩甚者氣泄衛疏故多汗微緩則亦氣傷而肢痿生鼠瘻經脈鬱結故為偏風半身不遂等病頭以下汗出不可止皆氣散也大甚者肺火盛於經絡肺主表上病極而下故為脛腫俗名流火也微大者熱傷津液肺氣痹而引胸背皆不舒痹論曰肺痹者煩滿喘而嘔也起惡日光亦火鬱之故也小甚者肺氣下陷而為泄瀉以大腸為肺之腑也微小者津亦耗矣故為消疸滑甚者熱盛氣騰故為息賁上氣微滑者氣熱動血而妄行上為鼻衄下為便血澀甚者氣傷血瘀瘀積於胃而嘔血也微澀者氣血兩傷而兩滯故成鼠瘻如瘰癧之類上既鬱結氣血不得下輸故下不勝上而足膝痠軟無力也痿論曰肺熱葉焦發為痿躄上虛而下病痠軟乃痿之兆也肝脈急甚者為惡言微急為肥氣在脅下若覆杯緩甚為善嘔微緩為水瘕痹也大甚為內癰善嘔衄微大為肝痹陰縮咳引小腹小甚為多飲微小為消疸滑甚為㿉疝微滑為遺溺澀甚為溢飲微澀為瘛攣筋痹肝藏血其本脈柔軟而細長名弦者陽氣初生之象也若急強不和則血少而氣逆肝氣逆則多怒故出惡言或惡人之言也若微急乃氣傷血瘀結於脅下名肥氣大如覆杯肝之積也脅下肝之部也緩甚者縱緩氣橫犯胃故善嘔也微緩者氣不循經水蓄成瘕而痹也瘕者假物以成形也大甚者火盛結為內癰血熱妄行嘔而衄血也微大者血傷氣痹肝主筋筋失榮養而陰縮陰為宗筋故氣痹而咳牽引小腹也小甚者血枯內燥渴而多飲微小者飲多成疸疸者水鬱成熱也滑甚者濕閉而熱伏熱則脈滑濕閉而氣不流行陰子腫大頑木不知痛癢名㿉疝也微滑者虛熱氣不能收攝為遺溺蓋實熱則癃閉虛熱為遺溺皆肝所主之病也澀甚者陽氣無力運行由水飲漫溢故也微澀者氣血皆傷筋失榮養為瘛瘲為拘攣而筋痹也脾脈急甚為瘛瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊僕微大為疝氣腹裡大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為㿉癃微滑為蟲毒蛔蠍腹熱澀甚為腸㿉微澀為內㿉多下膿血脾土居中而主肌肉其本脈和緩而敦厚陰陽兩平之象也氣旺四季更代之時故脈名代而歇止有定數者亦名代脈是脾氣損不能接續各臟之氣以行於身也脾主四肢其脈急甚肝邪盛而犯脾風動而四肢抽掣為瘛瘲也微急則氣逆而膈中膈猶格也食飲阻逆故入而還出後沃沫者食出又吐白沫中土被木邪所傷也緩為本脈緩甚則氣虛而經脈弛痿弱無力陽不能達四末則厥冷也微緩者氣虛而肝風乘之四肢不用名風痿以非外風故心慧然若無病也大甚者或因擊傷或跌僕而傷肌肉氣血擾動也若微大氣耗血壅為病疝以前陰為太陰陽明之所合也如又腹大以膿血結於腸胃之外也小甚則氣血皆虛營衛不調而為寒熱微小者氣虛不能化津消渴而成疸也滑甚為熱而在脾脾主濕濕熱閉結故㿉而兼癃是前陰脹痛小便不通也微滑者氣虛濕熱蒸而化蟲成蠱毒腹脹而內熱蟲名蛸蠍也澀甚者氣虛血瘀成腸㿉微澀者成內㿉皆腸癰之類故多下膿血也腎脈急甚為骨癲疾微急為沉厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出大甚為陰痿微大為石水起臍以下至小腹腄腄然上至胃脘死不治小甚為洞泄微小為消疸滑甚為癃㿉微滑為骨痿坐不能起起則目無所見澀甚為大癰微澀為不月沉痔腎藏精而主骨其本脈沉實按之軟滑陽氣歸伏之象也若急甚者寒邪入骨陽氣傷而心昏憒名骨癲疾也微急者寒邪入經沉者深也腎經為至深之處故足冷而厥其邪氣從少腹上衝心者名為奔豚腎之積也其足強不能收縮不得前後者二便不通皆下焦陽虛陰邪鬱閉故也緩甚者陽氣耗散督為陽脈之綱與腎脈相通而主腰脊陽傷故腰脊如折也微緩者陽氣內虛中空如洞無火化食下嗌還出也大甚者火散不聚其陰則痿矣微大者火衰水聚深沉如石起臍下至少腹腄腄然者腹脹下垂若脹至胃脘則火土兩敗故死不可治也小甚者下焦陽虛不固故為洞泄微小者腎水涸而成消疸矣滑甚者濕熱閉結既癃且㿉與脾脈之滑甚同病也微滑者腎虛骨熱為骨痿故坐不能起起則目無所見也痿有五痿心肝脾肺腎皆虛熱也澀甚者為大癰即所云營氣不從逆於肉裡乃生壅腫也微澀者結滯且乾枯故月事不來沉痔者謂病根結於深沉之處成痼疾也以上舉緩急大小滑澀六脈分五臟部位而辨其病然有脈同而病異者有病同而脈異者要必參合四診以辨之也諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒此總結緩急大小滑澀以辨氣血虛實寒熱之病也言諸急者多寒亦有非寒者矣如雲脾脈急甚為瘛瘲等病則非寒也是但寒病為多耳緩者多熱亦有非熱者矣如雲腎脈緩甚為折脊是陽虛而非熱以熱病為多耳多氣少血多血少氣者言偏勝鬱滯之病也蓋氣為陽性流動血為陰性凝滯故氣勝則脈滑血勝則脈澀也故凡緩急大小滑澀之脈皆有虛實不同其五臟為病各異要必參合四診以辨之為準也又如難經云一脈十變假令心脈急甚者肝邪干心也心脈微急者膽邪干小腸也心脈大甚者小腸邪自干小腸也心脈緩甚者脾邪干心也心脈微緩者胃邪干小腸也心脈澀甚者肺邪干心也心脈微澀者大腸邪干小腸也心脈沉甚者腎邪干心也心脈微沉者膀胱邪干小腸也五臟各有剛柔邪故令一脈變為十也是與此章經文互明其理蓋急大緩澀沉為肝心脾肺腎臟脈之本象若現於別臟部位則為病邪甚則為臟病微則為腑病此舉心臟以明之餘臟皆可類推矣素問平人氣象論曰臂多青脈曰脫血尺脈緩澀謂之解㑊安臥脈盛謂之脫血尺寒脈滑謂之多汗尺寒脈細謂之後泄脈粗尺常熱者謂之熱中頸脈動喘疾咳曰水目窠微腫如臥蠶起之狀曰水溺黃赤安臥者黃疸已食如飢者胃疸面腫曰風足脛腫曰水目黃者曰黃疸臂多青脈者絡脈也血藏絡中脫血則絡空青者肝色脫血肝傷故也上文靈樞邪氣病形篇云脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩滑澀大小亦然此言尺脈緩澀者是尺膚與兩手之脈皆寬緩澀滯尺膚屬衛脈屬營是營衛皆虛經脈懈弛行坐無力病名解㑊脈盛則邪盛而臥不安矣今反安臥乃暴脫血而氣不固則脈盛而虛大無力故倦臥也尺膚澀者衛虛也脈滑者營中熱也因熱而津外泄衛虛表不固故汗出多尺膚寒衛陽虛矣脈細中氣寒矣故為後泄不止之病也脈既粗則營熱尺膚又常熱不退其邪熱盛於內也頸脈者人迎胃脈也胃中水飲停蓄經氣大逆故頸脈動喘而疾咳疾咳者連聲急促也目窠眼眶也屬脾水濕壅於脾胃故目窠下腫如臥蠶欲起之狀若其溺黃赤者濕熱瘀閉必成黃疸以濕傷脾故困倦而安臥已食如飢者濕火在胃名胃疸其黃色鮮明名陽黃其色晦者名陰黃屬脾也風為陽邪本乎天者親上故傷風則面腫水為陰邪本乎地者親下故水病則足腫也目黃則濕閉故為黃疸病此節互明四診之道也脈分天地人三部九候素問三部九候論帝曰願聞天地之至數合於人形氣血通決死生為之奈何岐伯曰天地之至數始於一終於九焉一者天二者地三者人因而三之三三者九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾數止於九者十百千萬皆一之大數故數止於九而已天地人為三才而人身則有天地人三部部有三候之脈共合為九候以應天地九野之度九野即九州也察九候之脈和否可以決死生處治百病以調虛實而除邪疾也三候者有天有地有人也必指而導之乃以為真上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也故下部之天以候肝地以候腎人以候脾胃之氣中部之候天以候肺地以候胸中之氣人以候心上部天以候頭角之氣地以候口齒之氣人以候耳目之氣三而三之合則為九九分為九野九野為九臟故神臟五形臟四合為九臟五臟已敗其色必夭夭必死矣必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脈而後調之無問其病以平為期以一身分頭手足三部部有天地人三候其合為九候候其動脈以驗氣之衰旺病之吉凶也然此與氣口之分寸關尺義各不同互明其理也蓋兩手氣口皆肺臟本部之脈因肺為華蓋各臟腑脈氣盡歸於肺故各臟腑之病氣皆現於兩手寸關尺之脈是乃周身脈氣流行之總口故名氣口又名寸口又名脈口而本經言氣口獨為五臟主也此分三部九候者是診各臟腑本部之脈氣而驗之尤為真實何也假如外邪閉遏肺氣其兩手之脈或郁或伏即不知其病在何臟何腑必於九候之部診之方不錯誤也神臟五者心藏神肺藏魄肝藏魂脾藏意腎藏志也形臟四者馬玄臺言胃大小腸膀胱皆藏水穀糟粕生化氣血泌別清濁以充養一身者也薛生白以謂頭角耳目口齒胸中為四形臟是準經文三候之義於理亦通若五臟氣敗則神傷而色必枯夭則死矣故必先度其形之肥瘦以調其虛實而施補瀉之法必先去其血脈之邪使經絡流通而後隨宜調之無問其病之新久總以陰陽氣血和平為期也帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆臟相失者死中部之候相減者死目內陷者死形盛脈細少氣不足以息者外強中乾也故危形瘦脈大胸中多氣者本元離根上奔欲脫也故死形氣相得者如形盛脈盛而氣盛形瘦脈小而氣少此本元未搖故雖病可生以三相較謂之參以五相類謂之伍參伍不調者脈來浮沉遲數失序也如寸應浮尺應沉熱應數寒應遲反此則為不調也故凡病而三部九候皆失其本象之脈則陰陽敗而氣血亂故死也上下左右之脈相應如參舂者數動搏指來去出入至數不清其氣血之乖可知故病甚也至於相失不可數則更散亂無序故死也中部之候雖獨調與衆臟相失者僅存脾胃之氣苟延而浮沉各臟本脈形象皆失各臟氣敗故死也若各臟脈雖未敗而中部之候獨減削此脾胃先敗後天根本已絶亦死也目由五臟精氣所聚目內陷則臟氣絶故死也察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病此九候中獨現七端之脈名七診於九候中察其部位而知病處其云獨熱獨寒者兼肌膚言也帝曰冬陰夏陽奈何岐伯曰九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死是故寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍疏乍數乍遲乍疾者日乘四季而死此以脈象病狀合陰陽之理而決死期也蓋陰極陽生陽極陰生造化自然之理也脈病皆陰而死夜半脈病皆陽而死日中者以陰陽氣極不能相生而死也寒熱病死於平旦者平旦陽氣從陰而出於表病寒熱者陰陽格拒平旦陽不能出其氣閉絶而死風為陽邪日夕陽入於陰之時陽邪格逆氣不能入則陰陽偏絶而死其脈乍疏乍數乍疾乍遲者脾敗真臟脈現不能維持陰陽而散亂也土旺四季其氣敗故至辰戍丑未四季月日時無生氣接續則死形肉已脫九候雖調猶死七診雖見九候皆從者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈侯敗者亦死矣必發噦噫形肉脾胃所主為後天根本故形肉脫而脈之九候雖調猶死也七診上文所云獨小獨大等脈雖見七診而脈之九候皆從者不死其不死者因風氣閉結經脈及婦人經月不行或乍行其脈變似七診而非真七診也故言不死若有七診之病其脈之九候本元敗者亦死矣死時必發噦噫即元氣敗之徵也後世但知寸關尺浮中沉為九候然胃之衝陽肝之太衝腎之太溪皆動於足為根本之脈故凡重病不可不診以驗吉凶方無錯誤也必審問其所始病與今之所方病而後各循切其脈視其經絡浮沉以上下逆從循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可不察也問其始病知外感內傷之因問其現病知虛實淺深之證然後切脈而視其經絡察其氣之上下或逆或從其脈疾者流利也故不病遲者虛寒也故病若脈板實而無來去出入其氣血已死矣皮膚著骨者則血氣乾枯而肌肉已死矣太陽經脈起於目眥為目上綱經氣不足榮養故瞳子上吊而高至於目珠上竄其經氣已絶此決死生之要法不可不察也脈氣所以能動之理靈樞動輸篇帝曰經脈十二而手太陰足少陰陽明獨動不休何也岐伯曰是明胃脈也胃為五臟六腑之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止帝曰氣之過於寸口也上出焉息下入焉伏何道從還不知其極岐伯曰氣之離臟也卒然如弓弩之發如水之下岸上於魚以反衰其餘氣衰散以逆上故其行微凡氣血流行於營衛經絡始終之序而營衛生會經脈等篇已反復詳明矣此篇帝問脈氣所以能動之理舊注仍解作流行次序不但非經旨且覺復贅無謂矣此乃先明兩手寸口動脈是手太陰肺經之氣也其氣即胸中之宗氣宗氣者由胃所化水穀之精氣與腎中先天元陽之氣會合者也蓋脾主為胃行其津液由脾鼓運而胃氣始得上輸於肺而肺權衡敷布周行然後流於兩手寸口之脈以肺為華蓋而朝百脈故各臟腑脈氣皆上貫於肺和肺氣流行現象於兩手寸口之脈也帝問氣之過於寸口動而不休不知其出入息伏回環之道岐伯言氣之出於臟也如弓弩之發如水之下岸其勢有力及流於經而至手腕魚際則如強弩之末以反而衰如水勢之回返故其餘氣衰流散以後而再逆上則其行之力微此為出入息伏回環之道也蓋因臟腑之氣升降經絡之氣轉旋其升也由臟腑出升於經絡其降也由經絡轉旋入於臟腑故脈氣有出入來去升降之象升而出者為來為陽降而入者為去為陰切脈即知其氣之和否也良以先天元氣出於少陰腎後天穀氣出於陽明胃二氣會合於胸名宗氣宗氣達於肺而分行表裡轉旋回返而仍入腑臟是故手太陰肺經足陽明胃經足少陰腎經三者之脈氣最旺而獨動不休與他經不同也氣有升降故有呼吸而脈動應呼吸之序故仲景言呼吸者脈之頭也以無病人之呼吸合病人之動脈其遲數可準也帝問焉息者息止也言其氣之出也何所底止也焉伏者言其氣之入也伏藏何所其從何道而往還也既將出字誤刊作十注家不辨竟解作上十下八全無義理可通也帝曰足之陽明何因而動岐伯曰胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顱下客主人循牙車合陽明並下人迎此胃氣別走於陽明者也故陰陽上下其動也若一故陽病而陽脈小者為逆陰病而陰脈大者為逆故陰陽俱動俱靜若引繩相傾者病此言結喉兩旁動脈名人迎者是足陽明胃經之悍氣也胃中水穀精微之氣則入營達肺而流行於寸口之脈其升浮之悍氣直上衝頭循咽而上走空竅類煙霧之蒸騰從眼系入腦又出額顱下客主人循牙車而合陽明之經下入於人迎之脈此胃中慓悍之氣別走一路而仍會合於陽明經也夫陽明行氣於三陽故人迎主六腑之陽肺為五臟之華蓋故寸口主五臟之陰寸口之脈由肺走手人迎之脈由頭走頸故曰三陰在手三陽在頭至其動也上下若一而不參差然動雖一般而人迎主陽其脈比寸口本大故陽病而人迎反小則其陽衰甚而為逆也寸口主陰其脈比人迎本小故陰病而寸口反大則其陰虧甚而為逆也此陰陽各有本象之脈而俱動俱靜如兩人引繩各執一頭相應而不差若互相傾側者或應小反大應數反遲不合本象皆陰陽偏傾而為病也故本經論疾診尺篇曰人病其寸口脈與人迎脈大小等浮沉等者病難已也蓋寸口主陰本脈應小而沉人迎主陽本脈應大而浮今大小浮沉相等其陰陽之氣偏傾不合脈之本象故病難已是故凡病審其陰陽之虛實者必兼診喉間之人迎脈也帝曰足少陰何因而動岐伯曰衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉邪入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者邪入踝出屬跗上入大指之間注諸絡以溫足脛此脈之常動者也此言兩足內踝後動脈名太溪者是足少陰腎經之氣也因其氣從本經絡膀胱之大絡與衝脈同發源於腎臟乃是坎象中之元陽而衝脈為十二經氣聚會之海其脈由陽明經之氣街循陰股下入膕中又並足少陰經而入內踝之後入足下是故太溪之脈來源既深又合衝脈而行則其氣勢旺於他經此脈所以常動不休也帝曰營衛之行也上下相貫如環之無端今有其卒然遇邪氣及逢大寒手足懈惰其脈陰陽之道相輸之會行相失也氣何由還岐伯曰夫四末陰陽之會者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從合相輸如環帝曰善此所謂如環無端莫知其紀此之謂也上文已明脈動之理此更明其病邪淺深之分也夫營衛經絡者陰陽氣血流行之道路也脈者氣血流行之徵象也十二經每經交接皆由陰陽絡脈在手足指尖四肢之末若感外邪經絡閉郁四末之氣不通而手足懈惰則陰陽相輸相會之行路相失帝問其氣何由還復岐伯謂四末陰陽所交會者淺在絡脈如小路其內尚有四街之大路通行若外邪解其四末絡脈通則一身陰陽之氣依舊相合相輸如環無端者也四街者即本經所云胸氣有街腹氣有街頭氣有街脛氣有街也大抵臟腑之氣流行比經絡寬廣而稱街是故邪淺則街路通而病輕邪深入腑則街路塞而病危再深入臟則街路絶而死於此而辨邪之淺深病之輕重其治法可例知矣脈之宗氣出於胃素問平人氣象論曰胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也盛喘數絶者則病在中結而橫有積矣絶不至曰死乳之下其動應衣宗氣泄也此已録經絡門中因其為脈之宗氣所出故又録於此蓋營氣起於中焦而行脈中營中血氣由胃中水穀精微之氣生化故脈之宗氣出於胃由胃之大絡貫膈絡肺出於左乳下其動應衣者即是脈之宗氣也蓋以腎中所出元陽為祖氣與胃中谷氣會合而聚於胸名宗氣故胸名氣海統歸肺臟權衡敷布而分營衛陰陽營為陰而行脈中衛為陽而行脈外衛為氣故肺所主營為血故心所主胸中為衛之本膻中為營之源也若虛里之宗氣盛喘數絶者乳下之動脈數甚其病在中脘也若痞結而橫且有形則內有邪積矣若其脈絶不至則宗氣竭而死若其動甚震衣是宗氣不固而外泄也上言其動震衣但微動此言宗氣走泄則大動矣脈之宗氣出於胃故脈必以胃氣為本而弦鉤毛石等臟氣之象微現以應四時氣候方為吉也故如下文所言人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也此明脈以胃氣為本之理也胃氣之現於脈者從容和緩蓋陰陽五行而得中土調和之氣也若弦鉤毛石而無和緩之象是無胃氣名真臟脈故曰但弦無胃氣者死餘臟皆然又如脈之不得胃氣者如肝脈之應弦不弦而反毛是金來剋木也餘臟皆然良由無中土之氣調和故水火木金互相剋賊亦名真臟脈微現已危甚則死矣所以然者胃之穀氣由腎中元陽蒸化而生穀氣不生其元陽已敗也卷四下經解格陽關陰脈素問六節臟象論岐伯曰人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰人迎與寸口俱盛四倍以上為關格關格之脈贏不能極於天地之精氣則死矣人迎主六腑之陽寸口主五臟之陰故二脈統一身之陰陽也而分三陰三陽者明二氣流行皆有生旺之序也然偏旺則偏勝而病偏甚則偏絶矣人迎一盛者少陽偏旺故病在少陽二盛偏甚病在太陽三盛偏極病在陽明也寸口陰盛亦然其言盛者偏邪之氣非陰陽氣旺之謂也故至四盛以上則邪氣盛極而成關格之病陰陽不相交通故關者不得小便格者格拒吐逆食不下關格之脈贏滿四盛以上不能盡其所稟天地之精氣而死也靈樞終始篇曰人迎一盛病在足少陽一盛而躁病在手少陽以至二盛三盛及寸口一盛二盛三盛皆兼足手大抵盛在足經病或可治兼躁而及手經則病深不可治也惟難經以尺寸之脈下覆上溢名關格為真臟脈其人不病而死與內經互明其理也素問腹中論帝曰病熱而有所痛何也岐伯曰病熱者陽脈也以三陽之動也人迎一盛少陽二盛太陽三盛陽明入陰也夫陽入於陰故病在頭與腹乃䐜脹而頭痛也人迎主陽熱病陽邪故人迎脈盛盛甚則陽邪入陰蓋太陽主開猶可外泄陽明主闔則邪必入陰以陽明與太陰為表裡也未離陽明邪熱上衝而頭痛已入太陰故腹脹上節言兼躁是足傳手此節言從陽入陰皆謂病邪深重當急治之勿使成關格死證也脈應四時陰陽素問脈要精微論岐伯曰萬物之外六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與上下以春應中規夏應中矩秋應中衡冬應中權此言脈象應乎四時陰陽之氣化也寒為陰熱為陽二氣流行自微而盛故自暖而熱熱極則涼陽極生陰也寒極則溫陰極生陽也四時迭運而人身陰陽之氣隨之進退而現象於脈如規矩衡權上下相應準而有度如脈不應氣候而有太過不及相生相剋即可辨其病之輕重吉凶也是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失知脈所分分之有期故知死時此即申明上文之義也冬至四十五日立春節也陽氣微出於地上陰氣微下於地中萬物生機發動而脈由石變弦以應春陽之氣夏至四十五日立秋節也陰氣微出於地上陽氣微下於地中萬物長足而成實脈即由鉤而變毛以應秋收之氣也陽氣由微而盛則弦脈變鉤鉤者浮洪也陰氣由微而盛則毛脈變石石者沉實也此陰陽升降流行生化萬物故有四時之不同與脈相應如期會者若期而相失知脈氣與天地氣化分離故不相應視其分離有期或相生相剋即可知其死生之時日如春見秋脈金剋木為死見冬脈水生木可生也微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜補瀉勿失與天地如一得一之精以知死生是故聲合五音色合五行脈合陰陽此言疾病死生微妙之理全在察脈察之必有紀律非可憑臆揣度要從陰陽生化之理為始知始而後則有經常變化不同皆從五行出生如冬至陽生夏至陰生木旺於春火旺於夏金旺於秋水旺於冬土旺四季此陰陽四時之常度也如陰陽有偏勝則五行有生克遂變化致病故必調之合四時之宜應補應瀉而勿錯失與天地生化之理如一得其精一之理可以知逆順死生之道也若聲從氣發色由氣彰氣根於五臟五臟具五行之性脈為氣血之先形是故聲音色脈必皆合乎五行陰陽生化之理不合則病敗象見則死矣反四時者有餘為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格此言脈象反四時氣化之理也言有餘為精不足為消者謂人身陰陽之氣合四時氣化而消長者若春夏陽長陰消秋冬陽消陰長脈象隨四時而不同也如其應當太過而反不足為精傷而氣不生長也應當不足而反有餘為本元消敗虛陽發露之假象也故曰陰陽不相應病名曰關格關格者死不可治也此節經文向在前萬物之外一節以先余細詳上下義理必是錯簡故特移此義理方合是故持脈有道虛靜為保春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室故曰知內者按而紀之知外者終而始之此六者持脈之大法此言切脈之要道當虛心靜氣醫者虛心則明察病者氣靜則脈準可保無錯失也蓋脈理之妙難以言宣喻如魚遊蟲蟄種種形容其氣血流行出入之象亦即弦鉤毛石之意也必深思默究悟其神理指下方能明察故知身內之氣化者按脈象陰陽五行而紀之其理自見知身外之氣化者觀時序流行終始之道與人身無不相應而內傷外感昭然可辨以四時之氣化合人身之內外此六者為持脈之大綱要法也此結上文諸節之旨下乃詳敘診脈部位也脈候部位尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也此專指兩手之脈也李仕材曰季脅小肋也在脅下兩旁尺外者尺脈前半部也前以候陽後以候陰背為陽腎附背故外以候腎腹為陰故里以候腹所謂腹者凡大小腸膀胱命門皆在其中矣以上諸部俱言左右而此獨不分者以兩尺皆主乎腎也中附上者言尺之上即關脈也左外者左關之前半部也內者後半部也肝亦附近於背故外以候肝內以候膈膈者中焦之膈膜膽腑俱在其中矣右關之前所以候胃關後所以候脾脾胃皆在中州胃為陽脾為陰故外以候胃內以候脾也本篇止言五臟而不及他腑獨言胃者以五臟皆稟氣於胃而為臟腑之海則臟腑之氣亦可見乎此也上附上者關上寸脈也五臟惟肺最高故右寸之前以候肺後以候胸中胸中膈膜以上皆是也心肺皆居膈上故左寸之前以候心後以候膻中膻中者心包絡之別名也前以候前後以候後者重申上下內外之義也統而言之寸為前尺為後分而言之上半部為前下半部為後上竟上者言脈則盡於魚際在體則應乎胸喉也下竟下者在脈則盡於尺部在體則應乎少腹腰膝足也此章首言尺以次及於寸自內而至外者以尺為根本寸為枝葉也按內外二字諸注皆云內側外側若以側言必脈形匾闊或有兩條乃可耳不然於義不通矣如前以候前後以候後上竟上下竟下者皆內外之義也觀易卦六爻自下而上上三爻為外卦下三爻為內卦則上下內外之義昭然矣余觀李仕材舉卦象以明上下內外之義甚為確當然其錯處頗多蓋經之論陰陽也隨地變化各有義理不可混淆若舉周身而言則背為陽腹為陰若以表裡而言則表為陽里為陰若以營衛而言則營為陰衛為陽若以腑臟而言則腑為陽臟為陰也脈者根於臟腑之氣血流行出入升降於表裡者也故當以臟腑之陰陽為主不當以腹背陰陽淆混也夫陽之升自然行上行表自內出外陰主降自然行下行里自外入內故經文止言五臟一胃之部位而他腑之氣即可就陰陽之理而推之以診其脈也經言左關之前以候肝後以候膈膈者膈膜空洞之地候其氣血有無窒滯而已如右寸之前以候肺後以候胸中一律也若膽實連綴於肝且與肝合為表裡而腑為陽理當浮部候膽沉部候肝也難經言左為腎右為命門男子以藏精女子以系胞則尺脈浮部當候膀胱沉部候腎而命門獨候於右尺者因後天卦乾在西北正人身之右尺脈以有先天之元陽所在是人之命根要如門戶之固密故稱命門也今仕材言背為陽腎附於背故外以候腎腹為陰故里以候腹腹者凡大小腸膀胱命門皆在其中矣又言膈者膽在其中也此皆憑臆之説不獨臟腑部位錯亂而陰陽至理全失矣仕材醫學精詣獨其論脈每有似是而非者餘三集活人新書首卷有診脈綱要一篇凡自古疑惑而聚訟不休者余皆本易理靈素難經詳辨明晰可為定論矣其聚訟者皆未究聖經至理故也脈象辨病粗大者陰不足陽有餘為熱中也來疾去徐上實下虛為厥巔疾來徐去疾上虛下實為惡風也故中惡風者陽氣受也有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眴僕諸浮不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足數動一代者病在陽之脈也泄及便膿血此舉通體脈象陰陽虛實之綱以辨外感內傷輕重之病也夫脈之流行一如溪水而有源流澎湃之勢其陰陽升降出入之理存乎其中故有上下來去至止六字教人揣摩領悟自尺而上於寸為陽自寸而下於尺為陰自沉而浮為出為陽自浮而沉為入為陰其上而出為來其下而入為去應手為至離手為止是故粗大為陰不足陽有餘陽偏勝為熱中之病也來疾去徐者其氣升出速降入遲則上出氣旺故上實下虛下虛則足厥冷上實則巔頂或疼或脹之疾作也來徐去疾者升出氣遲降入氣速則下入氣旺故下實上虛上虛為陽虛故惡風也因其外感邪風風為陽故陽氣受病同類相感也其有脈俱沉細數者邪熱入陰部故病在少陰腎經厥者氣逆若沉細數散兼營氣不通故發寒熱如仲景云少陰病反發熱者用麻黃附子細辛湯然彼為寒邪故脈微細此為熱邪故脈沉細數散皆少陰兼營衛之病也若浮而散元氣外脫為眴僕忽而目眩跌僕也諸浮而不躁者其病皆在陽分而為熱病其躁者在手經以手經為心肺三焦之部乃陽中之陽故兼躁即上文一盛而躁病在手少陽之義也諸沉而細者其病皆在陰分深入於骨而為骨痛既沉細而有靜者其病在足經以足經為陰中之陰正與躁為在手相對待也此靜躁或兼病狀而言皆當審察也脈既數動則為火其病在陽又兼一代歇止也名促脈此火邪下迫而泄瀉熱邪入營則便膿血邪鬱而氣血傷故脈一代也以上諸病或由外感或由內傷更當審問其因也諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒推而外之內而不外有心腹積也推而內之外而不內身有熱也推而上之上而不下腰足清也推而下之下而不上頭項痛也按之至骨脈氣少者腰脊痛而身有痹也諸過者謂脈較本象太過也言有餘者病氣非元氣有餘也以病在衛陽為陽氣有餘故身熱無汗腠理閉滯故脈澀也病在營陰為陰有餘故多汗而身寒以腠理開泄津液流通故脈滑也營衛俱病為陰陽俱有餘營衛皆閉故無汗而身寒以上統論外感內傷之脈象當審問其因以分辨之也推而外之內而不外者輕按浮部不應重按沉部方見脈象是內有結積在心腹氣閉不能達於肌表也推而內之外而不內者重按脈微而旺於浮部是感外邪故身熱也推而上之上而不下者升多降少寸旺尺弱而下虛故腰足清冷也推而下之下而不上者升少降多寸弱尺旺而陽不伸故頭項強痛也按之至骨脈氣少者腎元虧陽氣不足故腰脊痛而身有痹也腰為腎之府脊為督脈陽經之綱風寒濕合而成痹由陽氣不能充周於身也診脈察色觀形帝曰診法何如岐伯曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故可診有過之脈脈者氣血之先形氣血有乖則現象於脈惟平旦陰陽氣未動散無飲食助氣而經絡之氣調勻故診其脈可知其病在何處而壽夭可辨也切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分切脈動靜者浮沉遲數之類也視精明察五色者人之精神聚於目氣色榮華現於面觀其外即可知內之臟腑強弱見其形可知身之盛衰或形盛脈弱為本虛形弱脈盛為邪實推陰陽逆順五行生剋之理參伍以決斷生死之分也更詳下文夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶死此即脈辨病而決生死之法也衛行脈外而主氣營行脈中而主血故脈為血之府然即可因之以驗氣何也蓋血主濡之氣主煦之血隨氣行氣由血聚良以陰陽血氣互相為根不能析離者也故脈形長者知其氣之調達而治也脈短者知其氣鬱而病也脈數者或因邪郁化火或因水虧火亢皆煩心也若外感而脈漸大是邪盛也若內傷而脈反大是本元之氣不固也皆知其病增進矣若脈勢上溢而寸偏旺則氣上盛而息必高若脈勢下垂而尺反大則氣下墜而腹必脹也代者歇止也其氣衰可知然亦有臟腑氣血結滯者脈細則氣少矣然亦有外受濕氣者總因陽氣衰少而尚可治若非結滯而現代脈則本元敗為難治矣脈澀者氣結血瘀心主血脈故心痛也渾渾革至如湧泉者輕按至數不清如皮革之狀重按如湧泉之騰沸此根元渙散陰陽升降出入無序故病進而色弊矣然猶有鼓動之勢若無力鼓動而綿綿如去水之下溜如琴絃之忽絶無形者正如殘燈忽滅故死也經脈應四時十二月素問陰陽別論帝曰人有四經十二從何謂岐伯曰四經應四時十二從應十二月十二月應十二脈脈有陰陽知陽者知陰知陰者知陽凡陽有五五五二十五陽所謂陰者真臟也見則為敗敗必死矣所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期三陽在頭三陰在手所謂一也別於陽者知病忌時別於陰者知死生之期謹熟陰陽無與衆謀四經應四時者肝經應春心經應夏肺經應秋腎經應冬脾土應四季在其中矣十二從者手足三陰三陽共十二經相從周流於一身如十二月之周行成一歲終而復始也脈理之要別其陰陽能知其陰即知其陽能知其陽即知其陰何也蓋陰陽之氣相合外行經絡內行臟腑循環不已而五臟皆稟胃脘陽和之氣其一臟遍含五臟之胃陽故五五有二十五陽臟為陰腑為陽所以謂陰者真臟孤陰之氣也真臟脈現則本元敗敗必死矣所以謂陽者胃脘之陽也胃為陽土其能納水穀化精微生氣血者實由先天元陽蒸騰之力故得陽生陰長氣血和平而脈象柔緩調勻是為胃氣故脈有胃氣則生若胃陽敗則孤陰真臟之脈現如弦鉤毛石而但急強散亂絶無和緩之氣則死矣是故能別其胃腸之和否可知其病處如弦多胃氣少病在肝之類也能別其孤陰真臟脈可知死生之期如肝至懸絶急十八日死之類也三陽經脈上頭三陰經脈止於手而陰陽通貫周流則一也故能知陽可以知陰知陰可以知陽辨其陽脈之太過不及可知病有宜忌之時如春夏人迎微大為宜反小為忌秋冬微小為宜反大為忌辨其陰脈之逆順可知死生之期如肝病遇木旺時可生遇金旺時則死之類如是謹記熟悉陰陽生化五行生剋之理則辨別自明無須與庸衆謀議徒滋惑亂也五臟絶脈所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽凡持真臟脈者肝至懸絶急十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死人身陰陽氣血升降流行循環不已與天地同其造化其升而出以現於脈者為至為陽其降而入為去為陰其來去之形靜者為陰動者為陽遲者為陰數者為陽沉者為陰浮者為陽此陰陽之綱必參悟其神理指下方能辨別也如上所云胃氣脈者其來去出入必舒徐和緩其部不浮不沉其動不遲不數如是則陰陽和平而無病否則即為病脈察其不調之處乃為病之所在若其本元敗真臟脈現而無胃氣可決其死期如經所云者五臟脈象鼓一陽曰鉤鼓一陰曰毛鼓陽勝急曰弦鼓陽絶而至曰石陰陽相過曰溜此表五臟脈象之神理也五臟具五行之性而五行由陰陽氣化流行生旺而成形象故五臟之氣現於脈者如此鼓一陽者脈形之鼓動如陰陽離合論所云搏而勿浮命一陽也鉤者陽升多陰降少陽升則浮出陰降則沉入故其形如鉤之微曲向下動轉圓活而主夏心之脈象也鼓一陰者如所云搏而勿沉命一陰也毛者陽微降陰微升陽降則收肅陰升則微鼓故如毛之在皮浮而柔軟主秋肺脈之象也鼓陽勝急者鼓動之陽較勝而略急如絃線乃陽初升主春肝脈之象也鼓陽絶而至者輕按其鼓動之形絶無陽象重按而純陰氣至其陽下伏如石沉水也主冬腎脈之象也夫陰陽升降出入是二氣相交相生必由中土經過互相往來如水之溜故言陰陽相過曰溜即脾胃之脈象也溜者中和柔緩之象現於弦鉤毛石之中乃為胃氣無病之脈猶土旺四季而不獨主一時故曰其善處不可得見以其在心腎肺肝之中也靈樞根結篇曰一日一夜五十營以營五臟之精不應數者名曰狂生所謂五十營者五臟皆受氣持其脈口數其至也五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣豫之短期要在終始所謂五十動而不一代者以為常也以知五臟之期豫以短期者乍數乍疏也營行脈中陰陽十二經脈流行凡一晝夜五十周於身以營運五臟之精氣而五臟皆受水穀之精氣充養者也故持其寸口之脈數其至數五十動而不一代者其氣周行五臟而不歇止也如五十動外及五十至內或有歇止無一定而遲者名結脈數者名促脈皆為氣血鬱滯之病非死脈也若歇止有定數名代脈以其氣竭不能接續如經所云一臟以至五臟無氣可決其死期之長短也雖不歇止而乍數乍疏此脾敗之真臟脈主死因脾為中土代行各臟之氣於周身故其本脈名代是和緩而不歇止若脾敗不能行氣於各臟五十至內歇止而有定數如欲求人代己故名代脈主死同名代脈其取義各不同也其有言少陽之至乍數乍疏者因少陽陽氣初升未能調暢是時令之旺脈非彼之死脈是故脈名同而義多不同皆當辨別也辨脈平病死旺之象素問平人氣象論岐伯曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也常以不病調病人醫不病故為病人平息以調之為法人一呼脈一動一吸脈一動曰少氣人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風澀曰痹人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死脈之動者陰陽氣血升降出入也其氣根於呼吸故仲景言呼吸脈之頭也一呼一吸名一息三息中必有一長息如歲之有閏名太息也一呼一吸而脈四動連長息計之則三息中多三動分計每息有五動名五至也如此為無病之平人以無病人之呼吸合病脈之至數其遲其數可見也假如一呼脈止一動一吸脈一動此為遲脈陽氣衰少也一呼脈三動一吸脈三動此為數脈若兼躁動而尺膚熱者溫病也尺膚不熱而脈兼滑者是內有風痰如中風之類也脈兼澀者邪痹經絡也若一呼脈至四動以上其氣有出無入本元外脫也脈絶不至者氣血竭也乍疏乍數者元氣散亂也故皆主死胃為臟腑之海臟腑皆賴胃中谷氣充養故人無胃氣其病為逆逆則死之徵也太陽脈至洪大以長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短此以陽氣生旺開闔而現於脈象也太陽為開陽氣正旺故脈洪大且長也少陽為樞陽氣始生未能調達故脈乍數乍疏乍長乍短與上節之乍疏乍數氣散無力者迥乎不同不可不知也兩陽合明名陽明陽旺極而氣闔也故脈浮大者陽之象短者闔象也以此驗三陽之氣生旺出入之道與天地相同假如夏令陽旺極而陰將生是陽明之短脈乃為秋令浮短澀之先兆其三陰經之開闔樞亦然故難經曰太陰之至緊大而長此陰氣旺也故太陰為開又云少陰之至緊細而微此陰氣始生故少陰為樞又云厥陰之至沉細而敦此陰氣已極故厥陰為闔難經以此三陰三陽名旺脈謂合天地生旺之氣也惟難經言冬至後得甲子少陽旺再得甲子陽明旺再得甲子太陽旺此但指天地陽氣生旺而言內經言開闔樞者指人身經氣流行而言各有義理不同也又素問至真要大論曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長此言客氣流行應乎脈象者與前諸義又不同是故聖經之論陰陽千變萬化各有義理所主不可錯亂故經曰知其要者一言而終不知其要流散無窮所以前章李仕材憑臆見注解脈象臟腑部位陰陽錯亂也春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病臟真散於肝肝藏筋膜之氣也五臟具五行之性故各臟脈形不同而合五時之氣化然以胃氣和緩之象為本故五時之脈但微現本臟之脈形方為吉也假如肝木旺於春兩手之脈弦弦者細長而調達必以和緩胃氣為主而微兼弦象曰平平者無病也若弦多胃氣少則肝氣橫逆而病矣但弦無胃氣則真臟脈現而死矣若弦緩兼毛毛者浮短澀肺臟之本脈而主秋令弦多胃少者肝氣太過也兼毛者肝氣不足也至秋金旺則肝木更虧而病矣若毛甚則春見秋脈生氣告匱即時病也先天真元之氣散布於肝肝為震後天之陽始生筋膜故筋膜之氣藏於肝而肝主筋也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病臟真通於心心藏血脈之氣也心火旺於夏兩手之脈鉤鉤者如鉤微曲向下其上圓活轉動而浮必以和緩胃氣為主微現鉤象曰平若鉤多胃氣少則心火亢逆而病矣但鉤無胃氣則堅硬不轉動是真臟脈現則死也若鉤緩中兼石石者沉實而滑腎臟之本脈而主冬令此心火不足至冬水旺則心氣愈虧而病矣若石甚則陰盛陽衰即時病也真元之氣通於心以生血脈而血脈藏於心故心主血脈也長夏胃微軟弱曰平弱多胃少曰脾病但代無胃曰死軟弱有石曰冬病石甚曰今病臟真濡於脾脾藏肌肉之氣也脾土旺於四季而主令長夏未月以土位於中而未為一歲之中也脾司鼓運代行各臟之氣於周身故其本脈名代軟弱者陰土柔象也胃為陽土其氣剛剛柔相濟而得中和之氣故微有軟弱之象曰平如弱多則陽氣少脾乏鼓運之力而病矣若但代無胃則真臟脈現而死也軟弱有石曰冬病石甚曰今病與心同蓋火土一源長夏心火猶旺也真元之氣蒸液濡於脾以長養肌肉故肌肉之氣藏於脾而脾主肌肉也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病臟真高於肺以行營衛之氣也肺金旺於秋兩手之脈毛毛者浮短澀陽氣初降變陰之象必以和緩胃氣為主而微有毛象曰平若毛多胃氣少則肺氣不調而病矣但毛無胃氣則真臟脈現而死也若毛而有弦以收肅之令而現生髮之脈其陽不斂至春發泄更甚而病矣若弦甚則反氣化時令而即病也肺為華蓋部位最高真元之氣上達於肺故權衡一身之氣以行營衛陰陽表裡也冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病臟真下於腎腎藏骨髓之氣也腎水旺於冬兩手之脈石石者沉實軟滑陽氣歸藏之象必以和緩胃氣為主而微有石象曰平若石多胃氣少則腎陽衰陰寒太過而病矣但石無胃氣則真臟脈現而死也若石而有鉤以歸藏之令而見升浮之脈陽先發露至夏令則水涸必生熱病矣若鉤甚是反其歸藏之令即時病也真元之氣下根於腎骨髓乃精氣所成而藏於腎故腎主骨也辨平病死之脈夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死如連珠琅玕者現於指下圓活柔和如鉤下曲而上圓是有胃氣者名鉤脈蓋心火旺於夏兩手之脈微有鉤象為有胃氣之平脈也若喘喘連屬者其形勢急促其中微曲則不調達此心火鬱逆而病也前曲後居如操帶鉤者其來也上浮如鉤頭之圓而堅硬故曰前曲其去也下沉如鉤身之長而不轉故曰後居是心之真臟脈也故死平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死厭厭聶聶者衆苗秀齊貌如落榆莢者輕浮和緩貌皆形容浮澀而和緩有胃氣之象名毛脈也以肺金旺於秋陽氣之初降故輕按浮短澀者收斂之象重按和緩為有胃氣無病之平脈也不上不下者澀甚也如循雞羽者浮澀虛軟也此肺氣鬱而且傷液枯氣耗之病也如物之浮者全在浮部下無根也如風吹毛者應指散亂毫無鼓動之力此肺氣將絶之真臟脈也故死平肝脈來軟弱招招如揭長竿末梢曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死招招猶迢迢也應指雖軟弱而源流綿遠也如揭長竿末梢者如高揭長竿其末梢細長而柔軟名弦脈也蓋肝木旺於春陽氣初升陰氣尚盛長者陽象弦軟陰象此有胃氣之平脈也若盈實而滑則乏柔和之象而陽亢故如長竿之直而不軟滑者陽化火也是肝氣橫逆為病然其滑尚有流動之象倘如新張弓弦之緊急硬徑則無胃氣之真臟脈也故死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如烏之喙如鳥之距如屋之漏如水之流曰脾死和柔相離者陰陽相等來去從容也如雞踐地者至數調勻脈路清楚也脾為陰土胃為陽土土旺四季而居五行之中故其和緩為無病之平脈也若脈來實而盈數則少柔和其氣太過如雞舉足者數而至數不勻必有邪積之脾病也若脈鋭堅如烏喙如鳥距是絶無中和之氣或如屋漏忽連續而來忽久歇一滴或如水流去而不返此皆本元敗而脾氣竭故為死脈也平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死此之喘喘纍纍如鉤形似心脈而實不同心脈陽旺而升現於浮部按之軟散外陽內陰離之象也腎脈陰盛陽伏現於沉部輕按軟弱重按有力而滑外陰內陽坎之象也此有胃氣無病之平脈也若來如引葛者至數模糊不清其陰陽不調故按之益堅無柔緩之氣則為腎病也發如奪索者如兩人奪一索互相牽掣亦如引葛無緒而如索之強硬故如彈石之辟辟絶無柔和之氣是真臟之死脈也辨脈太過不及中外異病素問玉機真臟論岐伯曰春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿春生夏長秋收冬藏氣之流行生化萬物肝應東方之木其氣柔嫩故脈軟弱輕虛而滑滑者流動也端直以長而象弦陽氣調達也凡五臟之脈各有本臟之形而春令弦象為應時之平脈也夏秋冬皆然若脈氣之來不輕虛而實不柔和而強此為太過病在外者外邪乘之肝氣鬱逆故令人善怒風性上搖故忽忽眩冒為巔頂之疾謂目眩昏冒巔頂掣痛以肝經之脈上頂與督脈相會也若其氣來不實而微是為不及而中虛之病乏陽和生氣三焦水道不宣上則胸窒痹痛引背下則兩胠及脅虛滿經所云臟寒生滿病也須用補陽以和陰不可作實痛實滿而用攻散也胠者脅下軟處皆肝經所行之部也夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病帝曰何如而反岐伯曰其氣來盛去亦盛此為太過病在外其氣來不盛去反盛此為不及病在中太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄陰陽生化之機無非升降出入夏令陽氣升浮出外故萬物盛長人身之氣應之故脈氣升多出多為來盛降少入少為去衰而其形如鉤也若來去皆盛為太過心火感召外火火邪劫爍津液而膚痛熱邪瀰漫營衛如水之浸淫於周身也若脈氣來不盛去反盛是升出少而降入多其陽內虛心氣不足以榮養故心煩不寧中虛津液不化氣滯痰凝上見咳唾下則時泄穢氣此因火虛而脾土不實也秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此為太過病在外其氣來毛而微此為不及病在中太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音秋令陽氣下降入地萬物成實夏脈之浮洪轉為輕浮來急者收束繃急之象去散者陽氣下降之象以其浮部輕虛故名毛脈若其氣來毛而中央堅兩旁虛此本有內熱外涼收束故中央堅為太過之脈令人肺氣逆而背痛慍慍然者鬱悶不快之狀也其氣來毛而微者按之虛微無力此為不及之脈病在中氣虛故喘息而呼吸少氣且咳氣虛不能攝血隨咳而出喉下聞痰阻之病音也冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病帝曰何如而反岐伯曰其氣來如彈石者此為太過病在外其去如數者此為不及病在中太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變冬令陽氣盡入於地萬物歸藏故脈氣之來沉以搏是浮按不足沉按有力也陽藏而營運於內故名營以沉部有力故又名石脈也若其氣來如彈石則少柔和之氣此為太過之脈病在外者精傷陽氣外露不固故經脈懈弛病名解㑊而脊脈痛元氣耗散故少氣不欲言也其去如數者降入之氣速則鼓動之力弱此為不及之脈病在中心懸如飢者中氣空虛心少主宰如懸宕似飢而又不能食也䏚中清冷脊痛䏚者軟腰脊屬督脈皆腎虛肝鬱故少腹滿小便變其常或短或澀乃下焦氣化無權也此兩證皆內傷之病帝曰四時之序逆從之變異也然脾脈獨何主岐伯曰脾脈者土也孤臟以灌四旁者也帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見其來如水之流者此為太過病在外如鳥之喙者此為不及病在中太過則令人四肢不舉其不及則令人九竅不通名曰重強弦鉤毛石之脈合春夏秋冬之氣其有逆從變異即可驗病之吉凶惟脾土居五行之中故為孤臟鼓運輸布胃中水穀精氣以灌溉上下四旁故凡弦鉤毛石之脈皆以和緩之象為本者是脾胃之氣故云其善處不可得見也惡者其脈來如水之流者柔弱太過即前所云弱多胃氣少之病脈也蓋弱則不能輸布胃氣以達四肢故四肢無力不能舉也其氣有升降而無出入故如水之流則無鼓動之力矣其脈來如鳥之喙者堅鋭動數是柔緩之氣不及也因而升降不調清濁淆混則九竅不能通利內外壅滯故名重強謂邪實也此柔緩之氣不及與上之柔弱太過皆未得脾胃中和之氣而致病也真臟死脈真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真臟脈見者皆死不治也此言五臟之脈無和緩胃氣但是真臟孤陰其色既枯而不澤又青與白赤與黑白與赤黑與黃黃與青互現是五行克賊故皆死不可治也如循刀刃即細急之極也如按琴瑟弦即緊急不轉動也如循薏苡子纍纍然者應指堅硬粒粒絶無柔和之氣也如以毛羽中人膚者應指輕虛散亂略按全無也如指彈石辟辟然者應指板實而堅全無來去出入之象也弱而乍數乍疏者鼓動無力其氣散亂也真臟脈現而皆以毛折死者毛折其一身氣血津液盡枯矣帝曰見真臟曰死何也岐伯曰五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為而至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨現獨現者病勝臟也故死五臟皆賴胃中水穀之氣滋養故胃為五臟之本而胃之所以能消化出入者又藉脾氣之鼓運而脾則以腎中元陽為根此先後天之互相生化而不可偏失也其各臟之氣亦必藉胃氣以達肺始得行於經脈若邪氣勝而精氣衰則病甚而無胃陽與之俱至於手太陰故真臟之氣獨現於脈由病邪勝臟氣無胃陽生化之精氣故死也辨脈陰陽四時逆從病狀素問平人氣象論曰脈從陰陽病易已脈逆陰陽病難已脈得四時之順曰病無他脈反四時及不間臟曰難已肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂真臟見皆死脈從陰陽者如心肺應浮肝腎應沉腑脈浮大臟脈沉小之類得四時之順者如春弦夏鉤秋毛冬石而有和緩胃氣如此雖病亦易愈也脈逆陰陽者與上文從陰陽之脈象相反也其反四時者如春見毛脈是金剋木夏見石脈是水剋火秋見鉤脈是火剋金冬見代脈是土剋水也不間臟者謂病傳相剋也如肝傳脾木剋土也脾傳腎土剋水也腎傳心水剋火也心傳肺火剋金也肺傳肝金剋木也如此病皆難已也間臟者如肝傳心是木生火間肺臟而木不剋土也心傳脾是火生土間腎臟而火不剋金也脾傳肺是土生金間肝臟而土不剋水也肺傳腎是金生水間心臟而金不剋木也腎傳肝是水生木也間脾臟而水不剋火也如此病皆易愈也其相剋者死如經文所言肝見庚辛等是謂無胃氣之真臟脈與前章所言但弦無胃氣曰死同一理也脈有逆從四時未有臟形春夏而脈瘦秋冬而脈浮大命曰逆四時也風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也此又申明逆從之理若春夏秋冬四時未有弦鉤毛石本臟之脈形當春夏陽旺而升其脈反瘦小不應其氣內衰可見秋冬陽降而藏脈反浮大而虛本元不固可知此為逆四時也又如風熱而脈反靜是陽病見陰脈正不敵邪矣便泄脫血陰陽皆傷脈應沉弱而反實者是無胃氣之真臟脈也病在中而有積脈反虛元氣已虧何以攻積乎病在外感而脈澀堅絶少陽和之氣何以達營衛而祛邪乎故此皆為難治之病命曰反四時者與天地氣化相反也欲知寸口太過與不及寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈中手促上擊者曰肩背痛寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外寸口脈沉而弱曰寒熱及疝瘕少腹痛寸口脈沉而橫曰脅下有積腹中有橫積痛寸口脈沉而喘曰寒熱經曰氣口成寸以決死生故或云寸口或云氣口或云脈口皆指兩手之脈也人迎主六腑之陽寸口主五臟之陰已詳辨前關格病篇矣舊注分寸關尺解之不但穿鑿且非經旨何也蓋經已有專明寸關尺以候臟腑部位者又有指出心脈何如為某病肝脈何如為某病及各臟腑病均有指出若此章數節專明兩手通體脈象為病者也假如外感則兩手之脈皆浮火邪則兩手脈皆數之類安能分部位哉診者既已先明臟腑部位自能隨時審其病處故此經文止論通脈為病之理也言脈中手者初按應指浮部之脈也短者表陽鬱而化火故頭痛以諸陽皆會於頭也長者陽氣有餘也陽有餘則陰不足以榮養經脈下部屬陰故足脛痛也促急而上擊者陽氣逆於胸肺故肩背痛也兩手脈俱沉而堅者有形之邪結滯故病在中也若浮而盛者氣行於表必有外感之病也若沉而弱者表裡皆虛也表陽虛則腠理不固時發寒熱內陽虛則陰邪結於陰分而有疝瘕少腹痛之病也若沉而橫橫者頂指有力而不順軌故知其脅下有積及腹中有橫積痛也脈沉而喘喘者鼓動急促而不調達此邪閉營衛表裡不通故脈反沉而發寒熱又脈主一身之氣或肺氣壅遏而喘息脈沉亦有之此喘字有雙關之義當兼審其外證也辨陰陽臟腑脈象病證脈盛滑堅者曰病在外脈小實而堅者曰病在內脈小弱以澀謂之久病脈滑浮而疾者謂之新病脈急者曰疝瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹此亦言兩手之脈現病狀也盛滑堅者浮按盛而滑沉按則堅此外邪盛而臟腑之氣不得舒和而脈堅實故曰病在外也若小者浮按不足沉按則實而堅此邪在腑臟故曰病在內是陰邪結於陰分也其小弱而澀者氣血兩傷故知其為久病然比小實堅之脈為吉凡脈而至堅硬者非難治之痼疾即傷本元之重病也若滑浮而疾此外感邪熱元氣未傷故知其為新病也脈急者無柔和之氣此陰凝之邪故有疝瘕少腹痛之病也脈滑曰風者是內風挾痰若外風其脈必浮也澀者寒濕滯於血脈而為痹也緩而滑者熱邪傷中故脈縱緩而滑有力則為熱病無力則為痿病盛而緊者陰邪積滯於中必脹滿也素問脈要精微論曰心脈搏堅而長當病舌卷不能言其軟而散者當消環自已搏堅而長者弦強有力肝邪乘心也心主血肝藏血舌為心苗肝主筋血少則筋急經筋篇言手少陽之筋轉則舌卷故病舌卷不能言也若其脈軟而散者血傷氣耗也消環二字必有錯訛甲乙經作消渴自已蓋血傷氣耗津液不生當病消渴然脈既軟散心火已微但靜養自愈也肺脈搏堅而長當病唾血其軟而散者當病灌汗至令不復散發也肺主氣肝藏血脈搏堅而長者肝邪橫逆犯肺血隨氣升而唾出也若其脈軟而散者肺氣大傷腠理開泄當病大汗淋漓如水灌身至令不能還復以津氣外散而發越也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其軟而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也肝脈搏堅而長者弦硬有力也肝邪盛色當青乃反不青是因墜跌若搏擊傷血血瘀結於脅下脅為肝之部位血瘀則氣逆中焦升降不利故喘而氣逆也若其脈軟而散則氣血兩傷色當枯瘁今反潤澤而明者因水飲漫溢經氣不循軌路故脈軟散由渴時暴多飲遂易入肌皮之內溢於腸胃之外將有腫脹之變也上篇云肝脈微緩為水瘕痹澀甚亦為溢飲大抵微緩澀及軟散同為虛弱之脈但觀其色如枯瘁不澤則非水溢之病矣胃脈搏堅而長其色赤當病折髀其軟而散者當病食痹心肝火邪乘胃胃脈搏堅而長故其色赤髀者胃經所行之部火邪流於經其髀痛如打折也其脈軟而散者胃氣傷食而不能消化反加黃瘦病名食痹也脾脈搏堅而長其色黃當病少氣其軟而散色不澤者當病足䯒腫若水狀也脾脈本應柔緩乃反搏堅而長是木橫土困故面黃其無力鼓運則病少氣也其脈軟而散面無色澤者是脾土衰而氣下墜故足䯒腫若水狀而非水病如水邪色必澤而明此當大培脾土其腫可漸消也腎脈搏堅而長其色黃而赤者當病折腰其軟而散者當少血至令不復也腎藏天一真水其脈沉實柔滑反現搏堅而長者水虧不能涵木木盛火熾火又生土而並旺故現黃赤之色土本剋水腰者腎之府腎水虧極故腰痛如折也其脈軟而散者精血少而氣亦耗故脈軟散至令不能復元也帝曰診得心脈而急此為何病病形何如岐伯曰病名心疝少腹當有形也帝曰何以言之岐伯曰心為牡臟小腸為之使故曰少腹當有形也疝者俗名小腸氣也牡陽也小腸心之腑經絡相通而為表裡寒邪客於小腸而心脈現緊急之象以心為陽臟小腸為之使故病形現於少腹小腸所居之部也帝曰診得胃脈病形何如岐伯曰胃脈實則脹虛則泄帝曰病成而變何謂岐伯曰風成為寒熱疸成為消中厥成為巔病久風為飧泄脈風成為癘病之變化不可勝數胃司納穀消化以生氣血其脈實者邪積而食不消故脘中脹滿也脈虛則氣虛下陷而為泄瀉此虛實兩病也至其病變如風客於表則營衛不和而成寒熱之病以衛氣生於胃也邪火內蘊則成疸疸者善能消食而反瘦削名中消病也胃氣以下行為順胃者陽明也陽明行氣於三陽或邪氣阻格使三陽之氣厥逆成巔頂疼痛之病即前文所云上實下虛成厥巔疾也若風邪客於胃風性疏泄迅利穀食不及消化而即下泄病名飧泄也如風邪入於血脈之中閉而成熱胃為水穀之海而主肌肉邪熱水濕蒸腐血脈漸致肌肉潰爛痛癢相兼名為癘風俗名大麻風最為惡病也是故病變不可勝數要在明陰陽五行生化八風邪正虛實而已素問大奇論腎脈小急肝脈小急心脈小急不鼓皆為瘕心肝腎皆統營血者三部之脈或有一部小而急者皆為營血內結成有形癥瘕也蓋營行脈中以其閉結故脈小不能鼓按之則急強不和也腎肝並沉為石水並浮為風水並虛為死並小弦欲驚腎主寒水肝主風木腎肝兩脈俱沉者木沉水中病名石水少腹按之必堅此陽衰水中無氣陰凝如石而不化也腎肝俱浮則風勝而水從風鼓病名風水也肝腎並虛則水涸木枯生氣竭矣故死肝腎並小而弦者水虧不能涵木虛風內動而欲驚肝主驚故也腎脈大急沉肝脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝疝者或由風寒或由濕熱自腑及臟牽連筋脈肝主筋故不離乎肝邪而肝腎同源故脈象相同此言脈搏急者風寒之邪多絞痛也其言㿗疝者頑木不痛濕熱之邪也方書多種已詳明之今腎肝心肺之脈皆搏急謂急強不和是風寒之邪故其部位不同而邪則同故病同然心疝為小腸病如上文所云則肺疝為大腸病可知矣三陽急為瘕三陰急為疝二陰急為癇厥二陽急為驚三陽者太陽也三陰者太陰也瘕者假物成形也故其脈急皆邪氣閉結結於陽為瘕結於陰為疝邪同而病異也二陰者少陰也脈急者風寒之邪乘心腎故為癇厥是抽搐昏厥不省人事也二陽者陽明也脈急者木邪乘胃所謂聞木音則惕然而驚也辨脈病生死素問大奇論曰脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治腎脈小搏沉為腸澼下血血溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死熱現七日死脾脈外鼓沉者鼓動於本部之外其形扁闊也所以沉者脾濕下注大腸為腸澼大便無關閉常流糞水然脈形闊脾氣不虧久則濕去自愈也肝脈小緩為腸澼木弱土強故亦易治如腎脈小搏沉腸澼兼下血者濕熱流於下焦且傷陰血故腎脈小搏不和沉而不鼓血溫身熱者邪熱深真陰涸也故死若由心肝風火動而腸澼下血者其非脾傷故可治若其兩手脈小且沉澀而腸澼者氣血兩傷身不當熱而反熱者虛陽外露七日陽復之期陽竭不復則死矣蓋陽生於子陰生於午自子到午為七自午到子為七若陰陽之氣相生其病以七日可愈不相生而絶故其死亦以七日也胃脈沉鼓澀胃外鼓大心脈小堅急皆膈偏枯男子發左女子發右不喑舌轉可治三十日起其從者喑三歲起年不滿二十者三歲死胃脈沉鼓澀而又鼓大於脈路之外此痰涎阻滯甚矣心脈應浮洪而軟乃反小且堅急其營血大傷也營起於中焦並胃口故二者之脈皆為膈病中宮阻格其陰陽氣血不得流通經脈遂成偏枯男子陽氣由左轉故發左為逆女子由右轉故發右為逆如不喑舌能轉其臟未傷但傷經脈故可治三十日日月合壁人身之氣亦三十日陰陽會於本元故偏枯可愈其從者言男子發右女子發左也脾腎經脈絡舌根連舌本喑者脾腎之氣不能上達於舌本其外證雖從而內臟傷如未全脫調補三歲可愈若年不滿二十正在長旺之時而得此病其本弱質而虛損雖調補不過苟延三歲而死脈至而搏血衄身熱者死脈來懸鉤浮為常脈此條以下皆言兩手脈象不分部位也衄者熱傷氣血從陽道上溢也脈搏無柔和之象而又身熱則是孤陽發越之真臟脈也故死脈來懸鉤浮者心臟本脈之象而加虛軟此為衄病之常脈可治而愈因衄熱在清道陽分故脈浮而虛軟若吐血由濁道陰分而來脈應沉弱如脈浮即為凶矣此又不可不知也脈至如喘名曰暴厥暴厥者不知與人言脈至如數使人暴驚三四日自已如喘者脈勢激湍其氣暴逆而厥不省人事如氣順厥回可蘇厥不回即死矣脈至如數者似數非數而虛軟此心肝血虛氣動使人暴驚者如欲寐忽驚惕而醒所謂魂夢不安也但靜養可已脈至浮合浮合如數一息十至以上是經氣豫不足也微見九十日死脈至浮合者如浮萍之浮於水面而合其下全空如數一息十至以上是脫脈立死焉能延至九十日其中必有錯訛或謂微現浮合下空之脈是經氣不足九十日當死如數一息十至以上則即死不能計日此倒裝文法也脈至如火薪然是心精之豫奪也草乾而死脈至如散葉是肝氣豫虛也木葉落而死脈至如省客省客者脈塞而鼓是腎氣豫不足也懸去棗花而死脈至如丸泥是胃精豫不足也榆莢落而死脈至如橫格是膽氣豫不足也禾熟而死脈至如弦縷是包精豫不足也病善言下霜而死不言可治脈至如交漆交漆者左右傍至也微見三十日死脈至如火薪然者騰沸動搖心精奪而心火散草乾冬深時水旺火絶而死也脈至如散葉者輕虛浮泛無根也肝之氣血皆枯木葉落金氣旺則肝木絶而死也脈至如省客者欲出不出故曰塞曰鼓者有出而無入是腎氣奪而精血枯故脈形如是懸去棗花夏令土旺則水絶而死也脈至如丸泥者應指圓旋而無出入來去鬆軟如泥此胃中精氣不足榆莢落春深木旺時則土氣絶而死也脈至如橫格者其氣橫逆相格失少陽柔和調達之象是膽氣不足膽為甲木禾熟秋深金旺則木氣絶而死也脈至如弦縷者細長急強也包精不足包為心包絡代心用事精不足則心火動散言者心聲故善言即多言也下霜冬令寒水旺則火絶而死如不言心火尚靜大補心血可治也脈至如交漆左右傍至者營氣不循經脈陰陽散亂微現此象至三十日陰陽會合之時不能相生則氣絶而死也脈至如湧泉浮鼓肌中太陽氣豫不足也少氣味韭英而死太陽與少陰為表裡者脈至如湧泉騰沸而浮鼓肌中其沉部空矣浮為陽沉為陰陽根於陰者也沉部空則根敗而生氣少至韭英得味春陽上升時其根脫絶而死也此下各條皆死脈脈至如頽土之狀按之不得是肌氣豫不足五色先見黑白壘發而死脈至如頽土者應指全無鼓動之力故按之不得而無根底是肌氣不足也五色先見黑者腎水涸所謂面如漆柴者藟有五種白者發於春土既先敗腎水涸而無春生之氣焉得不死脈至如懸雍懸雍者浮揣切之益大是十二俞之豫不足也水凝而死喉間下垂之帝中根於腎臟傷損即死又名懸雍脈形似之而浮揣切之益大者表氣有餘內臟不固為十二俞之不足者其陽氣發泄日甚故至冬寒水凝時則陽竭而死俞皆在背是十二經脈臟腑之氣穴也脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熱寒熱獨並於腎也如此其人不得坐立春而死浮部小急如刀口按之堅大急如刀背絶無柔和之氣菀者鬱結也以五臟久郁邪氣獨並於腎腎傷腰折可臥不得坐腎敗不能生肝立春而木無生氣則絶而死脈至如丸滑不直手不直者按之不可得也是大腸氣豫不足也棗葉生而死直同值不值手者謂應指圓滑按之即無但虛浮之氣動滑也大腸為庚金棗葉生於夏火旺則金絶而死脈至如華者令人善恐不欲坐臥行立常聽是小腸氣豫不足也季秋而死如華者如花開放而無收束與心脈之如火薪然相類蓋小腸為丙火心為丁火臟腑為表裡而氣相通故脈相類火無收束是陰精枯而陽外泄心氣怯則令人恐恐則多疑故不欲坐臥行立常聽至季秋陽氣泄盡而死丙火墓於戌也辨婦人懷妊崩産脈病素問平人氣象論曰婦人手少陰脈動甚者妊子也手少陰心脈也心主血腎藏精精血盛而凝結成孕月事不下心火上炎而脈動甚故亦有煩渴欲嘔等證因火炎濁氣不得下通故也然其脈象和滑而非病其腎脈亦必流利而充實即知其有妊也若心脈虛動腎脈不滑而澀其月事不來此乃血瘀心火虛動而非孕久必成病也此云妊子者兼男女而言若欲辨別其脈左旺寸旺為陽為男右旺尺旺為陰為女又本經腹中論曰何以知懷子之且生也岐伯曰身有病而無邪脈也無邪脈者謂無澀滯不和而脈流利柔滑也有病者謂月事不通及煩渴思食酸物欲嘔等將生則腹痛也素問陰陽別論曰陰搏陽別謂之有子陰陽虛腸澼死陽加於陰謂之汗陰虛陽搏謂之崩三陰俱搏二十日夜半死二陰俱搏十三日夕時死一陰俱搏十日死三陽俱搏且鼓三日死三陰三陽俱搏心腹滿發盡不得隱曲五日死二陽俱搏其病溫死不治不過十日死此論脈象必以和緩胃氣為本若搏擊而不柔緩皆為病脈獨婦人懷孕不同故首標明陰搏陽別者如尺部如沉候皆為陰而搏擊有力與陽部浮候之脈別異此精血充盛必搏擊流利而不澀滯乃為有子之象也如澀滯即為血瘀若瘀結久必有腹痛脹滿等病也若脈陰陽俱虛而又腸澼下泄不止此無論男女皆本元虛脫不能收攝故死也陽加於陰者陽邪乘陰津液發泄而為汗如惡風者當用仲景桂枝湯如不惡風而寐即出者名盜汗審無外邪當滋陰為主也陰脈虛陽脈搏是陽亢不能統血歸經遂致暴崩此專指婦人也若三陰俱搏是無胃氣之真臟脈延二十日交過一氣又加一候至夜半陰極而陽氣不生則死矣二陰搏一陰搏皆大同小異也三陽俱搏且鼓三陰三陽俱搏皆真臟脈又兼心腹滿正敗而邪盛言發盡者脹滿極也不得隱曲者二便不通也此即關格證故皆死也二陽俱搏其病溫者孤陽無陰不過二候而死素問通評虛實論帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死乳子者新産乳哺其子之婦人也新産脫血而患溫熱病其脈小者正虛邪盛也若手足溫其脾胃陽和之氣尚能周布而生手足寒則陽氣厥逆而死也若中風熱陽邪而受於上部陽分心肺氣逆故喘鳴肩息乃喘息有聲而抬肩也邪壅於上故脈必實大若和緩有胃氣者但瀉其邪熱可生若實大急強是氣脫之真臟脈則死矣
